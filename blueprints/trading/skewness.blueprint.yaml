# ============================================================
# skewness — Feature Blueprint
# Source: CFA LV1 2025 Vol 01 — Module 3, p.112-115
# ============================================================

feature: skewness
version: "1.0.0"
description: Compute skewness — the standardised third central moment — measuring the asymmetry of a return distribution around its mean
category: trading
tags: [quantitative-methods, descriptive-statistics, skewness, higher-moments, distribution-shape, cfa-level-1]
aliases:
  - sample-skewness
  - third-moment
  - asymmetry
  - positive-skew
  - negative-skew
  - left-skew
  - right-skew

actors:
  - id: statistics_engine
    name: Statistical Analytics Engine
    type: system

fields:
  - name: observations
    type: json
    required: true
    label: Array of numeric observations (returns)
  - name: population_or_sample
    type: select
    required: false
    label: sample (default) | population

rules:
  core_formula:
    # Source: Vol 1, Module 3, Equation 7, p.113
    sample_skewness: "S_k = [ n / ((n-1)(n-2)) ] * sum( (X_i - X_bar)^3 ) / s^3"
    population_skewness: "gamma_1 = (1/N) * sum( (X_i - mu)^3 ) / sigma^3"
    large_n_approximation: "S_k ≈ (1/n) * sum( (X_i - X_bar)^3 ) / s^3 for large n"
  interpretation:
    zero: "Symmetric distribution (normal-like)"
    positive: "Right tail longer; mean > median > mode; frequent small losses, occasional large gains"
    negative: "Left tail longer; mean < median < mode; frequent small gains, occasional large losses"
    threshold_of_significance: "|S_k| > 0.5 is generally considered economically meaningful; > 1.0 is substantial"
  return_distribution_implications:
    equities: "Daily equity returns are typically negatively skewed (crash risk)"
    hedge_funds: "Many hedge fund strategies exhibit negative skew (short vol, merger arb)"
    lottery_ticket_assets: "OOTM options, venture capital — positive skew"
  empirical_relations:
    mean_median_mode:
      positive_skew: "Mean > Median > Mode (approximate relation)"
      negative_skew: "Mean < Median < Mode (approximate relation)"
    normal_baseline: "Normal distribution has S_k = 0"
  validation:
    minimum_sample: "n >= 3 for sample skewness (denominators (n-1)(n-2))"
    non_zero_std_dev: "s > 0 (skewness undefined for constant series)"

outcomes:
  compute_sample_skewness:
    priority: 1
    description: Sample skewness
    given:
      - field: observations
        source: input
        operator: exists
      - field: sample_size
        source: computed
        operator: gte
        value: 3
    then:
      - action: call_service
        target: statistics_engine
      - action: emit_event
        event: stats.skewness_calculated
  compute_population_skewness:
    priority: 2
    description: Population skewness
    given:
      - field: population_or_sample
        source: input
        operator: eq
        value: population
    then:
      - action: call_service
        target: statistics_engine
      - action: emit_event
        event: stats.skewness_calculated
  insufficient_sample:
    priority: 10
    description: Fewer than 3 observations
    given:
      - field: sample_size
        source: computed
        operator: lt
        value: 3
    then:
      - action: emit_event
        event: stats.skewness_rejected
    error: SKEWNESS_INSUFFICIENT_SAMPLE
  constant_series:
    priority: 11
    description: Standard deviation is zero
    given:
      - field: std_dev
        source: computed
        operator: eq
        value: 0
    then:
      - action: emit_event
        event: stats.skewness_rejected
    error: SKEWNESS_UNDEFINED
  empty_observations:
    priority: 12
    description: Empty dataset
    given:
      - field: observations
        source: input
        operator: not_exists
    then:
      - action: emit_event
        event: stats.skewness_rejected
    error: SKEWNESS_EMPTY

errors:
  - code: SKEWNESS_EMPTY
    status: 400
    message: Observations array must not be empty
  - code: SKEWNESS_INSUFFICIENT_SAMPLE
    status: 400
    message: Sample skewness requires at least 3 observations
  - code: SKEWNESS_UNDEFINED
    status: 422
    message: Skewness is undefined when standard deviation is zero

events:
  - name: stats.skewness_calculated
    payload: [dataset_id, skewness, sample_size, interpretation]
  - name: stats.skewness_rejected
    payload: [dataset_id, reason_code]

anti_patterns:
  - rule: Do not ignore skewness when using mean-variance optimisation
    why: "Markowitz assumes symmetric returns; negative-skew assets (e.g., short-vol strategies) look attractive by mean-variance but carry crash risk that mean-variance misses"
  - rule: Do not compute skewness on small samples and present it as precise
    why: "Skewness estimators are notoriously noisy; a single outlier can swing sign at n < 30. Always report sample size and CI"
  - rule: Do not confuse skew with kurtosis
    why: "Skew measures asymmetry; kurtosis measures tail weight. A distribution can be symmetric (zero skew) yet fat-tailed (high kurtosis)"
  - rule: Do not use normal-distribution VaR for heavily skewed portfolios
    why: "Normal VaR understates tail loss for negatively skewed distributions; use empirical or Cornish-Fisher adjustment"

api:
  http:
    method: POST
    path: /analytics/stats/skewness
  request:
    schema:
      observations: array
      population_or_sample: string
  response:
    success:
      status: 200
      schema:
        skewness: number
        sample_size: number
        interpretation: string
    errors:
      - status: 400
        error_code: SKEWNESS_EMPTY
      - status: 400
        error_code: SKEWNESS_INSUFFICIENT_SAMPLE
      - status: 422
        error_code: SKEWNESS_UNDEFINED


