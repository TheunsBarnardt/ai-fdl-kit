# ============================================================
# Primitive collision shapes for physics and raycasting — Feature Blueprint
# FDL v0.1.0 | Blueprint v1.0.0
# ============================================================
# Extracted from: Godot Engine
# Tech stack: C++ engine
# ============================================================

feature: collision-shapes
version: "1.0.0"
description: "Primitive collision shapes for physics and raycasting"
category: integration
tags: [integration, godot]

actors:
  - id: game_engine
    name: "Godot Engine"
    type: system

outcomes:
  box_shape:
    given:
      - "Axis-aligned bounding box is requested"
    then:
      - action: transition_state
        field: status
        from: idle
        to: active
    result: "Axis-aligned bounding box completed"
    priority: 1
  sphere_shape:
    given:
      - "Spherical collision is requested"
    then:
      - action: transition_state
        field: status
        from: idle
        to: active
    result: "Spherical collision completed"
    priority: 2
  capsule_shape:
    given:
      - "Cylinder with rounded ends is requested"
    then:
      - action: transition_state
        field: status
        from: idle
        to: active
    result: "Cylinder with rounded ends completed"
    priority: 3
  cylinder_shape:
    given:
      - "Circular extrusion is requested"
    then:
      - action: transition_state
        field: status
        from: idle
        to: active
    result: "Circular extrusion completed"
    priority: 4
  mesh_shape:
    given:
      - "Trimesh from model data is requested"
    then:
      - action: transition_state
        field: status
        from: idle
        to: active
    result: "Trimesh from model data completed"
    priority: 5
  convex_shape:
    given:
      - "Optimized convex hull is requested"
    then:
      - action: transition_state
        field: status
        from: idle
        to: active
    result: "Optimized convex hull completed"
    priority: 6

rules:
  implementation:
    description: "Feature implemented in C++ engine core"
  platform_agnostic:
    description: "Works across desktop, web, mobile platforms"

related: []

extensions:
  tech_stack:
    language: "C++"
    runtime: "Godot 4.x"
