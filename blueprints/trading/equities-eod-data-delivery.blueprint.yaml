# ============================================================
# Equities End-of-Day Data Delivery — Feature Blueprint
# FDL v0.1.0 | Blueprint v1.0.0
# ============================================================
# Extracted from: Equities Non-Live Market Data Products
# Specifications v11.0 (173 pages, Public classification)
# Describes fixed-width flat file dissemination of end-of-day
# equity market statistics via FTP for licensed subscribers
# ============================================================

feature: equities-eod-data-delivery
version: "1.0.0"
description: "End-of-day equity market data delivery via FTP file dissemination — fixed-width flat files covering daily, weekly, and monthly statistics and corporate actions for listed securities"
category: trading
tags: [market-data, eod, equities, ftp, dissemination, fixed-width, non-live, corporate-actions]

actors:
  - id: data_subscriber
    name: "Data Subscriber"
    type: human
    description: "Licensed recipient who receives end-of-day equity data files"

  - id: exchange_operations
    name: "Exchange Operations"
    type: system
    description: "Exchange dissemination system that generates and delivers EOD files"

  - id: customer_services
    name: "Customer Services"
    type: human
    description: "Provisions subscriber credentials and dataset access before go-live"

fields:
  # ── Leading Record (first 41 chars of every record) ───────────────────────
  # Source: Section 10 — Leading Record Layout

  - name: sector_code
    type: text
    required: true
    # START 1, LENGTH 8, END 8 — ICB sector classification code (Source: Section 5, 10)

  - name: instrument_alpha_code
    type: text
    required: true
    # START 9, LENGTH 6, END 14 — alpha identifier; MAY be reused after delisting
    # MUST NOT be used as a permanent key — use instrument_numeric_code

  - name: record_type
    type: text
    required: true
    # START 15, LENGTH 3, END 17 — e.g. DE, DS, DO, SA, DD, DT, DR, CR, VA, VO, NH, NL, NQ
    # Weekly: WS, WL, WO, DW, WT, WD | Monthly: ME, MS, MO, AT, MT
    # Reference: EN, EK, ES, EC, CO, CS, ED, EE, FY, SN | Corporate: CA

  - name: sub_type
    type: text
    required: true
    # START 18, LENGTH 2, END 19 — groups fields within a record type

  - name: continuation_sequence_number
    type: number
    required: true
    # START 20, LENGTH 2, END 21 — joins multi-record payloads for the same record type

  - name: run_date
    type: date
    required: true
    # START 22, LENGTH 8, END 29 — format CCYYMMDD — dissemination date (not trade date)

  - name: board
    type: text
    required: true
    # START 30, LENGTH 4, END 33 — board the instrument/sector is linked to

  - name: market
    type: text
    required: true
    # START 34, LENGTH 4, END 37 — market the instrument/sector is linked to

  - name: exchange
    type: text
    required: true
    # START 38, LENGTH 4, END 41 — exchange the instrument/sector is linked to

  # ── Instrument Identification ──────────────────────────────────────────────
  - name: instrument_numeric_code
    type: number
    required: true
    # START 42, LENGTH 7, END 48 — permanent identifier, NEVER reused after delisting
    # Source: Section 10 NOTE — "We recommend programming be done according to
    # INSTRUMENT NUMERIC CODE" because alpha codes may be reused

  # ── Daily Instrument Statistics (DE/DEE Sub Type 01) ──────────────────────
  # Source: Section 11.1.1

  - name: traded_indicator
    type: boolean
    required: false
    # START 49, LENGTH 1, END 49 — indicates whether the instrument traded on the specified day

  - name: closing_price
    type: number
    required: false
    # START 50, LENGTH 9, END 58 — instrument closing price from trading engine

  - name: volume_traded
    type: number
    required: false
    # START 59, LENGTH 13, END 71 — total volume for the instrument on trading day

  - name: high_trade_price
    type: number
    required: false
    # START 72, LENGTH 9, END 80 — highest trade price for the day

  - name: low_trade_price
    type: number
    required: false
    # START 81, LENGTH 9, END 89 — lowest trade price for the day

  - name: dividend_yield
    type: number
    required: false
    # START 90, LENGTH 7, END 96 — annualised rolling dividends / closing price

  - name: earnings_yield
    type: number
    required: false
    # START 97, LENGTH 8, END 104 — percentage of purchase price recouped in earnings/year

  - name: last_best_bid
    type: number
    required: false
    # START 105, LENGTH 9, END 113 — best bid at time first closing price was published

  - name: last_best_offer
    type: number
    required: false
    # START 114, LENGTH 9, END 122 — best offer at time first closing price was published

  - name: closing_price_change_cents
    type: number
    required: false
    # START 123, LENGTH 9, END 131 — closing price variation for the period quoted in cents

  - name: closing_price_change_pct
    type: number
    required: false
    # START 132, LENGTH 7, END 138 — closing price variation as a percentage

  - name: gain_loss_indicator
    type: text
    required: false
    # START 139, LENGTH 1, END 139 — gain or loss indicator for the day

  - name: share_price_type
    type: select
    required: false
    options:
      - value: "C"
        label: "Cents"
      - value: "%"
        label: "Percentage"
    # START 140, LENGTH 1, END 140 — if % format, field lengths for closing price/high/low/yields differ

  - name: index_constituent
    type: boolean
    required: false
    # START 141, LENGTH 1, END 141 — indicates if the instrument is an index constituent

  - name: instrument_status
    type: text
    required: false
    # START 142, LENGTH 1, END 142 — current status of the instrument

  - name: instrument_type_code
    type: text
    required: false
    # START 143, LENGTH 10, END 152 — type of instrument (e.g. A Ordinary, REIT, ETF, warrant)

  - name: earnings_yield_sign
    type: text
    required: false
    # START 153, LENGTH 1, END 153 — N for negative, P for positive

  - name: interest_payment_yield
    type: number
    required: false
    # START 154, LENGTH 7, END 160 — annualised rolling interest payments / closing price

  - name: capital_payment_yield
    type: number
    required: false
    # START 161, LENGTH 7, END 167 — annualised rolling capital payments / closing price

  - name: reit_distribution_yield
    type: number
    required: false
    # START 168, LENGTH 7, END 174 — annualised rolling REIT distributions / closing price

  # ── Daily Instrument Statistics (DE/DEE Sub Type 02) ──────────────────────
  # Source: Section 11.1.2

  - name: value_traded
    type: number
    required: false
    # START 49, LENGTH 11, END 59 — total value traded (no decimals)

  - name: value_traded_with_decimals
    type: number
    required: false
    # START 145, LENGTH 13, END 157 — same as value_traded but includes decimal portion

  - name: price_earnings_ratio
    type: number
    required: false
    # START 60, LENGTH 11, END 70 — years of earnings to recoup purchase price

  - name: last_traded_price
    type: number
    required: false
    # START 71, LENGTH 9, END 79 — last automatic trade price for the day

  - name: number_of_trades
    type: number
    required: false
    # START 80, LENGTH 7, END 86 — number of trades for the day

  - name: last_deal_traded_price
    type: number
    required: false
    # START 87, LENGTH 9, END 95 — last automatic or negotiated trade price for the day

  - name: opening_trade_price
    type: number
    required: false
    # START 96, LENGTH 9, END 104 — first automatic trade price at start of business day

  - name: moving_12m_high_price
    type: number
    required: false
    # START 105, LENGTH 9, END 113 — highest adjusted trade price over 12 months (as at previous trading day)

  - name: moving_12m_high_price_date
    type: date
    required: false
    # START 114, LENGTH 8, END 121 — date of 12-month high (format DATE)

  - name: moving_12m_low_price
    type: number
    required: false
    # START 122, LENGTH 9, END 130 — lowest adjusted trade price over 12 months (as at previous trading day)

  - name: moving_12m_low_price_date
    type: date
    required: false
    # START 131, LENGTH 8, END 138 — date of 12-month low

  - name: ex_dividend_indicator
    type: boolean
    required: false
    # START 140, LENGTH 1, END 140 — indicates instrument is trading ex-dividend

  - name: dividend_yield_indicator
    type: text
    required: false
    # START 141, LENGTH 1, END 141 — ampersand (&) if dividend yield affected by declared dividend

  - name: tradability_indicator_alpha
    type: select
    required: false
    options:
      - value: "L"
        label: "Liquid"
      - value: "I"
        label: "Illiquid"
    # START 142, LENGTH 1, END 142

  - name: tradability_indicator_numeric
    type: select
    required: false
    options:
      - value: "1"
        label: "Highly Liquid"
      - value: "2"
        label: "Normally Liquid"
      - value: "3"
        label: "Illiquid"
    # START 143, LENGTH 1, END 143

  - name: price_earnings_ratio_sign
    type: text
    required: false
    # START 144, LENGTH 1, END 144 — N for negative, P for positive

  # ── Daily Instrument Statistics (DE/DEE Sub Type 03) ──────────────────────
  # Source: Section 11.1.3

  - name: market_capitalisation
    type: number
    required: false
    # START 49, LENGTH 14, END 62 — listed shares × closing price

  - name: dividend_cover
    type: number
    required: false
    # START 63, LENGTH 7, END 69 — annualised rolling headline EPS / rolling dividends

  - name: new_high_indicator
    type: boolean
    required: false
    # START 70, LENGTH 1, END 70 — instrument attained a new high since listing

  - name: new_low_indicator
    type: boolean
    required: false
    # START 71, LENGTH 1, END 71 — instrument attained a new low since listing

  - name: avg_value_traded_12m
    type: number
    required: false
    # START 72, LENGTH 13, END 84 — average value traded per day over 12 months (as at previous day)

  - name: avg_days_traded_12m
    type: number
    required: false
    # START 85, LENGTH 9, END 93 — average number of days instrument traded over 12 months

  - name: avg_volume_traded_12m
    type: number
    required: false
    # START 94, LENGTH 13, END 106 — average adjusted volume over 12 months (as at previous day)

  - name: closing_price_year_ago
    type: number
    required: false
    # START 107, LENGTH 9, END 115 — adjusted closing price 12 months prior

  - name: closing_price_3m_ago
    type: number
    required: false
    # START 116, LENGTH 9, END 124 — adjusted closing price 3 months prior

  - name: total_shares_listed
    type: number
    required: false
    # START 125, LENGTH 15, END 139 — total number of listed shares available for trading

  - name: dividend_cover_sign
    type: text
    required: false
    # START 140, LENGTH 1, END 140 — N for negative, PO for positive

  # ── Delivery metadata ─────────────────────────────────────────────────────
  - name: delivery_channel
    type: select
    required: true
    options:
      - value: "ftp"
        label: "FTP"
      - value: "leased_line"
        label: "Leased Line"
    # Source: Section 3 Introduction

  - name: dataset_name
    type: text
    required: true
    # Provisioned by Customer Services — required for FTP authentication

  - name: user_id
    type: text
    required: true
    # Sign-on credential provisioned by Customer Services (Source: Section 3.1)

states:
  field: delivery_status
  values:
    - name: pending
      initial: true
      description: "Subscriber provisioned, awaiting first delivery"

    - name: active
      description: "Subscriber receiving data files normally"

    - name: suspended
      terminal: false
      description: "Delivery suspended (e.g. non-payment or technical issue)"

    - name: terminated
      terminal: true
      description: "Subscription ended"

rules:
  identification:
    # Source: Section 10, Note — permanent vs reusable identifiers
    - "MUST: Use instrument_numeric_code as the permanent instrument identifier in all systems"
    - "MUST NOT: Use instrument_alpha_code as a permanent key — it MAY be reused after delisting"
    - "SHOULD: Store both alpha and numeric codes, but key all joins on numeric code"

  delivery:
    # Source: Section 3 — Introduction
    - "MUST: Authenticate with user_id, password, and dataset_name before accessing FTP"
    - "SHOULD: Test FTP access as soon as credentials are received from Customer Services"
    - "MUST: Subscribe to required record types in writing before go-live"
    - "SHOULD: Select only record types relevant to the subscriber's use case to minimise processing overhead"

  file_format:
    # Source: Section 10 — Leading Record Layout
    - "MUST: Parse the 41-char leading record header before interpreting any data payload"
    - "MUST: Use continuation_sequence_number to reconstruct multi-record payloads"
    - "SHOULD: Handle filler fields (reserved for future use) by ignoring content"
    - "MUST: Interpret run_date using CCYYMMDD format"

  statistics:
    # Source: Section 6 — Statistical Rules
    - "MUST: New trades (on-book and published off-book) increment volume, value, and number_of_trades for trade date T"
    - "MUST: Same-day cancellations decrement volume, value, and number_of_trades for T"
    - "MUST: Next-day cancellations decrement volume, value, and number_of_trades for T-1"
    - "MUST: On-book trades and NX trades affect high/low price; off-book published trades do NOT affect high/low price"
    - "MAY: Apply statistical rules only to on-book and published off-book trade types — exclude internal/private off-book trades"

  sectors:
    # Source: Section 5 — Sector Classification
    - "SHOULD: Use ICB (Industry Classification Benchmark) sector codes for instrument classification"
    - "MAY: Use DS05 record print sequence numbers for media-layout ordering of sectors and instruments"

  corporate_actions:
    # Source: Section 15 — Corporate Actions
    - "SHOULD: Process CA 01 records for dividend, rights offer, share split, and conversion events"
    - "SHOULD: Process CA 02 records for meeting diary (annual general meetings, etc.)"
    - "MUST: Apply withholding tax percentage and foreign tax fields when processing dividend payments"

  dummy_lines:
    # Source: Section 9 — Dummy Lines for Corporate Actions
    - "SHOULD: Detect dummy lines by checking for 'DUMMY' in the ISIN field of EN/ENE records"
    - "MAY: Include dummy line instruments in index replication calculations as instructed by index provider"

sla:
  closing_price_delivery:
    metric: "Closing price availability"
    max_duration: "18:30"
    # Source: Section 3 — "Closing Price information is available at 18:30 and 20:00 each business day"
    reason: "First closing price batch available at 18:30; second batch at 20:00 daily"

  ezip_delivery:
    metric: "E.Zip file delivery"
    max_duration: "20:30"
    # Source: Section 4 — Data Product List
    reason: "E.Zip daily dissemination file must be available via FTP by 20:30"

  ezip_early_delivery:
    metric: "EE.Zip file delivery"
    max_duration: "19:00"
    # Source: Section 4 — Data Product List
    reason: "EE.Zip (early) daily file must be available via FTP by 19:00"

  snapshot_delivery:
    metric: "Intraday snapshot availability"
    max_duration: "13:00"
    # Source: Section 3 — "Market snapshots available at 10:30, 13:00 and after 17:00"
    reason: "Market snapshots of trades and values available at 10:30, 13:00, and after 17:00"

outcomes:
  subscriber_provisioned:
    priority: 1
    given:
      - "subscription agreement is in place"
      - "subscriber has requested specific record types in writing"
    then:
      - action: create_record
        type: subscriber
        fields: [user_id, dataset_name, delivery_channel, subscribed_record_types]
      - action: transition_state
        field: delivery_status
        from: pending
        to: active
      - action: notify
        target: data_subscriber
        channel: email
        message: "Dataset name, User ID, and Password issued before 11:00 on go-live day"
      - action: emit_event
        event: eod_data.subscriber_activated
        payload: [user_id, dataset_name, go_live_date]
    result: "Subscriber receives credentials and begins receiving daily EOD files"

  eod_file_delivered:
    priority: 2
    given:
      - "trading day has ended"
      - "exchange dissemination run has completed"
    then:
      - action: create_record
        type: dissemination_file
        fields: [file_name, run_date, record_types_included, delivery_channel]
      - action: emit_event
        event: eod_data.file_available
        payload: [file_name, run_date, delivery_channel]
    result: "EOD file (E.Zip or EE.Zip) available on FTP for all active subscribers"

  file_parsed_successfully:
    priority: 3
    given:
      - "subscriber downloads EOD ZIP file"
      - "file is not corrupted"
    then:
      - action: set_field
        target: parse_status
        value: "success"
      - action: emit_event
        event: eod_data.file_parsed
        payload: [run_date, record_count, record_types_found]
    result: "All records extracted and stored for downstream processing"
    transaction: true

  instrument_stats_processed:
    priority: 4
    given:
      - "record_type is DE or DEE"
      - "sub_type is 01 through 07"
    then:
      - action: set_field
        target: closing_price
        value: "from record position 50-58"
      - action: set_field
        target: volume_traded
        value: "from record position 59-71"
      - action: set_field
        target: instrument_numeric_code
        value: "from record position 42-48"
      - action: emit_event
        event: eod_data.instrument_stats_stored
        payload: [run_date, instrument_numeric_code, closing_price]
    result: "Daily instrument statistics stored and available for query"

  corporate_action_processed:
    priority: 5
    given:
      - "record_type is CA"
      - "sub_type is 01 or 02"
    then:
      - action: create_record
        type: corporate_action
        fields: [instrument_numeric_code, run_date, action_type, effective_date, option1_nett_rate, option2_nett_rate, withholding_tax_pct, foreign_tax_pct]
      - action: emit_event
        event: eod_data.corporate_action_received
        payload: [instrument_numeric_code, action_type, effective_date]
    result: "Corporate action stored and flagged for portfolio adjustment"
    transaction: true

  authentication_failed:
    priority: 1
    error: EOD_AUTH_FAILED
    given:
      - field: user_id
        source: input
        operator: not_exists
    result: "FTP authentication rejected — credentials not recognised"

  file_not_available:
    priority: 2
    error: EOD_FILE_NOT_READY
    given:
      - "requested run_date file has not yet been generated"
    result: "File not available — check delivery schedule and retry after scheduled delivery time"

  invalid_record_format:
    priority: 3
    error: EOD_RECORD_PARSE_ERROR
    given:
      - "record does not match expected fixed-width layout for record_type + sub_type"
    then:
      - action: emit_event
        event: eod_data.parse_error
        payload: [run_date, record_type, sub_type, raw_record, error_detail]
    result: "Record rejected and logged for investigation"

errors:
  - code: EOD_AUTH_FAILED
    status: 401
    message: "Authentication failed. Please verify your credentials with your account manager."

  - code: EOD_FILE_NOT_READY
    status: 503
    message: "The requested data file is not yet available. Please check the delivery schedule and retry."

  - code: EOD_RECORD_PARSE_ERROR
    status: 422
    message: "A record could not be parsed. Please check the record layout specification for the record type."

  - code: EOD_UNKNOWN_RECORD_TYPE
    status: 422
    message: "An unrecognised record type was encountered. Please verify you are using the current specification version."

  - code: EOD_SUBSCRIPTION_INACTIVE
    status: 403
    message: "Your data subscription is not active. Please contact your account manager."

events:
  - name: eod_data.subscriber_activated
    description: "New subscriber provisioned and go-live confirmed"
    payload: [user_id, dataset_name, go_live_date]

  - name: eod_data.file_available
    description: "EOD dissemination file posted to FTP"
    payload: [file_name, run_date, delivery_channel]

  - name: eod_data.file_parsed
    description: "Subscriber successfully parsed an EOD file"
    payload: [run_date, record_count, record_types_found]

  - name: eod_data.instrument_stats_stored
    description: "Daily instrument statistics record processed and stored"
    payload: [run_date, instrument_numeric_code, closing_price]

  - name: eod_data.corporate_action_received
    description: "Corporate action record processed for an instrument"
    payload: [instrument_numeric_code, action_type, effective_date]

  - name: eod_data.parse_error
    description: "A record failed to parse — logged for investigation"
    payload: [run_date, record_type, sub_type, error_detail]

related:
  - feature: market-data-feeds
    type: recommended
    reason: "Complements real-time feeds — EOD delivery provides closing prices, statistics, and corporate actions for batch processing and historical analysis"

  - feature: fix-message-persistence
    type: optional
    reason: "FIX persistence patterns apply to EOD flat-file storage — same append-only, sequence-keyed storage model"

  - feature: data-import-export
    type: recommended
    reason: "EOD ZIP files require structured import pipeline matching fixed-width record layouts"


# ─── AGI READINESS ─────────────────────────────────────────

agi:
  # --- AGI READINESS (auto-generated by propagate-agi.js) ---

  goals:
    - id: reliable_equities_eod_data_delivery
      description: End-of-day equity market data delivery via FTP file dissemination — fixed-width flat files covering daily,
        weekly, and monthly statistics and corporate actions for listed securities
      success_metrics:
        - metric: policy_violation_rate
          target: 0%
          measurement: Operations that violate defined policies
        - metric: audit_completeness
          target: 100%
          measurement: All decisions have complete audit trails
      constraints:
        - type: regulatory
          description: All operations must be auditable and traceable
          negotiable: false
  autonomy:
    level: supervised
    human_checkpoints:
      - before transitioning to a terminal state
    escalation_triggers:
      - error_rate > 5
      - consecutive_failures > 3
  safety:
    action_permissions:
      - action: subscriber_provisioned
        permission: autonomous
      - action: eod_file_delivered
        permission: autonomous
      - action: file_parsed_successfully
        permission: autonomous
      - action: instrument_stats_processed
        permission: autonomous
      - action: corporate_action_processed
        permission: autonomous
      - action: authentication_failed
        permission: autonomous
      - action: file_not_available
        permission: autonomous
      - action: invalid_record_format
        permission: autonomous
  tradeoffs:
