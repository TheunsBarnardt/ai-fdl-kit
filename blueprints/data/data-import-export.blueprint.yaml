# ============================================================
# DATA IMPORT/EXPORT — Portable Feature Blueprint
# FDL v0.1.0 | Blueprint v1.0.0
# ============================================================
# Bulk CSV, Excel, and JSON import and export with background
# processing, row-level validation, and configurable error handling.
# ============================================================
# This blueprint describes BEHAVIOR, not implementation.
# It can be used to generate this feature for any framework.
# ============================================================

feature: data-import-export
version: "1.0.0"
description: Bulk data import and export supporting CSV, Excel, and JSON formats with column mapping, row validation, background processing, and configurable error handling
category: data
tags: [import, export, csv, excel, json, bulk-data, etl, background-processing]

fields:
  - name: file
    type: file
    required: true
    label: "Import File"
    validation:
      - type: max
        value: 52428800
        message: "File size must not exceed 50 MB"

  - name: format
    type: select
    required: true
    label: "File Format"
    options:
      - value: "csv"
        label: "CSV"
      - value: "xlsx"
        label: "XLSX"
      - value: "json"
        label: "JSON"

  - name: mapping
    type: json
    required: false
    label: "Column-to-Field Mapping"

  - name: on_error
    type: select
    required: false
    label: "Error Handling Strategy"
    options:
      - value: "skip"
        label: "Skip"
      - value: "fail"
        label: "Fail"
    default: skip

  - name: status
    type: select
    required: true
    label: "Job Status"
    options:
      - value: "pending"
        label: "Pending"
      - value: "validating"
        label: "Validating"
      - value: "processing"
        label: "Processing"
      - value: "completed"
        label: "Completed"
      - value: "partial"
        label: "Partial"
      - value: "failed"
        label: "Failed"

  - name: error_log
    type: json
    required: false
    label: "Error Log"

  - name: row_count
    type: number
    required: false
    label: "Total Row Count"

  - name: success_count
    type: number
    required: false
    label: "Successfully Processed Rows"

  - name: failure_count
    type: number
    required: false
    label: "Failed Rows"

  - name: export_format
    type: select
    required: false
    label: "Export Format"
    options:
      - value: "csv"
        label: "CSV"
      - value: "xlsx"
        label: "XLSX"
      - value: "json"
        label: "JSON"

  - name: export_filters
    type: json
    required: false
    label: "Export Filters"

  - name: download_url
    type: url
    required: false
    label: "Export Download URL"

rules:
  import:
    max_file_size_bytes: 52428800
    # 50 MB limit; configurable per deployment
    max_rows: 100000
    # Safety limit to prevent runaway imports
    background_threshold_rows: 1000
    # Imports with more than 1000 rows are processed asynchronously
    validate_before_insert: true
    # Every row is validated against field rules before insertion
    duplicate_detection: "configurable"
    # Can match on specified unique fields to detect duplicates
    supported_encodings: [utf-8, utf-16, latin-1]
    # CSV encoding detection with fallback

  column_mapping:
    auto_detect: true
    # Attempt to match column headers to field names automatically
    case_insensitive: true
    # Column name matching ignores case
    unmapped_columns: "ignore"
    # Columns not in the mapping are silently skipped

  export:
    max_records: 500000
    # Large exports are chunked and processed in background
    streaming: true
    # Export uses streaming to minimize memory usage
    download_url_expiry_hours: 24
    # Signed download URLs expire after 24 hours

  error_handling:
    skip_mode: "log_and_continue"
    # In skip mode, invalid rows are logged and processing continues
    fail_mode: "abort_and_rollback"
    # In fail mode, all changes are rolled back on first error
    error_log_max_entries: 10000
    # Truncate error log after this many entries to prevent bloat

outcomes:
  import_completed:
    priority: 1
    given:
      - "a valid import file is uploaded"
      - "all rows pass validation"
    then:
      - action: set_field
        target: status
        value: completed
      - action: set_field
        target: success_count
        description: "Set to total row count"
      - action: emit_event
        event: import.completed
        payload: [job_id, format, row_count, success_count, duration_ms]
    result: "All rows imported successfully; status set to completed"

  import_partial:
    priority: 2
    given:
      - "a valid import file is uploaded"
      - "some rows fail validation"
      - "on_error strategy is 'skip'"
    then:
      - action: set_field
        target: status
        value: partial
      - action: set_field
        target: error_log
        description: "Populate with details of each failed row"
      - action: emit_event
        event: import.completed
        payload: [job_id, format, row_count, success_count, failure_count]
    result: "Valid rows imported; failed rows logged in error_log; status set to partial"

  import_failed:
    priority: 3
    error: IMPORT_FAILED
    given:
      - any:
        - "the file is corrupted or in an unsupported format"
        - "a row fails validation and on_error strategy is 'fail'"
    then:
      - action: set_field
        target: status
        value: failed
      - action: set_field
        target: error_log
        description: "Populate with failure details"
      - action: emit_event
        event: import.failed
        payload: [job_id, format, error_summary]
    result: "Import aborted; all changes rolled back; error details provided"

  export_completed:
    priority: 4
    given:
      - "an export request is submitted with valid parameters"
      - "records matching the filters exist"
    then:
      - action: set_field
        target: download_url
        description: "Generate signed download URL for the exported file"
      - action: emit_event
        event: export.completed
        payload: [job_id, format, record_count, file_size_bytes]
    result: "Export file generated and download URL returned"

  import_file_too_large:
    priority: 10
    error: IMPORT_FILE_TOO_LARGE
    given:
      - field: file
        source: input
        operator: gt
        value: 52428800
        description: "Uploaded file exceeds 50 MB limit"
    result: "Error returned indicating file size limit"

errors:
  - code: IMPORT_FAILED
    status: 422
    message: "Import failed; check error log for details"

  - code: IMPORT_FILE_TOO_LARGE
    status: 413
    message: "Import file exceeds the maximum allowed size of 50 MB"

  - code: IMPORT_INVALID_FORMAT
    status: 400
    message: "File format is not supported or file is corrupted"

  - code: IMPORT_MAPPING_INVALID
    status: 400
    message: "Column mapping references fields that do not exist"

  - code: EXPORT_NO_RECORDS
    status: 404
    message: "No records match the export filters"

events:
  - name: import.started
    description: "An import job has been created and is queued for processing"
    payload: [job_id, format, file_size_bytes, row_count]

  - name: import.completed
    description: "An import job finished processing (fully or partially)"
    payload: [job_id, format, row_count, success_count, failure_count]

  - name: import.failed
    description: "An import job failed and was rolled back"
    payload: [job_id, format, error_summary]

  - name: export.completed
    description: "An export job finished and the file is ready for download"
    payload: [job_id, format, record_count, file_size_bytes]

related:
  - feature: file-storage
    type: required
    reason: "Import files and export outputs are stored in cloud storage"

  - feature: pagination
    type: optional
    reason: "Export may paginate through large datasets during generation"

  - feature: audit-trail
    type: recommended
    reason: "Import and export operations should be recorded for compliance"


# ─── AGI READINESS ─────────────────────────────────────────

agi:
  # --- AGI READINESS (auto-generated by propagate-agi.js) ---

  goals:
    - id: reliable_data_import_export
      description: Bulk data import and export supporting CSV, Excel, and JSON formats with column mapping, row validation,
        background processing, and configurable error handling
      success_metrics:
        - metric: data_accuracy
          target: 100%
          measurement: Records matching source of truth
        - metric: duplicate_rate
          target: 0%
          measurement: Duplicate records detected post-creation
      constraints:
        - type: performance
          description: Data consistency must be maintained across concurrent operations
          negotiable: false
  autonomy:
    level: supervised
    escalation_triggers:
      - error_rate > 5
  safety:
    action_permissions:
      - action: import_completed
        permission: autonomous
      - action: import_partial
        permission: autonomous
      - action: import_failed
        permission: autonomous
      - action: export_completed
        permission: autonomous
      - action: import_file_too_large
        permission: autonomous
  tradeoffs:
    - prefer: data_integrity
      over: performance
      reason: data consistency must be maintained across all operations
  coordination:
    protocol: request_response
    consumes:
      - capability: file_storage
        from: file-storage
        fallback: degrade
