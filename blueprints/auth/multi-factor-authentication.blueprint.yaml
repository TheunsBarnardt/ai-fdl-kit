feature: multi-factor-authentication
version: "1.0.0"
description: MFA with OTP, WebAuthn, and recovery codes
category: auth
tags: [mfa, credentials]

fields:
  - name: credential_type
    type: select
    required: true
    label: Credential Type
    validation:
      - type: required
        message: Type required

  - name: otp_code
    type: text
    required: false
    label: OTP Code
    validation:
      - type: pattern
        value: "^[0-9]{6}$"
        message: Must be 6 digits

rules:
  core: MFA credential management

outcomes:
  mfa_verified:
    priority: 5
    given:
      - field: otp_code
        operator: exists
        value: null
    then:
      - action: emit_event
        event: mfa.verified
        payload: [user_id]
    result: MFA verified

errors:
  - code: INVALID_OTP
    status: 401
    message: Invalid OTP code

events:
  - name: mfa.verified
    description: MFA verification successful
    payload: [user_id]

related: []


# ─── AGI READINESS ─────────────────────────────────────────

agi:
  # --- AGI READINESS (auto-generated by propagate-agi.js) ---

  goals:
    - id: reliable_multi_factor_authentication
      description: MFA with OTP, WebAuthn, and recovery codes
      success_metrics:
        - metric: unauthorized_access_rate
          target: 0%
          measurement: Failed authorization attempts that succeed
        - metric: response_time_p95
          target: < 500ms
          measurement: 95th percentile response time
      constraints:
        - type: security
          description: Follow OWASP security recommendations
          negotiable: false
  autonomy:
    level: supervised
    human_checkpoints:
      - before making irreversible changes
    escalation_triggers:
      - error_rate > 5
      - consecutive_failures > 3
  safety:
    action_permissions:
      - action: mfa_verified
        permission: autonomous
  tradeoffs:
    - prefer: security
      over: performance
      reason: authentication must prioritize preventing unauthorized access
  verification:
    invariants:
      - error messages never expose internal system details

extensions:
  source:
    repo: https://github.com/keycloak/keycloak
    project: Keycloak
    tech_stack: Java
