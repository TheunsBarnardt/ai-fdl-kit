# ============================================================
# Broker Client Data Upload — Feature Blueprint
# FDL v0.1.0 | Blueprint v1.0.0
# ============================================================
# Extracted from: Client Data Upload Specification v0.17
# Fixed-width card code upload of client account data from
# broker member firms to central back-office administration
# covering account details, addresses, legal/tax, portfolios
# ============================================================

feature: broker-client-data-upload
version: "1.0.0"
description: "Client account data upload from broker firms to central back-office via fixed-width card code files covering account, CSDP, addresses, FATCA/IT3 tax, and portfolio data"
category: trading
tags: [back-office, broker, upload, client-data, fatca, kyc, card-codes, fixed-width, csdp]

actors:
  - id: participating_broker
    name: "Participating Broker"
    type: external
    description: "Equity member firm submitting client account data"
  - id: back_office_system
    name: "Back Office System"
    type: system
  - id: compliance_officer
    name: "Compliance Officer"
    type: human
    description: "Broker staff member reviewing FATCA and tax compliance data"

fields:
  # ── Header/Trailer ──
  - name: card_code
    type: text
    required: true
  - name: broker_code
    type: text
    required: true
  - name: upload_date
    type: date
    required: true
  - name: record_count
    type: number
    required: false

  # ── Mandatory & Optional Client Account Fields (Card Code 031) ──
  - name: account_number
    type: text
    required: true
  - name: client_name
    type: text
    required: true
  - name: client_initials
    type: text
    required: false
  - name: client_surname
    type: text
    required: false
  - name: client_title
    type: select
    required: false
  - name: id_number
    type: text
    required: true
  - name: id_type
    type: select
    required: false
    # SA ID, Passport, Company Registration, etc.
  - name: date_of_birth
    type: date
    required: false
  - name: gender
    type: select
    required: false
  - name: country_of_birth
    type: text
    required: false
  - name: nationality
    type: text
    required: false
  - name: citizenship
    type: text
    required: false
  - name: language_preference
    type: select
    required: false
  - name: account_type
    type: select
    required: false
    # Individual, Joint, Company, Trust, Partnership, etc.

  # ── CSDP Details (Card Code 032) ──
  - name: csdp_code
    type: text
    required: false
  - name: csdp_account_number
    type: text
    required: false
  - name: csdp_bank_code
    type: text
    required: false
  - name: dematerialisation_indicator
    type: select
    required: false

  # ── All Other Fields (Card Code 033) ──
  - name: employment_status
    type: select
    required: false
  - name: occupation
    type: text
    required: false
  - name: employer_name
    type: text
    required: false
  - name: income_category
    type: select
    required: false
  - name: source_of_funds
    type: text
    required: false
  - name: risk_rating
    type: select
    required: false

  # ── Additional Client Maintenance Fields (Card Code 036) ──
  - name: vat_number
    type: text
    required: false
  - name: income_tax_reference
    type: text
    required: false
  - name: marital_status
    type: select
    required: false
  - name: spouse_id_number
    type: text
    required: false

  # ── Address Maintenance (Card Code 037) ──
  - name: postal_address_line_1
    type: text
    required: false
  - name: postal_address_line_2
    type: text
    required: false
  - name: postal_city
    type: text
    required: false
  - name: postal_postcode
    type: text
    required: false
  - name: postal_country
    type: text
    required: false
  - name: physical_address_line_1
    type: text
    required: false
  - name: physical_city
    type: text
    required: false
  - name: physical_postcode
    type: text
    required: false
  - name: email_address
    type: email
    required: false
  - name: mobile_number
    type: phone
    required: false
  - name: telephone_home
    type: phone
    required: false
  - name: telephone_work
    type: phone
    required: false

  # ── Legal and Tax (Card Code 038) ──
  - name: fatca_status
    type: select
    required: false
  - name: fatca_classification
    type: text
    required: false
  - name: gin_number
    type: text
    required: false
    # Global Intermediary Identification Number
  - name: tin_number
    type: text
    required: false
    # Tax Identification Number
  - name: tin_country
    type: text
    required: false
  - name: it3b_exclusion
    type: select
    required: false
  - name: it3c_exclusion
    type: select
    required: false
  - name: withholding_tax_exemption
    type: select
    required: false
  - name: us_person_indicator
    type: select
    required: false
  - name: crs_status
    type: select
    required: false
    # Common Reporting Standard
  - name: politically_exposed_person
    type: select
    required: false
  - name: sanctions_check_status
    type: select
    required: false

  # ── Portfolio Details (Card Code 034) ──
  - name: portfolio_code
    type: text
    required: false
  - name: portfolio_manager
    type: text
    required: false
  - name: portfolio_mandate_type
    type: select
    required: false
  - name: portfolio_base_currency
    type: text
    required: false
  - name: portfolio_benchmark
    type: text
    required: false

rules:
  submission:
    - "MUST: Support automated file submission via FTP"
    - "MUST: Support manual online upload via comprehensive reporting process function"
    - "MUST: Configure email addresses before allowing upload submission"
    - "MUST: Provide response dataset acknowledging upload status"
    - "MUST: Archive processed upload files"
  validation:
    - "MUST: Validate mandatory fields on Card Code 031"
    - "MUST: Reject files with invalid Card Code 000 header"
    - "MUST: Report field-level errors via COMPR/PCOMPR error reporting"
    - "MUST: Return response codes indicating success or failure per record"
  format:
    - "MUST: Use fixed-width card code record format"
    - "MUST: Start file with Header Record (Card Code 000)"
    - "MUST: End file with Trailer Record (Card Code 999)"
    - "MUST: Group related fields into logical Card Codes (031, 032, 033, 034, 036, 037, 038)"
  compliance:
    - "MUST: Support FATCA classification fields (GIN, TIN, US person indicator)"
    - "MUST: Support Common Reporting Standard (CRS) fields"
    - "MUST: Support IT3(b) and IT3(c) tax reporting exclusion flags"
    - "MUST: Support politically exposed person (PEP) indicator"
  identification:
    - "MUST: Use unique account number as primary identifier"
    - "MUST: Capture ID number and ID type for every client"

errors:
  - code: CLIENT_UPLOAD_INVALID_HEADER
    status: 400
    message: "Upload file missing or invalid Card Code 000 header"
  - code: CLIENT_UPLOAD_MANDATORY_FIELD_MISSING
    status: 422
    message: "Required client account field missing"
  - code: CLIENT_UPLOAD_DUPLICATE_ACCOUNT
    status: 409
    message: "Account number already exists"
  - code: CLIENT_UPLOAD_FATCA_VALIDATION_FAILED
    status: 422
    message: "FATCA classification fields failed validation"
  - code: CLIENT_UPLOAD_FILE_REJECTED
    status: 422
    message: "Upload file rejected - see response dataset for details"

outcomes:
  automated_upload_submission:
    priority: 1
    description: "Broker submits upload file via FTP automated process"
    given:
      - field: email_configured
        source: db
        operator: eq
        value: true
      - field: file_format
        source: input
        operator: eq
        value: "fixed_width_card_code"
    then:
      - action: create_record
        type: upload_submission
        fields: [broker_code, file_name, submission_timestamp, record_count]
      - action: emit_event
        event: client_upload.submitted

  validate_mandatory_fields:
    priority: 2
    description: "Validate Card Code 031 mandatory fields"
    given:
      - field: card_code
        source: input
        operator: eq
        value: "031"
    then:
      - action: call_service
        target: field_validator
      - action: emit_event
        event: client_upload.validated

  mandatory_field_missing:
    priority: 3
    error: CLIENT_UPLOAD_MANDATORY_FIELD_MISSING
    given:
      - any:
          - field: account_number
            source: input
            operator: not_exists
          - field: client_name
            source: input
            operator: not_exists
          - field: id_number
            source: input
            operator: not_exists
    then:
      - action: create_record
        type: error_response
        fields: [broker_code, record_reference, missing_field, error_code]
      - action: emit_event
        event: client_upload.validation_failed

  fatca_validation_check:
    priority: 4
    description: "Validate FATCA classification on Card Code 038"
    given:
      - field: card_code
        source: input
        operator: eq
        value: "038"
      - field: us_person_indicator
        source: input
        operator: eq
        value: "Y"
    then:
      - action: call_service
        target: fatca_validator
      - action: emit_event
        event: client_upload.fatca.validated

  generate_response_dataset:
    priority: 5
    description: "Generate response dataset with per-record status"
    given:
      - "upload file processing complete"
    then:
      - action: create_record
        type: response_dataset
        fields: [broker_code, upload_reference, success_count, failure_count, error_details]
      - action: notify
        channel: email
      - action: emit_event
        event: client_upload.response.delivered

  archive_upload:
    priority: 6
    description: "Archive processed upload file"
    given:
      - field: processing_status
        source: system
        operator: eq
        value: "completed"
    then:
      - action: call_service
        target: archive_storage
      - action: emit_event
        event: client_upload.archived

extensions:
  card_codes:
    "000":
      name: "Header Record"
      purpose: "File metadata and broker identification"
    "031":
      name: "Mandatory, Conditionally Optional and Frequently Used Optional fields"
      purpose: "Core client account details"
    "032":
      name: "CSDP Details"
      purpose: "Central Security Depository Participant account info"
    "033":
      name: "All Other Fields"
      purpose: "Employment, income, risk rating, KYC fields"
    "034":
      name: "Portfolio Details"
      purpose: "Portfolio configuration for portfolio clients"
    "036":
      name: "Additional Client Maintenance fields"
      purpose: "VAT, tax reference, marital status"
    "037":
      name: "Additional Address Maintenance fields"
      purpose: "Postal, physical, email, phone contact"
    "038":
      name: "Legal and Tax Maintenance fields"
      purpose: "FATCA, CRS, IT3, PEP, sanctions"
    "999":
      name: "Trailer Record"
      purpose: "Record count and checksum"
  submission_methods:
    - "Automated FTP submission"
    - "Manual online upload via comprehensive reporting function"
    - "Batch upload"
  delivery_workflow:
    - "1. Email address setup"
    - "2. Upload file submission (FTP or manual)"
    - "3. Error reporting via COMPR/PCOMPR"
    - "4. Response dataset delivery"
    - "5. Archiving"
  compliance_standards:
    - "FATCA (Foreign Account Tax Compliance Act)"
    - "CRS (Common Reporting Standard)"
    - "Local IT3(b) and IT3(c) tax reporting"
    - "PEP (Politically Exposed Persons) screening"

related:
  - feature: broker-back-office-dissemination
    type: recommended
  - feature: broker-financial-data-upload
    type: optional
  - feature: client-onboarding
    type: recommended
