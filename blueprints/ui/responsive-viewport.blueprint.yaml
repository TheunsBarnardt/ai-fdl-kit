    consumes:
      - capability: editor_state
        from: editor-state
        fallback: degrade

extensions:
  source:
    repo: "https://github.com/puckeditor/puck"
    project: "Page editor"
    tech_stack: "TypeScript + React"
    files_traced: 8
    entry_points:
      - "components/ViewportControls/"
      - "lib/get-zoom-config.ts"
      - "lib/use-reset-auto-zoom.ts"
      - "components/AutoFrame/"
