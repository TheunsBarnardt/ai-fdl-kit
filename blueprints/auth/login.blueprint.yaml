# ============================================================
# LOGIN — Feature Blueprint
# FDL v0.1.0 | Blueprint v1.0.0
# ============================================================
# Authenticates a user with email and password.
# This is the most rebuilt feature in software — this blueprint
# ensures nothing gets missed.
# ============================================================

feature: login
version: "1.0.0"
description: Authenticate a user with email and password
category: auth
tags: [authentication, session, security, identity]

# ─── FIELDS ────────────────────────────────────────────────
# What the user provides to log in

fields:
  - name: email
    type: email
    required: true
    label: "Email Address"
    placeholder: "you@example.com"
    sensitive: false
    validation:
      - type: required
        message: "Email is required"
      - type: email
        message: "Please enter a valid email address"
      - type: maxLength
        value: 255
        message: "Email is too long"

  - name: password
    type: password
    required: true
    label: "Password"
    sensitive: true
    validation:
      - type: required
        message: "Password is required"
      - type: minLength
        value: 8
        message: "Password must be at least 8 characters"
      - type: maxLength
        value: 64
        # OWASP: bcrypt has a 72-byte limit. Cap at 64 to prevent
        # silent truncation and DoS via extremely long passwords.
        message: "Password must be less than 64 characters"

  - name: remember_me
    type: boolean
    required: false
    label: "Remember me"
    default: false

# ─── RULES ─────────────────────────────────────────────────
# Business logic and security policies

rules:
  security:
    max_attempts: 5
    lockout_duration_minutes: 15
    lockout_scope: per_email
    # per_email: only that account locks (default, least disruptive)
    # per_ip: that IP locks (prevents credential stuffing)
    # both: both lock (strictest, use for high-security apps)

    rate_limit:
      window_seconds: 60
      max_requests: 10
      scope: per_ip
      # 10 login attempts per minute per IP — catches automated attacks
      # without affecting normal users

    password_comparison:
      constant_time: true
      # MANDATORY: use bcrypt.compare() or equivalent
      # Never use == or === for password comparison
      # Timing attacks can reveal password length

    credential_error_handling:
      generic_message: true
      # CRITICAL: always return "Invalid email or password"
      # NEVER return "User not found" vs "Wrong password"
      # This prevents user enumeration attacks

  session:
    type: jwt
    # jwt: stateless, scalable, good for SPAs and APIs
    # session-cookie: stateful, simpler, good for SSR apps
    # opaque-token: stateful with DB lookup, most secure

    access_token:
      expiry_minutes: 15
      # Short-lived — forces refresh, limits damage if stolen
    refresh_token:
      expiry_days: 7
      rotate_on_use: true
      # Issue new refresh token on each use — detects token theft
    remember_me_expiry_days: 30

    extend_on_activity: true
    # Reset the expiry timer on each authenticated request

    secure_flags:
      http_only: true # Prevent XSS access to tokens
      secure: true # HTTPS only
      same_site: strict # Prevent CSRF

  email:
    require_verified: true
    # If false, unverified users can still log in
    # If true, redirect to email-verification flow
    case_sensitive: false
    # ALWAYS normalize to lowercase before DB lookup
    # "User@Email.com" and "user@email.com" are the same account
    trim_whitespace: true
    # Remove leading/trailing spaces — common paste error

# ─── FLOWS ─────────────────────────────────────────────────
# Every path a user can take through this feature

flows:
  happy_path:
    description: "Successful login"
    steps:
      - id: validate
        action: validate_fields
        description: "Check email format and password length client-side"
      - id: normalize
        action: normalize_email
        description: "Lowercase and trim the email"
      - id: lookup
        action: lookup_user_by_email
        description: "Find user in database"
        on_fail: invalid_credentials
      - id: check_lock
        action: check_account_not_locked
        description: "Verify account is not in lockout period"
        on_fail: account_locked
      - id: check_disabled
        action: check_account_not_disabled
        description: "Verify account is active"
        on_fail: account_disabled
      - id: compare_password
        action: compare_password_hash
        description: "bcrypt.compare(input, stored_hash)"
        on_fail: invalid_credentials
      - id: check_verified
        action: check_email_verified
        description: "Only if rules.email.require_verified is true"
        on_fail: email_not_verified
      - id: reset_attempts
        action: reset_attempt_counter
        description: "Clear failed attempt count on success"
      - id: create_session
        action: generate_session_tokens
        description: "Create access + refresh tokens"
      - id: emit_success
        action: emit
        event: login.success
      - id: redirect
        action: redirect
        target: dashboard

  invalid_credentials:
    description: "Wrong email or wrong password — same response for both"
    trigger: "password_mismatch OR user_not_found"
    steps:
      - action: increment_attempt_counter
      - action: emit
        event: login.failed
      - action: show_error
        error: LOGIN_INVALID_CREDENTIALS
    # SECURITY: identical response prevents user enumeration

  account_locked:
    description: "Too many failed attempts"
    trigger: "attempt_count >= rules.security.max_attempts"
    steps:
      - action: emit
        event: login.locked
      - action: show_error
        error: LOGIN_ACCOUNT_LOCKED
      - action: send_notification
        template: account_locked_email
        # Optional: email the user that their account was locked

  email_not_verified:
    description: "User exists but hasn't confirmed email"
    trigger: "user.email_verified == false"
    steps:
      - action: emit
        event: login.unverified
      - action: redirect
        target: email-verification
        message: "Please verify your email before logging in"

  account_disabled:
    description: "Account deactivated by admin or user"
    trigger: "user.status == disabled"
    steps:
      - action: show_error
        error: LOGIN_ACCOUNT_DISABLED

  rate_limited:
    description: "Too many requests from this IP"
    trigger: "request_count >= rules.security.rate_limit.max_requests"
    steps:
      - action: show_error
        error: LOGIN_RATE_LIMITED

# ─── ERRORS ────────────────────────────────────────────────
# Every error this feature can return
# Messages are user-safe — no internal details

errors:
  - code: LOGIN_INVALID_CREDENTIALS
    status: 401
    message: "Invalid email or password"
    retry: true
    # Intentionally vague — same message for wrong email AND wrong password

  - code: LOGIN_ACCOUNT_LOCKED
    status: 423
    message: "Account temporarily locked. Please try again later."
    retry: false
    # Don't reveal exact lockout duration to attackers

  - code: LOGIN_EMAIL_NOT_VERIFIED
    status: 403
    message: "Please verify your email address to continue"
    retry: false
    redirect: email-verification

  - code: LOGIN_ACCOUNT_DISABLED
    status: 403
    message: "This account has been disabled. Please contact support."
    retry: false

  - code: LOGIN_RATE_LIMITED
    status: 429
    message: "Too many login attempts. Please wait a moment."
    retry: true

  - code: LOGIN_VALIDATION_ERROR
    status: 422
    message: "Please check your input and try again"
    retry: true

# ─── EVENTS ────────────────────────────────────────────────
# Signals emitted for other features to consume
# Think of these as hooks — audit logs, analytics, notifications

events:
  - name: login.success
    description: "User successfully authenticated"
    payload: [user_id, email, timestamp, ip_address, user_agent, session_id]
    # Consumers: audit log, analytics, last-login tracker, session manager

  - name: login.failed
    description: "Authentication attempt failed"
    payload: [email, timestamp, ip_address, user_agent, attempt_count, reason]
    # Consumers: security monitoring, brute-force detection, rate limiter

  - name: login.locked
    description: "Account locked due to too many failures"
    payload: [email, user_id, timestamp, lockout_until, attempt_count]
    # Consumers: notification system, admin alerts, security dashboard

  - name: login.unverified
    description: "Login blocked — email not verified"
    payload: [user_id, email, timestamp]
    # Consumers: email verification resend, analytics

# ─── RELATIONSHIPS ─────────────────────────────────────────
# How this feature connects to others

related:
  - feature: signup
    type: required
    reason: "User must exist before they can log in"
    ui_link: "Don't have an account? Sign up"
    ui_link_position: below_form

  - feature: password-reset
    type: recommended
    reason: "Users will forget passwords — #1 support request"
    ui_link: "Forgot password?"
    ui_link_position: below_password_field

  - feature: email-verification
    type: recommended
    reason: "Required when rules.email.require_verified is true"

  - feature: mfa
    type: optional
    reason: "Second factor after password verification"
    insert_after: "flows.happy_path.compare_password"
    # MFA step inserts between password check and session creation

  - feature: logout
    type: required
    reason: "Every login needs a logout"

  - feature: session-management
    type: optional
    reason: "View and revoke active sessions across devices"

# ─── UI HINTS ──────────────────────────────────────────────
# Suggestions for UI implementation — adapters may ignore these
# These are NOT requirements, just sensible defaults

ui_hints:
  layout: single_column_centered
  max_width: 420px
  show_logo: true

  fields_order: [email, password, remember_me]

  actions:
    primary:
      label: "Sign in"
      type: submit
      full_width: true
    secondary: []

  links:
    - label: "Forgot password?"
      target: password-reset
      position: below_password_field
    - label: "Don't have an account? Sign up"
      target: signup
      position: below_form

  accessibility:
    autofocus: email
    autocomplete:
      email: username
      password: current-password
    # autocomplete hints help password managers
    aria_live_region: true
    # Announce errors to screen readers

  loading:
    disable_button: true
    show_spinner: true
    prevent_double_submit: true

# ─── EXTENSIONS ────────────────────────────────────────────
# Framework-specific overrides — keyed by adapter name
# These provide implementation hints without affecting the core spec

extensions:
  nextjs:
    route: "/login"
    layout: "(auth)"
    server_action: true
    middleware_redirect: "/dashboard"
    # Use Next.js middleware to redirect authenticated users away from /login

  payload_cms:
    collection: "users"
    auth:
      tokenExpiration: 900 # 15 min in seconds
      maxLoginAttempts: 5
      lockTime: 900000 # 15 min in ms

  laravel:
    guard: "web"
    middleware: ["guest"]
    throttle: "5,1"

  express:
    route: "/api/auth/login"
    middleware: ["rate-limit", "cors"]

  flutter:
    screen: "LoginScreen"
    state_management: "riverpod"
    secure_storage: true
