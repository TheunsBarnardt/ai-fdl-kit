# ============================================================
# model-training — Machine Learning Model Training Workflow
# FDL v0.1.0 | Blueprint v1.1.0
# ============================================================
# Sources:
#   TensorFlow public API (tensorflow.org/api_docs)
#     tensorflow/python/keras/engine/training.py
#     tensorflow/python/keras/callbacks.py
#     tensorflow/python/distribute/mirrored_strategy.py
#   PyTorch (github.com/pytorch/pytorch)
#     torch/optim/optimizer.py
#     torch/optim/adam.py
#     torch/optim/lr_scheduler.py
# ============================================================

feature: model-training
version: "1.1.0"
description: "Train, evaluate, and checkpoint ML models with configurable optimizers, LR schedulers, mixed precision, and distributed strategies — covers Keras fit API and PyTorch training loop"
category: ai
tags:
  - ai
  - machine-learning
  - training
  - deep-learning
  - pytorch
  - tensorflow

actors:
  - id: ml_engineer
    name: "ML Engineer"
    type: human
    description: "Defines model architecture, hyperparameters, and training strategy"
  - id: data_engineer
    name: "Data Engineer"
    type: human
    description: "Prepares and validates training datasets"
  - id: training_runtime
    name: "Training Runtime"
    type: system
    description: "Executes the training loop on CPU, GPU, or TPU hardware"
  - id: checkpoint_store
    name: "Checkpoint Store"
    type: system
    description: "Persists model weights and optimizer state to disk"

fields:
  - name: optimizer
    type: select
    required: true
    label: "Optimizer"
    options:
      - value: "adam"
        label: "Adam (adaptive learning rate, recommended default)"
      - value: "sgd"
        label: "SGD (stochastic gradient descent)"
      - value: "rmsprop"
        label: "RMSProp (good for RNNs)"
      - value: "adamw"
        label: "AdamW (Adam + decoupled weight decay)"
      - value: "adagrad"
        label: "Adagrad (per-parameter learning rates)"
      - value: "nadam"
        label: "NAdam (Adam with Nesterov momentum)"
      - value: "radam"
        label: "RAdam (rectified Adam, variance-corrected warmup)"
      - value: "adafactor"
        label: "Adafactor (memory-efficient, no second moment storage)"

  # PyTorch Adam-specific hyperparameters
  # Source: torch/optim/adam.py — validated: 0 <= betas < 1, eps > 0
  - name: optimizer_betas
    type: json
    required: false
    label: "Adam Beta Coefficients [beta1, beta2] (PyTorch)"

  - name: optimizer_eps
    type: number
    required: false
    label: "Optimizer Epsilon for Numerical Stability (default: 1e-8)"

  - name: optimizer_weight_decay
    type: number
    required: false
    label: "Weight Decay (L2 penalty)"

  - name: optimizer_amsgrad
    type: boolean
    required: false
    label: "Use AMSGrad Variant of Adam (PyTorch)"

  - name: optimizer_fused
    type: boolean
    required: false
    label: "Use Fused Kernel Implementation (PyTorch, CUDA only, fastest — requires floating point params)"

  # PyTorch LR scheduler type
  # Source: torch/optim/lr_scheduler.py — __all__ list
  - name: lr_scheduler
    type: select
    required: false
    label: "Learning Rate Scheduler"
    options:
      - value: "none"
        label: "None (constant learning rate)"
      - value: "step"
        label: "StepLR (decay by gamma every step_size epochs)"
      - value: "cosine"
        label: "CosineAnnealingLR (cosine decay to eta_min)"
      - value: "cosine_warm_restarts"
        label: "CosineAnnealingWarmRestarts (periodic restarts)"
      - value: "one_cycle"
        label: "OneCycleLR (super-convergence, 1-cycle policy)"
      - value: "reduce_on_plateau"
        label: "ReduceLROnPlateau (reduce when metric stops improving)"
      - value: "exponential"
        label: "ExponentialLR (decay by gamma every epoch)"
      - value: "polynomial"
        label: "PolynomialLR (polynomial decay to zero)"
      - value: "lambda"
        label: "LambdaLR (custom lambda function)"

  - name: mixed_precision
    type: boolean
    required: false
    label: "Enable Mixed Precision Training (fp16/bf16 forward, fp32 optimizer state)"

  - name: learning_rate
    type: number
    required: true
    label: "Learning Rate"
    validation:
      - type: min
        value: 0
        message: "Learning rate must be positive"
      - type: max
        value: 1
        message: "Learning rate should not exceed 1.0"

  - name: loss_function
    type: select
    required: true
    label: "Loss Function"
    options:
      - value: "categorical_crossentropy"
        label: "Categorical Cross-Entropy (multi-class, one-hot labels)"
      - value: "sparse_categorical_crossentropy"
        label: "Sparse Categorical Cross-Entropy (multi-class, integer labels)"
      - value: "binary_crossentropy"
        label: "Binary Cross-Entropy (binary classification)"
      - value: "mean_squared_error"
        label: "Mean Squared Error (regression)"
      - value: "huber"
        label: "Huber Loss (regression, robust to outliers)"
      - value: "mean_absolute_error"
        label: "Mean Absolute Error (regression)"

  - name: epochs
    type: number
    required: true
    label: "Max Training Epochs"
    validation:
      - type: min
        value: 1
        message: "Must train for at least 1 epoch"

  - name: batch_size
    type: number
    required: true
    label: "Batch Size"
    validation:
      - type: min
        value: 1
        message: "Batch size must be at least 1"

  - name: validation_split
    type: number
    required: false
    label: "Validation Split (fraction of training data, 0–1)"

  - name: checkpoint_path
    type: text
    required: false
    label: "Checkpoint Directory Path"

  - name: early_stopping_patience
    type: number
    required: false
    label: "Early Stopping Patience (epochs without improvement)"

  - name: gradient_clip_norm
    type: number
    required: false
    label: "Gradient Clip Norm (prevents exploding gradients)"

  - name: distribute_strategy
    type: select
    required: false
    label: "Distribution Strategy"
    options:
      - value: "default"
        label: "Default (single device)"
      - value: "mirrored"
        label: "MirroredStrategy / DDP (multi-GPU, same machine)"
      - value: "multi_worker"
        label: "MultiWorkerMirrored / DDP multi-node (multi-node cluster)"
      - value: "fsdp"
        label: "FSDP (Fully Sharded Data Parallel — large model sharding)"
      - value: "tpu"
        label: "TPUStrategy (Google Cloud TPU)"

  - name: training_status
    type: select
    required: false
    label: "Training Status"
    options:
      - value: "idle"
        label: "Idle"
      - value: "running"
        label: "Running"
      - value: "completed"
        label: "Completed"
      - value: "stopped_early"
        label: "Stopped Early"
      - value: "failed"
        label: "Failed"

  - name: current_epoch
    type: number
    required: false
    label: "Current Epoch"

  - name: best_val_loss
    type: number
    required: false
    label: "Best Validation Loss"

states:
  run_state:
    field: training_status
    values:
      - name: idle
        initial: true
      - name: running
      - name: completed
        terminal: true
      - name: stopped_early
        terminal: true
      - name: failed
        terminal: true
    transitions:
      - from: idle
        to: running
        actor: ml_engineer
        description: "Training initiated via model.fit()"
      - from: running
        to: completed
        actor: training_runtime
        description: "All epochs completed successfully"
      - from: running
        to: stopped_early
        actor: training_runtime
        description: "EarlyStopping callback triggered — no improvement for patience epochs"
      - from: running
        to: failed
        actor: training_runtime
        description: "Unrecoverable error (OOM, NaN loss, shape mismatch)"

rules:
  data_preparation:
    input_validation: |
      MUST validate input tensor shapes match the model's expected input shape
      before calling model.fit(). Mismatched shapes raise InvalidArgumentError.
      Data types must match the model's dtype (float32 is the default).
      # Source: tensorflow/python/keras/engine/training.py

    normalization: |
      MUST normalize or standardize feature values before training.
      Common strategies: (x - mean) / std or MinMaxScaler to [0, 1].
      Unnormalized inputs cause slow convergence, gradient instability,
      and saturated activations (sigmoid/tanh).

    shuffle: |
      MUST shuffle training data before each epoch to prevent the model
      from learning the ordering of examples.
      Use tf.data.Dataset.shuffle() with buffer_size >= dataset size for
      full randomness; partial buffer gives approximate shuffle.

  training_loop:
    gradient_clipping: |
      SHOULD set gradient_clip_norm (clipnorm parameter in optimizer) to
      prevent exploding gradients, especially in RNNs and transformer models.
      Typical value: clipnorm=1.0.
      # Source: tensorflow/python/training/optimizer.py

    learning_rate_scheduling: |
      SHOULD reduce learning rate on plateau using ReduceLROnPlateau callback
      or use cosine decay schedule to improve convergence in later epochs.
      # Source: tensorflow/python/keras/callbacks.py: ReduceLROnPlateau

    reproducibility: |
      Set tf.random.set_seed(seed) for deterministic weight initialization
      and dropout behavior across runs. Also set numpy.random.seed and
      Python random.seed for full reproducibility.

  checkpointing:
    model_checkpointing: |
      SHOULD save model checkpoints using ModelCheckpoint callback:
      - save_best_only=True: only persist when monitored metric improves
      - save_weights_only=False: save full SavedModel (graph + weights)
      - monitor='val_loss': use validation loss, not training loss
      Checkpoint format: SavedModel directory (recommended over .h5).
      # Source: tensorflow/python/keras/callbacks.py: ModelCheckpoint

  distributed_training:
    strategy_scope: |
      MUST create model and optimizer inside strategy.scope() when using
      MirroredStrategy or MultiWorkerMirroredStrategy.
      All variables created inside scope are mirrored across all replicas.
      Effective batch size = batch_size × number_of_replicas.
      # Source: tensorflow/python/distribute/mirrored_strategy.py

    tpu_requirements: |
      TPUStrategy requires:
      - Connecting to TPU cluster before strategy creation
      - Dynamic shapes NOT supported — use fixed-shape inputs
      - Effective batch size MUST be divisible by number of TPU cores (8 or 128)
      # Source: tensorflow/python/distribute/tpu_strategy.py

  pytorch_training_loop:
    loop_order: |
      PyTorch requires explicit training loop management (unlike Keras model.fit).
      The canonical step order per batch:
        1. optimizer.zero_grad(set_to_none=True)   — clear gradients
        2. output = model(inputs)                  — forward pass
        3. loss = criterion(output, targets)        — compute loss
        4. loss.backward()                         — accumulate gradients
        5. torch.nn.utils.clip_grad_norm_(params, max_norm)  — optional clip
        6. optimizer.step()                        — update parameters
        7. scheduler.step()                        — update LR (after optimizer)
      Call model.train() before the loop and model.eval() for validation.
      # Source: torch/optim/optimizer.py — _use_grad_for_differentiable

    zero_grad: |
      SHOULD call optimizer.zero_grad(set_to_none=True) rather than the default
      set_to_none=False. Setting gradients to None instead of zeroing avoids
      a memory write and reduces memory bandwidth, which is measurably faster
      on large models.
      # Source: torch/optim/optimizer.py — zero_grad docstring

    optimizer_performance: |
      PyTorch optimizers offer three implementation tiers (fastest first):
        1. fused=True    — vertical+horizontal kernel fusion; CUDA only; requires
                           floating point params (float16/32/64/bfloat16).
                           Cannot be combined with foreach=True or differentiable=True.
        2. foreach=True  — horizontal fusion via tensorlist ops; uses ~sizeof(params)
                           extra peak memory; CUDA recommended.
        3. default       — single-tensor for-loop; works everywhere; slowest.
      When neither flag is set PyTorch defaults to foreach on CUDA.
      # Source: torch/optim/optimizer.py — _default_to_fused_or_foreach,
      #          torch/optim/adam.py — Adam.__init__ fused/foreach validation

    mixed_precision: |
      PyTorch mixed precision (AMP) uses:
        - torch.amp.autocast(device_type='cuda') wrapping the forward pass
        - torch.amp.GradScaler to scale loss before backward, preventing
          fp16 underflow in gradients. Unscale before gradient clipping.
      Correct order:
        with autocast():
            loss = model(inputs)
        scaler.scale(loss).backward()
        scaler.unscale_(optimizer)
        clip_grad_norm_(...)
        scaler.step(optimizer)
        scaler.update()

    lr_scheduler: |
      MUST call scheduler.step() AFTER optimizer.step(), not before.
      PyTorch warns if called in the wrong order (detected via _opt_called flag).
      When resuming from checkpoint: restore scheduler BEFORE calling
      optimizer.load_state_dict() to avoid overwriting loaded LRs.
      # Source: torch/optim/lr_scheduler.py — LRScheduler.__init__,
      #          EPOCH_DEPRECATION_WARNING

    adam_validation: |
      Adam raises ValueError on construction for invalid hyperparameters:
        - lr must be >= 0
        - eps must be >= 0
        - betas[0] and betas[1] must be in [0, 1)
        - weight_decay must be >= 0
        - fused and foreach cannot both be True
      # Source: torch/optim/adam.py — Adam.__init__

outcomes:
  training_completed:
    priority: 10
    given:
      - "model compiled with optimizer, loss, and at least one metric"
      - "training data provided with compatible shapes and dtypes"
      - field: epochs
        source: input
        operator: gt
        value: 0
      - "no hardware error during training loop"
    then:
      - action: transition_state
        field: training_status
        from: running
        to: completed
      - action: emit_event
        event: training.completed
        payload:
          - total_epochs
          - final_loss
          - final_val_loss
    result: "Model weights updated to final checkpoint; training history returned"
    transaction: true

  early_stopping_triggered:
    priority: 5
    given:
      - field: early_stopping_patience
        source: input
        operator: exists
      - "EarlyStopping callback configured with a monitored metric"
      - "monitored metric has not improved for early_stopping_patience epochs"
    then:
      - action: transition_state
        field: training_status
        from: running
        to: stopped_early
      - action: set_field
        target: best_val_loss
        value: "best monitored metric value at stopped epoch"
      - action: emit_event
        event: training.stopped_early
        payload:
          - best_epoch
          - best_val_loss
    result: "Training halted early; model weights restored to best checkpoint epoch"

  checkpoint_saved:
    priority: 3
    given:
      - field: checkpoint_path
        source: input
        operator: exists
      - "training epoch completed"
      - "val_loss improved or save_best_only is false"
    then:
      - action: emit_event
        event: checkpoint.saved
        payload:
          - current_epoch
          - checkpoint_path
          - best_val_loss
    result: "Model weights and optimizer state persisted in SavedModel format"

  training_failed_oom:
    priority: 1
    error: TRAINING_OOM_ERROR
    given:
      - "GPU or TPU memory allocation failed during forward or backward pass"
      - field: batch_size
        source: input
        operator: gt
        value: 0
    then:
      - action: transition_state
        field: training_status
        from: running
        to: failed
    result: "Training aborted; reduce batch_size or use gradient accumulation"

  training_failed_nan_loss:
    priority: 2
    error: TRAINING_NAN_LOSS
    given:
      - "loss value became NaN or Inf during forward or backward pass"
    then:
      - action: transition_state
        field: training_status
        from: running
        to: failed
    result: "Training aborted; check learning_rate, input normalization, and gradient_clip_norm"

  training_failed_shape_mismatch:
    priority: 1
    error: TRAINING_SHAPE_MISMATCH
    given:
      - "input tensor shape does not match model's expected input_shape"
    then:
      - action: transition_state
        field: training_status
        from: running
        to: failed
    result: "Training aborted; reshape input data to match model's expected input_shape"

errors:
  - code: TRAINING_OOM_ERROR
    status: 500
    message: "Out of memory during training. Reduce batch size or use gradient accumulation."
    retry: true

  - code: TRAINING_NAN_LOSS
    status: 500
    message: "Loss became NaN or Inf. Check learning rate, input normalization, and gradient clipping."

  - code: TRAINING_SHAPE_MISMATCH
    status: 400
    message: "Input shape does not match the model's expected input shape."

  - code: MODEL_COMPILE_ERROR
    status: 400
    message: "Failed to compile model. Check optimizer, loss, and metrics configuration."

  - code: DISTRIBUTE_STRATEGY_ERROR
    status: 400
    message: "Distribution strategy error. Ensure model is created inside strategy.scope()."

events:
  - name: training.started
    payload:
      - optimizer
      - learning_rate
      - epochs
      - batch_size
      - distribute_strategy

  - name: training.epoch_completed
    payload:
      - current_epoch
      - loss
      - val_loss

  - name: training.completed
    payload:
      - total_epochs
      - final_loss
      - final_val_loss

  - name: training.stopped_early
    payload:
      - best_epoch
      - best_val_loss

  - name: training.failed
    payload:
      - error_code
      - current_epoch

  - name: checkpoint.saved
    payload:
      - current_epoch
      - checkpoint_path
      - best_val_loss

sla:
  epoch_throughput:
    p99: "depends on dataset size and hardware"
  checkpoint_write:
    max_duration: "30s"

related:
  - feature: dataset-pipeline
    type: required
    reason: "Training requires a tf.data.Dataset pipeline to supply batches"
  - feature: model-serving
    type: recommended
    reason: "Trained model exported as SavedModel for serving"

extensions:
  tech_stack:
    language: "Python"
    frameworks:
      - "TensorFlow / Keras — Model.fit() loop, callbacks, tf.distribute.Strategy"
      - "PyTorch — manual training loop, torch.optim, torch.amp, DDP/FSDP"
    patterns:
      - "Keras Model.fit() with ModelCheckpoint + EarlyStopping callbacks"
      - "PyTorch: zero_grad → forward → loss → backward → clip → step"
      - "PyTorch AMP: autocast + GradScaler for mixed precision"
      - "PyTorch LR schedulers: CosineAnnealingLR, OneCycleLR, ReduceLROnPlateau"
      - "fused/foreach optimizer kernels for CUDA performance"
      - "tf.distribute.Strategy / DDP / FSDP for distributed training"
