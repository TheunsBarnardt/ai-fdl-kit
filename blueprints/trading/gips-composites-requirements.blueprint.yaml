# ============================================================
# gips-composites-requirements — Feature Blueprint
# Source: CFA LV1 2025 Vol 10 — Module 5, GIPS Composites
# ============================================================

feature: gips-composites-requirements
version: "1.0.0"
description: Define GIPS composites, describe the requirements for composite construction, return calculation, disclosures, and presentation, and present minimum required items on a compliant presentation
category: trading
tags: [ethics, gips, composite-construction, performance-presentation, cfa-level-1]
aliases:
  - gips-composite-construction
  - gips-composite-definition
  - gips-disclosures
  - gips-presentation
  - gips-pooled-fund
  - gips-carve-out

actors:
  - id: composite_mgr
    name: Composite Manager
    type: system

fields:
  - name: composite_id
    type: text
    required: true
    label: Composite identifier
  - name: composite_definition
    type: text
    required: true
    label: Strategy description

rules:
  composite_definition:
    rule: "Aggregation of one or more portfolios managed according to similar investment mandate, objective, or strategy"
    all_inclusive: "All actual, fee-paying, discretionary portfolios managed to that strategy must be included"
    non_discretionary: "Excluded from composites but included in firm total"
  carve_outs:
    rule: "Only allowed if managed separately with own cash balance; cash allocations required"
  minimum_presentation_periods:
    inception_to_5: "Five years minimum, or since inception if less"
    build_to_10: "Add year-by-year until 10 years"
  required_statistics:
    composite_return: "Annual returns for each period"
    benchmark_return: "Appropriate benchmark for same periods"
    dispersion: "Internal dispersion across portfolios in composite"
    three_year_ex_post_standard_deviation: "After 36 months of monthly returns"
    number_of_portfolios: "Count at period end (or n/a if <5)"
    composite_assets: "At period end"
    firm_assets_or_percentage: "Total firm AUM or composite percentage"
  required_disclosures:
    compliance_statement: "Boilerplate claim"
    benchmark_description: "Benchmark selection rationale"
    fees: "Gross or net of fees; fee schedule"
    use_of_leverage: "If applicable"
    significant_events: "Material firm changes"
  validation:
    composite_required: "composite_id present"

outcomes:
  construct_composite:
    priority: 1
    description: Construct GIPS-compliant composite
    given:
      - field: composite_id
        source: input
        operator: exists
    then:
      - action: call_service
        target: composite_mgr
      - action: emit_event
        event: composite.constructed

errors:
  - code: GIPS_COMPOSITE_INVALID
    status: 400
    message: composite construction inputs invalid

events:
  - name: composite.constructed
    payload: [composite_id, portfolio_count, aum, benchmark, dispersion]

anti_patterns:
  - rule: Do not exclude poorly performing portfolios from a composite
    why: "GIPS requires all discretionary fee-paying portfolios in the strategy be included; cherry-picking voids compliance"
  - rule: Do not switch benchmark without disclosure
    why: "Benchmark changes must be disclosed with date and reason; silent switches breach GIPS"
  - rule: Do not present gross-of-fees without net-of-fees where regulations require
    why: "Some jurisdictions and client types mandate net; omission misleads prospects about achievable returns"

api:
  http:
    method: POST
    path: /ethics/gips/composite/construct
  request:
    schema:
      composite_id: string
      composite_definition: string
  response:
    success:
      status: 200
      schema:
        composite_id: string
        portfolio_count: number

related:
  - feature: gips-standards-l3
    type: recommended
    reason: L3 advanced GIPS topics build on the composite construction rules defined here
  - feature: gips-compliance-fundamentals
    type: required


# ─── AGI READINESS ─────────────────────────────────────────

