feature: market-data-all-classes
version: 1.0.0
description: Comprehensive market data products across all asset classes (equities, derivatives, fixed-income, indices, commodities, currencies)
category: trading
tags: [market-data, eod, nlmd, all-classes, comprehensive]
aliases:
  - market-data-comprehensive
  - all-classes-market-data
  - market-data-feeds-all
  - data-products-all
  - eod-all-classes

fields:
  - name: asset_class
    type: select
    required: true
    label: Asset Class
  - name: product_code
    type: text
    required: true
    label: Product Code
  - name: distribution_date
    type: date
    required: true
    label: Distribution Date
  - name: record_format
    type: select
    required: false
    label: Format (FixedWidth, Delimited, Binary)

rules:
  coverage:
    data_completeness: "All markets publish EOD data for all trading instruments"
    historical_retention: "Minimum 5-year retention for regulatory compliance"
    format_standardization: "All products use exchange-standard formats"

outcomes:
  publish_market_data_eod:
    priority: 1
    description: Publish EOD market data across all asset classes
    given:
      - field: asset_class
        source: input
        operator: exists
    then:
      - action: emit_event
        event: market_data.published

errors:
  - code: MARKET_DATA_PUBLISH_FAILED
    status: 500
    message: Market data publication failed

events:
  - name: market_data.published
    payload: [asset_class, product_code, publication_date]


# ─── AGI READINESS ─────────────────────────────────────────

agi:
  # --- AGI READINESS (auto-generated by propagate-agi.js) ---

  goals:
    - id: reliable_market_data_all_classes
      description: Comprehensive market data products across all asset classes (equities, derivatives, fixed-income, indices,
        commodities, currencies)
      success_metrics:
        - metric: policy_violation_rate
          target: 0%
          measurement: Operations that violate defined policies
        - metric: audit_completeness
          target: 100%
          measurement: All decisions have complete audit trails
      constraints:
        - type: regulatory
          description: All operations must be auditable and traceable
          negotiable: false
  autonomy:
    level: supervised
    human_checkpoints:
      - before making irreversible changes
    escalation_triggers:
      - error_rate > 5
      - consecutive_failures > 3
  safety:
    action_permissions:
      - action: publish_market_data_eod
        permission: autonomous
  tradeoffs:
    - prefer: accuracy
      over: latency
      reason: trading operations require precise execution and full audit trails
  verification:
    invariants:
      - error messages never expose internal system details
  coordination:
    protocol: request_response
    consumes:
      - capability: reference_data_management
        from: reference-data-management
        fallback: fail

extensions:
  asset_classes:
    equity:
      products: [Price Data, Volume Data, Corporate Actions, Dividends, Technical Indicators]
      indices: [ALSI, TOP40, FINI, Sector Indices, Style Indices, Thematic Indices]
    derivatives:
      products: [Options Data, Futures Data, Greeks, Open Interest]
      types: [Equity Derivatives, Commodity Derivatives, Currency Derivatives, Interest-Rate Derivatives]
    fixed_income:
      products: [Bond Data, Yield Data, Valuation, Reference Data, Corporate Actions]
      segments: [Government Bonds, Corporate Bonds, Floating-Rate Notes, Bond ETPs]
    indices:
      families: [Headline, African, Capped, Core, Factor, Style, Thematic, Sector, Fixed-Income, Multi-Asset]
    currencies:
      products: [Exchange Rates, FX Derivatives, Historical Rates]
    commodities:
      products: [Commodity Futures Data, Reference Data]
  data_products_by_class:
    equity: [OpenPrice, HighPrice, LowPrice, ClosePrice, Volume, TurnOver, VolumeWeightedPrice]
    derivatives: [OpenPrice, HighPrice, LowPrice, SettlementPrice, Volume, OpenInterest, ImpliedVol, Greeks]
    bonds: [YieldToMaturity, Duration, Convexity, CleanPrice, DirtyPrice, AccruedInterest]
    indices: [OpenLevel, HighLevel, LowLevel, CloseLevel, Change, ChangePercent, DividendYield]

related:
  - feature: index-data-feeds
    type: extends
  - feature: reference-data-management
    type: required
  - feature: bond-pricing-models
    type: recommended
