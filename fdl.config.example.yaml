# ============================================================
# fdl.config.yaml — FDL Project Configuration
# ============================================================
# Copy this file to your project root as fdl.config.yaml
# and fill in your actual stack. FDL skills read this
# automatically — no need to specify your stack on every
# /fdl-build or /fdl-generate command.
#
# All fields are optional. The more you fill in, the fewer
# questions the skills will ask.
# ============================================================

stack:
  # Core framework
  framework: nextjs        # nextjs | express | laravel | django | fastapi | flask
                           # nestjs | nuxt | sveltekit | angular | remix | go | rust
                           # csharp | flutter | react-native

  # Primary language
  language: typescript     # typescript | javascript | python | php | go | rust | java | dart

  # ORM / database client
  database: prisma         # prisma | drizzle | mongoose | sequelize | typeorm
                           # sqlalchemy | eloquent | gorm | dapper

  # Database engine
  db_engine: postgresql    # postgresql | mysql | sqlite | mongodb | redis | supabase

  # UI component library (frontend projects)
  ui: shadcn               # shadcn | mui | bootstrap | antd | chakra | mantine | none

  # Authentication strategy
  auth: jwt                # jwt | session | oauth | magic-link | api-key | passkey

  # API style
  api_style: rest          # rest | graphql | trpc | grpc | websocket

conventions:
  # Module import style
  import_style: named      # named | default | both

  # Test framework
  test_framework: jest     # jest | vitest | pytest | phpunit | rspec | go-test

  # CSS approach
  css_approach: tailwind   # tailwind | css-modules | styled-components | scss | plain-css

  # Error handling pattern
  error_handling: try-catch  # try-catch | result-type | error-boundary | middleware

  # API response wrapper
  response_format: envelope  # envelope ({ data, error, meta }) | plain | problem-json

project:
  name: my-app
  description: "Brief description of what this application does"
  
  # Where to source blueprints when not in the FDL repo directory
  # local  — use blueprints/ directory only
  # remote — fetch from https://theunsbarnardt.github.io/ai-fdl-kit/api/
  # both   — local takes priority, fall back to remote for missing blueprints
  blueprints_source: both
