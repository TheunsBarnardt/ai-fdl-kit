# ============================================================
# time-weighted-return — Feature Blueprint
# Source: CFA LV1 2025 Vol 01 — Module 1, p.19-27 (TWR)
# ============================================================

feature: time-weighted-return
version: "1.0.0"
description: Calculate time-weighted rate of return by chain-linking sub-period HPRs, neutralising the effect of external cash flow timing for fair manager evaluation
category: trading
tags: [quantitative-methods, return-measures, twr, gips, performance, cfa-level-1]
aliases:
  - twr
  - time-weighted-rate-of-return
  - chain-linked-return
  - gips-return
  - manager-return

actors:
  - id: performance_engine
    name: Performance Measurement Engine
    type: system
  - id: portfolio_manager
    name: Portfolio Manager
    type: human

fields:
  - name: sub_period_returns
    type: json
    required: true
    label: Array of sub-period HPRs, each bracketing an external cash flow
  - name: periods_per_year
    type: number
    required: false
    label: Compounding frequency for annualization
  - name: valuation_method
    type: select
    required: false
    label: How sub-periods are formed (exact_valuation, modified_dietz, daily_valuation)

rules:
  core_formula:
    twr_chain_link: "R_TWR = [product(1 + R_t) for t=1..T]^(1/years) - 1"
    # Source: Vol 1, Module 1, p.22-23 — "TWR requires computing HPR for each sub-period and chain-linking them"
    sub_period_definition: "A new sub-period begins every time there is an external cash flow"
    sub_period_hpr: "R_t = (EMV_t - BMV_t - ExternalFlow_t) / BMV_t under specific conventions"
  conventions:
    exact_method: "Revalue portfolio immediately before every external flow — most accurate"
    modified_dietz: "Weight external flows by fraction of period — approximation when daily valuation unavailable"
    daily_valuation: "GIPS-compliant preferred method post-2010"
  appropriate_use:
    manager_evaluation: "Preferred return measure for comparing managers — removes cash flow timing effects"
    gips_compliance: "Required by CFA Institute GIPS standards for composite performance"
  validation:
    non_empty: "At least one sub-period required"
    no_total_loss: "No sub-period return may be <= -1.0"

outcomes:
  compute_twr:
    priority: 1
    description: Chain-link sub-period returns when valid
    given:
      - field: sub_period_returns
        source: input
        operator: exists
    then:
      - action: call_service
        target: performance_engine
      - action: emit_event
        event: return.twr_calculated
  total_loss_sub_period:
    priority: 10
    description: A sub-period return is <= -100%
    given:
      - field: sub_period_returns
        source: input
        operator: exists
    then:
      - action: emit_event
        event: return.twr_rejected
    error: TWR_TOTAL_LOSS_SUBPERIOD
  empty_sub_periods:
    priority: 11
    description: No sub-period returns provided
    given:
      - field: sub_period_returns
        source: input
        operator: not_exists
    then:
      - action: emit_event
        event: return.twr_rejected
    error: TWR_EMPTY_SUBPERIODS

errors:
  - code: TWR_TOTAL_LOSS_SUBPERIOD
    status: 400
    message: A sub-period return <= -100% makes TWR undefined
  - code: TWR_EMPTY_SUBPERIODS
    status: 400
    message: At least one sub-period return is required

events:
  - name: return.twr_calculated
    payload: [portfolio_id, twr, annualized_twr, sub_period_count, valuation_method]
  - name: return.twr_rejected
    payload: [portfolio_id, reason_code]

anti_patterns:
  - rule: Do not use TWR when the investor's cash flow timing is the thing being evaluated
    why: "TWR deliberately removes timing effects — use money-weighted-return when investor-level return matters"
  - rule: Do not compute TWR by simply averaging sub-period returns
    why: "TWR must be compounded (chain-linked); simple averaging gives the arithmetic mean, not TWR"
  - rule: Do not mix valuation methods within a single period calculation
    why: "Switching between modified Dietz and exact valuation mid-period produces inconsistent results"
  - rule: Do not publish TWR without disclosing the valuation method for GIPS compliance
    why: "GIPS requires disclosure of valuation practices; omission breaches GIPS standards"

api:
  http:
    method: POST
    path: /analytics/returns/time-weighted
  request:
    schema:
      sub_period_returns: array<number>
      periods_per_year: number
      valuation_method: string
  response:
    success:
      status: 200
      schema:
        twr: number
        annualized_twr: number
        sub_period_count: integer
    errors:
      - status: 400
        error_code: TWR_TOTAL_LOSS_SUBPERIOD
      - status: 400
        error_code: TWR_EMPTY_SUBPERIODS


# ─── AGI READINESS ─────────────────────────────────────────

agi:
  # --- AGI READINESS (auto-generated by propagate-agi.js) ---

  goals:
    - id: reliable_time_weighted_return
      description: Calculate time-weighted rate of return by chain-linking sub-period HPRs, neutralising the effect of
        external cash flow timing for fair manager evaluation
      success_metrics:
        - metric: policy_violation_rate
          target: 0%
          measurement: Operations that violate defined policies
        - metric: audit_completeness
          target: 100%
          measurement: All decisions have complete audit trails
      constraints:
        - type: regulatory
          description: All operations must be auditable and traceable
          negotiable: false
  autonomy:
    level: supervised
    human_checkpoints:
      - before making irreversible changes
    escalation_triggers:
      - error_rate > 5
      - consecutive_failures > 3
  safety:
    action_permissions:
      - action: compute_twr
        permission: autonomous
      - action: total_loss_sub_period
        permission: autonomous
      - action: empty_sub_periods
        permission: autonomous
  tradeoffs:
    - prefer: accuracy
      over: latency
      reason: trading operations require precise execution and full audit trails
  verification:
    invariants:
      - error messages never expose internal system details
  coordination:
    protocol: orchestrated
    consumes:
      - capability: money_weighted_return
        from: money-weighted-return
        fallback: fail
      - capability: holding_period_return
        from: holding-period-return
        fallback: fail

extensions:
  worked_example:
    # Source: Vol 1, Module 1, Example 8 (same scenario as MWR for contrast), p.22-24
    scenario: "Year 1 HPR = 15%, Year 2 HPR = 6.7% (bracketing investor's cash flow)"
    sub_period_returns: [0.15, 0.067]
    computation: "[(1.15)(1.067)]^(1/2) - 1 ≈ 0.108"
    twr: 0.108
    mwr_comparison: 0.0968
    interpretation: "Manager return ≈ 10.8% per year; investor's MWR of 9.68% differs due to cash flow timing"
  methods_detail:
    exact_valuation:
      description: "Revalue portfolio on every external cash flow date"
      accuracy: highest
    modified_dietz:
      formula: "R ≈ (EMV - BMV - CF) / (BMV + sum(w_i * CF_i))"
      description: "Weights cash flows by fraction of period remaining"
      accuracy: approximation
    daily_valuation:
      description: "Compound daily HPRs"
      gips_standard: true

related:
  - feature: money-weighted-return
    type: required
  - feature: holding-period-return
    type: required
  - feature: geometric-mean-return
    type: recommended
  - feature: annualized-return
    type: recommended
