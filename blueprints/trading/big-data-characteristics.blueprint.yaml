    - prefer: accuracy
      over: latency
      reason: trading operations require precise execution and full audit trails
  verification:
    invariants:
      - error messages never expose internal system details

extensions:
  example_sources:
    structured: ["Bloomberg price feeds", "EDGAR XBRL filings", "CRSP returns database"]
    semi_structured: ["SEC 10-K HTML", "news article JSON feeds"]
    unstructured: ["Earnings call transcripts", "satellite imagery", "Twitter firehose"]

related:
  - feature: fintech-investment-analysis
    type: recommended
  - feature: data-science-processing
    type: recommended
