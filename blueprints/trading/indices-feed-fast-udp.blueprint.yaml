feature: indices-feed-fast-udp
version: 1.0.0
description: Real-time indices via FAST UDP multicast with TCP replay from FTSE.
category: trading

fields:
  - name: index_id
    type: text
    required: true
    label: Index Symbol

rules:
  delivery:
    multicast: "Real-time UDP multicast"
    replay: "TCP replay channel"

outcomes:
  logon_successful:
    priority: 1
    description: "Client authenticates"
    given:
      - field: credentials_valid
        source: request
        operator: eq
        value: true
    then:
      - action: emit_event
        event: session.established
        payload: [user_id]
    result: "Session active"

  index_updated:
    priority: 2
    description: "Index value updated"
    given:
      - field: index_data_available
        source: system
        operator: eq
        value: true
    then:
      - action: emit_event
        event: index.updated
        payload: [index_id]
    result: "Index refresh published"

errors:
  - code: AUTH_FAILED
    status: 401
    message: "Authentication failed"
  - code: LOGON_LIMIT
    status: 429
    message: "Login limit exceeded"

events:
  - name: session.established
    payload: [user_id]
  - name: index.updated
    payload: [index_id]

actors:
  - id: client
    name: Client
    type: human
    description: "Indices subscriber"

related:
  - feature: market-data-feed-fast-udp
    type: extends
    reason: Inherits shared FAST UDP multicast and TCP recovery/replay specification


# ─── AGI READINESS ─────────────────────────────────────────

agi:
  # --- AGI READINESS (auto-generated by propagate-agi.js) ---

  goals:
    - id: reliable_indices_feed_fast_udp
      description: Real-time indices via FAST UDP multicast with TCP replay from FTSE.
      success_metrics:
        - metric: policy_violation_rate
          target: 0%
          measurement: Operations that violate defined policies
        - metric: audit_completeness
          target: 100%
          measurement: All decisions have complete audit trails
      constraints:
        - type: regulatory
          description: All operations must be auditable and traceable
          negotiable: false
  autonomy:
    level: supervised
    human_checkpoints:
      - before making irreversible changes
    escalation_triggers:
      - error_rate > 5
      - consecutive_failures > 3
  safety:
    action_permissions:
      - action: logon_successful
        permission: autonomous
      - action: index_updated
        permission: supervised
  tradeoffs:
    - prefer: accuracy
      over: latency
      reason: trading operations require precise execution and full audit trails
  verification:
    invariants:
      - error messages never expose internal system details
