# ============================================================
# passive-equity-investing-l3 — Feature Blueprint
# Source: CFA LV3 2024 Vol 3 — Portfolio Management Module 4
# Passive Equity Investing
# ============================================================

feature: passive-equity-investing-l3
version: "1.0.0"
description: Passive equity investment strategies — index construction, vehicle selection, replication methods, tracking error management, attribution, and investor engagement
category: trading
tags: [portfolio-management, equity, passive-investing, index-investing, etf, tracking-error, replication, factor-based-index, cfa-level-3]
aliases:
  - equity-index-investing-l3
  - passive-equity-replication-l3
  - etf-portfolio-l3
  - tracking-error-management-l3
  - equity-index-construction-l3
  - factor-based-indexing-l3
  - stratified-sampling-equity-l3

actors:
  - id: portfolio_manager
    name: Portfolio Manager
    type: human

fields:
  - name: portfolio_id
    type: text
    required: true
    label: Portfolio identifier
  - name: replication_method
    type: select
    required: true
    label: full_replication | stratified_sampling | optimization | blended

rules:
  index_construction:
    market_cap_weighted: "Weights proportional to float-adjusted market cap; self-rebalancing; dominant methodology"
    equal_weighted: "Equal weight to each constituent; high turnover; small-cap bias"
    fundamental_weighted: "Weight by revenue, earnings, dividends; value tilt; less momentum"
    factor_weighted: "Smart beta; tilt toward value, quality, momentum, low-vol, size"
  benchmark_selection:
    representativeness: "Benchmark must reflect investable opportunity set"
    tradability: "Constituent stocks must be liquid and purchasable"
    transparency: "Clear rules for inclusion, exclusion, and rebalancing"
    appropriateness: "Match investor objective; global vs regional vs sector"
  pooled_investment_vehicles:
    mutual_funds: "Daily NAV pricing; redeemable at NAV; potential tax drag from distributions"
    etfs: "Exchange-traded; intraday liquidity; creation-redemption mechanism minimizes tax drag"
    futures: "Cheap exposure; tracking error from basis; roll cost at expiry"
    total_return_swaps: "Receive index return; pay floating; counterparty risk; off-balance-sheet"
  replication_methods:
    full_replication: "Hold all index constituents at index weights; minimal tracking error; high cost for large indexes"
    stratified_sampling: "Divide index into cells by sector/size/country; hold representative securities from each cell"
    optimization: "Use factor model to minimize tracking error with subset of stocks; model-dependent"
    blended: "Full replication for liquid stocks; sampling for illiquid tail; balances cost and tracking"
  tracking_error:
    definition: "Standard deviation of active return (portfolio return − benchmark return)"
    sources: "Transaction costs, cash drag, sampling approximation, dividend timing, corporate actions"
    controlling: "Minimize unnecessary deviations; rebalance close to index; minimize cash drag"
    excess_return: "May be positive (securities lending, tax management) or negative (costs)"
  sources_of_return_risk:
    attribution: "Decompose return into factor exposures and residual; assess deviation from index"
    securities_lending: "Income from lending indexed shares; offsets fees; subject to recall risk"
    investor_activism: "Passive managers are large shareholders; increasing pressure to engage on governance"
  validation:
    portfolio_required: "portfolio_id present"
    valid_replication: "replication_method in [full_replication, stratified_sampling, optimization, blended]"

outcomes:
  implement_passive_portfolio:
    priority: 1
    description: Implement passive equity portfolio using specified replication method
    given:
      - field: portfolio_id
        source: input
        operator: exists
      - field: replication_method
        source: input
        operator: in
        value: [full_replication, stratified_sampling, optimization, blended]
    then:
      - action: call_service
        target: portfolio_manager
      - action: emit_event
        event: passive.portfolio.implemented
  invalid_replication:
    priority: 10
    description: Unsupported replication method
    given:
      - field: replication_method
        source: input
        operator: not_in
        value: [full_replication, stratified_sampling, optimization, blended]
    then:
      - action: emit_event
        event: passive.portfolio.rejected
    error: PASSIVE_INVALID_REPLICATION

errors:
  - code: PASSIVE_INVALID_REPLICATION
    status: 400
    message: replication_method must be one of full_replication, stratified_sampling, optimization, blended

events:
  - name: passive.portfolio.implemented
    payload: [portfolio_id, replication_method, tracking_error, securities_lending_income]
  - name: passive.portfolio.rejected
    payload: [portfolio_id, reason_code]

anti_patterns:
  - rule: Do not equate low tracking error with zero active risk in factor-tilted indexes
    why: "Smart beta or factor-weighted indexes have intentional factor tilts that introduce active risk vs cap-weighted benchmarks; low tracking error vs their own benchmark masks significant active factor exposures"
  - rule: Do not select ETF vehicle without considering bid-ask spread and creation-redemption mechanism
    why: "ETF intraday premium/discount to NAV can exceed the fund's annual management fee; in illiquid underlying markets (small cap, EM), ETF trading costs may exceed direct indexing costs"
  - rule: Do not ignore the impact of index rebalancing events on portfolio transaction costs
    why: "Index adds/deletions create predictable demand that front-runners exploit; funds that rebalance precisely on the announced date buy at the peak and sell at the trough — gradual pre-trading reduces impact cost"

api:
  http:
    method: POST
    path: /pm/equity/passive
  request:
    schema:
      portfolio_id: string
      replication_method: string
  response:
    success:
      status: 200
      schema:
        portfolio_id: string
        tracking_error: number
        securities_lending_income: number
    errors:
      - status: 400
        error_code: PASSIVE_INVALID_REPLICATION

related:
  - feature: equity-portfolio-management-overview-l3
    type: required
  - feature: active-equity-strategies-l3
    type: recommended
