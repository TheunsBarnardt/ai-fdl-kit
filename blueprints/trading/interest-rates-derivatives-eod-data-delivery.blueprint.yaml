# ============================================================
# Interest Rates Derivatives End-of-Day Data Delivery — Feature Blueprint
# FDL v0.1.0 | Blueprint v1.0.0
# ============================================================
# Extracted from: Interest Rates Derivatives Non-Live Market Data
# Products Specifications v1.0 (20 pages)
# Fixed-width flat file dissemination of end-of-day interest rate
# derivatives statistics via FTP for licensed subscribers
# ============================================================

feature: interest-rates-derivatives-eod-data-delivery
version: "1.0.0"
description: "End-of-day interest rate derivatives data delivery via FTP — fixed-width flat files covering daily statistics, mark-to-market, and reference rates"
category: trading
tags: [market-data, eod, interest-rates, derivatives, ftp, dissemination, fixed-width, non-live]

actors:
  - id: data_subscriber
    name: "Data Subscriber"
    type: human
    description: "Licensed recipient who receives end-of-day interest rate derivatives data files"

  - id: exchange_operations
    name: "Exchange Operations"
    type: system
    description: "Exchange dissemination system that generates and delivers EOD files"

  - id: customer_services
    name: "Customer Services"
    type: human
    description: "Provisions subscriber credentials and dataset access before go-live"

fields:
  # ── Leading Record (first 48 chars of every record) ───────────────────────
  # Source: Section 7.1 — Leading Record Layout

  - name: market_number
    type: number
    required: true
    # START 1, LENGTH 1, END 1 — Market identifier (3 = Interest Rate)

  - name: contract_type
    type: text
    required: true
    # START 2, LENGTH 1, END 2 — F=Future, Y=Option, S=Spot

  - name: instrument_type
    type: text
    required: true
    # START 3, LENGTH 10, END 12 — underlying instrument type (e.g. IRC, IRC Spot YXS, IRC Future YXF)

  - name: record_type
    type: text
    required: true
    # START 13, LENGTH 4, END 16 — e.g. DIR, SIR, OIR, MIR, RIR

  - name: record_sub_type
    type: text
    required: true
    # START 17, LENGTH 4, END 20 — sub type code e.g. 01, 02

  - name: run_date
    type: date
    required: true
    # START 21, LENGTH 8, END 28 — format CCYYMMDD — dissemination date

  - name: filler_header
    type: text
    required: false
    # START 29, LENGTH 20, END 48 — reserved for future expansion

  # ── DIR Sub Type 01 — Daily Traded Statistics ─────────────────────────────
  # Source: Section 7.2

  - name: instrument
    type: text
    required: false
    # START 49, LENGTH 4, END 52 — underlying instrument code

  - name: date
    type: date
    required: false
    # START 53, LENGTH 8, END 60 — expiry/valuation date (CCYYMMDD)

  - name: strike_price
    type: number
    required: false
    # START 61, LENGTH 17, END 77 — numeric 10.6 format; zero for futures

  - name: option_type
    type: text
    required: false
    # START 78, LENGTH 1, END 78 — Put or Call

  - name: spot_price
    type: number
    required: false
    # START 79, LENGTH 17, END 95 — closing price of underlying instrument (10.6)

  - name: closing_bid
    type: number
    required: false
    # START 96, LENGTH 17, END 112 — closing bid price (10.6)

  - name: closing_offer
    type: number
    required: false
    # START 113, LENGTH 17, END 129 — closing offer price (10.6)

  - name: mtm
    type: number
    required: false
    # START 130, LENGTH 17, END 146 — mark-to-market official closing price (10.6)

  - name: first_price
    type: number
    required: false
    # START 147, LENGTH 17, END 163 — first execution price of the day (10.6)

  - name: last_price
    type: number
    required: false
    # START 164, LENGTH 17, END 180 — last execution price of the day (10.6)

  - name: high_price
    type: number
    required: false
    # START 181, LENGTH 17, END 197 — highest execution price of the day (10.6)

  - name: low_price
    type: number
    required: false
    # START 198, LENGTH 17, END 214 — lowest execution price of the day (10.6)

  - name: number_of_deals
    type: number
    required: false
    # START 215, LENGTH 14, END 228 — integer, total deals traded

  - name: volume
    type: number
    required: false
    # START 229, LENGTH 14, END 242 — integer, total contracts traded

  - name: value_traded
    type: number
    required: false
    # START 243, LENGTH 21, END 263 — total value of contracts traded (14.6)

  - name: open_interest
    type: number
    required: false
    # START 264, LENGTH 14, END 277 — integer, open interest on contract

  - name: volatility
    type: number
    required: false
    # START 278, LENGTH 11, END 288 — implied volatility (4.6), options only

  # ── DIR Sub Type 02 additional field ──────────────────────────────────────
  # Source: Section 7.5 — includes Traded Indicator at position 79

  - name: traded_indicator
    type: boolean
    required: false
    # START 79, LENGTH 1, END 79 — T/F, indicates if contract traded on specified day
    # Only present in DIR Sub Type 02 (Full Market Statistics)

  # ── SIR/OIR Type & Overall Totals ─────────────────────────────────────────
  # Source: Sections 7.3, 7.4, 7.6, 7.7

  - name: total_contracts
    type: number
    required: false
    # START 49, LENGTH 14, END 62 — integer, total contracts per type/day

  - name: total_deals
    type: number
    required: false
    # START 63, LENGTH 14, END 76 — integer, total deals per type/day

  - name: total_value
    type: number
    required: false
    # START 77, LENGTH 21, END 97 — total value of contracts (14.6)

  - name: total_open_interest
    type: number
    required: false
    # START 98, LENGTH 14, END 111 — integer, total open interest

  - name: total_margin_on_deposit
    type: number
    required: false
    # START 112, LENGTH 21, END 132 — total margin on deposit (14.6)
    # Only present in OIR Sub Type 02

  # ── RIR Sub Type 01 — Interest Rates ──────────────────────────────────────
  # Source: Section 7.9

  - name: interest_on_initial_margin
    type: number
    required: false
    # START 49, LENGTH 11, END 59 — interest earned on clearing house initial margin (4.6)

rules:
  data_format:
    format: fixed_width_flat_file
    encoding: ASCII
    # Source: Section 6 — Field Formats
    field_types:
      A: "Alpha only"
      N: "Numeric only (integer shown as N(I))"
      AN: "Alphanumeric"
      DATE: "8-byte date CCYYMMDD"
      B: "Boolean — T for True, F for False"
    padding:
      alpha: "space (ASCII 32) right-padded"
      numeric: "decimal point consumes 1 byte, fixed position"
    filler: "space characters (ASCII 32) reserved for future expansion"

  delivery:
    channel: FTP
    # Source: Section 3 — via Information Delivery Portal (IDP) FTP server
    schedule: "MUST deliver all products at 20:00 daily"
    frequency: daily

  subscription:
    # Source: Section 3 — prospective subscribers must contact Market Data Department
    requires_written_request: true
    requires_license_agreement: true

  market_identification:
    # Source: Section 7.1 — Market Number table
    market_number: 3
    market_identifier: "IR"
    market_name: "Interest Rate"

  contract_types:
    # Source: Section 5 — Contracts vs. Instruments
    F: "Future"
    Y: "Option"
    S: "Spot"

outcomes:
  successful_delivery:
    given:
      - "subscriber is licensed and provisioned with IDP credentials"
      - "trading day has completed"
    then:
      - "exchange operations generates fixed-width flat files for all subscribed record types"
      - "files are compressed and delivered via FTP at 20:00"
      - action: emit_event
        event: data.delivery.completed
        payload: [run_date, record_types, file_name]
    result: "subscriber receives complete end-of-day interest rate derivatives data"

  subscriber_provisioned:
    given:
      - "prospective subscriber has contacted Market Data Department in writing"
      - "license agreement is signed"
    then:
      - "Customer Services provides IDP user ID, dataset name, and password"
      - "subscriber tests access to confirm successful connection"
    result: "subscriber has working FTP access to interest rate derivatives data files"

errors:
  - code: DELIVERY_FAILED
    message: "End-of-day data file delivery failed"
    status: 500

  - code: INVALID_CREDENTIALS
    message: "IDP authentication failed — contact Customer Services"
    status: 500

  - code: DATASET_NOT_PROVISIONED
    message: "Requested dataset has not been provisioned for this subscriber"
    status: 500

events:
  - name: data.delivery.completed
    description: "All subscribed interest rate derivatives record types delivered for the day"
    payload:
      - run_date
      - record_types
      - file_name

  - name: subscriber.provisioned
    description: "New subscriber provisioned with IDP credentials and dataset access"
    payload:
      - subscriber_id
      - dataset_name

related:
  - feature: equities-eod-data-delivery
    type: optional
    reason: "Equities EOD data uses same FTP delivery infrastructure"


# ─── AGI READINESS ─────────────────────────────────────────

agi:
  # --- AGI READINESS (auto-generated by propagate-agi.js) ---

  goals:
    - id: reliable_interest_rates_derivatives_eod_data_delivery
      description: End-of-day interest rate derivatives data delivery via FTP — fixed-width flat files covering daily
        statistics, mark-to-market, and reference rates
      success_metrics:
        - metric: policy_violation_rate
          target: 0%
          measurement: Operations that violate defined policies
        - metric: audit_completeness
          target: 100%
          measurement: All decisions have complete audit trails
      constraints:
        - type: regulatory
          description: All operations must be auditable and traceable
          negotiable: false
  autonomy:
    level: supervised
    human_checkpoints:
      - before making irreversible changes
    escalation_triggers:
      - error_rate > 5
      - consecutive_failures > 3
  safety:
    action_permissions:
      - action: successful_delivery
        permission: autonomous
      - action: subscriber_provisioned
        permission: autonomous
  tradeoffs:
    - prefer: accuracy
      over: latency
      reason: trading operations require precise execution and full audit trails
  verification:
    invariants:
      - error messages never expose internal system details

