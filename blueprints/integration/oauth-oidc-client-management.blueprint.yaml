# ============================================================
# oauth-oidc-client-management — Feature Blueprint
# FDL v0.1.0 | Blueprint v2.0.0
# ============================================================
# Extracted from: https://github.com/ory/hydra
# Tech stack: Go + net/http + pop ORM + PostgreSQL (multi-tenant NID)
# Files analyzed: client/client.go, client/handler.go,
#   client/validator.go, client/error.go, client/manager.go,
#   cmd/cmd_create_client.go
# ============================================================

feature: oauth-oidc-client-management
version: "2.0.0"
description: >
  Lifecycle management of OAuth 2.0 and OpenID Connect clients — admin CRUD
  plus self-service OpenID Connect Dynamic Client Registration (RFC 7591).
category: integration
tags:
  - oauth2
  - oidc
  - client-registration
  - dynamic-registration
  - rfc7591

actors:
  - id: admin_api
    name: Admin API Consumer
    type: system
    description: >
      Trusted backend operator with full CRUD access via privileged admin
      endpoints. Can set admin-only fields: metadata, access_token_strategy,
      skip_consent, skip_logout_consent.

  - id: client_owner
    name: Client Owner
    type: human
    description: >
      Application developer or automated service that self-registers and
      manages its own OAuth 2.0 client via the public OIDC Dynamic Client
      Registration endpoint using a registration_access_token.

fields:
  # ── Identity ──────────────────────────────────────────────

  # Immutable UUID4 — auto-generated if omitted; always server-assigned for DCR.
  # Source: client/client.go — ID field; client/handler.go CreateClient()
  - name: client_id
    type: text
    required: false
    label: Client ID
    immutable: true

  # Human-readable name shown to end-users on the consent screen.
  # Source: client/client.go — Name field
  - name: client_name
    type: text
    required: false
    label: Client Name

  # Cleartext on create only — hashed immediately, never returned again.
  # Min 6 chars. Auto-generated (26 chars) if omitted. Empty for public clients.
  # Source: client/validator.go:87 — len(c.Secret) < 6 check
  - name: client_secret
    type: password
    required: false
    label: Client Secret
    sensitive: true
    validation:
      - type: minLength
        value: 6
        message: client_secret must be at least 6 characters long.

  # ── Protocol ──────────────────────────────────────────────

  # Must not contain fragments (#). Required for authorization_code / implicit flows.
  # Source: client/validator.go — strings.Contains(r, "#") + url.ParseRequestURI
  - name: redirect_uris
    type: text
    required: false
    label: Redirect URIs

  # Defaults to [authorization_code] when empty.
  # Source: client/client.go GetGrantTypes() default
  - name: grant_types
    type: multiselect
    required: false
    label: Grant Types
    options:
      - value: authorization_code
        label: Authorization Code
      - value: client_credentials
        label: Client Credentials
      - value: implicit
        label: Implicit (deprecated)
      - value: refresh_token
        label: Refresh Token
      - value: "urn:ietf:params:oauth:grant-type:jwt-bearer"
        label: JWT Bearer
      - value: "urn:ietf:params:oauth:grant-type:device_code"
        label: Device Code

  # Defaults to [code] when empty.
  # Source: client/client.go GetResponseTypes() default
  - name: response_types
    type: multiselect
    required: false
    label: Response Types
    options:
      - value: code
        label: Code
      - value: id_token
        label: ID Token
      - value: token
        label: Access Token

  # Space-separated list. Defaults to server's default_client_scope if empty.
  # Source: client/validator.go — default scope assignment
  - name: scope
    type: text
    required: false
    label: Scope

  # Allow-list of audience URLs (no whitespace). Limits token applicability.
  # Source: client/client.go — Audience field
  - name: audience
    type: text
    required: false
    label: Audience

  # ── Authentication ─────────────────────────────────────────

  # Defaults to client_secret_basic. Use none for public (native/mobile) clients.
  # private_key_jwt requires jwks or jwks_uri.
  # Source: client/validator.go:52; client/client.go IsPublic()
  - name: token_endpoint_auth_method
    type: select
    required: false
    label: Token Endpoint Auth Method
    options:
      - value: client_secret_basic
        label: client_secret_basic (default)
      - value: client_secret_post
        label: client_secret_post
      - value: private_key_jwt
        label: private_key_jwt
      - value: none
        label: none (public client)

  # Required when token_endpoint_auth_method=private_key_jwt.
  # Source: client/validator.go — supportedAuthTokenSigningAlgs slice
  - name: token_endpoint_auth_signing_alg
    type: select
    required: false
    label: Token Endpoint Auth Signing Algorithm
    options:
      - value: RS256
        label: RS256
      - value: RS384
        label: RS384
      - value: RS512
        label: RS512
      - value: PS256
        label: PS256
      - value: PS384
        label: PS384
      - value: PS512
        label: PS512
      - value: ES256
        label: ES256
      - value: ES384
        label: ES384
      - value: ES512
        label: ES512

  # URL of the client's JWK Set. Mutually exclusive with jwks.
  # Must not resolve to a private IP range.
  # Source: client/validator.go — mutual exclusion + private IP check
  - name: jwks_uri
    type: url
    required: false
    label: JWK Set URI

  # Inline JWK Set. Mutually exclusive with jwks_uri. All keys must be valid.
  # Prefer jwks_uri for key rotation support.
  # Source: client/validator.go — GetJSONWebKeys() validation loop
  - name: jwks
    type: json
    required: false
    label: JWK Set (inline)

  # ── OpenID Connect ─────────────────────────────────────────

  # public = same sub for all RPs; pairwise = unique sub per RP.
  # Defaults to public if supported. Pairwise requires sector_identifier_uri.
  # Source: client/validator.go — SubjectTypesSupported() check + default
  - name: subject_type
    type: select
    required: false
    label: Subject Type
    options:
      - value: public
        label: public
      - value: pairwise
        label: pairwise

  # HTTPS only. Fetched at registration — all redirect_uris must appear in the JSON array.
  # Source: client/validator.go ValidateSectorIdentifierURL()
  - name: sector_identifier_uri
    type: url
    required: false
    label: Sector Identifier URI

  # Pre-registered JAR request_uri values. Must not resolve to private IP ranges.
  # Source: client/validator.go — private IP check for request_uris
  - name: request_uris
    type: text
    required: false
    label: Request URIs

  # JWS algorithm for request objects sent to the authorization endpoint.
  - name: request_object_signing_alg
    type: text
    required: false
    label: Request Object Signing Algorithm

  # Defaults to none (plain JSON UserInfo). Only none or RS256 accepted.
  # Source: client/validator.go:100
  - name: userinfo_signed_response_alg
    type: select
    required: false
    label: UserInfo Signed Response Algorithm
    options:
      - value: none
        label: none (default)
      - value: RS256
        label: RS256

  # ── Logout ─────────────────────────────────────────────────

  # URL rendered in iframe by OP to trigger RP front-channel logout.
  - name: frontchannel_logout_uri
    type: url
    required: false
    label: Front-Channel Logout URI

  # If true, OP MUST include iss + sid params. Defaults to false.
  - name: frontchannel_logout_session_required
    type: boolean
    required: false
    label: Front-Channel Logout Session Required

  # URL for back-channel logout token delivery. Must not resolve to private IP.
  # Source: client/validator.go — private IP check for backchannel_logout_uri
  - name: backchannel_logout_uri
    type: url
    required: false
    label: Back-Channel Logout URI

  # If true, OP MUST include sid claim in Logout Token. Defaults to false.
  - name: backchannel_logout_session_required
    type: boolean
    required: false
    label: Back-Channel Logout Session Required

  # Must share scheme + host + port with at least one registered redirect_uri.
  # Source: client/validator.go — ContainsFunc check against redirect_uris
  - name: post_logout_redirect_uris
    type: text
    required: false
    label: Post-Logout Redirect URIs

  # ── Client Info ────────────────────────────────────────────

  - name: owner
    type: text
    required: false
    label: Owner

  # Typically email addresses for contacts responsible for this client.
  - name: contacts
    type: text
    required: false
    label: Contacts

  # Must be valid http/https URL. Source: client/validator.go — URI scheme check
  - name: policy_uri
    type: url
    required: false
    label: Policy URI

  - name: tos_uri
    type: url
    required: false
    label: Terms of Service URI

  - name: client_uri
    type: url
    required: false
    label: Client URI

  - name: logo_uri
    type: url
    required: false
    label: Logo URI

  # scheme://host[:port] only — no path, query string, or credentials.
  # Appended to server-level CORS config. Requires CORS_ENABLED=true.
  # Source: client/validator.go — CORS origin validation loop
  - name: allowed_cors_origins
    type: text
    required: false
    label: Allowed CORS Origins

  # ── Admin-only Fields ──────────────────────────────────────

  # Arbitrary JSON. Cannot be set via Dynamic Client Registration (admin only).
  # Source: client/validator.go ValidateDynamicRegistration — metadata check
  - name: metadata
    type: json
    required: false
    label: Metadata

  # Overrides server-wide access token strategy for this client. Admin only.
  # Source: client/validator.go ValidateDynamicRegistration — strategy check
  - name: access_token_strategy
    type: select
    required: false
    label: Access Token Strategy
    options:
      - value: jwt
        label: jwt (self-contained)
      - value: opaque
        label: opaque (reference token)

  # Bypasses the consent screen for this client. Admin only.
  - name: skip_consent
    type: boolean
    required: false
    label: Skip Consent Screen

  # Bypasses the logout consent screen for this client. Admin only.
  - name: skip_logout_consent
    type: boolean
    required: false
    label: Skip Logout Consent Screen

  # ── Token Lifespans (per grant type) ───────────────────────
  # Duration strings e.g. "1h", "30m". Overrides server-wide defaults per client.
  # Source: client/client.go — Lifespans struct + GetEffectiveLifespan()

  - name: authorization_code_grant_access_token_lifespan
    type: text
    required: false
    label: AuthCode Access Token Lifespan

  - name: authorization_code_grant_id_token_lifespan
    type: text
    required: false
    label: AuthCode ID Token Lifespan

  - name: authorization_code_grant_refresh_token_lifespan
    type: text
    required: false
    label: AuthCode Refresh Token Lifespan

  - name: client_credentials_grant_access_token_lifespan
    type: text
    required: false
    label: Client Credentials Access Token Lifespan

  - name: refresh_token_grant_access_token_lifespan
    type: text
    required: false
    label: Refresh Token Grant Access Token Lifespan

  - name: refresh_token_grant_id_token_lifespan
    type: text
    required: false
    label: Refresh Token Grant ID Token Lifespan

  - name: refresh_token_grant_refresh_token_lifespan
    type: text
    required: false
    label: Refresh Token Grant Refresh Token Lifespan

  - name: device_authorization_grant_access_token_lifespan
    type: text
    required: false
    label: Device Auth Access Token Lifespan

  - name: device_authorization_grant_id_token_lifespan
    type: text
    required: false
    label: Device Auth ID Token Lifespan

  - name: device_authorization_grant_refresh_token_lifespan
    type: text
    required: false
    label: Device Auth Refresh Token Lifespan

  # ── Timestamps ─────────────────────────────────────────────

  - name: created_at
    type: datetime
    required: false
    label: Created At
    immutable: true

  - name: updated_at
    type: datetime
    required: false
    label: Updated At

rules:
  security:
    authentication:
      admin_api: >
        All /admin/clients/* endpoints are privileged — must be protected by
        network policy, gateway auth, or service mesh. No built-in auth in handler.
      dynamic_registration: >
        /oauth2/register/{id} GET/PUT/DELETE require a valid registration_access_token
        (Bearer). Validated via HMAC strategy; constant-time compared against stored
        signature to prevent timing attacks.
        Source: client/handler.go ValidDynamicAuth()
      registration_token_rotation: >
        On every successful PUT to /oauth2/register/{id}, a new registration_access_token
        is generated and the old one invalidated.
        Source: client/handler.go setOidcDynamicClient()

    input_validation:
      secret_minimum_length: >
        client_secret must be >= 6 chars. Auto-generated secrets are 26 chars.
        Source: client/validator.go:87
      redirect_uri_fragments: >
        Redirect URIs must not contain fragments (#).
        Source: client/validator.go — strings.Contains(r, "#")
      jwks_mutual_exclusion: >
        jwks and jwks_uri cannot both be set.
        Source: client/validator.go:60
      private_key_jwt_requirements: >
        When token_endpoint_auth_method=private_key_jwt, either jwks or jwks_uri must
        be set. token_endpoint_auth_signing_alg (if set) must be one of:
        RS256/RS384/RS512/PS256/PS384/PS512/ES256/ES384/ES512.
        Source: client/validator.go:53-58
      uri_scheme_validation: >
        policy_uri, tos_uri, logo_uri, client_uri must be valid http or https URLs.
        Source: client/validator.go — URI scheme check loop
      cors_origin_format: >
        allowed_cors_origins must be scheme://host[:port] only — no path, query,
        fragment, or embedded credentials.
        Source: client/validator.go — CORS validation loop
      post_logout_redirect_uri_match: >
        Each post_logout_redirect_uri must share scheme, hostname, and port with at
        least one registered redirect_uri.
        Source: client/validator.go — ContainsFunc check
      sector_identifier_uri_validation: >
        sector_identifier_uri must be HTTPS. Server fetches it at registration and
        validates all redirect_uris appear in the returned JSON array.
        Source: client/validator.go ValidateSectorIdentifierURL()
      private_ip_restriction: >
        When ClientHTTPNoPrivateIPRanges=true (configurable), jwks_uri,
        backchannel_logout_uri, and request_uris must not resolve to private IP ranges.
        Source: client/validator.go — ipx.AreAllAssociatedIPsAllowed()
      subject_type_validation: >
        subject_type must be in server's configured subject_types_supported.
        Defaults to public if supported. Source: client/validator.go
      userinfo_alg_validation: >
        userinfo_signed_response_alg must be none or RS256.
        Source: client/validator.go:100

    secret_handling:
      never_return_in_list_or_get: >
        client_secret is always stripped from GET /admin/clients and
        GET /admin/clients/{id} responses.
        Source: client/handler.go — c[k].Secret = "" and c.Secret = ""
      secret_expires_at_always_zero: >
        client_secret_expires_at is always set to 0 (expiry not supported).
        Source: client/validator.go — c.SecretExpiresAt = 0
      only_echoed_on_create_update: >
        Secret is only returned in the response body of create and update operations
        for non-public clients. Never persisted in plaintext.

  access:
    dynamic_registration_disabled_by_default: >
      /oauth2/register endpoints are disabled by default. Enabled via:
      oidc.dynamic_client_registration.enabled=true.
      Source: client/handler.go requireDynamicAuth()
      + driver/config/provider.go KeyPublicAllowDynamicRegistration
    dynamic_registration_field_restrictions: >
      Dynamic Client Registration cannot set: client_secret, client_id, metadata,
      access_token_strategy, skip_consent, skip_logout_consent.
      Source: client/handler.go createOidcDynamicClient() + ValidateDynamicRegistration()
    dynamic_get_excludes_metadata: >
      GET /oauth2/register/{id} strips both Secret and Metadata from the response.
      Source: client/handler.go getOidcDynamicClient() — c.Metadata = nil

  rate_limiting:
    # Source: client/handler.go — x-ory-ratelimit-bucket swagger annotations
    admin_write:
      bucket: hydra-admin-low
      # POST /admin/clients, PUT/PATCH/DELETE /admin/clients/{id},
      # PUT /admin/clients/{id}/lifespans
    admin_list:
      bucket: hydra-admin-medium
      # GET /admin/clients
    admin_get:
      bucket: hydra-admin-high
      # GET /admin/clients/{id}, GET /oauth2/register/{id}
    public_dynamic:
      bucket: hydra-public-low
      # POST /oauth2/register, PUT/DELETE /oauth2/register/{id}

outcomes:
  # ── Error outcomes (checked first) ────────────────────────

  dynamic_registration_disabled:
    priority: 1
    error: DYNAMIC_REGISTRATION_DISABLED
    given:
      - "oidc.dynamic_client_registration.enabled = false (server default)"
    then: []
    result: "404 Not Found."
    # Source: client/handler.go requireDynamicAuth()

  dynamic_registration_unauthorized:
    priority: 1
    error: DYNAMIC_REGISTRATION_UNAUTHORIZED
    given:
      - any:
          - "registration_access_token missing from Authorization header"
          - "registration_access_token is malformed or expired"
          - "token signature does not match stored signature"
          - "client has no registration access token"
    then: []
    result: "401 Unauthorized. Generic message to prevent client ID enumeration."
    # Source: client/handler.go ValidDynamicAuth() — all error paths return same 401

  invalid_redirect_uri:
    priority: 1
    error: INVALID_REDIRECT_URI
    given:
      - any:
          - "a redirect_uri contains a fragment (#)"
          - "a redirect_uri is not a valid URL"
    then: []
    result: "400 Bad Request."
    # Source: client/validator.go — ErrInvalidRedirectURI

  dynamic_field_violation:
    priority: 1
    error: INVALID_REQUEST
    given:
      - any:
          - "dynamic registration request includes client_secret"
          - "dynamic registration request includes metadata"
          - "dynamic registration request sets skip_consent=true"
          - "dynamic registration request sets skip_logout_consent=true"
          - "dynamic registration request sets access_token_strategy"
    then: []
    result: "400 Bad Request."
    # Source: client/handler.go + ValidateDynamicRegistration()

  invalid_client_metadata:
    priority: 2
    error: INVALID_CLIENT_METADATA
    given:
      - any:
          - "private_key_jwt auth without jwks or jwks_uri"
          - "both jwks and jwks_uri are set"
          - "a JWK in the inline jwks set is invalid"
          - "a URI field is not a valid http/https URL"
          - "client_secret is shorter than 6 characters"
          - "userinfo_signed_response_alg is not none or RS256"
          - "subject_type is not in server's supported list"
          - "allowed_cors_origins entry has a path, query, or credentials"
          - "post_logout_redirect_uri does not match any redirect_uri domain/port/scheme"
          - "sector_identifier_uri is not HTTPS or missing redirect_uris in its array"
          - "jwks_uri, backchannel_logout_uri, or request_uri resolves to private IP range"
          - "access_token_strategy is not jwt or opaque"
    then: []
    result: "400 Bad Request."
    # Source: client/validator.go — multiple ErrInvalidClientMetadata usages

  client_not_found:
    priority: 2
    error: CLIENT_NOT_FOUND
    given:
      - "no client exists with the requested client_id"
    then: []
    result: "404 Not Found."
    # Source: client/manager.go — GetConcreteClient() error propagation

  # ── Admin CRUD ─────────────────────────────────────────────

  client_created:
    priority: 5
    given:
      - "admin API caller provides valid client configuration"
      - "all validation rules pass"
    then:
      - action: create_record
        type: oauth2_client
      - action: emit_event
        event: client.created
        payload: [client_id, client_name, grant_types, created_at]
      - action: set_field
        target: client_secret_expires_at
        value: 0
    result: >
      201 Created. Full client object returned including client_secret (plaintext, once only)
      and registration_access_token. Secret is hashed in storage and never retrievable again.
    # Source: client/handler.go createOAuth2Client() + CreateClient()

  clients_listed:
    priority: 5
    given:
      - "optional filters: client_name, owner"
      - "optional keyset pagination parameters"
    then: []
    result: >
      200 OK. Array of client objects, paginated via Link header (keyset pagination).
      client_secret stripped from all records. Default page size: 100.
    # Source: client/handler.go listOAuth2Clients()

  client_retrieved:
    priority: 5
    given:
      - "client with given client_id exists"
    then: []
    result: "200 OK. Full client record. client_secret always omitted."
    # Source: client/handler.go Get() — c.Secret = ""

  client_replaced:
    priority: 5
    given:
      - "client with given client_id exists"
      - "request body passes all validation rules"
    then:
      - action: set_field
        target: updated_at
        value: "now()"
    result: >
      200 OK. Updated client. client_secret echoed if provided in request;
      existing secret preserved otherwise.
    # Source: client/handler.go setOAuth2Client() + updateClient()

  client_patched:
    priority: 5
    given:
      - "client with given client_id exists"
      - "JSON Patch document is valid (RFC 6902)"
      - "patch does not attempt to modify the client_id field"
    then:
      - action: set_field
        target: updated_at
        value: "now()"
    result: "200 OK. Patched client. client_secret echoed if patch modified it."
    # Source: client/handler.go patchOAuth2Client() — /id path is protected

  client_deleted:
    priority: 5
    given:
      - "client with given client_id exists"
    then:
      - action: delete_record
        type: oauth2_client
      - action: emit_event
        event: client.deleted
        payload: [client_id]
    result: "204 No Content."
    # Source: client/handler.go deleteOAuth2Client()

  client_lifespans_updated:
    priority: 5
    given:
      - "client with given client_id exists"
      - "lifespan values are valid duration strings"
    then:
      - action: set_field
        target: updated_at
        value: "now()"
    result: >
      200 OK. Client returned with updated lifespan values.
      Only lifespan fields are modified; all other client fields are preserved.
    # Source: client/handler.go setOAuth2ClientLifespans()

  # ── Dynamic Client Registration ────────────────────────────

  client_registered_dynamic:
    priority: 5
    given:
      - "oidc.dynamic_client_registration.enabled = true"
      - "request does not include any admin-only fields"
      - "all validation rules pass"
    then:
      - action: create_record
        type: oauth2_client
      - action: emit_event
        event: client.registered
        payload: [client_id, client_name, grant_types, created_at, registration_client_uri]
    result: >
      201 Created. Server-assigned client_id and client_secret returned (once only).
      registration_access_token issued for self-managing this client.
    # Source: client/handler.go createOidcDynamicClient()

  dynamic_client_self_managed:
    priority: 5
    given:
      - "oidc.dynamic_client_registration.enabled = true"
      - "valid registration_access_token in Authorization header"
      - "token signature matches stored signature (constant-time compare)"
    then: []
    result: >
      Client owner can GET (200), PUT (200, token rotated), or DELETE (204) their registration.
      GET strips client_secret and metadata. PUT issues new registration_access_token.
    # Source: client/handler.go ValidDynamicAuth() + setOidcDynamicClient()

errors:
  - code: INVALID_CLIENT_METADATA
    status: 400
    message: >
      The value of one of the Client Metadata fields is invalid and the server
      has rejected this request.
    # Source: client/error.go — ErrInvalidClientMetadata (RFC 6749 / RFC 7591)

  - code: INVALID_REDIRECT_URI
    status: 400
    message: The value of one or more redirect_uris is invalid.
    # Source: client/error.go — ErrInvalidRedirectURI

  - code: INVALID_REQUEST
    status: 400
    message: >
      The request includes an unsupported parameter value or is otherwise malformed.
    # Source: client/error.go — ErrInvalidRequest

  - code: CLIENT_NOT_FOUND
    status: 404
    message: The requested OAuth 2.0 client does not exist.

  - code: DYNAMIC_REGISTRATION_UNAUTHORIZED
    status: 401
    message: >
      The requested OAuth 2.0 client does not exist or you provided incorrect credentials.
    # Intentionally vague — prevents client ID enumeration.
    # Source: client/handler.go ValidDynamicAuth()

  - code: DYNAMIC_REGISTRATION_DISABLED
    status: 404
    message: Dynamic client registration is not enabled.
    # Source: client/handler.go requireDynamicAuth()

events:
  - name: client.created
    description: Fired when a new OAuth 2.0 client is registered via the admin API.
    payload:
      - client_id
      - client_name
      - grant_types
      - created_at

  - name: client.registered
    description: Fired when a client self-registers via OIDC Dynamic Client Registration.
    payload:
      - client_id
      - client_name
      - grant_types
      - created_at
      - registration_client_uri

  - name: client.deleted
    description: Fired when an OAuth 2.0 client is deleted.
    payload:
      - client_id

related:
  - feature: oauth-provider
    type: required
    reason: Authorization server that issues tokens using these client registrations.

  - feature: identity-brokering-social-login
    type: optional
    reason: Social login flows consume OAuth 2.0 clients configured here.

  - feature: openid-connect-server
    type: recommended
    reason: >
      Governs token lifespans, supported subject types, and default scopes
      referenced by client registrations.

  - feature: user-consent-management
    type: recommended
    reason: >
      Consent screen logic triggered during authorization for clients where
      skip_consent is false.


