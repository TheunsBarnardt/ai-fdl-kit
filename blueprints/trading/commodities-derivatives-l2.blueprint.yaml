# ============================================================
# commodities-derivatives-l2 — Feature Blueprint
# Source: CFA LV2 2024 Vol 5 — Alternative Investments Module 1, Introduction to Commodities and Commodity Derivatives
# ============================================================

feature: commodities-derivatives-l2
version: "1.0.0"
description: Analyse commodities and derivatives — sector characteristics, spot and futures pricing, theories of futures returns, roll return, contango and backwardation, commodity swaps, and indexes
category: trading
tags: [alternative-investments, commodities, futures, roll-return, contango, backwardation, cfa-level-2]
aliases:
  - commodity-sectors-l2
  - commodity-futures-pricing
  - roll-return-contango-backwardation
  - commodity-spot-futures-parity
  - theories-of-futures-returns
  - commodity-swaps-l2
  - commodity-index-construction

actors:
  - id: commodity_analyst
    name: Commodity Analyst
    type: system

fields:
  - name: commodity_id
    type: text
    required: true
    label: Commodity identifier
  - name: analysis_type
    type: select
    required: true
    label: pricing | futures_return | index | swap

rules:
  commodity_sectors:
    energy: "Oil, natural gas, coal; inelastic demand, supply shocks; OPEC"
    industrial_metals: "Copper, aluminium; China demand driven"
    precious_metals: "Gold, silver; store of value; low industrial correlation"
    livestock: "Hogs, cattle; perishable; seasonal"
    grains: "Corn, wheat, soy; seasonal supply; storage cost"
    softs: "Coffee, cocoa, sugar, cotton; weather dependent"
  valuation_of_commodities:
    cost_of_production: "Minimum long-run price floor"
    value_of_end_use: "Derived from downstream product price"
    dcf: "Net present value of cash flows generated"
    comparables: "Historical price ratios, cross-commodity spreads"
  commodity_futures_markets:
    hedgers: "Producers short futures; consumers long futures"
    speculators: "Provide liquidity; earn risk premium"
    normal_backwardation: "Hedgers (short) pay speculators risk premium; futures below expected spot"
  spot_and_futures_pricing:
    full_carry: "F0 = S0 × e^{(r + c − y)T} where c=storage cost, y=convenience yield"
    convenience_yield: "Non-monetary benefit from holding physical (supply disruption buffer)"
    normal_contango: "F > expected spot (no convenience yield, storage cost high)"
    normal_backwardation: "F < expected spot (convenience yield high; supply scarcity)"
  theories_of_futures_returns:
    insurance_theory: "Futures return = risk-free + risk premium from hedger demand"
    hedging_pressure: "Net hedger position determines sign of risk premium"
    theory_of_storage: "Convenience yield drives backwardation"
    segmented_markets: "Commodity returns uncorrelated with equity — diversification"
  components_of_futures_returns:
    spot_return: "Change in spot price"
    roll_yield: "From rolling expiring to next contract"
    collateral_return: "Return on margin collateral (T-bills)"
    total_return: "Spot + roll + collateral"
  roll_return:
    contango: "Futures above spot; rolling losses as high-priced futures replace low spot"
    backwardation: "Futures below spot; rolling gains"
  commodity_swaps:
    total_return_swap: "Receive commodity return; pay fixed or floating"
    basis_swap: "Exchange one commodity return for another"
    variance_volatility_swap: "Bet on realised variance vs strike"
  commodity_indexes:
    gsci: "Production-weighted; heavy in energy"
    bloomberg_commodity: "Diversified; rules-based diversification caps"
    rebalancing: "Calendar rebalancing generates buy-low, sell-high"
    rolling_schedule: "Systematic roll from front to next contract"
  validation:
    commodity_required: "commodity_id present"
    valid_analysis: "analysis_type in [pricing, futures_return, index, swap]"

outcomes:
  analyse_commodity:
    priority: 1
    description: Analyse commodity or derivative
    given:
      - field: commodity_id
        source: input
        operator: exists
      - field: analysis_type
        source: input
        operator: in
        value: [pricing, futures_return, index, swap]
    then:
      - action: call_service
        target: commodity_analyst
      - action: emit_event
        event: commodity.analysed
  invalid_analysis:
    priority: 10
    description: Unsupported analysis type
    given:
      - field: analysis_type
        source: input
        operator: not_in
        value: [pricing, futures_return, index, swap]
    then:
      - action: emit_event
        event: commodity.rejected
    error: COMMODITY_INVALID_ANALYSIS

errors:
  - code: COMMODITY_INVALID_ANALYSIS
    status: 400
    message: analysis_type must be one of the supported types

events:
  - name: commodity.analysed
    payload: [commodity_id, analysis_type, spot_price, futures_price, roll_return, total_return]
  - name: commodity.rejected
    payload: [commodity_id, reason_code]

anti_patterns:
  - rule: Do not assume commodity futures always trade in contango
    why: "Backwardation occurs when convenience yield exceeds storage cost + risk-free rate; energy and grains frequently invert due to supply scarcity or seasonal demand"
  - rule: Do not treat commodity index returns as equivalent to spot returns
    why: "Roll yield (often negative in contango markets) and rebalancing frequency create material divergence between index return and spot price change"
  - rule: Do not ignore the secular decline in risk premiums from financialisation
    why: "Post-2000 commodity index investment narrowed the traditional hedger premium; backwardation risk premium is time-varying and may be structurally lower"

api:
  http:
    method: POST
    path: /alternatives/commodity/analyse
  request:
    schema:
      commodity_id: string
      analysis_type: string
  response:
    success:
      status: 200
      schema:
        commodity_id: string
        total_return: number
    errors:
      - status: 400
        error_code: COMMODITY_INVALID_ANALYSIS

related:
  - feature: forward-commitments-valuation-l2
    type: recommended
