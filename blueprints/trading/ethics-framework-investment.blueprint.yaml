# ============================================================
# ethics-framework-investment — Feature Blueprint
# Source: CFA LV1 2025 Vol 10 — Module 1, Ethics & Trust
# ============================================================

feature: ethics-framework-investment
version: "1.0.0"
description: Explain the role of ethics in the investment profession, trust and client well-being, differences between ethical conduct and legal conduct, and challenges to ethical behaviour
category: trading
tags: [ethics, investment-profession, trust, fiduciary, cfa-level-1]
aliases:
  - investment-ethics-overview
  - ethics-vs-legal
  - client-trust
  - fiduciary-ethical-duty
  - professional-ethics-investment

actors:
  - id: ethics_reviewer
    name: Ethics Reviewer
    type: human

fields:
  - name: review_id
    type: text
    required: true
    label: Ethics review identifier
  - name: situation_type
    type: select
    required: true
    label: client_conflict | market_integrity | firm_conflict | self_conduct

rules:
  role_of_ethics:
    trust: "Professions require public trust; investment industry fiduciary role"
    beyond_compliance: "Legal compliance is minimum; ethics sets higher standard"
  ethics_vs_law:
    law: "Minimum enforceable conduct"
    ethics: "Higher voluntary standard based on profession values"
    conflict_possible: "Legal act may be unethical; illegal act never ethical"
  ethical_challenges:
    in_group_loyalty: "Firm or team pressure"
    overconfidence: "Certainty about one's ethics prevents scrutiny"
    situational_influences: "Stress, incentives, scarcity"
  professional_implications:
    standard: "Act in clients' best interest; uphold integrity of markets"
    consequences: "Career, firm, and industry trust damage"
  validation:
    review_required: "review_id present"
    valid_situation: "situation_type in allowed set"

outcomes:
  assess_ethical_situation:
    priority: 1
    description: Assess ethical situation
    given:
      - field: review_id
        source: input
        operator: exists
      - field: situation_type
        source: input
        operator: in
        value: [client_conflict, market_integrity, firm_conflict, self_conduct]
    then:
      - action: call_service
        target: ethics_reviewer
      - action: emit_event
        event: ethics.assessed
  invalid_situation:
    priority: 10
    description: Unsupported situation type
    given:
      - field: situation_type
        source: input
        operator: not_in
        value: [client_conflict, market_integrity, firm_conflict, self_conduct]
    then:
      - action: emit_event
        event: ethics.assessment_rejected
    error: ETHICS_INVALID_SITUATION

errors:
  - code: ETHICS_INVALID_SITUATION
    status: 400
    message: situation_type must be a supported category

events:
  - name: ethics.assessed
    payload: [review_id, situation_type, concern_level, recommendation]
  - name: ethics.assessment_rejected
    payload: [review_id, reason_code]

anti_patterns:
  - rule: Do not conflate legal compliance with ethical behaviour
    why: "Regulations trail ethics and define minimum only; professionals must apply higher standard or undermine client trust"
  - rule: Do not rationalise ethical breaches via situational pressure
    why: "Environmental drivers explain but don't justify; structural safeguards and peer review reduce situational failure"
  - rule: Do not assume personal integrity alone prevents ethical lapses
    why: "Overconfidence in one's ethics is itself a risk factor; requires process, training, and mentorship"

api:
  http:
    method: POST
    path: /ethics/assess
  request:
    schema:
      review_id: string
      situation_type: string
  response:
    success:
      status: 200
      schema:
        review_id: string
        concern_level: string
    errors:
      - status: 400
        error_code: ETHICS_INVALID_SITUATION

related:
  - feature: cfa-code-of-ethics
    type: required
  - feature: ethical-decision-making-framework
    type: required


# ─── AGI READINESS ─────────────────────────────────────────

agi:
  # --- AGI READINESS (auto-generated by propagate-agi.js) ---

  goals:
    - id: reliable_ethics_framework_investment
      description: Explain the role of ethics in the investment profession, trust and client well-being, differences between
        ethical conduct and legal conduct, and challenges to ethical behaviour
      success_metrics:
        - metric: policy_violation_rate
          target: 0%
          measurement: Operations that violate defined policies
        - metric: audit_completeness
          target: 100%
          measurement: All decisions have complete audit trails
      constraints:
        - type: regulatory
          description: All operations must be auditable and traceable
          negotiable: false
  autonomy:
    level: supervised
    human_checkpoints:
      - before making irreversible changes
    escalation_triggers:
      - error_rate > 5
      - consecutive_failures > 3
  safety:
    action_permissions:
      - action: assess_ethical_situation
        permission: autonomous
      - action: invalid_situation
        permission: autonomous
  tradeoffs:
    - prefer: accuracy
      over: latency
      reason: trading operations require precise execution and full audit trails
  verification:
    invariants:
      - error messages never expose internal system details
  coordination:
    protocol: orchestrated
    consumes:
      - capability: cfa_code_of_ethics
        from: cfa-code-of-ethics
        fallback: fail
      - capability: ethical_decision_making_framework
        from: ethical-decision-making-framework
        fallback: fail
