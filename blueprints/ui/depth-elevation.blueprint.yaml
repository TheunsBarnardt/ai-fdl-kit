feature: depth-elevation
version: "1.0"
category: ui
description: >
  Use shadows, layering, and spatial relationships to create visual depth and communicate element elevation, even in flat designs, making clickable elements feel interactive and content hierarchy clear.

rules:
  - Emulate a light source — consistent shadow direction (typically top-left light) creates believable depth
  - Use shadows to convey elevation — stronger shadows = higher elevation; no shadow = background level
  - Shadows can have two parts — a soft, larger shadow (ambient) and a sharper, smaller shadow (contact)
  - Even flat designs can have depth — shadows on flat surfaces are effective without skeuomorphism
  - Overlap elements to create layers — slight overlap communicates spatial relationship and depth

outcomes:
  - given:
      - "modal or floating panel is displayed above content"
    then:
      - action: set_field
        target: elevation_level
        value: "highest"
      - action: set_field
        target: shadow_blur
        value: "16-24px"
      - action: set_field
        target: shadow_spread
        value: "0 to 8px"
      - action: set_field
        target: shadow_opacity
        value: "15-25%"
      - action: set_field
        target: shadow_offset
        value: "0 12px (down and slightly forward)"
    result: "modal clearly appears above all other content and captures focus"

  - given:
      - "card or raised element is on background"
    then:
      - action: set_field
        target: elevation_level
        value: "medium"
      - action: set_field
        target: shadow_blur
        value: "8-12px"
      - action: set_field
        target: shadow_spread
        value: "0 to 4px"
      - action: set_field
        target: shadow_opacity
        value: "10-15%"
    result: "card appears layered above background without excessive visual weight"

  - given:
      - "button or interactive element is at rest"
    then:
      - action: set_field
        target: elevation_level
        value: "low or none"
      - action: set_field
        target: shadow
        value: "subtle or none at rest"
      - action: transition_state
        field: element_state
        from: "rest"
        to: "hover"
      - action: set_field
        target: shadow
        value: "small shadow on hover"
    result: "button feels raised on interaction, subtle at rest"

  - given:
      - "elements are layered (e.g., image with overlay)"
    then:
      - action: set_field
        target: overlap_offset
        value: "8-16px"
      - action: set_field
        target: shadow_on_overlapping
        value: "optional subtle shadow"
    result: "layering is clear and suggests spatial depth"

fields:
  - name: light_source_direction
    type: text
    description: "Direction of primary light (e.g., top-left, directly above)"

  - name: shadow_levels
    type: text
    description: "Predefined shadow styles for different elevations (background, card, modal)"

  - name: max_shadow_blur
    type: number
    description: "Maximum blur radius for largest shadows (typically 24px)"

  - name: interaction_shadow_change
    type: text
    description: "How shadows change on hover/active (increase blur, offset, or opacity)"

tags:
  - design-system
  - visual-design
  - interaction-design

related:
  - feature: visual-hierarchy
    type: recommended
    description: "Elevation and shadows express hierarchy through spatial positioning"

  - feature: color-system
    type: recommended
    description: "Shadow color is derived from brand darkness, not pure black"

  - feature: dark-mode
    type: recommended
    description: "Shadow appearance differs in dark mode (lighter shadows on dark backgrounds)"

  - feature: animation-state-machine
    type: optional
    description: "Shadows can animate smoothly during state transitions"
