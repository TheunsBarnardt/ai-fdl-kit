      - error messages never expose internal system details

extensions:
  worked_example:
    # Source: Vol 1, Module 3, p.99-100
    scenario: "EAA Equity Index daily returns"
    q1: -0.00487
    q2: 0.00043
    q3: 0.00583
    iqr: 0.01070
    p10: -0.00876
    p90: 0.00921

related:
  - feature: measures-of-central-tendency
    type: recommended
  - feature: measures-of-dispersion
    type: recommended
