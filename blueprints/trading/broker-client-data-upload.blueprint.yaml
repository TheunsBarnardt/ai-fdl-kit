rules:
  submission:
    - "MUST: Support automated file submission via FTP"
    - "MUST: Support manual online upload via comprehensive reporting process function"
    - "MUST: Configure email addresses before allowing upload submission"
    - "MUST: Provide response dataset acknowledging upload status"
    - "MUST: Archive processed upload files"
  validation:
    - "MUST: Validate mandatory fields on Card Code 031"
    - "MUST: Reject files with invalid Card Code 000 header"
    - "MUST: Report field-level errors via COMPR/PCOMPR error reporting"
    - "MUST: Return response codes indicating success or failure per record"
  format:
    - "MUST: Use fixed-width card code record format"
    - "MUST: Start file with Header Record (Card Code 000)"
    - "MUST: End file with Trailer Record (Card Code 999)"
    - "MUST: Group related fields into logical Card Codes (031, 032, 033, 034, 036, 037, 038)"
  compliance:
    - "MUST: Support FATCA classification fields (GIN, TIN, US person indicator)"
    - "MUST: Support Common Reporting Standard (CRS) fields"
    - "MUST: Support IT3(b) and IT3(c) tax reporting exclusion flags"
    - "MUST: Support politically exposed person (PEP) indicator"
  identification:
    - "MUST: Use unique account number as primary identifier"
    - "MUST: Capture ID number and ID type for every client"
errors:
  - code: CLIENT_UPLOAD_INVALID_HEADER
    status: 400
    message: Upload file missing or invalid Card Code 000 header
  - code: CLIENT_UPLOAD_MANDATORY_FIELD_MISSING
    status: 422
    message: Required client account field missing
  - code: CLIENT_UPLOAD_DUPLICATE_ACCOUNT
    status: 409
    message: Account number already exists
  - code: CLIENT_UPLOAD_FATCA_VALIDATION_FAILED
    status: 422
    message: FATCA classification fields failed validation
  - code: CLIENT_UPLOAD_FILE_REJECTED
    status: 422
    message: Upload file rejected - see response dataset for details
outcomes:
  automated_upload_submission:
    priority: 1
    description: Broker submits upload file via FTP automated process
    given:
      - field: email_configured
        source: db
        operator: eq
        value: true
      - field: file_format
        source: input
        operator: eq
        value: fixed_width_card_code
    then:
      - action: create_record
        type: upload_submission
        fields:
          - broker_code
          - file_name
          - submission_timestamp
          - record_count
      - action: emit_event
        event: client_upload.submitted
  validate_mandatory_fields:
    priority: 2
    description: Validate Card Code 031 mandatory fields
    given:
      - field: card_code
        source: input
        operator: eq
        value: "031"
    then:
      - action: call_service
        target: field_validator
      - action: emit_event
        event: client_upload.validated
  mandatory_field_missing:
    priority: 3
    error: CLIENT_UPLOAD_MANDATORY_FIELD_MISSING
    given:
      - any:
          - field: account_number
            source: input
            operator: not_exists
          - field: client_name
            source: input
            operator: not_exists
          - field: id_number
            source: input
            operator: not_exists
    then:
      - action: create_record
        type: error_response
        fields:
          - broker_code
          - record_reference
          - missing_field
          - error_code
      - action: emit_event
        event: client_upload.validation_failed
  fatca_validation_check:
    priority: 4
    description: Validate FATCA classification on Card Code 038
    given:
      - field: card_code
        source: input
        operator: eq
        value: "038"
      - field: us_person_indicator
        source: input
        operator: eq
        value: Y
    then:
      - action: call_service
        target: fatca_validator
      - action: emit_event
        event: client_upload.fatca.validated
    error: CLIENT_UPLOAD_FATCA_VALIDATION_FAILED
  generate_response_dataset:
    priority: 5
    description: Generate response dataset with per-record status
    given:
      - upload file processing complete
    then:
      - action: create_record
        type: response_dataset
        fields:
          - broker_code
          - upload_reference
          - success_count
          - failure_count
          - error_details
      - action: notify
        channel: email
      - action: emit_event
        event: client_upload.response.delivered
  archive_upload:
    priority: 6
    description: Archive processed upload file
    given:
      - field: processing_status
        source: system
        operator: eq
        value: completed
    then:
      - action: call_service
        target: archive_storage
      - action: emit_event
        event: client_upload.archived
agi:
  goals:
    - id: reliable_broker_client_data_upload
      description: Client account data upload from broker firms to central back-office via fixed-width card code files covering account, CSDP, addresses, FATCA/IT3 tax, and portfolio data
      success_metrics:
        - metric: policy_violation_rate
          target: 0%
          measurement: Operations that violate defined policies
        - metric: audit_completeness
          target: 100%
          measurement: All decisions have complete audit trails
      constraints:
        - type: regulatory
          description: All operations must be auditable and traceable
          negotiable: false
  autonomy:
    level: supervised
    human_checkpoints:
      - before making irreversible changes
    escalation_triggers:
      - error_rate > 5
      - consecutive_failures > 3
  safety:
    action_permissions:
      - action: automated_upload_submission
        permission: autonomous
      - action: validate_mandatory_fields
        permission: autonomous
      - action: mandatory_field_missing
        permission: autonomous
      - action: fatca_validation_check
        permission: autonomous
      - action: generate_response_dataset
        permission: autonomous
      - action: archive_upload
        permission: autonomous
  tradeoffs:
    - prefer: accuracy
      over: latency
      reason: trading operations require precise execution and full audit trails
  verification:
    invariants:
      - error messages never expose internal system details
extensions:
  card_codes:
    "999":
      name: Trailer Record
      purpose: Record count and checksum
    "000":
      name: Header Record
      purpose: File metadata and broker identification
    "031":
      name: Mandatory, Conditionally Optional and Frequently Used Optional fields
      purpose: Core client account details
    "032":
      name: CSDP Details
      purpose: Central Security Depository Participant account info
    "033":
      name: All Other Fields
      purpose: Employment, income, risk rating, KYC fields
    "034":
      name: Portfolio Details
      purpose: Portfolio configuration for portfolio clients
    "036":
      name: Additional Client Maintenance fields
      purpose: VAT, tax reference, marital status
    "037":
      name: Additional Address Maintenance fields
      purpose: Postal, physical, email, phone contact
    "038":
      name: Legal and Tax Maintenance fields
      purpose: FATCA, CRS, IT3, PEP, sanctions
  submission_methods:
    - Automated FTP submission
    - Manual online upload via comprehensive reporting function
    - Batch upload
  delivery_workflow:
    - 1. Email address setup
    - 2. Upload file submission (FTP or manual)
    - 3. Error reporting via COMPR/PCOMPR
    - 4. Response dataset delivery
    - 5. Archiving
  compliance_standards:
    - FATCA (Foreign Account Tax Compliance Act)
    - CRS (Common Reporting Standard)
    - Local IT3(b) and IT3(c) tax reporting
    - PEP (Politically Exposed Persons) screening
related:
  - feature: broker-back-office-dissemination
    type: recommended
  - feature: broker-financial-data-upload
    type: optional
  - feature: client-onboarding
    type: recommended
