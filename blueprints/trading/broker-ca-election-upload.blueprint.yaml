feature: broker-ca-election-upload
version: 1.0.0
description: Broker upload of client elections for voluntary corporate action events, validated against a frozen positions file before the election deadline.
category: trading
aliases:
  - ca-election-upload
  - corporate-action-election-submit
  - voluntary-event-elections
  - elective-event-upload
  - ca-elect-upload
tags:
  - corporate-actions
  - elections
  - upload
  - voluntary-events
  - broker
fields:
  - name: broker_code
    type: text
    required: true
    label: Broker Code
    validation:
      - type: pattern
        value: ^[0-9]{3}$
        message: Broker Code failed pattern validation
  - name: process_date
    type: date
    required: true
    label: Process Date
  - name: process_time
    type: text
    required: true
    label: Process Time
    validation:
      - type: pattern
        value: ^[0-9]{6}$
        message: Process Time failed pattern validation
  - name: sequence
    type: text
    required: true
    label: Sequence Number
    validation:
      - type: pattern
        value: ^[A-Za-z0-9]{7}$
        message: Sequence Number failed pattern validation
  - name: process_type
    type: select
    required: true
    label: Event Process Type
    options:
      - value: SC
        label: Scrip Dividend
      - value: TU
        label: Take Up
      - value: OL
        label: Odd Lots
      - value: CD
        label: DRIP (CD)
      - value: RI
        label: DRIP (RI)
      - value: RE
        label: Reinvestment
      - value: IT
        label: Interest
  - name: instrument_type
    type: text
    required: true
    label: Instrument Type
    validation:
      - type: pattern
        value: ^E$
        message: Instrument Type failed pattern validation
  - name: instrument_alpha
    type: text
    required: true
    label: Instrument Alpha
    validation:
      - type: pattern
        value: ^[A-Z0-9 ]{1,6}$
        message: Instrument Alpha failed pattern validation
  - name: instrument_version
    type: text
    required: true
    label: Instrument Version
    validation:
      - type: pattern
        value: ^[A-Z0-9 ]{1,3}$
        message: Instrument Version failed pattern validation
  - name: ldr_date
    type: date
    required: true
    label: Last Date to Register
  - name: process_sequence
    type: number
    required: true
    label: Process Sequence
  - name: line_number
    type: number
    required: true
    label: Line Number
  - name: section
    type: select
    required: true
    label: Section
    options:
      - value: B
        label: Client Holdings / Unsettled Deals
      - value: G
        label: Securities Lending / Borrowing
      - value: H
        label: Collateral
  - name: option_code
    type: text
    required: false
    label: Option Code
    validation:
      - type: pattern
        value: ^[A-Z ]{0,2}$
        message: Option Code failed pattern validation
  - name: account_code
    type: text
    required: true
    label: Account Code
    validation:
      - type: pattern
        value: ^[0-9]{7}$
        message: Account Code failed pattern validation
  - name: original_sign
    type: select
    required: true
    label: Original Quantity Sign
    options:
      - value: +
        label: Positive
      - value: "-"
        label: Negative
      - value: " "
        label: Zero
  - name: original_quantity
    type: number
    required: true
    label: Original Quantity
  - name: election_sign
    type: select
    required: true
    label: Election Quantity Sign
    options:
      - value: +
        label: Positive
      - value: "-"
        label: Negative
      - value: " "
        label: Zero
  - name: election_quantity
    type: number
    required: true
    label: Election Quantity
  - name: scrip_type
    type: text
    required: false
    label: Scrip Type
  - name: registration_code
    type: text
    required: false
    label: Registration Code
  - name: location_alpha
    type: text
    required: false
    label: Location Code
  - name: deal_id
    type: text
    required: false
    label: Deal ID
  - name: ps_indicator
    type: select
    required: false
    label: Purchase / Sale Indicator
    options:
      - value: P
        label: Purchase
      - value: S
        label: Sale
  - name: lender_account
    type: text
    required: false
    label: Lender Account
  - name: borrower_account
    type: text
    required: false
    label: Borrower Account
  - name: provider_account
    type: text
    required: false
    label: Collateral Provider Account
  - name: receiver_account
    type: text
    required: false
    label: Collateral Receiver Account
  - name: opposite_account
    type: text
    required: false
    label: Opposite Account
  - name: opposite_lb_stock_account
    type: text
    required: false
    label: Opposite LB Stock Account
  - name: total_records
    type: number
    required: true
    label: Total Records
  - name: records_processed
    type: number
    required: false
    label: Records Processed
  - name: records_rejected
    type: number
    required: false
    label: Records Rejected
  - name: errors_per_line
    type: number
    required: false
    label: Errors Per Line
  - name: response_description
    type: text
    required: false
    label: Response Description
actors:
  - id: broker
    name: Broker / Member Firm
    type: external
    description: Submits the election upload file on behalf of clients.
  - id: upload_processor
    name: Election Upload Processor
    type: system
    description: Parses and validates the upload, applies elections against the frozen file.
  - id: corporate_actions_engine
    name: Corporate Actions Engine
    type: system
    description: Holds the frozen positions file and default election rules.
  - id: customer_support
    name: Customer Support
    type: human
    description: Can grant exceptional cut-off extensions.
events:
  - name: ca.election.upload.received
    description: Upload file received for processing.
    payload:
      - broker_code
      - sequence
      - process_date
      - process_time
      - total_records
  - name: ca.election.applied
    description: Election successfully applied to frozen position.
    payload:
      - broker_code
      - account_code
      - instrument_alpha
      - option_code
      - election_quantity
  - name: ca.election.rejected
    description: An election line was rejected.
    payload:
      - broker_code
      - line_number
      - account_code
      - response_description
  - name: ca.election.file.rejected
    description: Entire upload file rejected.
    payload:
      - broker_code
      - sequence
      - response_description
  - name: ca.election.default.applied
    description: Default election option applied where no explicit election submitted.
    payload:
      - account_code
      - instrument_alpha
      - option_code
      - election_quantity
  - name: ca.election.ack.generated
    description: Acknowledgement response file produced for the broker.
    payload:
      - broker_code
      - sequence
      - records_processed
      - records_rejected
errors:
  - code: ELECTION_PAST_CUT_OFF
    status: 410
    message: Election cut-off has passed; file rejected.
  - code: ELECTION_INVALID_BROKER
    status: 403
    message: Broker code is not valid.
  - code: ELECTION_INVALID_EVENT
    status: 422
    message: Corporate action event could not be matched for the broker.
  - code: ELECTION_INVALID_INSTRUMENT
    status: 422
    message: Instrument type, alpha, or version is invalid.
  - code: ELECTION_INVALID_PROCESS_TYPE
    status: 422
    message: Process type is not a supported elective event.
  - code: ELECTION_INVALID_SECTION
    status: 422
    message: Section must be B, G, or H.
  - code: ELECTION_INVALID_OPTION_CODE
    status: 422
    message: Option code not valid for this event type.
  - code: ELECTION_ACCOUNT_NOT_FOUND
    status: 404
    message: Account code does not exist on the frozen file.
  - code: ELECTION_INSUFFICIENT_HOLDINGS
    status: 422
    message: Election quantity exceeds holdings on the frozen file.
  - code: ELECTION_MISSING_OPP_ACCOUNT
    status: 422
    message: Opposite account is required for deal entries.
  - code: ELECTION_SLB_ACCOUNTS_REQUIRED
    status: 422
    message: Lender and borrower accounts plus deal ID required for section G.
  - code: ELECTION_COLLATERAL_ACCOUNTS_REQUIRED
    status: 422
    message: Provider and receiver accounts plus deal ID required for section H.
  - code: ELECTION_RECORD_COUNT_MISMATCH
    status: 422
    message: Trailer record count does not match records received; file rejected.
  - code: ELECTION_MISSING_CARD_CODE
    status: 422
    message: Required header, event, or trailer card code missing; file rejected.
  - code: ELECTION_POSITION_NOT_CONFIRMED
    status: 422
    message: Linked SLB or collateral deal position is not confirmed.
rules:
  general:
    rule_1: File must contain exactly one header (000), exactly one event (066), one or more account (067) records, and exactly one trailer (999).
    rule_2: Whole file is rejected if the election cut-off time has passed (default 11:00 on election date, RD-2) unless customer support has authorised an extension.
    rule_3: Whole file is rejected if broker code, instrument type/alpha/version, last date to register, process type, process sequence, or trailer record count is invalid.
    rule_4: Only sections B (client holdings), G (SLB), and H (collateral) are supported; add / delete operations must be performed interactively.
    rule_5: Upload may not add new positions or delete frozen positions; it only updates existing ones.
    rule_6: Election quantity must never exceed the original quantity held on the frozen file for that position.
    rule_7: A single option code per position is sufficient; the balance is automatically allocated to the alternate option (typically the default).
    rule_8: For CD DRIP only reinvestment records should be submitted with the option code left blank; C or S option codes are ignored for CD DRIP.
    rule_9: Deal entries require both the account code and the opposite account to be captured; demat entries against account 39008 are populated automatically.
    rule_10: SLB elections (section G) require lender account, borrower account, and deal ID; the linked position must be confirmed.
    rule_11: Collateral elections (section H) require provider account, receiver account, and deal ID; the linked position must be confirmed.
    rule_12: Each line is validated independently; partial file processing is permitted and the response file returns only rejected records alongside the header, event, and trailer.
    rule_13: Sequence numbers should be unique per broker per day; reusing a sequence appends to the existing response rather than overwriting it.
    rule_14: Acknowledgement response file is produced with the same dataset name plus the sequence suffix and delivered back to the broker.
    rule_15: Resubmission of a corrected file fully overrides any prior file for the same event.
outcomes:
  upload_election:
    priority: 10
    description: Valid election line is applied to the frozen file for the account and event.
    given:
      - field: cut_off_passed
        source: system
        operator: eq
        value: false
      - field: broker_code
        source: db
        operator: exists
      - field: account_code
        source: db
        operator: exists
      - field: election_quantity
        source: input
        operator: lte
        value: original_quantity
    then:
      - action: set_field
        target: frozen_position.option_code
        value: input.option_code
      - action: set_field
        target: frozen_position.election_quantity
        value: input.election_quantity
      - action: emit_event
        event: ca.election.applied
        payload:
          - broker_code
          - account_code
          - instrument_alpha
          - option_code
          - election_quantity
    transaction: true
  validate_against_frozen_file:
    priority: 5
    description: Election line is validated against the frozen positions file for account existence, instrument match, and holdings.
    given:
      - field: account_code
        source: input
        operator: exists
      - field: instrument_alpha
        source: input
        operator: exists
    then:
      - action: call_service
        target: corporate_actions_engine.lookup_frozen_position
      - action: set_field
        target: line.validated
        value: true
  reject_past_deadline:
    priority: 1
    description: Entire file is rejected when received after the election cut-off with no extension granted.
    given:
      - field: cut_off_passed
        source: system
        operator: eq
        value: true
      - field: extension_granted
        source: system
        operator: eq
        value: false
    then:
      - action: set_field
        target: file.status
        value: rejected
      - action: emit_event
        event: ca.election.file.rejected
        payload:
          - broker_code
          - sequence
          - response_description
      - action: notify
        channel: email
        target: broker
        template: election_file_rejected
    error: ELECTION_PAST_CUT_OFF
    transaction: true
  reject_insufficient_holdings:
    priority: 3
    description: Election line is rejected when election quantity exceeds the frozen original quantity or when a required account is missing on the frozen file.
    given:
      - any:
          - field: election_quantity
            source: input
            operator: gt
            value: original_quantity
          - field: account_code
            source: db
            operator: not_exists
    then:
      - action: set_field
        target: line.status
        value: rejected
      - action: set_field
        target: line.errors_per_line
        value: 1
      - action: emit_event
        event: ca.election.rejected
        payload:
          - broker_code
          - line_number
          - account_code
          - response_description
    error: ELECTION_INSUFFICIENT_HOLDINGS
  apply_default_election:
    priority: 8
    description: Default option code defined on the event is applied to any account position that has no explicit election or has an unallocated balance.
    given:
      - field: election_submitted
        source: computed
        operator: eq
        value: false
    then:
      - action: set_field
        target: frozen_position.option_code
        value: event.default_option_code
      - action: emit_event
        event: ca.election.default.applied
        payload:
          - account_code
          - instrument_alpha
          - option_code
          - election_quantity
  ack_received:
    priority: 20
    description: Acknowledgement response file with processed and rejected counts is produced and returned to the broker.
    given:
      - field: file.processing_complete
        source: system
        operator: eq
        value: true
    then:
      - action: create_record
        type: election_upload_response
        fields:
          - broker_code
          - sequence
          - records_processed
          - records_rejected
      - action: emit_event
        event: ca.election.ack.generated
        payload:
          - broker_code
          - sequence
          - records_processed
          - records_rejected
      - action: notify
        channel: email
        target: broker
        template: election_ack
flows:
  submit_election_upload:
    description: Broker submits an election upload file and receives an acknowledgement response.
    steps:
      - step: 1
        actor: broker
        action: Transfer upload dataset containing header, event, account, and trailer records.
      - step: 2
        actor: upload_processor
        action: Validate header card code 000, broker code, and sequence; reject whole file on failure.
      - step: 3
        actor: upload_processor
        action: Validate event detail card code 066 (process type, instrument, LDR); reject whole file on failure.
        condition: cut_off_passed == false
      - step: 4
        actor: upload_processor
        action: For each account detail record (067), validate section, option code, and account against the frozen file.
      - step: 5
        actor: corporate_actions_engine
        action: Apply election quantities and option codes to the frozen positions, calculating balance allocations automatically.
      - step: 6
        actor: corporate_actions_engine
        action: Apply default election option to any unallocated balance or position where no election was submitted.
      - step: 7
        actor: upload_processor
        action: Validate trailer card code 999 record counts; reject whole file if totals do not reconcile.
      - step: 8
        actor: upload_processor
        action: Generate response dataset with sequence suffix containing rejected lines plus header, event, and trailer.
      - step: 9
        actor: broker
        action: Receive email acknowledgement and review response file for rejected records.
related:
  - feature: broker-ca-election-download
    type: recommended
    reason: Sibling operation — download retrieves the election results file that completes this upload workflow
  - feature: broker-client-account-maintenance
    type: recommended

