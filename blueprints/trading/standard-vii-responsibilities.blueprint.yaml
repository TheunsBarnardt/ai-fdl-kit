# ============================================================
# standard-vii-responsibilities — Feature Blueprint
# Source: CFA LV1 2025 Vol 10 — Module 3, Standard VII
# ============================================================

feature: standard-vii-responsibilities
version: "1.0.0"
description: Apply Standard VII (Responsibilities as CFA Member/Candidate) — Conduct in the CFA Program and proper reference to CFA Institute, designation, and program
category: trading
tags: [ethics, standard-vii, cfa-program-conduct, designation-usage, cfa-level-1]
aliases:
  - standard-vii-a-conduct-as-candidate
  - standard-vii-b-reference-to-cfa
  - cfa-designation-usage
  - candidate-conduct-standard
  - cfa-program-integrity

actors:
  - id: standard_vii_reviewer
    name: Standard VII Reviewer
    type: human

fields:
  - name: case_id
    type: text
    required: true
    label: Case identifier
  - name: substandard
    type: select
    required: true
    label: vii_a | vii_b

rules:
  vii_a_conduct_in_cfa_program:
    rule: "Do not engage in conduct that compromises the reputation or integrity of CFA Institute, CFA designation, or the integrity, validity, or security of CFA examinations"
    violations: "Cheating, exam disclosure, misusing confidential info about exam content"
  vii_b_reference_to_cfa:
    rule: "When referring to CFA Institute membership, CFA designation, or candidacy, must not misrepresent or exaggerate meaning"
    factual_statements: "'Passed Level I on first attempt' is factual; 'CFA I' or 'CFAI' suggesting partial designation is not allowed"
    candidacy: "Must be active candidate to claim candidate status"
  proper_designation_usage:
    letters: "CFA or Chartered Financial Analyst after name — only after earning charter"
    format: "Not a noun ('a CFA'), always an adjective ('a CFA charterholder')"
  recommended_procedures:
    training: "Ensure understanding of exam conduct rules"
    consistency_checks: "Review marketing materials and CVs for proper designation usage"
  validation:
    case_required: "case_id present"
    valid_substandard: "substandard in [vii_a, vii_b]"

outcomes:
  review_standard_vii:
    priority: 1
    description: Review conduct under Standard VII
    given:
      - field: case_id
        source: input
        operator: exists
      - field: substandard
        source: input
        operator: in
        value: [vii_a, vii_b]
    then:
      - action: call_service
        target: standard_vii_reviewer
      - action: emit_event
        event: standard_vii.reviewed
  invalid_substandard:
    priority: 10
    description: Unsupported substandard
    given:
      - field: substandard
        source: input
        operator: not_in
        value: [vii_a, vii_b]
    then:
      - action: emit_event
        event: standard_vii.review_rejected
    error: STD_VII_INVALID_SUBSTANDARD

errors:
  - code: STD_VII_INVALID_SUBSTANDARD
    status: 400
    message: substandard must be vii_a or vii_b

events:
  - name: standard_vii.reviewed
    payload: [case_id, substandard, compliant, recommended_action]
  - name: standard_vii.review_rejected
    payload: [case_id, reason_code]

anti_patterns:
  - rule: Do not discuss exam content after sitting
    why: "Standard VII(A) restricts disclosure of exam material; social media posts after the exam commonly breach this"
  - rule: Do not use CFA as a noun
    why: "VII(B) requires charterholder or designation used as an adjective; 'a CFA' is non-compliant"
  - rule: Do not claim partial designation from passing individual levels
    why: "Only the full charter after Level III and work experience confers designation; 'CFA I' misrepresents status"

api:
  http:
    method: POST
    path: /ethics/standard-vii/review
  request:
    schema:
      case_id: string
      substandard: string
  response:
    success:
      status: 200
      schema:
        case_id: string
        compliant: boolean
    errors:
      - status: 400
        error_code: STD_VII_INVALID_SUBSTANDARD

related:
  - feature: cfa-code-of-ethics
    type: required
