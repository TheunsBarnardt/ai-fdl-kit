# ============================================================
# standard-ii-integrity-capital-markets — Feature Blueprint
# Source: CFA LV1 2025 Vol 10 — Module 3, Standard II
# ============================================================

feature: standard-ii-integrity-capital-markets
version: "1.0.0"
description: Apply Standard II (Integrity of Capital Markets) — Material Nonpublic Information and Market Manipulation — to investment research, trading, and execution practices
category: trading
tags: [ethics, standard-ii, mnpi, market-manipulation, cfa-level-1]
aliases:
  - standard-ii-a-mnpi
  - material-nonpublic-information
  - standard-ii-b-market-manipulation
  - insider-trading-standard
  - information-based-manipulation
  - transaction-based-manipulation

actors:
  - id: standard_ii_reviewer
    name: Standard II Reviewer
    type: human

fields:
  - name: case_id
    type: text
    required: true
    label: Case identifier
  - name: substandard
    type: select
    required: true
    label: ii_a | ii_b

rules:
  ii_a_mnpi:
    rule: "Do not act or cause others to act on material nonpublic information"
    material_test: "Reasonable investor would consider it important"
    nonpublic_test: "Not widely disseminated or selectively disclosed"
    mosaic_theory: "Analysis combining public + nonmaterial nonpublic is allowed"
    firewall_procedures: "Physical and procedural separation between departments"
  ii_b_market_manipulation:
    information_based: "Spreading false rumours, misleading statements"
    transaction_based: "Wash trades, cornering, pump and dump"
    intent: "Purpose is to mislead market participants"
  recommended_procedures:
    restricted_list: "Prevent trading in securities with MNPI"
    watch_list: "Monitor but not restrict"
    policies_training: "Documented procedures and periodic training"
  investigative_implications:
    disclosure: "Encourage issuer to disclose the MNPI"
    abstain: "If not disclosed, abstain from trading and from recommending"
  validation:
    case_required: "case_id present"
    valid_substandard: "substandard in [ii_a, ii_b]"

outcomes:
  review_standard_ii:
    priority: 1
    description: Review conduct under Standard II
    given:
      - field: case_id
        source: input
        operator: exists
      - field: substandard
        source: input
        operator: in
        value: [ii_a, ii_b]
    then:
      - action: call_service
        target: standard_ii_reviewer
      - action: emit_event
        event: standard_ii.reviewed
  invalid_substandard:
    priority: 10
    description: Unsupported substandard
    given:
      - field: substandard
        source: input
        operator: not_in
        value: [ii_a, ii_b]
    then:
      - action: emit_event
        event: standard_ii.review_rejected
    error: STD_II_INVALID_SUBSTANDARD

errors:
  - code: STD_II_INVALID_SUBSTANDARD
    status: 400
    message: substandard must be ii_a or ii_b

events:
  - name: standard_ii.reviewed
    payload: [case_id, substandard, compliant, recommended_action]
  - name: standard_ii.review_rejected
    payload: [case_id, reason_code]

anti_patterns:
  - rule: Do not assume selectively-disclosed information is public
    why: "Issuer disclosure to one analyst does not cure nonpublic status; trading on it breaches II(A)"
  - rule: Do not rely on mosaic theory to bypass information barriers
    why: "Mosaic combines nonmaterial public with nonmaterial nonpublic; one material nonpublic item taints the analysis"
  - rule: Do not treat market-making or liquidity provision as exempt from II(B)
    why: "Transactions designed to mislead remain manipulation even if carried out by market makers; intent is the test"

api:
  http:
    method: POST
    path: /ethics/standard-ii/review
  request:
    schema:
      case_id: string
      substandard: string
  response:
    success:
      status: 200
      schema:
        case_id: string
        compliant: boolean
    errors:
      - status: 400
        error_code: STD_II_INVALID_SUBSTANDARD

related:
  - feature: cfa-code-of-ethics
    type: required


# ─── AGI READINESS ─────────────────────────────────────────

agi:
  # --- AGI READINESS (auto-generated by propagate-agi.js) ---

  goals:
    - id: reliable_standard_ii_integrity_capital_markets
      description: Apply Standard II (Integrity of Capital Markets) — Material Nonpublic Information and Market Manipulation —
        to investment research, trading, and execution practices
      success_metrics:
        - metric: policy_violation_rate
          target: 0%
          measurement: Operations that violate defined policies
        - metric: audit_completeness
          target: 100%
          measurement: All decisions have complete audit trails
      constraints:
        - type: regulatory
          description: All operations must be auditable and traceable
          negotiable: false
  autonomy:
    level: supervised
    human_checkpoints:
      - before making irreversible changes
    escalation_triggers:
      - error_rate > 5
      - consecutive_failures > 3
  safety:
    action_permissions:
      - action: review_standard_ii
        permission: autonomous
      - action: invalid_substandard
        permission: autonomous
  tradeoffs:
    - prefer: accuracy
      over: latency
      reason: trading operations require precise execution and full audit trails
  verification:
    invariants:
      - error messages never expose internal system details
  coordination:
    protocol: orchestrated
    consumes:
      - capability: cfa_code_of_ethics
        from: cfa-code-of-ethics
        fallback: fail
