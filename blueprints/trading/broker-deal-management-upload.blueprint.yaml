feature: broker-deal-management-upload
version: 1.1.0
description: Fixed-width bulk upload of deal allocations, same-day allocations, deals, amendments and cancellations to back-office with settlement-cycle aware rules
category: trading
tags:
  - back-office
  - broker
  - upload
  - deal-allocation
  - settlement
  - amendment
  - cancellation
  - fixed-width
actors:
  - id: participating_broker
    name: Participating Broker
    type: external
  - id: back_office_system
    name: Back Office System
    type: system
  - id: broker_dealing_room
    name: Broker Dealing Room
    type: human
  - id: settlement_authority
    name: Settlement Authority
    type: external
fields:
  - name: record_type
    type: text
    required: true
    label: Record Type
  - name: card_code
    type: text
    required: true
    label: Card Code
  - name: broker_code
    type: text
    required: true
    label: Broker Code
  - name: transaction_code
    type: select
    required: true
    label: Transaction Code
    options:
      - value: DF
        label: Deal Final (booked trade)
      - value: DP
        label: Deal Pending
      - value: DU
        label: Deal Update/Amendment
      - value: DC
        label: Deal Cancellation
      - value: DA
        label: Deal Allocation
      - value: ES
        label: External Settlement
      - value: OM
        label: Off-Market Trade
      - value: RV
        label: Reverse Settled Trade
      - value: SD
        label: Same-Day Allocation
  - name: sequence_number
    type: text
    required: true
    label: Sequence Number
  - name: upload_date
    type: date
    required: true
    label: Upload Date
  - name: upload_time
    type: text
    required: false
    label: Upload Time
  - name: deal_reference
    type: text
    required: true
    label: Deal Reference
  - name: order_reference
    type: text
    required: false
    label: Order Reference
  - name: trade_date
    type: date
    required: true
    label: Trade Date
  - name: settlement_date
    type: date
    required: false
    label: Settlement Date
  - name: settlement_cycle
    type: select
    required: false
    label: Settlement Cycle
    options:
      - value: T+0
        label: Same Day
      - value: T+2
        label: T+2
      - value: T+3
        label: T+3
      - value: T+5
        label: T+5
  - name: buy_sell_indicator
    type: select
    required: true
    label: Buy Sell Indicator
    options:
      - value: P
        label: Purchase
      - value: S
        label: Sell
  - name: instrument_type
    type: text
    required: false
    label: Instrument Type
  - name: instrument_code
    type: text
    required: true
    label: Instrument Code
  - name: isin
    type: text
    required: false
    label: ISIN
  - name: country_code
    type: text
    required: false
    label: Country Code
  - name: quantity
    type: number
    required: true
    label: Quantity
  - name: price
    type: number
    required: true
    label: Price
  - name: consideration
    type: number
    required: false
    label: Consideration
  - name: trade_time
    type: text
    required: false
    label: Trade Time
  - name: trade_capacity
    type: select
    required: false
    label: Trade Capacity
    options:
      - value: A
        label: Agency
      - value: P
        label: Principal
  - name: client_account
    type: text
    required: true
    label: Client Account (internal)
  - name: allocation_account
    type: text
    required: false
    label: Allocation Account
  - name: external_account_code
    type: text
    required: false
    label: External Account Code
  - name: fund_code
    type: text
    required: false
    label: Fund Manager Code
  - name: commission_amount
    type: number
    required: false
    label: Commission Amount
  - name: charges_amount
    type: number
    required: false
    label: Charges Amount
  - name: vat_amount
    type: number
    required: false
    label: VAT Amount
  - name: stt_amount
    type: number
    required: false
    label: Securities Transfer Tax Amount
  - name: reference_page_no
    type: text
    required: false
    label: Reference Page Number
  - name: reference_line_no
    type: text
    required: false
    label: Reference Line Number
  - name: reference_order_number
    type: text
    required: false
    label: Reference Order Number
  - name: charge_structure_code
    type: text
    required: false
    label: Charge Structure Code
  - name: terms_input
    type: text
    required: false
    label: Terms Input
  - name: negotiated_commission
    type: number
    required: false
    label: Negotiated Commission
  - name: average_indicator
    type: text
    required: false
    label: Average Price Indicator
  - name: non_external_flag
    type: select
    required: false
    label: Non-External Flag
    options:
      - value: N
        label: Non-external only
      - value: " "
        label: Standard
  - name: cancellation_reason
    type: text
    required: false
    label: Cancellation Reason
  - name: amendment_reason
    type: text
    required: false
    label: Amendment Reason
  - name: original_deal_reference
    type: text
    required: false
    label: Original Deal Reference (for amendments/cancellations)
  - name: new_price
    type: number
    required: false
    label: New Price (for price amendment)
  - name: new_consideration
    type: number
    required: false
    label: New Consideration (for consideration amendment)
  - name: pre_settlement_flag
    type: boolean
    required: false
    label: Pre-Settlement Amendment
rules:
  submission_modes:
    - "MUST: Support manual submission of deal allocations via FTP"
    - "MUST: Support automated submission of deal allocations via FTP"
    - "MUST: Support automated submission of same-day allocations"
    - "MUST: Support automated submission of deals upload"
    - "MUST: Support bulk amendment, cancellation, and reversal uploads"
  file_structure:
    - "MUST: Every upload file starts with Header record (CARD-CODE 000) and ends with Trailer record (CARD-CODE 999)"
    - "MUST: Header contains broker code, process date (CCYYMMDD), process time (HHMMSS), 'S' prefix and 7-char broker-controlled sequence"
    - "MUST: Trailer totals must equal the count of detail records; otherwise entire file is rejected"
    - "MUST: All fields are positional; mandatory or optional fields must be space or zero filled"
    - "MUST: Total detail record length is 150 bytes"
  setup:
    - "MUST: Complete member FTP dataset configuration before first use"
    - "MUST: Configure up to 100 notification email addresses per process type"
  validation:
    - "MUST: Validate external account code maps to an internal client account"
    - "MUST: Validate fund manager code is present when external account code is used"
    - "MUST: Validate buy/sell indicator is 'P' or 'S'"
    - "MUST: Validate ISIN first 2 bytes match country code"
    - "MUST: Validate trade date is today or a previous business day"
    - "MUST: Reject unbalanced or incomplete allocation records"
    - "MUST: Records with the reserved broker comment code are treated as comment records (columns 4-80) and skipped during processing"
  transaction_codes:
    - "MUST: Every detail record carries a CARD-CODE identifying the record layout (100, 101, 102, etc.)"
    - "MUST: Transaction codes (DF/DP/DU/DC/ES/OM/RV/DA/SD) identify the business action"
  settlement:
    - "MUST: Default settlement cycle is T+3 for standard equity trades"
    - "MUST: Support T+2 settlement for instruments operating on shorter cycle"
    - "MUST: Same-day allocation age_date must equal the online business date"
  amendment:
    - "MUST: Pre-settlement amendments (trade_date to settlement_date - 1) allow price, consideration, account and quantity changes"
    - "MUST: Post-settlement amendments are restricted to consideration adjustments and require settlement-authority approval"
    - "MUST: Cancellation after settlement requires a reverse-settled-trade (RV) record, not a DC"
    - "MUST: All amendments must reference the original_deal_reference"
  duplicate_control:
    - "MUST: Sequence numbers should not be reused; repeated sequence overwrites the previous response file"
    - "MUST: For the multi-file dataset variant, sequence number must be unique in perpetuity per broker"
errors:
  - code: DEAL_UPLOAD_INVALID_EXTERNAL_ACCOUNT
    status: 422
    message: External account code cannot be mapped to a client account
  - code: DEAL_UPLOAD_INVALID_TRADE_DATE
    status: 422
    message: Trade date is invalid or outside allowed window
  - code: DEAL_UPLOAD_INSTRUMENT_NOT_FOUND
    status: 422
    message: Referenced instrument does not exist
  - code: DEAL_UPLOAD_ALLOCATION_CUTOFF_EXCEEDED
    status: 422
    message: Same-day allocation submitted after cutoff time
  - code: DEAL_UPLOAD_DUPLICATE_DEAL
    status: 409
    message: Deal reference already exists
  - code: DEAL_UPLOAD_TRAILER_MISMATCH
    status: 422
    message: Trailer record total does not match detail record count
  - code: DEAL_UPLOAD_HEADER_MISSING
    status: 422
    message: Header record not received or malformed
  - code: DEAL_UPLOAD_SEQUENCE_REUSED
    status: 409
    message: Sequence number has already been used for this broker
  - code: DEAL_UPLOAD_POST_SETTLEMENT_AMEND_DENIED
    status: 403
    message: Amendment not permitted after settlement without authority approval
  - code: DEAL_UPLOAD_ORIGINAL_DEAL_NOT_FOUND
    status: 404
    message: Original deal reference not found for amendment or cancellation
  - code: DEAL_UPLOAD_CANCEL_AFTER_SETTLEMENT
    status: 422
    message: Settled trade must be reversed, not cancelled
  - code: DEAL_UPLOAD_FUND_CODE_MISSING
    status: 422
    message: Fund manager code required when external account code supplied
events:
  - name: broker.deal.upload.received
    payload:
      - broker_code
      - sequence_number
      - record_count
      - upload_date
  - name: broker.deal.upload.accepted
    payload:
      - broker_code
      - sequence_number
      - records_processed
  - name: broker.deal.upload.rejected
    payload:
      - broker_code
      - sequence_number
      - records_rejected
      - error_codes
  - name: broker.deal.allocated
    payload:
      - broker_code
      - deal_reference
      - allocation_account
      - quantity
  - name: broker.deal.cancelled
    payload:
      - broker_code
      - deal_reference
      - cancellation_reason
  - name: broker.deal.amended
    payload:
      - broker_code
      - original_deal_reference
      - amendment_reason
      - new_values
  - name: broker.deal.reversed
    payload:
      - broker_code
      - original_deal_reference
      - settlement_date
outcomes:
  header_validation:
    priority: 1
    description: Validate header record presence and format
    given:
      - field: card_code
        source: input
        operator: neq
        value: "000"
    then:
      - action: emit_event
        event: broker.deal.upload.rejected
    error: DEAL_UPLOAD_HEADER_MISSING
  trailer_mismatch:
    priority: 2
    description: Reject entire file if trailer totals do not reconcile
    given:
      - field: trailer_total_records
        source: input
        operator: neq
        value: detail_record_count
    then:
      - action: emit_event
        event: broker.deal.upload.rejected
    error: DEAL_UPLOAD_TRAILER_MISMATCH
  sequence_reuse_detected:
    priority: 3
    description: Multi-file dataset variant rejects reused sequence numbers
    given:
      - field: sequence_number
        source: db
        operator: exists
      - field: dataset_variant
        source: input
        operator: eq
        value: multi_file
    then:
      - action: emit_event
        event: broker.deal.upload.rejected
    error: DEAL_UPLOAD_SEQUENCE_REUSED
  manual_deal_allocation_upload:
    priority: 10
    description: Broker manually submits deal allocations via FTP ALLOUP
    given:
      - field: submission_mode
        source: input
        operator: eq
        value: manual_ftp
    then:
      - action: create_record
        type: deal_allocation_upload
      - action: emit_event
        event: broker.deal.upload.received
  automated_deal_allocation_upload:
    priority: 11
    description: Automated deal allocation upload via ALLUPO
    given:
      - field: submission_mode
        source: input
        operator: eq
        value: automated_ftp
    then:
      - action: create_record
        type: deal_allocation_upload_auto
      - action: emit_event
        event: broker.deal.upload.received
  same_day_allocation_upload:
    priority: 12
    description: Same-day allocation upload processed intraday
    given:
      - field: transaction_code
        source: input
        operator: eq
        value: SD
      - field: submission_time
        source: system
        operator: lt
        value: cutoff_time
    then:
      - action: create_record
        type: same_day_allocation
      - action: emit_event
        event: broker.deal.upload.received
  deals_upload:
    priority: 13
    description: Automated deals upload via DLSUPL near-real-time
    given:
      - field: transaction_code
        source: input
        operator: in
        value:
          - DF
          - DP
    then:
      - action: create_record
        type: deals_upload
      - action: emit_event
        event: broker.deal.upload.received
  bulk_allocate_trades:
    priority: 20
    description: Bulk allocate one or more booked trades to client accounts
    given:
      - field: transaction_code
        source: input
        operator: eq
        value: DA
      - field: allocation_account
        source: input
        operator: exists
    then:
      - action: call_service
        target: external_account_mapper
      - action: create_record
        type: trade_allocation
      - action: emit_event
        event: broker.deal.allocated
    transaction: true
  cancel_trade:
    priority: 21
    description: Cancel a pre-settlement trade via DC record
    given:
      - field: transaction_code
        source: input
        operator: eq
        value: DC
      - field: pre_settlement_flag
        source: input
        operator: eq
        value: true
    then:
      - action: transition_state
        field: deal_status
        from: booked
        to: cancelled
      - action: emit_event
        event: broker.deal.cancelled
    error: DEAL_UPLOAD_ORIGINAL_DEAL_NOT_FOUND
    transaction: true
  cancel_after_settlement_denied:
    priority: 22
    description: Reject DC records against already-settled trades
    given:
      - field: transaction_code
        source: input
        operator: eq
        value: DC
      - field: pre_settlement_flag
        source: input
        operator: eq
        value: false
    then:
      - action: emit_event
        event: broker.deal.upload.rejected
    error: DEAL_UPLOAD_CANCEL_AFTER_SETTLEMENT
  amend_trade_price:
    priority: 23
    description: Amend the price of a pre-settlement trade via DU record
    given:
      - field: transaction_code
        source: input
        operator: eq
        value: DU
      - field: pre_settlement_flag
        source: input
        operator: eq
        value: true
      - field: new_price
        source: input
        operator: gt
        value: 0
    then:
      - action: set_field
        target: price
        value: new_price
      - action: emit_event
        event: broker.deal.amended
    transaction: true
  amend_trade_consideration:
    priority: 24
    description: Amend the consideration value of a trade (pre- or post-settlement with approval)
    given:
      - field: transaction_code
        source: input
        operator: eq
        value: DU
      - field: new_consideration
        source: input
        operator: gt
        value: 0
    then:
      - action: set_field
        target: consideration
        value: new_consideration
      - action: emit_event
        event: broker.deal.amended
    transaction: true
  post_settlement_amend_denied:
    priority: 25
    description: Reject post-settlement amendments without settlement-authority approval
    given:
      - field: transaction_code
        source: input
        operator: eq
        value: DU
      - field: pre_settlement_flag
        source: input
        operator: eq
        value: false
      - field: authority_approval
        source: input
        operator: not_exists
    then:
      - action: emit_event
        event: broker.deal.upload.rejected
    error: DEAL_UPLOAD_POST_SETTLEMENT_AMEND_DENIED
  reverse_settled_trade:
    priority: 26
    description: Reverse a settled trade via RV record with settlement-authority approval
    given:
      - field: transaction_code
        source: input
        operator: eq
        value: RV
      - field: original_deal_reference
        source: input
        operator: exists
    then:
      - action: transition_state
        field: deal_status
        from: settled
        to: reversed
      - action: emit_event
        event: broker.deal.reversed
    transaction: true
  off_market_trade_upload:
    priority: 27
    description: Upload an off-market (OM) trade booked bilaterally
    given:
      - field: transaction_code
        source: input
        operator: eq
        value: OM
    then:
      - action: create_record
        type: off_market_trade
      - action: emit_event
        event: broker.deal.upload.received
  external_account_mapping:
    priority: 30
    description: Map external account code to internal client account
    given:
      - field: external_account_code
        source: input
        operator: exists
    then:
      - action: call_service
        target: external_account_mapper
  fund_code_required:
    priority: 31
    description: Reject external-account rows missing fund code
    given:
      - field: external_account_code
        source: input
        operator: exists
      - field: fund_code
        source: input
        operator: not_exists
    then:
      - action: emit_event
        event: broker.deal.upload.rejected
    error: DEAL_UPLOAD_FUND_CODE_MISSING
  allocation_cutoff_exceeded:
    priority: 32
    description: Same-day allocations submitted after cutoff are rejected
    given:
      - field: transaction_code
        source: input
        operator: eq
        value: SD
      - field: submission_time
        source: system
        operator: gte
        value: cutoff_time
    then:
      - action: emit_event
        event: broker.deal.upload.rejected
    error: DEAL_UPLOAD_ALLOCATION_CUTOFF_EXCEEDED
agi:
  goals:
    - id: reliable_broker_deal_management_upload
      description: Deliver accurate, auditable bulk deal management uploads honouring settlement-cycle amendment rules
      success_metrics:
        - metric: policy_violation_rate
          target: 0%
          measurement: Operations that violate defined policies
        - metric: audit_completeness
          target: 100%
          measurement: All decisions have complete audit trails
      constraints:
        - type: regulatory
          description: All operations must be auditable and traceable
          negotiable: false
  autonomy:
    level: supervised
    human_checkpoints:
      - before making irreversible changes
      - before any post-settlement amendment or reversal
    escalation_triggers:
      - error_rate > 5
      - consecutive_failures > 3
      - post_settlement_amendment_requested
  safety:
    action_permissions:
      - action: manual_deal_allocation_upload
        permission: autonomous
      - action: automated_deal_allocation_upload
        permission: autonomous
      - action: same_day_allocation_upload
        permission: autonomous
      - action: deals_upload
        permission: autonomous
      - action: bulk_allocate_trades
        permission: autonomous
      - action: cancel_trade
        permission: supervised
      - action: amend_trade_price
        permission: supervised
      - action: amend_trade_consideration
        permission: supervised
      - action: reverse_settled_trade
        permission: human_required
      - action: off_market_trade_upload
        permission: supervised
  tradeoffs:
    - prefer: accuracy
      over: latency
      reason: trading operations require precise execution and full audit trails
  verification:
    invariants:
      - error messages never expose internal system details
      - settled trades are never cancelled, only reversed
      - trailer totals always reconcile with detail record count
extensions:
  transaction_codes:
    DF: Deal Final - booked trade confirmation
    DP: Deal Pending - awaiting confirmation
    DU: Deal Update - amendment to price, consideration, account or quantity
    DC: Deal Cancellation - pre-settlement cancellation only
    DA: Deal Allocation - allocate booked trade to client account(s)
    ES: External Settlement - settlement handled outside the back-office
    OM: Off-Market Trade - bilateral trade booked off-exchange
    RV: Reverse Settled Trade - unwind of a settled trade (post-settlement)
    SD: Same-Day Allocation - intraday allocation processed same business day
  record_type_map:
    "100": Same Day Allocations Upload detail record (SDAYUP)
    "101": Deals Upload detail record (DLSUPL)
    "102": Automated Deal Allocations Upload detail record (ALLUPO)
    "999": Trailer record (end of every upload file)
    "000": Header record (start of every upload file)
  upload_datasets:
    ALLOUP:
      description: Manual Submission Deal Allocations (scheduled via process request)
      dataset_pattern: BBAP.SPRD.{BROKER}.ALLOC
    ALLUPO:
      description: Automated Submission Deal Allocations
      dataset_pattern: BBAP.SPRD.UPLOAD.{BROKER}.ALLUPO
      response_pattern: BBAP.SPRD.UPLOAD.{BROKER}.ALLUPO.S{SEQUENCE}
    SDAYUP:
      description: Automated Same Day Allocations
      dataset_pattern: BBAP.SPRD.UPLOAD.{BROKER}.SDAYUP
      response_pattern: BBAP.SPRD.UPLOAD.{BROKER}.SDAYUP.S{SEQUENCE}
    DLSUPL:
      description: Automated Deals Upload (near real-time)
      dataset_pattern: BBAP.SPRD.UPLOAD.{BROKER}.DLSUPL
      response_pattern: BBAP.SPRD.UPLOAD.{BROKER}.DLSUPL.S{SEQUENCE}
      multi_file_variant: BBAP.SPRD.UPLOAD.{BROKER}.DLSUPL.G(+1)
  settlement_cycles:
    T+0: Same-day settlement (intraday)
    T+2: Two business days post-trade
    T+3: Three business days post-trade (standard equity)
    T+5: Five business days post-trade (specific instruments)
  amendment_rules:
    pre_settlement:
      window: trade_date to settlement_date - 1 business day
      permitted_changes:
        - price
        - consideration
        - client_account
        - allocation_account
        - quantity
        - commission
      record_types:
        - DU
        - DC
      approval_required: false
    post_settlement:
      window: settlement_date onwards
      permitted_changes:
        - consideration (narrow error correction only)
      record_types:
        - DU with authority_approval
        - RV
      approval_required: true
      approver: settlement_authority
    reversal:
      description: Settled trades cannot be cancelled; they must be reversed via RV
      record_type: RV
      approval_required: true
  record_layouts:
    HEADER_000:
      card_code: "000"
      total_length: 150
      fields:
        - name: card_code
          start: 1
          length: 3
          end: 3
          type: numeric
        - name: broker_code
          start: 4
          length: 3
          end: 6
          type: numeric
        - name: date
          start: 7
          length: 8
          end: 14
          type: numeric
        - name: time
          start: 15
          length: 6
          end: 20
          type: numeric
        - name: prefix
          start: 21
          length: 1
          end: 21
          type: char
        - name: sequence
          start: 22
          length: 7
          end: 28
          type: alphanumeric
        - name: printer_id
          start: 29
          length: 4
          end: 32
          type: char
        - name: filler
          start: 33
          length: 118
          end: 150
          type: char
    ALLOUP_MANUAL:
      card_code: N/A
      description: Manual allocation upload flat file (no card code prefix, positional)
      total_length: 150
      fields:
        - name: broker_code
          start: 1
          length: 3
          end: 3
          type: numeric
        - name: reference_page_no
          start: 4
          length: 10
          end: 13
          type: char
        - name: reference_line_no
          start: 14
          length: 2
          end: 15
          type: char
        - name: account_code
          start: 16
          length: 7
          end: 22
          type: numeric
        - name: purchase_sell_indicator
          start: 23
          length: 1
          end: 23
          type: char
        - name: price
          start: 24
          length: 11
          end: 34
          type: numeric
        - name: quantity
          start: 35
          length: 11
          end: 45
          type: numeric
        - name: charge_structure_code
          start: 46
          length: 2
          end: 47
          type: char
        - name: con_charge_indicator
          start: 48
          length: 1
          end: 48
          type: char
        - name: consolidate_note_indicator
          start: 49
          length: 2
          end: 50
          type: char
        - name: terms_input
          start: 51
          length: 8
          end: 58
          type: char
        - name: reference_alpha
          start: 59
          length: 2
          end: 60
          type: char
        - name: reference_order_number
          start: 61
          length: 7
          end: 67
          type: numeric
        - name: external_account_code
          start: 68
          length: 7
          end: 74
          type: char
        - name: instrument_type
          start: 75
          length: 1
          end: 75
          type: char
        - name: instrument_alpha
          start: 76
