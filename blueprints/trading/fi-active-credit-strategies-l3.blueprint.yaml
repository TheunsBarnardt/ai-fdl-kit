      over: latency
      reason: trading operations require precise execution and full audit trails
  verification:
    invariants:
      - error messages never expose internal system details
  coordination:
    protocol: orchestrated
    consumes:
      - capability: fixed_income_portfolio_management_l3
        from: fixed-income-portfolio-management-l3
        fallback: fail
