        permission: human_required
      - action: logon_outside_time_window
        permission: autonomous
      - action: logon_rejected_by_application
        permission: supervised
      - action: comp_id_mismatch
        permission: autonomous
      - action: logon_timeout_elapsed
        permission: autonomous
      - action: heartbeat_timeout
        permission: autonomous
      - action: sequence_gap_detected
        permission: autonomous
      - action: logon_successful
        permission: autonomous
      - action: logout_successful
        permission: autonomous
  tradeoffs:
    - prefer: accuracy
      over: latency
      reason: trading operations require precise execution and full audit trails
  verification:
    invariants:
      - error messages never expose internal system details
      - state transitions follow the defined state machine — no illegal transitions
  coordination:
    protocol: orchestrated
    consumes:
      - capability: fix_message_building
        from: fix-message-building
        fallback: fail
      - capability: fix_connection_management
        from: fix-connection-management
        fallback: fail
      - capability: fix_message_persistence
        from: fix-message-persistence
        fallback: fail

extensions:
  tech_stack:
    language: C++
    framework: FIX Protocol Engine
    protocol: FIX 4.0–5.0 SP2 / FIXT 1.1
  admin_message_types:
    - Logon (A)
    - Logout (5)
    - Heartbeat (0)
    - TestRequest (1)
    - ResendRequest (2)
    - Reject (3)
    - SequenceReset (4)
