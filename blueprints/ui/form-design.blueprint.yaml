feature: form-design
version: "1.0"
category: ui
description: >
  Design forms that are easy to scan and complete by organizing fields clearly, providing immediate feedback, handling errors gracefully, and minimizing cognitive load through smart defaults and progressive disclosure.

rules:
  - Group related fields logically — use spacing and optional section headers to communicate field relationships
  - Labels are crucial signals — descriptive labels above or beside inputs (avoid placeholders as labels)
  - Provide immediate feedback — validation feedback (errors, success, warnings) appears without additional steps
  - Smart defaults reduce effort — pre-fill when possible; use sensible defaults for optional fields
  - Error messages are user-safe — explain what went wrong and how to fix it, never expose system details
  - Don't over-design for edge cases — handle common paths smoothly; edge cases can be addressed with help text

outcomes:
  - given:
      - "form is presented to user"
    then:
      - action: set_field
        target: field_grouping
        value: "logically related fields grouped with spacing"
      - action: set_field
        target: label_placement
        value: "above input (mobile) or beside (desktop)"
      - action: set_field
        target: required_indicator
        value: "clear visual marker (asterisk, color, or text)"
    result: "form is scannable and user understands what's required"

  - given:
      - "user enters invalid data in field"
    then:
      - action: set_field
        target: error_message
        value: "appears immediately (on blur or submit)"
      - action: set_field
        target: message_tone
        value: "helpful, not critical"
      - action: set_field
        target: message_content
        value: "states problem and solution"
      - action: set_field
        target: visual_indicator
        value: "red border, icon, or background"
    result: "user understands error and knows how to fix it"

  - given:
      - "form submission is successful"
    then:
      - action: emit_event
        event: "form.submission.success"
        payload: [confirmation_message, redirect_or_next_step]
      - action: set_field
        target: feedback
        value: "clear success state (message, icon, animation)"
    result: "user confident that action completed"

  - given:
      - "form has optional or conditional fields"
    then:
      - action: set_field
        target: disclosure_strategy
        value: "progressive disclosure or clear grouping"
      - action: set_field
        target: conditional_logic
        value: "show/hide based on user input"
    result: "form doesn't overwhelm with unnecessary fields"

  - given:
      - "form is long (>5 fields)"
    then:
      - action: set_field
        target: organization
        value: "multi-step or grouped sections with visual breaks"
      - action: set_field
        target: progress_indicator
        value: "step count or progress bar if multi-step"
    result: "long form feels manageable and completion is visible"

fields:
  - name: field_count
    type: number
    description: "Number of input fields in form"

  - name: required_fields
    type: number
    description: "How many fields are required vs optional"

  - name: error_handling_strategy
    type: text
    description: "Real-time validation, on-blur, or on-submit"

  - name: success_feedback
    type: text
    description: "How success is communicated (message, redirect, animation)"

  - name: conditional_fields
    type: text
    description: "Fields that show/hide based on user input"

tags:
  - ui
  - interaction-design
  - user-experience

related:
  - feature: form-validation
    type: required
    description: "Forms require robust validation rules and error handling"

  - feature: accessibility
    type: required
    description: "Forms must be keyboard-navigable with proper label/input associations"

  - feature: visual-hierarchy
    type: recommended
    description: "Form hierarchy guides user through logical field progression"

  - feature: error-handling
    type: recommended
    description: "Error states integrate with broader error handling system"
