      <rect x="0" y="84" width="28" height="28"/><rect x="112" y="84" width="28" height="28"/>
      <rect x="0" y="112" width="28" height="28"/><rect x="112" y="112" width="28" height="28"/>
      <rect x="0" y="140" width="28" height="28"/><rect x="112" y="140" width="28" height="28"/>
      <rect x="0" y="168" width="28" height="28"/><rect x="28" y="168" width="28" height="28"/><rect x="56" y="168" width="28" height="28"/><rect x="84" y="168" width="28" height="28"/>
