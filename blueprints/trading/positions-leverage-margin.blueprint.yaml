  # --- AGI READINESS (auto-generated by propagate-agi.js) ---

  goals:
    - id: reliable_positions_leverage_margin
      description: Compute returns on long, short, and leveraged positions including margin requirements, maintenance calls,
        and the leverage ratio effect on equity returns
      success_metrics:
        - metric: policy_violation_rate
          target: 0%
          measurement: Operations that violate defined policies
        - metric: audit_completeness
