# ============================================================
# Interest Rates Derivatives End-of-Day Data Delivery — Feature Blueprint
# FDL v0.1.0 | Blueprint v1.0.0
# ============================================================
# Extracted from: Interest Rates Derivatives Non-Live Market Data
# Products Specifications v1.0 (20 pages)
# Fixed-width flat file dissemination of end-of-day interest rate
# derivatives statistics via FTP for licensed subscribers
# ============================================================

feature: interest-rates-derivatives-eod-data-delivery
version: 1.0.0
description: End-of-day interest rate derivatives data delivery via FTP — fixed-width flat files covering daily statistics, mark-to-market, and reference rates
category: trading
