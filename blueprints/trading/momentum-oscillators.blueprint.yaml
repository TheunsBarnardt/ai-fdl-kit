# ============================================================
# momentum-oscillators — Feature Blueprint
# FDL v0.1.0 | Blueprint v1.0.0
# ============================================================
# Extracted from: https://github.com/TA-Lib/ta-lib
# Tech stack: C99 | Multi-language bindings: Java, .NET, Rust, Python
# Files analyzed: ta_RSI.c, ta_MACD.c, ta_STOCH.c, ta_STOCHF.c,
#   ta_STOCHRSI.c, ta_CCI.c, ta_WILLR.c, ta_MOM.c, ta_CMO.c,
#   ta_BOP.c, ta_APO.c, ta_PPO.c, ta_ULTOSC.c, ta_MFI.c,
#   ta_AROON.c, ta_AROONOSC.c, ta_func_api.xml
# ============================================================

feature: momentum-oscillators
version: "1.0.0"
description: A suite of momentum oscillators for identifying overbought/oversold conditions, trend reversal signals, and price momentum strength across financial time series data
category: trading
tags: [technical-analysis, momentum, oscillators, rsi, macd, stochastic, cci, ta-lib, indicators]

aliases:
  - momentum-indicators
  - technical-oscillators
  - rsi-macd-stochastic
  - overbought-oversold-indicators
  - price-momentum
  - ta-lib-momentum

actors:
  - id: quant_analyst
    name: Quantitative Analyst
    type: human
  - id: indicator_engine
    name: Technical Indicator Engine
    type: system

fields:
  # --- Universal inputs ---
  - name: close_prices
    type: json
    required: true
    label: Close Prices (chronological double array; minimum length = lookback + 1)
  - name: high_prices
    type: json
    required: false
    label: High Prices (required for CCI, WILLR, STOCH, STOCHF, STOCHRSI, ULTOSC, MFI)
  - name: low_prices
    type: json
    required: false
    label: Low Prices (required for CCI, WILLR, STOCH, STOCHF, STOCHRSI, ULTOSC, MFI)
  - name: open_prices
    type: json
    required: false
    label: Open Prices (required for BOP only)
  - name: volume
    type: json
    required: false
    label: Volume series (required for MFI only)
  - name: indicator_type
    type: select
    required: true
    label: Oscillator to compute
    options:
      - value: RSI
        label: RSI
      - value: MACD
        label: MACD
      - value: MACDEXT
        label: MACDEXT
      - value: MACDFIX
        label: MACDFIX
      - value: STOCH
        label: STOCH
      - value: STOCHF
        label: STOCHF
      - value: STOCHRSI
        label: STOCHRSI
      - value: CCI
        label: CCI
      - value: WILLR
        label: WILLR
      - value: MOM
        label: MOM
      - value: CMO
        label: CMO
      - value: BOP
        label: BOP
      - value: APO
        label: APO
      - value: PPO
        label: PPO
      - value: ULTOSC
        label: ULTOSC
      - value: MFI
        label: MFI
      - value: AROON
        label: AROON
      - value: AROONOSC
        label: AROONOSC
  # --- Shared period parameter ---
  - name: time_period
    type: number
    required: false
    label: "Time Period (default by indicator: RSI=14, CCI=14, WILLR=14, MOM=10, CMO=14, MFI=14, STOCHRSI=14; range 2-100000)"
  # --- MACD / APO / PPO parameters ---
  - name: fast_period
    type: number
    required: false
    label: Fast MA Period (default 12; range 2-100000)
  - name: slow_period
    type: number
    required: false
    label: Slow MA Period (default 26; range 2-100000)
  - name: signal_period
    type: number
    required: false
    label: Signal Line Smoothing Period (default 9; range 1-100000)
  - name: ma_type
    type: select
    required: false
    label: Moving Average Type (SMA=0, EMA=1, WMA=2, DEMA=3, TEMA=4, TRIMA=5, KAMA=6, MAMA=7, T3=8; default SMA for APO/PPO)
    options:
      - value: SMA
        label: SMA
      - value: EMA
        label: EMA
      - value: WMA
        label: WMA
      - value: DEMA
        label: DEMA
      - value: TEMA
        label: TEMA
      - value: TRIMA
        label: TRIMA
      - value: KAMA
        label: KAMA
      - value: MAMA
        label: MAMA
      - value: T3
        label: T3
  # --- Stochastic parameters ---
  - name: fast_k_period
    type: number
    required: false
    label: Fast %K Lookback Period (default 5; range 1-100000)
  - name: slow_k_period
    type: number
    required: false
    label: Slow %K Smoothing Period (default 3; range 1-100000 — usually 3)
  - name: slow_k_ma_type
    type: select
    required: false
    label: Slow %K MA Type (default SMA)
    options:
      - value: SMA
        label: SMA
      - value: EMA
        label: EMA
      - value: WMA
        label: WMA
      - value: DEMA
        label: DEMA
      - value: TEMA
        label: TEMA
      - value: TRIMA
        label: TRIMA
      - value: KAMA
        label: KAMA
      - value: MAMA
        label: MAMA
      - value: T3
        label: T3
  - name: slow_d_period
    type: number
    required: false
    label: Slow %D Smoothing Period (default 3; range 1-100000)
  - name: slow_d_ma_type
    type: select
    required: false
    label: Slow %D MA Type (default SMA)
    options:
      - value: SMA
        label: SMA
      - value: EMA
        label: EMA
      - value: WMA
        label: WMA
      - value: DEMA
        label: DEMA
      - value: TEMA
        label: TEMA
      - value: TRIMA
        label: TRIMA
      - value: KAMA
        label: KAMA
      - value: MAMA
        label: MAMA
      - value: T3
        label: T3
  # --- STOCHRSI additional parameters ---
  - name: fast_d_period
    type: number
    required: false
    label: StochRSI Fast %D Smoothing Period (default 3)
  - name: fast_d_ma_type
    type: select
    required: false
    label: StochRSI Fast %D MA Type (default SMA)
    options:
      - value: SMA
        label: SMA
      - value: EMA
        label: EMA
      - value: WMA
        label: WMA
      - value: DEMA
        label: DEMA
      - value: TEMA
        label: TEMA
      - value: TRIMA
        label: TRIMA
      - value: KAMA
        label: KAMA
      - value: MAMA
        label: MAMA
      - value: T3
        label: T3
  # --- ULTOSC parameters ---
  - name: period1
    type: number
    required: false
    label: Ultimate Oscillator Period 1 (default 7; range 1-100000)
  - name: period2
    type: number
    required: false
    label: Ultimate Oscillator Period 2 (default 14; range 2-100000)
  - name: period3
    type: number
    required: false
    label: Ultimate Oscillator Period 3 (default 28; range 2-100000)
  # --- Output ---
  - name: out_beg_idx
    type: number
    required: false
    label: Output Begin Index (first index in input that corresponds to first output value)
  - name: out_nb_element
    type: number
    required: false
    label: Number of output elements produced
  - name: out_values
    type: json
    required: false
    label: Primary output array (indicator values; double array)
  - name: out_signal
    type: json
    required: false
    label: Secondary output (MACD signal line, STOCH slowD, STOCHRSI fastD, AROON down line)
  - name: out_hist
    type: json
    required: false
    label: Tertiary output (MACD histogram, AROON up line)

rules:
  lookback_model:
    # Source: ta_func.h — all TA functions use a lookback model
    formula: "valid_output_count = input_length - lookback_period"
    constraint: "If input_length <= lookback_period, outNBElement = 0 (no valid output)"

  rsi:
    # Source: ta_RSI.c:90 — optInTimePeriod default=14, range 2-100000
    formula: "RS = avgGain / avgLoss (Wilder smoothing); RSI = 100 - 100 / (1 + RS)"
    default_period: 14
    period_range: "2 to 100000"
    output_range: "0 to 100"
    lookback: "timePeriod + unstable_period (configurable via TA_SetUnstablePeriod)"
    interpretation:
      overbought: "> 70 (conventional threshold)"
      oversold: "< 30 (conventional threshold)"
    edge_case: "When avgLoss = 0, RSI = 100 (no losing periods)"
    # Source: ta_RSI.c:198 — div-by-zero resolved explicitly

  macd:
    # Source: ta_MACD.c:90-130 — MACD, MACDEXT, MACDFIX
    formula: "MACD_line = EMA(close, fast) - EMA(close, slow); Signal = EMA(MACD_line, signal); Histogram = MACD_line - Signal"
    defaults: "fast=12, slow=26, signal=9"
    period_range: "fast/slow 2-100000; signal 1-100000"
    outputs: "3 arrays: macd_line, signal_line, histogram"
    swap_rule: "If slow < fast, periods are automatically swapped to ensure slow >= fast"
    # Source: ta_MACD.c:158 — swap on entry
    macdfix: "MACDFIX hardcodes fast=12 slow=26; only signal period is configurable"
    macdext: "MACDEXT allows custom MA types for fast, slow, and signal lines"
    interpretation:
      bullish_crossover: "MACD line crosses above signal line"
      bearish_crossover: "MACD line crosses below signal line"
      zero_cross: "MACD line crossing zero confirms trend direction"

  stochastic:
    # Source: ta_STOCH.c — STOCH (slow), STOCHF (fast)
    stoch_formula: "RawK = (Close - LowestLow(fastK)) / (HighestHigh(fastK) - LowestLow(fastK)) * 100; SlowK = MA(RawK, slowK); SlowD = MA(SlowK, slowD)"
    stochf_formula: "FastK = RawK; FastD = MA(FastK, fastD)"
    stochrsi_formula: "RSI_val computed first; StochRSI = (RSI - lowestRSI) / (highestRSI - lowestRSI)"
    defaults: "fastK=5, slowK=3, slowD=3, MA type=SMA"
    output_range: "0 to 100"
    interpretation:
      overbought: "> 80"
      oversold: "< 20"
      signal: "K line crossing D line"
    edge_case: "When highestHigh - lowestLow = 0, output is 0 (no range)"

  cci:
    # Source: ta_CCI.c
    formula: "TypPrice = (High + Low + Close) / 3; CCI = (TypPrice - SMA(TypPrice, n)) / (0.015 * MeanDeviation(TypPrice, n))"
    default_period: 14
    period_range: "2 to 100000"
    output_range: "unbounded (typically -300 to +300)"
    interpretation:
      overbought: "> +100"
      oversold: "< -100"
    constant: "0.015 ensures ~70-80% of values fall within ±100"

  williams_r:
    # Source: ta_WILLR.c
    formula: "WILLR = (HighestHigh(n) - Close) / (HighestHigh(n) - LowestLow(n)) * -100"
    default_period: 14
    period_range: "2 to 100000"
    output_range: "-100 to 0"
    interpretation:
      overbought: "> -20 (near 0)"
      oversold: "< -80 (near -100)"
    note: "Inverse of Fast Stochastic %K — multiply by -1 for equivalent"

  momentum_mom:
    # Source: ta_MOM.c
    formula: "MOM = Close[i] - Close[i - n]"
    default_period: 10
    period_range: "1 to 100000"
    output_range: "unbounded (raw price difference)"
    note: "No normalization — magnitude is price-unit dependent"

  cmo:
    # Source: ta_CMO.c (Chande Momentum Oscillator)
    formula: "CMO = (SumUp - SumDown) / (SumUp + SumDown) * 100"
    default_period: 14
    output_range: "-100 to +100"
    interpretation:
      strong_uptrend: "> +50"
      strong_downtrend: "< -50"

  bop:
    # Source: ta_BOP.c (Balance of Power)
    formula: "BOP = (Close - Open) / (High - Low)"
    inputs_required: [Open, High, Low, Close]
    output_range: "-1 to +1"
    edge_case: "When High == Low, output = 0 (no candle range)"

  apo_ppo:
    # Source: ta_APO.c, ta_PPO.c
    apo_formula: "APO = MA(close, fast) - MA(close, slow)"
    ppo_formula: "PPO = (MA(close, fast) - MA(close, slow)) / MA(close, slow) * 100"
    defaults: "fast=12, slow=26, MA type=SMA"
    ppo_advantage: "PPO is normalized as percentage, comparable across different price levels"

  ultosc:
    # Source: ta_ULTOSC.c (Ultimate Oscillator — Larry Williams)
    formula: "BuyingPressure = Close - min(Low, PrevClose); TrueRange = max(High, PrevClose) - min(Low, PrevClose); BP1/TR1 averaged over period1, BP2/TR2 over period2, BP3/TR3 over period3; UltOsc = 100 * (4*avg1 + 2*avg2 + avg3) / 7"
    defaults: "period1=7, period2=14, period3=28"
    output_range: "0 to 100"
    interpretation:
      overbought: "> 70"
      oversold: "< 30"

  mfi:
    # Source: ta_MFI.c (Money Flow Index — volume-weighted RSI)
    formula: "TypicalPrice = (High + Low + Close) / 3; RawMoneyFlow = TP * Volume; PositiveMF if TP > PrevTP else NegativeMF; MFI = 100 - 100 / (1 + PosMF/NegMF)"
    default_period: 14
    period_range: "2 to 100000"
    output_range: "0 to 100"
    inputs_required: [High, Low, Close, Volume]
    interpretation:
      overbought: "> 80"
      oversold: "< 20"

  aroon:
    # Source: ta_AROON.c, ta_AROONOSC.c
    aroon_up_formula: "((period - periodsFromHigh) / period) * 100"
    aroon_down_formula: "((period - periodsFromLow) / period) * 100"
    aroonosc_formula: "AroonUp - AroonDown"
    default_period: 14
    output_range: "0 to 100 (AROON); -100 to +100 (AROONOSC)"
    inputs_required: [High, Low]
    outputs: "2 arrays for AROON (AroonDown, AroonUp); 1 array for AROONOSC"

outcomes:
  compute_success:
    priority: 10
    given:
      - "input_length > lookback_period for selected indicator"
      - "all required price arrays present and of equal length"
      - "all optional parameters within valid ranges"
    then:
      - action: set_field
        target: out_beg_idx
        value: "first input index that maps to out[0]"
      - action: set_field
        target: out_nb_element
        value: "input_length - lookback_period"
      - action: set_field
        target: out_values
        value: "computed indicator values array"
      - action: emit_event
        event: indicator.computed
        payload: [indicator_type, out_nb_element, out_beg_idx]
    result: "out_values contains valid oscillator readings; caller aligns output to input using outBegIdx"

  macd_computed:
    priority: 10
    given:
      - "indicator_type in [MACD, MACDEXT, MACDFIX]"
      - "input_length > lookback_period"
    then:
      - action: set_field
        target: out_values
        value: "MACD line values"
      - action: set_field
        target: out_signal
        value: "Signal line values"
      - action: set_field
        target: out_hist
        value: "Histogram values (MACD - Signal)"
      - action: emit_event
        event: indicator.computed
        payload: [indicator_type, out_nb_element]
    result: "Three aligned output arrays; histogram crossing zero indicates signal crossover"

  aroon_computed:
    priority: 10
    given:
      - "indicator_type == AROON"
      - "input_length > lookback_period"
    then:
      - action: set_field
        target: out_signal
        value: "AroonDown values (0-100)"
      - action: set_field
        target: out_hist
        value: "AroonUp values (0-100)"
    result: "Two arrays: AroonDown and AroonUp, both in range [0,100]"

  insufficient_data:
    priority: 1
    error: INSUFFICIENT_DATA
    given:
      - "input_length <= lookback_period for selected indicator"
    then:
      - action: set_field
        target: out_nb_element
        value: 0
    result: "outNBElement = 0; caller must provide more bars before meaningful output is available"

  invalid_parameters:
    priority: 2
    error: INVALID_PARAMETER
    given:
      - any:
          - "time_period < 2 and indicator_type in [RSI, CCI, WILLR, CMO, MFI, STOCH]"
          - "fast_period < 2 and indicator_type in [MACD, APO, PPO]"
          - "slow_period < fast_period and indicator_type == MACD"
          - "period1 < 1 or period2 < 2 or period3 < 2 and indicator_type == ULTOSC"
    result: "Function returns error code; caller must validate parameters before calling"

  missing_required_inputs:
    priority: 2
    error: MISSING_INPUT
    given:
      - any:
          - "high_prices is null and indicator_type in [CCI, WILLR, STOCH, STOCHF, STOCHRSI, ULTOSC, MFI, AROON, AROONOSC]"
          - "volume is null and indicator_type == MFI"
          - "open_prices is null and indicator_type == BOP"
    result: "Invalid output; ensure all required price arrays are supplied"

  range_clamp_edge:
    priority: 3
    given:
      - any:
          - "High == Low for all bars in period and indicator_type in [WILLR, STOCH, BOP]"
          - "SumUp + SumDown == 0 and indicator_type == CMO"
          - "PosMF + NegMF == 0 and indicator_type == MFI"
    then:
      - action: set_field
        target: out_values
        value: "0 (BOP/WILLR) or boundary value per indicator spec"
    result: "Output clamped to boundary — indicates flat market with no price movement"

errors:
  - code: INSUFFICIENT_DATA
    message: "Not enough historical bars to compute indicator. Provide at least lookback + 1 data points."
    status: 422
  - code: INVALID_PARAMETER
    message: "One or more parameters are outside their valid range. Check period constraints."
    status: 400
  - code: MISSING_INPUT
    message: "Required price series (High, Low, Volume, Open) not provided for the selected indicator."
    status: 400

events:
  - name: indicator.computed
    payload: [indicator_type, out_nb_element, out_beg_idx]
  - name: indicator.overbought
    payload: [indicator_type, value, threshold]
  - name: indicator.oversold
    payload: [indicator_type, value, threshold]
  - name: indicator.crossover
    payload: [indicator_type, direction, value]

related:
  - feature: moving-average-overlap-studies
    type: required
  - feature: volatility-band-indicators
    type: recommended
  - feature: directional-movement-indicators
    type: recommended
  - feature: volume-flow-indicators
    type: recommended
  - feature: candlestick-pattern-recognition
    type: optional
  - feature: market-data-feeds
    type: required


anti_patterns:
  - rule: "Do not use MACD signals in isolation without checking trend direction"
    why: "MACD generates many false crossovers in ranging/sideways markets — confirmed by the lookback consuming the slow EMA period plus signal period"
  - rule: "Do not ignore outBegIdx when aligning output with input dates"
    why: "The lookback period consumes the first N bars; out[0] maps to inReal[outBegIdx] — misalignment corrupts date-based chart rendering"
  - rule: "Do not share time_period across all indicators without checking defaults"
    why: "Each indicator has different default periods (RSI=14, MOM=10, STOCH fastK=5) — a single global period misrepresents the indicator's intent"
  - rule: "Do not apply overbought/oversold thresholds mechanically"
    why: "Trending assets can sustain RSI>70 for extended periods; thresholds are heuristics, not hard signals"
  - rule: "Do not compute BOP when High == Low"
    why: "Zero denominator produces undefined output; the source code (ta_BOP.c) guards this with output=0, but callers must handle flat candles"
  - rule: "Do not use STOCHRSI without enough bars for nested lookback"
    why: "STOCHRSI lookback = RSI_lookback + STOCH_lookback; with defaults this is ~32 bars minimum"

extensions:
  tech_stack:
    language: "C99"
    bindings: "Java, .NET (Managed C++), Rust, Python (via ta-lib wrapper)"
    build_system: "Autoconf / CMake"
    source_repo: "https://github.com/TA-Lib/ta-lib"
  indicator_count: 18
  output_type: "All outputs are double-precision floating-point arrays"
  unstable_period:
    control: "TA_SetUnstablePeriod(TA_FUNC_UNST_RSI, n) — default 0"
  ma_type_enum:
    SMA: 0
    EMA: 1
    WMA: 2
    DEMA: 3
    TEMA: 4
    TRIMA: 5
    KAMA: 6
    MAMA: 7
    T3: 8
