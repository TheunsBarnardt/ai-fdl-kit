# ============================================================
# Equity Derivatives End-of-Day Data Delivery — Feature Blueprint
# FDL v0.1.0 | Blueprint v1.0.0
# ============================================================
# Extracted from: Equity Derivatives Non-Live Market Data
# Products Specifications v6.0 (54 pages)
# Fixed-width flat file dissemination of end-of-day equity
# derivatives statistics via FTP for licensed subscribers
# ============================================================

feature: equity-derivatives-eod-data-delivery
version: "1.0.0"
description: "End-of-day equity derivatives data delivery via FTP — fixed-width flat files covering daily/weekly/monthly statistics, MTM, rates, and risk parameters"
category: trading
tags: [market-data, eod, equity-derivatives, ftp, dissemination, fixed-width, non-live, mtm, risk-parameters]

actors:
  - id: data_subscriber
    name: "Data Subscriber"
    type: human
    description: "Licensed recipient who receives end-of-day equity derivatives data files"

  - id: exchange_operations
    name: "Exchange Operations"
    type: system
    description: "Exchange dissemination system that generates and delivers EOD files"

  - id: customer_services
    name: "Customer Services"
    type: human
    description: "Provisions subscriber credentials and dataset access before go-live"

fields:
  # ── Leading Record (first 48 chars of every record) ───────────────────────
  # Source: Section 7.1 — Leading Record Layout

  - name: market_number
    type: number
    required: true
    # START 1, LENGTH 1, END 1 — Market identifier (3 = Equity Derivatives / EDM)

  - name: contract_type
    type: text
    required: true
    # START 2, LENGTH 1, END 2 — F=Future, Y=Option

  - name: instrument_type
    type: text
    required: true
    # START 3, LENGTH 10, END 12 — underlying instrument type

  - name: record_type
    type: text
    required: true
    # START 13, LENGTH 4, END 16 — e.g. DED, SED, OED, MED, RED, CED, IED, PED, LED, AED, ADD, XED

  - name: record_sub_type
    type: text
    required: true
    # START 17, LENGTH 4, END 20 — sub type code

  - name: run_date
    type: date
    required: true
    # START 21, LENGTH 8, END 28 — format CCYYMMDD

  - name: filler_header
    type: text
    required: false
    # START 29, LENGTH 20, END 48 — reserved for future expansion

  # ── DED Sub Type 01 — Daily Traded Statistics ─────────────────────────────
  # Source: Section 7.2

  - name: instrument
    type: text
    required: false
    # START 49, LENGTH 7, END 55 — underlying instrument code

  - name: date
    type: date
    required: false
    # START 56, LENGTH 8, END 63 — expiry date (CCYYMMDD)

  - name: strike_price
    type: number
    required: false
    # START 64, LENGTH 17, END 80 — numeric 10.6; zero for futures

  - name: option_type
    type: text
    required: false
    # START 81, LENGTH 1, END 81 — Put or Call

  - name: spot_price
    type: number
    required: false
    # START 82, LENGTH 17, END 98 — closing price of underlying (10.6)

  - name: closing_bid
    type: number
    required: false
    # START 99, LENGTH 17, END 115 — closing bid; blank for off-book only

  - name: closing_offer
    type: number
    required: false
    # START 116, LENGTH 17, END 132 — closing offer; blank for off-book only

  - name: mtm
    type: number
    required: false
    # START 133, LENGTH 17, END 149 — mark-to-market official closing price (10.6)

  - name: first_price
    type: number
    required: false
    # START 150, LENGTH 17, END 166 — first execution price; blank for off-book only

  - name: last_price
    type: number
    required: false
    # START 167, LENGTH 17, END 183 — last execution price; blank for off-book only

  - name: high_price
    type: number
    required: false
    # START 184, LENGTH 17, END 200 — highest execution price; blank for off-book only

  - name: low_price
    type: number
    required: false
    # START 201, LENGTH 17, END 217 — lowest execution price; blank for off-book only

  - name: number_of_deals
    type: number
    required: false
    # START 218, LENGTH 14, END 231 — integer

  - name: volume_traded
    type: number
    required: false
    # START 232, LENGTH 14, END 245 — integer

  - name: value_traded
    type: number
    required: false
    # START 246, LENGTH 21, END 266 — numeric 14.6

  - name: open_interest
    type: number
    required: false
    # START 267, LENGTH 14, END 280 — integer

  - name: volatility
    type: number
    required: false
    # START 281, LENGTH 11, END 291 — numeric 4.6, options only

  - name: isin
    type: text
    required: false
    # START 292, LENGTH 13, END 304 — International Securities Identification Number

  - name: instrument_id
    type: number
    required: false
    # START 305, LENGTH 17, END 321 — universal instrument master ID, unique across all markets

  # ── DED Sub Type 02/03/04 — Market Statistics (Daily/Weekly/Monthly) ──────
  # Source: Sections 7.3, 7.4, 7.5 — identical layout

  - name: derivatives_instrument_type
    type: text
    required: false
    # START 49, LENGTH 60, END 108 — instrument type description

  - name: contract_code
    type: text
    required: false
    # START 109, LENGTH 50, END 158 — describes expiry date, underlying, settlement type

  - name: call_put_future
    type: text
    required: false
    # START 159, LENGTH 6, END 164 — Call, Put, or Future

  - name: deals
    type: number
    required: false
    # START 165, LENGTH 14, END 178 — integer

  - name: contracts_traded
    type: number
    required: false
    # START 179, LENGTH 14, END 192 — integer

  - name: nominal_value
    type: number
    required: false
    # START 193, LENGTH 21, END 213 — numeric 14.6

  - name: delta_value
    type: number
    required: false
    # START 214, LENGTH 21, END 234 — numeric 14.6

  - name: delta_value_sign
    type: text
    required: false
    # START 235, LENGTH 1, END 235 — N for negative, P for positive

  - name: premium_value
    type: number
    required: false
    # START 236, LENGTH 21, END 256 — numeric 14.6

  # ── DED Sub Type 05 — All Contracts Open Interest ─────────────────────────
  # Source: Section 7.6

  - name: ded05_contract_code
    type: text
    required: false
    # START 49, LENGTH 50, END 98

  - name: ded05_open_interest
    type: number
    required: false
    # START 99, LENGTH 14, END 112 — integer

  - name: ded05_contract_traded
    type: number
    required: false
    # START 113, LENGTH 14, END 126 — integer

  # ── SED Sub Type 02 — Type Totals ─────────────────────────────────────────
  # Source: Section 7.7

  - name: total_contracts
    type: number
    required: false
    # START 49, LENGTH 14, END 62

  - name: total_deals
    type: number
    required: false
    # START 63, LENGTH 14, END 76

  - name: total_value
    type: number
    required: false
    # START 77, LENGTH 21, END 97 — numeric 14.6

  - name: total_open_interest
    type: number
    required: false
    # START 98, LENGTH 14, END 111

  # ── OED Sub Type 02 — Overall Totals ──────────────────────────────────────
  # Source: Section 7.8

  - name: total_margin_on_deposit
    type: number
    required: false
    # START 112, LENGTH 21, END 132 — always populated with zeros

  # ── RCD Sub Type 01/02/03 — South African Rates ───────────────────────────
  # Source: Sections 7.12-7.14

  - name: interest_on_initial_margin
    type: number
    required: false
    # START 49, LENGTH 11, END 59 — numeric 5.5

  - name: jibar_one_month_yield
    type: number
    required: false
    # START 60, LENGTH 11, END 70

  - name: jibar_three_month_yield
    type: number
    required: false
    # START 71, LENGTH 11, END 81

  - name: jibar_six_month_yield
    type: number
    required: false
    # START 82, LENGTH 11, END 92

  - name: jibar_nine_month_yield
    type: number
    required: false
    # START 93, LENGTH 11, END 103

  - name: jibar_twelve_month_yield
    type: number
    required: false
    # START 104, LENGTH 11, END 114

  - name: prime_rate
    type: number
    required: false
    # START 203, LENGTH 11, END 213

  - name: cpi
    type: number
    required: false
    # START 214, LENGTH 11, END 224

rules:
  data_format:
    format: fixed_width_flat_file
    encoding: ASCII
    field_types:
      A: "Alpha only"
      N: "Numeric only (integer shown as N(I))"
      AN: "Alphanumeric"
      DATE: "8-byte date CCYYMMDD"
      B: "Boolean — T for True, F for False"

  delivery:
    channel: FTP
    # Source: Section 3 — via IDP FTP server
    primary_time: "20:30"
    frequency: daily

  subscription:
    requires_written_request: true
    requires_license_agreement: true

  market_identification:
    market_number: 3
    market_identifier: "EDM"
    market_name: "Equity Derivatives Market"

  contract_types:
    F: "Future"
    Y: "Option"

  instrument_identifiers:
    # Source: Section 5
    contract_code: "Alphanumeric field describing expiry, underlying, settlement type"
    isin: "ZAD prefix for futures, ZAD<letter> for options"
    instrument_id: "Unique number across all instruments in all markets"

outcomes:
  successful_delivery:
    given:
      - "subscriber is licensed and provisioned with IDP credentials"
      - "trading day has completed"
    then:
      - "exchange operations generates fixed-width flat files for all subscribed record types"
      - "files compressed and delivered via FTP per schedule"
      - action: emit_event
        event: data.delivery.completed
        payload: [run_date, record_types, file_name]
    result: "subscriber receives complete end-of-day equity derivatives data"

  subscriber_provisioned:
    given:
      - "prospective subscriber has contacted Market Data Department in writing"
      - "license agreement is signed"
    then:
      - "Customer Services provides IDP user ID, dataset name, and password"
      - "subscriber tests access to confirm successful connection"
    result: "subscriber has working FTP access to equity derivatives data files"

errors:
  - code: DELIVERY_FAILED
    message: "End-of-day data file delivery failed"
    status: 500

  - code: INVALID_CREDENTIALS
    message: "IDP authentication failed — contact Customer Services"
    status: 500

  - code: DATASET_NOT_PROVISIONED
    message: "Requested dataset has not been provisioned for this subscriber"
    status: 500

events:
  - name: data.delivery.completed
    description: "All subscribed equity derivatives record types delivered for the day"
    payload:
      - run_date
      - record_types
      - file_name

related:
  - feature: equities-eod-data-delivery
    type: optional
    reason: "Equities EOD data uses same FTP delivery infrastructure"

  - feature: interest-rates-derivatives-eod-data-delivery
    type: optional
    reason: "Interest rates derivatives uses similar record structure"

  - feature: currency-derivatives-eod-data-delivery
    type: optional
    reason: "Currency derivatives uses identical record structure with different prefixes"

