feature: broker-portfolio-management
version: 1.0.0
description: Internal back-office portfolio management for client investment holdings across equities, warrants, bonds, unit trusts and unlisted assets, including at-home holdings, valuation statements,...
category: trading
tags:
  - back-office
  - broker
  - portfolio
  - holdings
  - valuation
  - performance-measurement
  - unlisted-securities
  - at-home-holdings
  - popia
aliases:
  - broker-portfolio
  - portfolio-maintenance
  - client-portfolio
  - holdings-management
  - menup
  - pfv
  - valuation-statements
  - broker-portfolio-enquiry
actors:
  - id: broker_operator
    name: Broker Back-Office Operator
    type: human
  - id: portfolio_administrator
    name: Portfolio Administrator
    type: human
    description: Maintains client portfolio master data, advisors, investment types
  - id: client_advisor
    name: Client Advisor
    type: human
    description: Holds advisor code assigned to one or more client portfolios
  - id: compliance_officer
    name: Compliance Officer
    type: human
  - id: portfolio_system
    name: Portfolio Calculation System
    type: system
  - id: trading_back_office
    name: Trading Back-Office System
    type: system
    description: Source of trade transactions that update portfolio holdings
fields:
  - name: client_portfolio_code
    type: text
    required: true
    label: Client Portfolio Code
  - name: branch_code
    type: text
    required: true
    label: Branch Code
  - name: partner_code
    type: text
    required: true
    label: Partner Code
  - name: advisor_code
    type: text
    required: true
    label: Advisor Code
  - name: investment_type_code
    type: text
    required: false
    label: Investment Type Code
  - name: instrument_code
    type: text
    required: true
    label: Instrument Code
  - name: instrument_class
    type: select
    required: true
    label: Instrument Class
  - name: unlisted_sector_code
    type: text
    required: false
    label: Unlisted Sector Code
  - name: holding_quantity
    type: number
    required: true
    label: Holding Quantity
  - name: holding_cost
    type: number
    required: true
    label: Holding Cost
  - name: market_value
    type: number
    required: false
    label: Current Market Value
  - name: at_home_indicator
    type: boolean
    required: false
    label: At Home Indicator
  - name: at_home_quantity
    type: number
    required: false
    label: Quantity Held At Home
  - name: at_home_cost
    type: number
    required: false
    label: Cost of Holdings Held At Home
  - name: bond_clean_price_flag
    type: boolean
    required: false
    label: Value Bonds At Clean Price
  - name: benchmark_index_code
    type: text
    required: false
    label: Benchmark Index Code
  - name: portfolio_status
    type: select
    required: true
    label: Portfolio Status
  - name: language_indicator
    type: select
    required: false
    label: Statement Language Indicator
  - name: valuation_date
    type: date
    required: false
    label: Valuation Date
  - name: opening_value
    type: number
    required: false
    label: Opening Valuation Value
  - name: closing_value
    type: number
    required: false
    label: Closing Valuation Value
  - name: performance_return_pct
    type: number
    required: false
    label: Period Performance Return Percentage
  - name: cash_movement_total
    type: number
    required: false
    label: Net Cash Movement In Period
  - name: dividend_income
    type: number
    required: false
    label: Dividend And Earnings Income
  - name: closed_date
    type: date
    required: false
    label: Portfolio Closed Date
states:
  field: portfolio_status
  values:
    - name: pending
      initial: true
    - name: active
    - name: suspended
    - name: closed
      terminal: true
  transitions:
    - from: pending
      to: active
      actor: portfolio_administrator
      description: Activate after master data and processing parameters loaded
    - from: active
      to: suspended
      actor: compliance_officer
      description: Suspend during compliance review
    - from: suspended
      to: active
      actor: compliance_officer
    - from: active
      to: closed
      actor: portfolio_administrator
      description: Close portfolio when client relationship ends
rules:
  data_integrity:
    holdings_auto_update: Holdings update automatically from trading back-office transactions, manual load only for at-home and unlisted
    unique_portfolio_code: Client portfolio code must be unique within the broker firm
    instrument_reference: Every holding must reference an active instrument record on the instruments master
    unlisted_sector_mandatory: Unlisted securities and assets must be linked to an unlisted sector code, otherwise default sector applied
    audit_trail: All master-data and holding changes logged with user, timestamp, old/new values
  security:
    resource_access_control: Each screen controlled via resource access control facility, view vs update permissions separate
    segregation_of_duties: Portfolio closure and suspension require separate actor from day-to-day maintenance operator
    no_pii_on_statements_logs: Valuation statements must not log full ID or tax numbers in system logs
  compliance:
    popia_personal_info: Client name, address, and holdings are personal information under POPIA and require documented lawful basis
    popia_cross_border: Statements must not be emailed across borders without client consent and adequate-protection check per POPIA s.72
    statement_retention: Valuation statements retained for minimum regulatory period (typically 5 years)
    tax_classification: Dividend and earnings data tagged for IT3B tax-certificate production
  business:
    grouping_hierarchy: Portfolios grouped by Broker > Branch > Partner > Advisor > Client for all reports and statements
    investment_type_grouping: Portfolios additionally grouped by user-defined investment type codes for enquiry views
    at_home_cost_default: If no cost supplied when receiving at-home scrip, cost defaults to previous trading-day close market value
    bond_valuation_method: Bonds may be valued at clean price or all-in price per broker preference flag
    performance_vs_index: Portfolio return measured against selected benchmark index over the valuation period
    valuation_sequence: Valuation statements produced in Broker, Branch, Partner, Advisor, then alpha or numeric client sequence
errors:
  - code: PORTFOLIO_DUPLICATE
    status: 409
    message: Client portfolio code already exists
  - code: PORTFOLIO_INVALID_ADVISOR
    status: 400
    message: Advisor code not found on advisor master table
  - code: PORTFOLIO_INSTRUMENT_UNKNOWN
    status: 404
    message: Instrument code not found on instrument master
  - code: PORTFOLIO_AT_HOME_NEGATIVE
    status: 422
    message: At-home quantity may not exceed total holding quantity
  - code: PORTFOLIO_VALUATION_NO_PRICE
    status: 422
    message: Valuation cannot be produced, no market price available for one or more instruments
  - code: PORTFOLIO_PERFORMANCE_NO_BENCHMARK
    status: 422
    message: Performance measurement requires a benchmark index to be configured
  - code: PORTFOLIO_POPIA_VIOLATION
    status: 422
    message: Personal information capture failed POPIA lawful-basis check
  - code: PORTFOLIO_CLOSED_UPDATE_FORBIDDEN
    status: 409
    message: Closed portfolio cannot be modified
events:
  - name: portfolio.created
    payload:
      - client_portfolio_code
      - branch_code
      - partner_code
      - advisor_code
      - created_by
      - timestamp
  - name: portfolio.activated
    payload:
      - client_portfolio_code
      - activated_by
      - timestamp
  - name: portfolio.holding_updated
    payload:
      - client_portfolio_code
      - instrument_code
      - old_quantity
      - new_quantity
      - source
      - timestamp
  - name: portfolio.at_home_recorded
    payload:
      - client_portfolio_code
      - instrument_code
      - at_home_quantity
      - at_home_cost
      - recorded_by
  - name: portfolio.valuation_produced
    payload:
      - client_portfolio_code
      - valuation_date
      - closing_value
      - run_id
  - name: portfolio.performance_calculated
    payload:
      - client_portfolio_code
      - valuation_date
      - performance_return_pct
      - benchmark_index_code
      - benchmark_return_pct
  - name: portfolio.suspended
    payload:
      - client_portfolio_code
      - suspended_by
      - reason
      - timestamp
  - name: portfolio.closed
    payload:
      - client_portfolio_code
      - closed_date
      - closed_by
      - timestamp
outcomes:
  register_client_portfolio:
    priority: 1
    description: Administrator registers a new client portfolio with required grouping codes
    given:
      - field: client_portfolio_code
        source: input
        operator: exists
      - field: branch_code
        source: input
        operator: exists
      - field: partner_code
        source: input
        operator: exists
      - field: advisor_code
        source: input
        operator: exists
    then:
      - action: create_record
        type: client_portfolio
      - action: set_field
        target: portfolio_status
        value: pending
      - action: emit_event
        event: portfolio.created
    transaction: true
  reject_duplicate_portfolio:
    priority: 2
    error: PORTFOLIO_DUPLICATE
    description: Prevent duplicate portfolio codes within broker
    given:
      - field: client_portfolio_code
        source: db
        operator: exists
    then:
      - action: emit_event
        event: portfolio.created
  reject_unknown_advisor:
    priority: 3
    error: PORTFOLIO_INVALID_ADVISOR
    description: Advisor code must exist on advisor master
    given:
      - field: advisor_code
        source: db
        operator: not_exists
    then:
      - action: emit_event
        event: portfolio.created
  update_holding_from_trade:
    priority: 4
    description: Trading back-office transaction automatically updates portfolio holding quantity and cost
    given:
      - field: source
        source: system
        operator: eq
        value: trading_back_office
      - field: portfolio_status
        source: db
        operator: eq
        value: active
    then:
      - action: set_field
        target: holding_quantity
        value: updated
      - action: set_field
        target: holding_cost
        value: updated
      - action: emit_event
        event: portfolio.holding_updated
  record_at_home_holding:
    priority: 5
    description: Operator records an at-home holding, cost defaults to previous close when blank
    given:
      - field: at_home_quantity
        source: input
        operator: gt
        value: 0
      - field: at_home_quantity
        source: input
        operator: lte
        value: holding_quantity
    then:
      - action: set_field
        target: at_home_indicator
        value: true
      - action: set_field
        target: at_home_cost
        value: default_previous_close
      - action: emit_event
        event: portfolio.at_home_recorded
    transaction: true
  reject_excess_at_home_quantity:
    priority: 6
    error: PORTFOLIO_AT_HOME_NEGATIVE
    description: At-home quantity may not exceed total holding
    given:
      - field: at_home_quantity
        source: input
        operator: gt
        value: holding_quantity
    then:
      - action: emit_event
        event: portfolio.at_home_recorded
  produce_valuation_statement:
    priority: 7
    description: System produces a client valuation statement for a given valuation date
    given:
      - field: portfolio_status
        source: db
        operator: eq
        value: active
      - field: valuation_date
        source: input
        operator: exists
    then:
      - action: call_service
        target: valuation_calculator
      - action: set_field
        target: closing_value
        value: calculated
      - action: emit_event
        event: portfolio.valuation_produced
    transaction: true
  reject_valuation_without_prices:
    priority: 8
    error: PORTFOLIO_VALUATION_NO_PRICE
    description: Block valuation when any holding has no current price
    given:
      - field: missing_price_count
        source: computed
        operator: gt
        value: 0
    then:
      - action: emit_event
        event: portfolio.valuation_produced
  calculate_performance_vs_benchmark:
    priority: 9
    description: Calculate period return and compare to configured benchmark index
    given:
      - field: benchmark_index_code
        source: db
        operator: exists
      - field: opening_value
        source: db
        operator: gt
        value: 0
    then:
      - action: call_service
        target: performance_measurement_engine
      - action: set_field
        target: performance_return_pct
        value: calculated
      - action: emit_event
        event: portfolio.performance_calculated
  reject_performance_without_benchmark:
    priority: 10
    error: PORTFOLIO_PERFORMANCE_NO_BENCHMARK
    description: Performance measurement requires benchmark index
    given:
      - field: benchmark_index_code
        source: db
        operator: not_exists
    then:
      - action: emit_event
        event: portfolio.performance_calculated
  close_portfolio:
    priority: 11
    description: Administrator closes a portfolio at end of client relationship
    given:
      - field: portfolio_status
        source: db
        operator: eq
        value: active
      - field: user_role
        source: session
        operator: eq
        value: portfolio_administrator
    then:
      - action: transition_state
        field: portfolio_status
        from: active
        to: closed
      - action: set_field
        target: closed_date
        value: today
      - action: emit_event
        event: portfolio.closed
    transaction: true
  block_update_on_closed_portfolio:
    priority: 12
    error: PORTFOLIO_CLOSED_UPDATE_FORBIDDEN
    description: Prevent any changes on a closed portfolio
    given:
      - field: portfolio_status
        source: db
        operator: eq
        value: closed
    then:
      - action: emit_event
        event: portfolio.holding_updated
api:
  http:
    method: POST
    path: /api/v1/portfolios
  request:
    schema:
      client_portfolio_code: text
      branch_code: text
      partner_code: text
      advisor_code: text
      investment_type_code: text
      benchmark_index_code: text
  response:
    success:
      status: 201
      schema:
        client_portfolio_code: text
        portfolio_status: select
    errors:
      - error_code: PORTFOLIO_DUPLICATE
        status: 409
      - error_code: PORTFOLIO_INVALID_ADVISOR
        status: 400
      - error_code: PORTFOLIO_POPIA_VIOLATION
        status: 422
anti_patterns:
  - rule: Do not compute valuations from stale prices without flagging the age of the last price
    why: Statements presented to clients with undisclosed stale prices are a known source of mis-selling and regulatory complaints
  - rule: Do not permit at-home quantity greater than total holding quantity
    why: Negative custody positions are an accounting impossibility and indicate data corruption that must be rejected at entry
  - rule: Do not log full client names, ID numbers, or holdings detail in plaintext application logs
    why: POPIA s.19 requires technical safeguards on personal and financial information, plaintext logs are a known breach vector
  - rule: Do not allow the same operator to both maintain holdings and close the portfolio
    why: Segregation-of-duties protects against concealment of errors or fraud during portfolio wind-down
  - rule: Do not mix clean-price and all-in-price bond valuations in a single statement without labelling the method
    why: Unlabelled bond valuation methods mislead clients about accrued interest and portfolio yield
  - rule: Do not publish performance percentages without also disclosing the benchmark and period used
    why: Unqualified performance figures breach fair-dealing principles and typical regulator marketing rules
related:
  - feature: broker-client-account-maintenance
    type: required
  - feature: popia-compliance
    type: required
  - feature: broker-client-data-upload
    type: recommended
  - feature: broker-back-office-dissemination
    type: recommended

# ─── AGI READINESS ─────────────────────────────────────────

agi:
  # --- AGI READINESS (auto-generated by propagate-agi.js) ---

  goals:
    - id: reliable_broker_portfolio_management
      description: Internal back-office portfolio management for client investment holdings across equities, warrants, bonds,
        unit trusts and unlisted assets, including at-home holdings, valuation statements,...
      success_metrics:
        - metric: policy_violation_rate
          target: 0%
          measurement: Operations that violate defined policies
        - metric: audit_completeness
          target: 100%
          measurement: All decisions have complete audit trails
      constraints:
        - type: regulatory
          description: All operations must be auditable and traceable
          negotiable: false
  autonomy:
    level: supervised
    human_checkpoints:
      - before transitioning to a terminal state
    escalation_triggers:
      - error_rate > 5
      - consecutive_failures > 3
  safety:
    action_permissions:
      - action: register_client_portfolio
        permission: autonomous
      - action: reject_duplicate_portfolio
        permission: supervised
      - action: reject_unknown_advisor
        permission: supervised
      - action: update_holding_from_trade
        permission: supervised
      - action: record_at_home_holding
        permission: autonomous
      - action: reject_excess_at_home_quantity
        permission: supervised
      - action: produce_valuation_statement
        permission: autonomous
      - action: reject_valuation_without_prices
        permission: supervised
      - action: calculate_performance_vs_benchmark
        permission: autonomous
      - action: reject_performance_without_benchmark
        permission: supervised
      - action: close_portfolio
        permission: autonomous
      - action: block_update_on_closed_portfolio
        permission: human_required
  tradeoffs:
    - prefer: accuracy
      over: latency
      reason: trading operations require precise execution and full audit trails
  verification:
    invariants:
      - error messages never expose internal system details
      - state transitions follow the defined state machine — no illegal transitions
  coordination:
    protocol: orchestrated
    consumes:
      - capability: broker_client_account_maintenance
        from: broker-client-account-maintenance
        fallback: fail
      - capability: popia_compliance
        from: popia-compliance
        fallback: fail

