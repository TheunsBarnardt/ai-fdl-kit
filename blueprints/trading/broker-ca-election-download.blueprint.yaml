feature: broker-ca-election-download
version: 1.0.0
description: Download frozen-file corporate-action election positions to brokers per account for voluntary events, supporting live or batch delivery via email or SFTP.
category: trading
aliases:
  - ca-election-download
  - corporate-action-election-feed
  - voluntary-event-feed
  - elective-events-frozen-file
  - ca-elect-download
tags:
  - corporate-actions
  - elections
  - voluntary-events
  - dissemination
  - frozen-file
actors:
  - id: broker_member
    name: Broker Member
    type: external
  - id: back_office_system
    name: Back-Office System
    type: system
  - id: registrar
    name: Registrar / Issuer Agent
    type: external
  - id: central_depository
    name: Central Depository
    type: external
  - id: operations_user
    name: Corporate Actions Operations User
    type: human
fields:
  - name: broker_code
    type: text
    required: true
    label: Broker Numeric Code
    validation:
      - type: pattern
        value: ^[0-9]{3}$
        message: Broker Numeric Code failed pattern validation
  - name: process_code
    type: select
    required: true
    label: Process Code
    options:
      - value: ELECDN
        label: CA Election Download
      - value: ELECUP
        label: CA Election Upload
  - name: process_type
    type: select
    required: true
    label: Event Process Type
    options:
      - value: SC
        label: Scrip Dividend (cash or shares)
      - value: TU
        label: Rights Take-Up or Lapse
      - value: OL
        label: Odd-Lot Offer (sell or retain)
      - value: CD
        label: Cash Dividend with DRIP
      - value: RE
        label: Reinvestment (cash or shares)
      - value: RI
        label: Rights Issue with DRIP
      - value: IT
        label: Interest with DRIP
  - name: instrument_alpha
    type: text
    required: true
    label: Instrument Alpha Code
    validation:
      - type: pattern
        value: ^[A-Z0-9]{1,6}$
        message: Instrument Alpha Code failed pattern validation
  - name: instrument_version
    type: text
    required: true
    label: Instrument Version
    validation:
      - type: pattern
        value: ^[A-Z0-9]{1,3}$
        message: Instrument Version failed pattern validation
  - name: instrument_type
    type: select
    required: true
    label: Instrument Type
    options:
      - value: E
        label: Equity
  - name: record_date
    type: date
    required: true
    label: Record Date / Last Day to Register
  - name: election_deadline
    type: datetime
    required: true
    label: Election Deadline (cut-off)
  - name: payment_date
    type: date
    required: false
    label: Payment / Distribution Date
  - name: process_sequence
    type: text
    required: true
    label: Process Sequence
    validation:
      - type: pattern
        value: ^[0-9]{3}$
        message: Process Sequence failed pattern validation
  - name: run_frequency
    type: select
    required: true
    label: Run Frequency
    options:
      - value: "*"
        label: Ad-hoc
      - value: D
        label: Daily
      - value: W
        label: Weekly
      - value: M
        label: Monthly
  - name: delivery_channel
    type: multiselect
    required: true
    label: Delivery Channel
    options:
      - value: email
        label: Email notification
      - value: sftp
        label: SFTP dataset fetch
      - value: local_mainframe
        label: Mainframe dataset
  - name: email_addresses
    type: json
    required: false
    label: Response Email Addresses
  - name: dataset_name
    type: text
    required: false
    label: Output Dataset Name Pattern
  - name: is_frozen
    type: boolean
    required: true
    label: Frozen File Flag
  - name: is_first_download
    type: boolean
    required: true
    label: First Download for Event
  - name: section
    type: select
    required: true
    label: Holdings Section
    options:
      - value: B
        label: Client Positions
      - value: G
        label: Securities Lending / Borrowing
      - value: H
        label: Collateral
  - name: account_code
    type: text
    required: true
    label: Client Account Code
    validation:
      - type: pattern
        value: ^[0-9]{7}$
        message: Client Account Code failed pattern validation
  - name: option_code
    type: select
    required: false
    label: Elected Option Code
    options:
      - value: C
        label: Cash
      - value: S
        label: Shares
      - value: T
        label: Take-Up
      - value: " "
        label: Lapse / Default
  - name: original_quantity
    type: number
    required: true
    label: Original Holding Quantity
  - name: election_quantity
    type: number
    required: false
    label: Elected Quantity
  - name: scrip_type
    type: text
    required: false
    label: Scrip Type (demat)
  - name: registration_code
    type: text
    required: false
    label: Registration Code
  - name: location_alpha
    type: text
    required: false
    label: Location Alpha Code
  - name: deal_id
    type: text
    required: false
    label: Deal ID
  - name: purchase_sale_indicator
    type: select
    required: false
    label: Purchase/Sale Indicator
    options:
      - value: P
        label: Purchase
      - value: S
        label: Sale
  - name: lender_account
    type: text
    required: false
    label: Lender Account
  - name: borrower_account
    type: text
    required: false
    label: Borrower Account
  - name: provider_account
    type: text
    required: false
    label: Collateral Provider Account
  - name: receiver_account
    type: text
    required: false
    label: Collateral Receiver Account
rules:
  general:
    rule_1: Frozen file contains all client, loan and collateral positions as at record date for the event.
    rule_2: First download per event returns all accounts; subsequent downloads return only amended positions (delta).
    rule_3: Downloads are available from LDT+1 until end-of-day LDR (election deadline).
    rule_4: Requests are ad-hoc and serviced immediately; only one request at a time per broker.
    rule_5: Email addresses must be pre-registered for process types ELECDN (download) and ELECUP (upload); up to 999 addresses supported.
    rule_6: Dataset name follows a deterministic pattern keyed on broker alpha code, e.g. secure.download.{broker_alpha}.ELEC
    rule_7: "File layout is strictly fixed-width card-coded records: 000 header, 071 event detail, 072 account detail, 999 trailer."
    rule_8: "Option codes are event-specific: SC/RE accept C or S; TU accepts T or blank; OL accepts S or blank; DRIP events (CD, RI, IT) populate reinvestment quantity."
    rule_9: Sections B (client), G (lending), H (collateral) are all disseminated; only confirmed SLB and collateral loans are included.
    rule_10: ORIG-SIGN must match the ORIG-QTY polarity; mismatches reject on upload and downloaded frozen quantity remains authoritative.
    rule_11: After election deadline, no further elections accepted; unelected holdings default per event terms.
    rule_12: Response email is sent on every request — both success and failure — stating records read and processed.
outcomes:
  download_election_frozen_file:
    priority: 1
    description: Generate frozen-file election download for a requested voluntary event.
    given:
      - field: process_code
        source: input
        operator: eq
        value: ELECDN
      - field: instrument_alpha
        source: input
        operator: exists
      - field: process_type
        source: input
        operator: in
        value:
          - SC
          - TU
          - OL
          - CD
          - RE
          - RI
          - IT
      - field: record_date
        source: computed
        operator: lte
        value: today
    then:
      - action: call_service
        target: freeze_positions_as_of_record_date
      - action: create_record
        type: election_download_file
      - action: set_field
        target: is_frozen
        value: true
      - action: emit_event
        event: election.download.generated
        payload:
          - broker_code
          - process_type
          - instrument_alpha
          - record_date
          - dataset_name
  deliver_via_email:
    priority: 2
    description: Notify broker via registered email addresses when download file is ready.
    given:
      - field: delivery_channel
        source: input
        operator: in
        value:
          - email
      - field: email_addresses
        source: db
        operator: exists
    then:
      - action: notify
        channel: email
        target: email_addresses
      - action: emit_event
        event: election.download.notified
        payload:
          - broker_code
          - dataset_name
          - email_addresses
  deliver_via_sftp:
    priority: 3
    description: Publish download file to the broker's SFTP dataset location for retrieval.
    given:
      - field: delivery_channel
        source: input
        operator: in
        value:
          - sftp
    then:
      - action: call_service
        target: publish_to_sftp_dataset
      - action: emit_event
        event: election.download.published
        payload:
          - broker_code
          - dataset_name
  election_deadline_reminder:
    priority: 4
    description: Remind broker of approaching election deadline before cut-off.
    given:
      - field: election_deadline
        source: computed
        operator: gt
        value: now
      - field: election_deadline
        source: computed
        operator: lte
        value: now_plus_24h
    then:
      - action: notify
        channel: email
        target: email_addresses
      - action: emit_event
        event: election.deadline.reminder
        payload:
          - broker_code
          - instrument_alpha
          - election_deadline
  default_election_application:
    priority: 5
    description: Apply default election (lapse or retain) when no instruction received by deadline.
    given:
      - field: election_deadline
        source: computed
        operator: lt
        value: now
      - field: option_code
        source: db
        operator: not_exists
    then:
      - action: set_field
        target: option_code
        value: " "
      - action: transition_state
        field: election_status
        from: awaiting_instruction
        to: defaulted
      - action: emit_event
        event: election.default.applied
        payload:
          - broker_code
          - account_code
          - instrument_alpha
          - process_type
  reject_after_cutoff:
    priority: 6
    description: Reject download request received after the election cut-off window.
    given:
      - field: election_deadline
        source: db
        operator: lt
        value: now
    then:
      - action: emit_event
        event: election.download.rejected
        payload:
          - broker_code
          - process_type
          - instrument_alpha
    error: CA_ELECTION_CUTOFF_REACHED
events:
  - name: election.download.generated
    payload:
      - broker_code
      - process_type
      - instrument_alpha
      - record_date
      - dataset_name
  - name: election.download.notified
    payload:
      - broker_code
      - dataset_name
      - email_addresses
  - name: election.download.published
    payload:
      - broker_code
      - dataset_name
  - name: election.download.rejected
    payload:
      - broker_code
      - process_type
      - instrument_alpha
  - name: election.deadline.reminder
    payload:
      - broker_code
      - instrument_alpha
      - election_deadline
  - name: election.default.applied
    payload:
      - broker_code
      - account_code
      - instrument_alpha
      - process_type
errors:
  - code: CA_ELECTION_INVALID_INSTRUMENT
    status: 422
    message: Invalid instrument details for election download.
  - code: CA_ELECTION_INVALID_LDR_DATE
    status: 422
    message: Invalid last-day-to-register date.
  - code: CA_ELECTION_INVALID_ACCOUNT
    status: 422
    message: Account code is not valid for this broker or event.
  - code: CA_ELECTION_INVALID_OPTION_CODE
    status: 422
    message: Option code is not valid for the event process type.
  - code: CA_ELECTION_INVALID_PROCESS_TYPE
    status: 422
    message: Process type not recognised.
  - code: CA_ELECTION_INVALID_PROCESS_SEQ
    status: 422
    message: Process sequence invalid for instrument.
  - code: CA_ELECTION_CUTOFF_REACHED
    status: 409
    message: Election cut-off time reached; request cannot be serviced.
  - code: CA_ELECTION_NO_HEADER
    status: 422
    message: File rejected — missing header record.
  - code: CA_ELECTION_NO_EVENT_DETAIL
    status: 422
    message: File rejected — missing event detail record.
  - code: CA_ELECTION_NO_ACCOUNT_DETAIL
    status: 422
    message: File rejected — missing account detail record.
  - code: CA_ELECTION_NO_TRAILER
    status: 422
    message: File rejected — missing trailer record.
  - code: CA_ELECTION_RECORD_COUNT_MISMATCH
    status: 422
    message: Record count does not match trailer totals.
  - code: CA_ELECTION_TECHNICAL_ERROR
    status: 500
    message: Technical error — no changes applied; contact support.
related:
  - feature: broker-ca-election-upload
    type: recommended
  - feature: broker-client-account-maintenance
    type: required
  - feature: broker-corporate-actions-feed
    type: recommended
  - feature: broker-dissemination-download
