feature: broker-electronic-cash-payments
version: 1.0.0
description: Back-office electronic funds transfer interface that loads cash payments into authorised batches, applies multi-level verification and dual release with segregation of duties, and submits them to...
category: trading
tags:
  - back-office
  - broker
  - payments
  - eft
  - batching
  - authorisation
  - dual-control
  - bank-integration
  - popia
aliases:
  - electronic-cash-payments
  - broker-eft-payments
  - broker-eft
  - cash-payment-batches
  - payment-release
  - bank-transfer-interface
  - electronic-payment-gateway
actors:
  - id: payment_operator
    name: Payment Capture Operator
    type: human
    description: Captures cash payment entries and selects them into a batch
  - id: payment_verifier
    name: Payment Verifier / Authoriser
    type: human
    description: Reviews selected entries and verifies the batch before release
  - id: payment_releaser
    name: Payment Releaser (Approver)
    type: human
    description: One of two independent releasers required to send a verified batch
  - id: bank_system
    name: Electronic Payment Bank Gateway
    type: external
    description: Generic bank electronic funds transfer interface that receives, processes, and acknowledges or rejects payment batches
  - id: systems_administrator
    name: Systems Administrator
    type: human
    description: Maintains the list of supported bank gateways and profile configuration
  - id: back_office_system
    name: Back-Office Payment System
    type: system
fields:
  - name: bank_process_code
    type: text
    required: true
    label: Electronic Bank Process Code
  - name: bank_user_id
    type: text
    required: true
    label: Bank-Issued User ID
  - name: user_reference
    type: text
    required: true
    label: Bank User Reference Owner
  - name: batch_number
    type: number
    required: true
    label: Batch Number
  - name: batch_limit
    type: number
    required: true
    label: Batch Monetary Limit
  - name: credit_item_limit
    type: number
    required: true
    label: Credit Item Limit
  - name: cut_off_time
    type: text
    required: true
    label: Daily Cut-Off Time HHMM
  - name: cash_alpha
    type: text
    required: true
    label: Cash Alpha (Source Bank Account)
  - name: payment_indicator
    type: select
    required: true
    label: Payment Method Indicator
  - name: payee_name
    type: text
    required: true
    label: Payee Name
  - name: payee_bank_branch
    type: text
    required: true
    label: Payee Bank Branch Code
  - name: payee_bank_account
    type: text
    required: true
    label: Payee Bank Account Number
  - name: payment_amount
    type: number
    required: true
    label: Payment Amount
  - name: action_date
    type: date
    required: true
    label: Action Date
  - name: age_date
    type: date
    required: false
    label: Age Date
  - name: account_code
    type: text
    required: true
    label: Source Account Code
  - name: balance_code
    type: text
    required: true
    label: Balance Code
  - name: narrative
    type: text
    required: false
    label: Transaction Narrative
  - name: select_user
    type: text
    required: false
    label: Selecting User ID
  - name: verify_user
    type: text
    required: false
    label: Verifying User ID
  - name: verify_timestamp
    type: datetime
    required: false
    label: Verification Timestamp
  - name: releaser_1_user
    type: text
    required: false
    label: First Releaser User ID
  - name: releaser_1_timestamp
    type: datetime
    required: false
    label: First Release Timestamp
  - name: releaser_2_user
    type: text
    required: false
    label: Second Releaser User ID
  - name: releaser_2_timestamp
    type: datetime
    required: false
    label: Second Release Timestamp
  - name: payment_status
    type: select
    required: true
    label: Payment Status
  - name: rejection_code
    type: text
    required: false
    label: Rejection Error Code
  - name: rejection_description
    type: text
    required: false
    label: Rejection Description
  - name: redirect_indicator
    type: select
    required: false
    label: Redirect or Unpaid Indicator
  - name: interim_processed_at
    type: datetime
    required: false
    label: Interim Processed Timestamp
  - name: final_audit_processed_at
    type: datetime
    required: false
    label: Final Audit Processed Timestamp
states:
  field: payment_status
  values:
    - name: loaded
      initial: true
    - name: selected
    - name: verified
    - name: authorized
    - name: released
    - name: settled
      terminal: true
    - name: rejected
      terminal: true
    - name: deactivated
      terminal: true
  transitions:
    - from: loaded
      to: selected
      actor: payment_operator
      description: Operator selects a cash entry into the pending batch
    - from: selected
      to: verified
      actor: payment_verifier
      description: Verifier confirms the selected group
    - from: verified
      to: authorized
      actor: payment_releaser
      description: First releaser authorises the verified batch
    - from: authorized
      to: released
      actor: payment_releaser
      description: Second independent releaser sends the batch to the bank
    - from: released
      to: settled
      actor: bank_system
      description: Bank confirms final audit processing
    - from: released
      to: rejected
      actor: bank_system
      description: Bank rejects all or part of the batch
    - from: selected
      to: loaded
      actor: payment_operator
      description: Operator unselects before verification
    - from: loaded
      to: deactivated
      actor: payment_operator
      description: Payment deactivated (e.g. cheque issued instead)
sla:
  cut_off_enforcement:
    description: Releases must occur before the bank cut-off time on the action date
    max_duration: same-business-day
    escalation: Unreleased batches roll to the next business day and require re-authorisation
  interim_acknowledgement:
    description: Bank should return interim processed acknowledgement within minutes of submission
    max_duration: 15m
    escalation: Missing interim acknowledgement after SLA triggers operations alert
rules:
  authorisation:
    three_eyes_minimum: "Payments require at least three distinct users: one selector, one verifier, and two releasers"
    dual_release: Two different user IDs must release each batch; identical releasers are rejected
    segregation_of_duties: The selecting user may not verify their own selection; a releaser may not act as the other releaser on the same batch
    unrelease_authority: A released record may only be unreleased by the same user who released it, prior to send
    cut_off_enforcement: Releases after the configured cut-off time are blocked and deferred to the next business day
  limits:
    batch_limit_check: Batch total must not exceed the bank-agreed batch limit configured on the bank profile
    credit_item_limit_check: Individual credit items must not exceed the bank-agreed per-item credit limit
    limit_mismatch_rejection: If batch or item limits do not match the bank's configured limits, the bank will reject the batch
  data_integrity:
    account_eligibility: Only bank accounts of type Current with blank exchange-control indicator are eligible for electronic payment
    electronic_indicator: Payment method indicator must be set explicitly to Electronic for a payment to enter the EFT flow
    batch_numbering: Batch numbers auto-increment per bank process and are unique per release
    audit_trail: All inserts, changes, deactivations, and reinstatements are logged with user, timestamp, and old/new values
  security:
    access_control: Access to select-all, verify, and release functions is governed by role-based function permissions
    bank_user_id_scope: Only one bank-issued user ID per electronic bank process per broker firm
    no_plaintext_credentials: Bank credentials and tokens must never be persisted or logged in clear text
  compliance:
    popia: Payee bank details are personal information under POPIA; protect with encryption at rest and in transit
    popia_breach_notification: Compromise of payee banking details triggers regulator and data-subject notification under POPIA s.22
    reserve_bank_eft: EFT submissions conform to the National Payments System clearing rules
    retention: Payment audit records retained per financial-services recordkeeping requirements (minimum 5 years)
  business:
    rejection_handling: Rejected entries surface on a rejection queue with options to generate a cash receipt, re-select, or take no action
    redirect_on_account_move: If the bank reports a redirect, payee bank details are updated and require re-verification before reuse
    unpaid_on_closed_account: Unpaid responses on closed accounts require alternate payment arrangements
    cheque_fallback: A deactivated electronic payment may be re-issued as a cheque without reversing the underlying cash payment
errors:
  - code: PAYMENT_IDENTICAL_RELEASERS
    status: 409
    message: The two releasers must be different users
  - code: PAYMENT_CUT_OFF_EXCEEDED
    status: 409
    message: Bank cut-off time has passed; release deferred to next business day
  - code: PAYMENT_BATCH_LIMIT_EXCEEDED
    status: 422
    message: Batch total exceeds the configured bank batch limit
  - code: PAYMENT_CREDIT_ITEM_LIMIT_EXCEEDED
    status: 422
    message: Individual payment amount exceeds the configured credit item limit
  - code: PAYMENT_SELF_VERIFY_FORBIDDEN
    status: 403
    message: Selector may not verify or release their own payments
  - code: PAYMENT_INELIGIBLE_BANK_ACCOUNT
    status: 422
    message: Source bank account is not configured for electronic payments
  - code: PAYMENT_BANK_REJECTED
    status: 503
    message: Bank gateway rejected all or part of the batch
  - code: PAYMENT_BATCH_NOT_VERIFIED
    status: 409
    message: Batch must be verified before release
events:
  - name: payment.loaded
    payload:
      - payment_id
      - account_code
      - amount
      - cash_alpha
      - bank_process_code
      - created_by
      - timestamp
  - name: payment.selected
    payload:
      - payment_id
      - batch_number
      - selected_by
      - timestamp
  - name: payment.verified
    payload:
      - batch_number
      - select_user
      - verify_user
      - total_amount
      - timestamp
  - name: payment.authorized
    payload:
      - batch_number
      - releaser_1_user
      - timestamp
  - name: payment.released
    payload:
      - batch_number
      - releaser_2_user
      - total_amount
      - action_date
      - timestamp
  - name: payment.bank_submitted
    payload:
      - batch_number
      - bank_process_code
      - sent_at
      - debit_count
      - credit_count
  - name: payment.bank_acknowledged
    payload:
      - batch_number
      - interim_processed_at
  - name: payment.settled
    payload:
      - batch_number
      - final_audit_processed_at
  - name: payment.rejected
    payload:
      - batch_number
      - payment_id
      - rejection_code
      - rejection_description
  - name: payment.redirected
    payload:
      - payment_id
      - new_bank_branch
      - new_bank_account
      - redirect_source
outcomes:
  load_electronic_payment:
    priority: 1
    description: Operator captures a cash payment flagged as electronic, eligible source account only
    given:
      - field: payment_indicator
        source: input
        operator: eq
        value: electronic
      - field: source_account_type
        source: db
        operator: eq
        value: current
      - field: exchange_control_indicator
        source: db
        operator: eq
        value: blank
    then:
      - action: create_record
        type: cash_payment
      - action: set_field
        target: payment_status
        value: loaded
      - action: emit_event
        event: payment.loaded
    transaction: true
  reject_ineligible_source_account:
    priority: 2
    error: PAYMENT_INELIGIBLE_BANK_ACCOUNT
    description: Block electronic payments from accounts that are not current or that have exchange-control flags set
    given:
      - any:
          - field: source_account_type
            source: db
            operator: neq
            value: current
          - field: exchange_control_indicator
            source: db
            operator: neq
            value: blank
    then:
      - action: emit_event
        event: payment.loaded
  select_payment_into_batch:
    priority: 3
    description: Operator selects loaded payments into a pending batch grouped by selecting user
    given:
      - field: payment_status
        source: db
        operator: eq
        value: loaded
      - field: action_date
        source: input
        operator: gte
        value: today
    then:
      - action: transition_state
        field: payment_status
        from: loaded
        to: selected
      - action: set_field
        target: select_user
        value: current_user
      - action: emit_event
        event: payment.selected
    transaction: true
  verify_selected_batch:
    priority: 4
    description: Verifier confirms the selected group; selector cannot self-verify
    given:
      - field: payment_status
        source: db
        operator: eq
        value: selected
      - field: verify_user
        source: session
        operator: neq
        value: select_user
    then:
      - action: transition_state
        field: payment_status
        from: selected
        to: verified
      - action: set_field
        target: verify_timestamp
        value: now
      - action: emit_event
        event: payment.verified
    transaction: true
  reject_self_verification:
    priority: 5
    error: PAYMENT_SELF_VERIFY_FORBIDDEN
    description: Prevent the selecting user from verifying or releasing their own selection
    given:
      - field: acting_user
        source: session
        operator: eq
        value: select_user
    then:
      - action: emit_event
        event: payment.verified
  dual_release_send_batch:
    priority: 6
    description: Two distinct releasers authorise and send a verified batch before the cut-off time
    given:
      - field: payment_status
        source: db
        operator: eq
        value: authorized
      - field: releaser_2_user
        source: input
        operator: neq
        value: releaser_1_user
      - field: current_time
        source: system
        operator: lt
        value: cut_off_time
      - field: batch_total
        source: computed
        operator: lte
        value: batch_limit
    then:
      - action: transition_state
        field: payment_status
        from: authorized
        to: released
      - action: call_service
        target: electronic_payment_bank
      - action: emit_event
        event: payment.released
      - action: emit_event
        event: payment.bank_submitted
    transaction: true
  block_identical_releasers:
    priority: 7
    error: PAYMENT_IDENTICAL_RELEASERS
    description: Reject release attempts where releaser 1 and releaser 2 are the same user
    given:
      - field: releaser_2_user
        source: input
        operator: eq
        value: releaser_1_user
    then:
      - action: emit_event
        event: payment.released
  enforce_cut_off_time:
    priority: 8
    error: PAYMENT_CUT_OFF_EXCEEDED
    description: Block releases submitted after the configured bank cut-off time
    given:
      - field: current_time
        source: system
        operator: gte
        value: cut_off_time
    then:
      - action: emit_event
        event: payment.released
  process_bank_acknowledgement:
    priority: 9
    description: Record interim and final bank acknowledgements and settle the batch
    given:
      - field: payment_status
        source: db
        operator: eq
        value: released
      - field: final_audit_processed_at
        source: input
        operator: exists
    then:
      - action: transition_state
        field: payment_status
        from: released
        to: settled
      - action: set_field
        target: final_audit_processed_at
        value: bank_timestamp
      - action: emit_event
        event: payment.settled
    transaction: true
  handle_bank_rejection:
    priority: 10
    error: PAYMENT_BANK_REJECTED
    description: Bank rejects all or part of the batch; surface rejections for reprocessing
    given:
      - field: bank_response
        source: input
        operator: eq
        value: rejected
    then:
      - action: transition_state
        field: payment_status
        from: released
        to: rejected
      - action: set_field
        target: rejection_code
        value: bank_error_code
      - action: emit_event
        event: payment.rejected
flows:
  capture_to_settlement:
    description: End-to-end electronic cash payment flow from capture to bank settlement
    steps:
      - step: 1
        actor: payment_operator
        action: Capture cash payment with electronic indicator on eligible source account
      - step: 2
        actor: payment_operator
        action: Select loaded payments into a pending batch for a given action date
      - step: 3
        actor: payment_verifier
        action: Verify the selected batch group (must differ from selector)
      - step: 4
        actor: payment_releaser
        action: First releaser authorises the verified batch
      - step: 5
        actor: payment_releaser
        action: Second distinct releaser sends the batch before cut-off
      - step: 6
        actor: bank_system
        action: Acknowledge interim receipt and return final audit result
      - step: 7
        actor: back_office_system
        action: Surface rejections and redirects for operator remediation
api:
  http:
    method: POST
    path: /api/v1/payments/batches/{batch_number}/release
  request:
    schema:
      bank_process_code: text
      batch_number: number
      action_date: date
      releaser_role: select
  response:
    success:
      status: 200
      schema:
        batch_number: number
        payment_status: select
        total_amount: number
    errors:
      - error_code: PAYMENT_IDENTICAL_RELEASERS
        status: 409
      - error_code: PAYMENT_CUT_OFF_EXCEEDED
        status: 409
      - error_code: PAYMENT_BATCH_LIMIT_EXCEEDED
        status: 422
      - error_code: PAYMENT_CREDIT_ITEM_LIMIT_EXCEEDED
        status: 422
      - error_code: PAYMENT_SELF_VERIFY_FORBIDDEN
        status: 403
      - error_code: PAYMENT_BANK_REJECTED
        status: 503
      - error_code: PAYMENT_BATCH_NOT_VERIFIED
        status: 409
anti_patterns:
  - rule: Do not allow the same user to verify and release a batch they selected
    why: Segregation-of-duties is the primary control preventing internal fraud on EFT payments; collapsing roles defeats the control
  - rule: Do not persist bank user credentials, tokens, or signing keys in application databases or logs
    why: Compromise of a bank gateway credential allows an attacker to submit arbitrary payments; credentials belong in a secrets vault with short-lived tokens
  - rule: Do not bypass the cut-off time check by adjusting client clocks or resubmitting after hours
    why: Cut-off enforcement protects against communication delays; late submissions cause duplicate processing the next day
  - rule: Do not auto-retry rejected batches without human review
    why: Bank rejections often indicate limit mismatches or closed accounts; blind retries create duplicates and regulator-reportable errors
  - rule: Do not log full payee bank account numbers in plaintext
    why: Payee banking details are personal information under POPIA; plaintext logs are a recognised breach vector requiring regulator notification
  - rule: Do not hard-code a single bank gateway — abstract via bank_process_code
    why: Vendor lock-in prevents adding or switching banks; the interface must remain generic
related:
  - feature: popia-compliance
    type: required
  - feature: broker-client-account-maintenance
    type: recommended
  - feature: broker-back-office-dissemination
    type: recommended

