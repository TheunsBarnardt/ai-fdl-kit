# ============================================================
# model-serving — ML Model Export, Versioning, and Inference
# FDL v0.1.0 | Blueprint v1.0.0
# ============================================================
# Source: TensorFlow public API (tensorflow.org/api_docs)
# Tech stack: Python + TensorFlow SavedModel + TF Serving
# Reference: tensorflow/python/saved_model/save.py
#            tensorflow/python/framework/tensor_spec.py
#            tensorflow_serving/servables/tensorflow/
# ============================================================

feature: model-serving
version: "1.0.0"
description: "Export trained ML models in SavedModel format, version them for rollback, load them into a serving runtime, and execute real-time or batch inference via REST or gRPC"
category: ai
tags:
  - ai
  - serving
  - inference
  - savedmodel
  - deployment
  - versioning

actors:
  - id: ml_engineer
    name: "ML Engineer"
    type: human
    description: "Exports, versions, and deploys trained model checkpoints"
  - id: serving_runtime
    name: "Serving Runtime"
    type: system
    description: "Loads model and executes inference requests (TF Serving, in-process, etc.)"
  - id: client_application
    name: "Client Application"
    type: external
    description: "Calls the inference endpoint and consumes predictions"

fields:
  - name: model_path
    type: text
    required: true
    label: "Model Base Directory (e.g. /models/classifier)"

  - name: model_version
    type: text
    required: true
    label: "Model Version (integer string, e.g. '3')"

  - name: export_format
    type: select
    required: true
    label: "Export Format"
    options:
      - value: "saved_model"
        label: "TensorFlow SavedModel (recommended for production)"
      - value: "keras_h5"
        label: "Keras HDF5 (.h5, legacy format)"
      - value: "tflite"
        label: "TensorFlow Lite (.tflite, mobile/edge devices)"
      - value: "onnx"
        label: "ONNX (cross-framework interoperability)"

  - name: serving_status
    type: select
    required: false
    label: "Serving Status"
    options:
      - value: "unloaded"
        label: "Unloaded"
      - value: "loading"
        label: "Loading"
      - value: "loaded"
        label: "Loaded"
      - value: "serving"
        label: "Serving"
      - value: "deprecated"
        label: "Deprecated"

  - name: input_dtype
    type: text
    required: false
    label: "Input Tensor Dtype (e.g. float32)"

  - name: input_shape
    type: json
    required: false
    label: "Input Tensor Shape (e.g. [null, 224, 224, 3])"

  - name: output_dtype
    type: text
    required: false
    label: "Output Tensor Dtype (e.g. float32)"

  - name: output_shape
    type: json
    required: false
    label: "Output Tensor Shape (e.g. [null, 1000])"

  - name: max_batch_size
    type: number
    required: false
    label: "Max Request Batch Size"

  - name: timeout_ms
    type: number
    required: false
    label: "Inference Timeout (milliseconds)"

  - name: warmup_requests
    type: number
    required: false
    label: "Warmup Inference Calls After Load (pre-compile TF ops)"

states:
  serving_state:
    field: serving_status
    values:
      - name: unloaded
        initial: true
      - name: loading
      - name: loaded
      - name: serving
      - name: deprecated
        terminal: true
    transitions:
      - from: unloaded
        to: loading
        actor: serving_runtime
        description: "Model load initiated"
      - from: loading
        to: loaded
        actor: serving_runtime
        description: "Weights and computation graph loaded into memory"
      - from: loaded
        to: serving
        actor: serving_runtime
        description: "Warmup completed; model ready for inference requests"
      - from: serving
        to: deprecated
        actor: ml_engineer
        description: "Newer model version deployed; this version retired"
      - from: loading
        to: unloaded
        actor: serving_runtime
        description: "Load failed; model returned to unloaded state"

rules:
  export:
    saved_model_format: |
      MUST export as SavedModel format (not .h5) for production serving:
      - Bundles computation graph, weights, and serving signatures together
      - Compatible with TF Serving (REST + gRPC), TF.js, and TFLite conversion
      - Version directory structure: {model_path}/{version}/saved_model.pb
      Use: tf.saved_model.save(model, path) or model.save(path)
      # Source: tensorflow/python/saved_model/save.py

    input_signatures: |
      MUST define explicit tf.TensorSpec input signatures when exporting:
      - Without signatures the model cannot be served via TF Serving REST/gRPC
      - Use @tf.function(input_signature=[...]) or signatures parameter in save()
      - Signatures name the serving endpoint (default: 'serving_default')
      # Source: tensorflow/python/framework/tensor_spec.py

    tflite_quantization: |
      When exporting to TFLite for edge deployment:
      - SHOULD apply post-training quantization (float16 or int8) to reduce
        model size and improve latency on mobile CPUs and DSPs
      - Dynamic range quantization: 2-4x size reduction, minimal accuracy loss
      - Full integer quantization: requires representative_dataset callable
      # Source: tensorflow/lite/python/lite.py

  versioning:
    directory_structure: |
      MUST use sequential integer version directories:
      {model_path}/1/saved_model.pb
      {model_path}/2/saved_model.pb
      TF Serving auto-discovers new versions by scanning model_path at intervals.
      Higher version number = newer; server loads the highest available version.
      # Source: tensorflow_serving/core/aspired_versions_manager.cc

    rollback: |
      SHOULD retain the previous version when deploying a new one.
      If the new version causes errors or regressions:
      - Remove (or hide) the new version directory
      - TF Serving automatically falls back to the previous highest version
      Immediate rollback without restart — zero-downtime deployment.

    version_policy: |
      Configure TF Serving version_policy to control how many versions are kept:
      - latest: keep only the newest version (default)
      - specific: pin to an exact version number
      - all: keep all available versions (useful for A/B testing)

  inference:
    input_validation: |
      MUST validate input tensor dtype and shape against input_signature
      before executing inference. Return INFERENCE_SHAPE_MISMATCH (400)
      if inputs are incompatible; do not allow TF to raise a C++ error.

    batching: |
      SHOULD configure TF Serving's built-in batching for throughput:
      - Groups concurrent requests into a single forward pass
      - max_batch_size: limits GPU memory usage per batch
      - batch_timeout_micros: max wait time before dispatching partial batch
      - Use batching_parameters_file to pass config to TF Serving
      Never accept requests with batch size > max_batch_size.

    warmup: |
      SHOULD run warmup_requests dummy inferences after model loads:
      - JIT-compiles TensorFlow XLA ops (first real call would be slow)
      - Pre-allocates GPU memory to avoid latency spike on first request
      - TF Serving supports SavedModel warmup assets:
          assets.extra/tf_serving_warmup_requests (WarmupData proto)
      # Source: tensorflow_serving/servables/tensorflow/saved_model_warmup.cc

  security:
    model_integrity: |
      SHOULD verify model checksum after loading to detect corruption.
      Do NOT load models from untrusted sources without integrity verification.
      Model weights can contain malicious operations via custom ops.

outcomes:
  model_loaded:
    priority: 5
    given:
      - field: model_path
        source: input
        operator: exists
      - "SavedModel directory exists at {model_path}/{model_version}/"
      - "saved_model.pb file is present and parseable"
    then:
      - action: transition_state
        field: serving_status
        from: loading
        to: loaded
      - action: emit_event
        event: model.loaded
        payload:
          - model_path
          - model_version
    result: "Model computation graph and weights loaded into serving runtime memory"

  model_serving_ready:
    priority: 6
    given:
      - field: serving_status
        source: db
        operator: eq
        value: "loaded"
      - "warmup_requests completed without error"
    then:
      - action: transition_state
        field: serving_status
        from: loaded
        to: serving
      - action: emit_event
        event: model.ready
        payload:
          - model_version
    result: "Model serving endpoint active; accepting inference requests"

  inference_succeeded:
    priority: 10
    given:
      - field: serving_status
        source: db
        operator: eq
        value: "serving"
      - "request input dtype matches input_dtype"
      - "request input shape is compatible with input_shape"
      - field: max_batch_size
        source: system
        operator: exists
      - "request batch size is within max_batch_size"
    then:
      - action: emit_event
        event: model.inference_completed
        payload:
          - model_version
          - batch_size
          - inference_latency_ms
    result: "Predictions returned in output tensor with shape and dtype matching output_signature"

  inference_failed_shape_mismatch:
    priority: 1
    error: INFERENCE_SHAPE_MISMATCH
    given:
      - "request input shape or dtype does not match input_signature"
    result: "Request rejected; client must reshape or cast inputs to match the model signature"

  model_not_found:
    priority: 2
    error: MODEL_NOT_FOUND
    given:
      - field: model_path
        source: input
        operator: exists
      - "directory {model_path}/{model_version}/ does not exist"
    result: "Load failed; verify model_path and model_version are correct"

  model_load_failed:
    priority: 2
    error: MODEL_LOAD_FAILED
    given:
      - "saved_model.pb exists but cannot be parsed or is corrupted"
    then:
      - action: transition_state
        field: serving_status
        from: loading
        to: unloaded
    result: "Load aborted; file may be corrupt or from an incompatible TF version"

  inference_timeout:
    priority: 3
    error: INFERENCE_TIMEOUT
    given:
      - field: timeout_ms
        source: system
        operator: exists
      - "inference duration exceeded timeout_ms"
    result: "Request timed out; reduce input size, increase timeout_ms, or scale serving replicas"

  max_batch_exceeded:
    priority: 1
    error: MAX_BATCH_EXCEEDED
    given:
      - field: max_batch_size
        source: system
        operator: exists
      - "request batch size exceeds max_batch_size"
    result: "Request rejected; split into smaller batches not exceeding max_batch_size"

errors:
  - code: MODEL_NOT_FOUND
    status: 404
    message: "Model not found at the specified path and version."

  - code: MODEL_LOAD_FAILED
    status: 500
    message: "Failed to load model. File may be corrupted or from an incompatible TensorFlow version."
    retry: true

  - code: INFERENCE_SHAPE_MISMATCH
    status: 400
    message: "Input tensor shape or dtype does not match the model's serving signature."

  - code: INFERENCE_TIMEOUT
    status: 503
    message: "Inference exceeded the configured timeout. Reduce input size or increase timeout."
    retry: true

  - code: MAX_BATCH_EXCEEDED
    status: 400
    message: "Request batch size exceeds the configured maximum."

events:
  - name: model.loaded
    payload:
      - model_path
      - model_version

  - name: model.ready
    payload:
      - model_version
      - warmup_requests

  - name: model.inference_completed
    payload:
      - model_version
      - batch_size
      - inference_latency_ms

  - name: model.unloaded
    payload:
      - model_path
      - model_version

  - name: model.deprecated
    payload:
      - model_version
      - replacement_version

sla:
  inference_latency:
    p50: "50ms"
    p99: "200ms"
  model_load_time:
    max_duration: "30s"
  warmup_time:
    max_duration: "60s"

related:
  - feature: model-training
    type: required
    reason: "Consumes SavedModel checkpoint exported by the training workflow"
  - feature: dataset-pipeline
    type: optional
    reason: "Batch inference can reuse tf.data pipelines for preprocessing"

extensions:
  tech_stack:
    language: "Python"
    framework: "TensorFlow SavedModel + TF Serving"
    patterns:
      - "SavedModel versioned directory structure"
      - "tf.TensorSpec input/output signatures"
      - "TF Serving batching configuration"
      - "Zero-downtime rolling version deployment"
      - "SavedModel warmup assets for JIT pre-compilation"
