  # --- AGI READINESS (auto-generated by propagate-agi.js) ---

  goals:
    - id: reliable_target_downside_deviation
      description: Compute the target downside deviation (target semideviation) — the square root of the average squared
        deviations below a target return — a risk measure for investors asymmetrically averse to losses
      success_metrics:
        - metric: policy_violation_rate
          target: 0%
