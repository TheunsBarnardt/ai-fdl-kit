extensions:
  worked_example:
    # Source: Vol 1, Module 9, p.247-248
    r: 0.35
    n_small: 12
    t_small: "0.35 * sqrt(10) / sqrt(1 - 0.1225) = 1.182"
    decision_small: "Fail to reject at alpha=0.05 (t_crit = 2.228)"
    n_large: 32
    t_large: "0.35 * sqrt(30) / sqrt(1 - 0.1225) = 2.046"
    decision_large: "Reject at alpha=0.05 (t_crit = 2.042)"

related:
  - feature: covariance-correlation
    type: required
  - feature: hypothesis-testing-framework
    type: required
  - feature: parametric-vs-nonparametric-tests
    type: recommended
