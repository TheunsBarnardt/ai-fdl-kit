rules:
  format:
    - "MUST: Use fixed-width flat file format for all indices records"
    - "MUST: Include Leading Record header on every record (market_number, record_type, sub_type, sequence, run_date)"
    - "MUST: Use 3-character record_type (D + family letter + file type letter)"
    - "MUST: Use 2-character record_sub_type (01=Constituents, 02=Valuations, 03=Tracker1, 04=Tracker2, 05/07=Tracker3, 11=Opening, 14=FiveDay)"
  dissemination:
    - "MUST: Generate Valuations, Constituents, and Tracker files at end of each trading day"
    - "MUST: Generate Opening Constituents file at start of each trading day"
    - "MUST: Generate Five-Day Tracker files for upcoming weighting amendments"
    - "MUST: Deliver all files via IDP FTP to entitled subscribers only"
  identification:
    - "MUST: Use unique record_type per index family + file type combination"
    - "MUST: Use sequence numbers 01-04 for multi-row records, 01-99 for Tracker 3"
  data_integrity:
    - "MUST: Include all constituents in Constituents file with weightings that sum correctly"
    - "MUST: Include weighting amendment reason in Tracker 2 records"
    - "MUST: Include ex-dividend details in Tracker 3 records"
  access_control:
    - "MUST: Verify subscriber entitlement before file generation"
errors:
  - code: INDICES_SUBSCRIBER_NOT_PROVISIONED
    message: Subscriber not provisioned for FTSE-JSE indices data
    status: 403
  - code: INDICES_FILE_GENERATION_FAILED
    message: Failed to generate indices EOD data file
    status: 500
  - code: INDICES_INVALID_RECORD_TYPE
    message: Record type code does not match any known index family
    status: 422
  - code: INDICES_MISSING_CONSTITUENTS
    message: Constituents data missing for index family
    status: 422
outcomes:
  generate_valuations_eod:
    priority: 1
    description: Daily Valuations file generated for each index family at EOD
    given:
      - end of trading day reached
      - all index calculations complete
    then:
      - action: create_record
        type: valuations_data_file
        description: Fixed-width file with Leading Record + Sub Type 02 records
      - action: call_service
        target: idp_ftp_dissemination
      - action: emit_event
        event: indices.valuations.disseminated
  generate_constituents_eod:
    priority: 2
    description: Daily Constituents file listing all stocks in each index
    given:
      - end of trading day reached
    then:
      - action: create_record
        type: constituents_data_file
        description: Fixed-width file with Sub Type 01 records (sequences 01-04)
      - action: emit_event
        event: indices.constituents.disseminated
  generate_tracker_1_index_level:
    priority: 3
    description: Tracker 1 file with index-level data per index family
    given:
      - end of trading day reached
    then:
      - action: create_record
        type: tracker_1_file
        description: Fixed-width file with Sub Type 03 records
      - action: emit_event
        event: indices.tracker_1.disseminated
  generate_tracker_2_weighting_amendments:
    priority: 4
    description: Tracker 2 file with stock-level weighting amendments
    given:
      - any:
          - field: constituent_shares_changed
            source: computed
            operator: eq
            value: true
          - field: free_float_changed
            source: computed
            operator: eq
            value: true
          - field: capping_factor_changed
            source: computed
            operator: eq
            value: true
    then:
      - action: create_record
        type: tracker_2_file
        description: Fixed-width file with Sub Type 04 records
      - action: emit_event
        event: indices.tracker_2.disseminated
  generate_tracker_3_ex_dividend:
    priority: 5
    description: Tracker 3 file with ex-dividend changes
    given:
      - field: ex_dividend_events_present
        source: computed
        operator: eq
        value: true
    then:
      - action: create_record
        type: tracker_3_file
        description: Fixed-width file with Sub Type 05/07 and 06/08 records
      - action: emit_event
        event: indices.tracker_3.disseminated
  generate_opening_constituents:
    priority: 6
    description: Opening Constituents file with starting positions
    given:
      - start of trading day reached
    then:
      - action: create_record
        type: opening_constituents_file
        description: Fixed-width file with Sub Type 11 records
      - action: emit_event
        event: indices.opening_constituents.disseminated
  generate_five_day_tracker:
    priority: 7
    description: Five-day rolling tracker of upcoming weighting amendments
    given:
      - end of trading day reached
      - amendments scheduled within next 5 business days
    then:
      - action: create_record
        type: five_day_tracker_file
        description: Fixed-width file with Sub Type 14 records
      - action: emit_event
        event: indices.five_day_tracker.disseminated
  dissemination_failure:
    priority: 8
    error: INDICES_FILE_GENERATION_FAILED
    description: Fixed-width file generation or FTP dissemination fails
    given:
      - field: ftp_transfer_status
        source: system
        operator: eq
        value: failed
    then:
      - action: notify
        channel: operations
        target: exchange_operations
      - action: emit_event
        event: indices.dissemination.failed
  subscriber_not_provisioned:
    priority: 9
    error: INDICES_SUBSCRIBER_NOT_PROVISIONED
    description: Subscriber attempts retrieval without entitlement
    given:
      - field: subscriber_entitled
        source: db
        operator: eq
        value: false
    then:
      - action: emit_event
        event: indices.access_denied
agi:
  goals:
    - id: reliable_indices_eod_data_delivery
      description: End-of-day FTSE-JSE indices market data delivery via FTP — fixed-width flat files covering 30+ index families with valuations data, constituents data, index-level tracker data, stock-level weightin...
      success_metrics:
        - metric: policy_violation_rate
          target: 0%
          measurement: Operations that violate defined policies
        - metric: audit_completeness
          target: 100%
          measurement: All decisions have complete audit trails
      constraints:
        - type: regulatory
          description: All operations must be auditable and traceable
          negotiable: false
  autonomy:
    level: supervised
    human_checkpoints:
      - before making irreversible changes
    escalation_triggers:
      - error_rate > 5
      - consecutive_failures > 3
  safety:
    action_permissions:
      - action: generate_valuations_eod
        permission: autonomous
      - action: generate_constituents_eod
        permission: autonomous
      - action: generate_tracker_1_index_level
        permission: autonomous
      - action: generate_tracker_2_weighting_amendments
        permission: autonomous
      - action: generate_tracker_3_ex_dividend
        permission: autonomous
      - action: generate_opening_constituents
        permission: autonomous
      - action: generate_five_day_tracker
        permission: autonomous
      - action: dissemination_failure
        permission: autonomous
      - action: subscriber_not_provisioned
        permission: autonomous
  tradeoffs:
    - prefer: accuracy
      over: latency
      reason: trading operations require precise execution and full audit trails
  verification:
    invariants:
      - error messages never expose internal system details
extensions:
  file_type_sub_type_mapping:
    "11":
      name: Opening Constituents
      description: Starting positions for day (sequences 01-04)
    "14":
      name: Five-Day Tracker
      description: Rolling 5-day view of upcoming weighting amendments (sequences 01-04)
    "01":
      name: Constituents
      description: Full list of stocks in index with weightings (sequences 01-04)
    "02":
      name: Valuations
      description: Index values, returns, and level changes (sequences 01-02)
    "03":
      name: Tracker 1 - Index Level Data
      description: Intraday and EOD index level tracking (sequences 01-02)
    "04":
      name: Tracker 2 - Stock Level Weighting Amendments
      description: Changes to shares in issue, free float, capping (sequences 01-04)
    "05":
      name: Tracker 3 - Ex-Dividend Changes (Set 1)
      description: Ex-dividend stock adjustments (sequences 01-99)
    "07":
      name: Tracker 3 - Ex-Dividend Changes (Set 2)
      description: Ex-dividend stock adjustments (sequences 01-99)
    "06":
      name: Tracker 3 - Ex-Dividend Details
      description: Detailed ex-dividend records (sequences 01-99)
    "08":
      name: Tracker 3 - Ex-Dividend Details
      description: Detailed ex-dividend records (sequences 01-99)
  record_type_char_3_codes:
