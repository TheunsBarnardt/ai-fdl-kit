ui_hints:
  delivery_dashboard:
    fields: [run_date, file_name, delivery_status, record_count]
    layout: "table"
    notes: "Show last 30 days of deliveries with parse status and record counts per type"

  instrument_snapshot:
    fields: [instrument_alpha_code, instrument_numeric_code, closing_price, volume_traded, high_trade_price, low_trade_price, dividend_yield, market_capitalisation]
    layout: "detail"
    notes: "Use instrument_numeric_code as the primary key for all lookups"

extensions:
  # ═══════════════════════════════════════════════════════════════════════════
  # FIXED-WIDTH RECORD LAYOUTS — exact START POS / LENGTH / END POS
  # from Equities Non-Live Market Data Products Specifications v11.0
  # All records share a 41-char leading record (Section 10)
  # Data payload begins at position 42
  # ═══════════════════════════════════════════════════════════════════════════
  record_layouts:
    leading_record:
      # Section 10 — first 41 chars of every record
      fields:
        - { name: sector_code,                  start: 1,   length: 8,  type: AN, end: 8 }
        - { name: instrument_alpha_code,        start: 9,   length: 6,  type: AN, end: 14 }
        - { name: record_type,                  start: 15,  length: 3,  type: AN, end: 17 }
        - { name: sub_type,                     start: 18,  length: 2,  type: AN, end: 19 }
        - { name: continuation_sequence_number, start: 20,  length: 2,  type: N,  end: 21 }
        - { name: run_date,                     start: 22,  length: 8,  type: DATE, end: 29, format: CCYYMMDD }
        - { name: board,                        start: 30,  length: 4,  type: AN, end: 33 }
        - { name: market,                       start: 34,  length: 4,  type: AN, end: 37 }
        - { name: exchange,                     start: 38,  length: 4,  type: AN, end: 41 }

    DE_01:
      # Section 11.1.1 — Daily Instrument Statistics Sub Type 01
      fields:
        - { name: instrument_numeric_code,       start: 42,  length: 7,  type: N,  end: 48 }
        - { name: traded_indicator,              start: 49,  length: 1,  type: AN, end: 49 }
        - { name: instrument_closing_price,      start: 50,  length: 9,  type: N,  end: 58 }
        - { name: instrument_volume_traded,      start: 59,  length: 13, type: N,  end: 71 }
        - { name: high_trade_price,              start: 72,  length: 9,  type: N,  end: 80 }
        - { name: low_trade_price,               start: 81,  length: 9,  type: N,  end: 89 }
        - { name: instrument_dividend_yield,     start: 90,  length: 7,  type: N,  end: 96 }
        - { name: instrument_earnings_yield,     start: 97,  length: 8,  type: N,  end: 104 }
        - { name: instrument_last_bid,           start: 105, length: 9,  type: N,  end: 113 }
        - { name: instrument_last_offer,         start: 114, length: 9,  type: N,  end: 122 }
        - { name: closing_price_change_cents,    start: 123, length: 9,  type: N,  end: 131 }
