feature: broker-dematerialisation
version: 1.0.0
description: Back-office conversion of paper share certificates into electronic records via a central securities depository, with lodgement, nominee-name registration, scrip register updates, proprietary and...
category: trading
tags:
  - back-office
  - broker
  - dematerialisation
  - scrip
  - nominee
  - csd
  - settlement
  - equities
aliases:
  - dematerialisation
  - demat
  - scrip-dematerialisation
  - paper-to-electronic
  - scrip-lodgement
  - rematerialisation
  - nominee-registration
actors:
  - id: broker_operator
    name: Broker Back-Office Operator
    type: human
  - id: settlement_supervisor
    name: Settlement Supervisor
    type: human
  - id: csd_participant
    name: Central Securities Depository Participant
    type: external
  - id: transfer_secretary
    name: Transfer Secretary
    type: external
  - id: back_office_system
    name: Back-Office System
    type: system
  - id: client
    name: Client
    type: human
fields:
  - name: batch_reference
    type: text
    required: true
    label: Batch Reference Number
  - name: issuing_company
    type: text
    required: true
    label: Issuing Company
  - name: share_class
    type: text
    required: true
    label: Share Class
  - name: registered_holder
    type: text
    required: true
    label: Registered Holder
  - name: non_resident_flag
    type: boolean
    required: true
    label: Non-Resident Scrip Flag
  - name: certificate_number
    type: text
    required: true
    label: Certificate Number
  - name: certificate_quantity
    type: number
    required: true
    label: Certificate Quantity
  - name: document_type
    type: select
    required: true
    label: Document Type
  - name: client_account_code
    type: text
    required: false
    label: Client Account Code
  - name: proprietary_flag
    type: boolean
    required: true
    label: Proprietary Scrip Flag
  - name: nominee_account_code
    type: text
    required: true
    label: Nominee Account Code
  - name: scrip_location
    type: select
    required: true
    label: Scrip Location Code
  - name: lodgement_date
    type: date
    required: true
    label: Lodgement Date
  - name: acknowledgement_receipt
    type: text
    required: false
    label: CSD Acknowledgement Receipt
  - name: csd_response
    type: select
    required: false
    label: CSD Response Outcome
  - name: rejection_reason
    type: text
    required: false
    label: Rejection Reason
  - name: scrip_status
    type: select
    required: true
    label: Scrip Status
  - name: jurisdiction
    type: select
    required: true
    label: Securities Jurisdiction
  - name: rematerialisation_quantity
    type: number
    required: false
    label: Rematerialisation Quantity
  - name: registration_code
    type: text
    required: false
    label: Registration Code
  - name: rematerialisation_receipt
    type: text
    required: false
    label: Rematerialisation Receipt Number
states:
  field: scrip_status
  values:
    - name: lodged
      initial: true
    - name: pending_demat
    - name: dematerialised
      terminal: true
    - name: rejected
    - name: tainted
    - name: rematerialised
      terminal: true
  transitions:
    - from: lodged
      to: pending_demat
      actor: broker_operator
    - from: pending_demat
      to: dematerialised
      actor: csd_participant
    - from: pending_demat
      to: rejected
      actor: csd_participant
    - from: pending_demat
      to: tainted
      actor: transfer_secretary
    - from: rejected
      to: pending_demat
      actor: broker_operator
    - from: dematerialised
      to: rematerialised
      actor: broker_operator
rules:
  batching:
    max_documents_per_batch: A batch may contain no more than 100 documents of title
    single_issuer: All scrip in a batch must be for one issuing company only
    single_share_class: All scrip in a batch must be for one share class only
    single_holder: All scrip in a batch must be for one registered holder only
    non_resident_segregation: Non-resident scrip must be lodged in a separate batch from resident scrip
    acceptable_documents: Only share certificates and balance receipts may be included in a batch
    unique_reference: Each batch must carry a broker-assigned unique reference number
  lodgement:
    covering_letter_required: Each batch lodged with the CSD must include scrip, a printed information report, and a covering letter
    acknowledgement_required: Broker must receive and retain CSD acknowledgement for each batch lodged
    location_transfer: Scrip sent to CSD must be transferred to the pending dematerialisation location before acknowledgement
  segregation:
    proprietary_vs_client: Nominee account must be analysed daily into proprietary, resident-client, and non-resident-client sub-totals
    nominee_account_reserved: Central nominee account is reserved exclusively for dematerialised scrip
    daily_reconciliation: All uncertificated balances must be reconciled with the CSD on a daily basis
  rejection:
    unacceptable_scrip: Unacceptable scrip (minor technicality) is returned and must be rectified and resubmitted
    tainted_scrip: Tainted scrip is retained by the transfer secretary; certified copy returned; handled under trace rules
    rejection_transfer: Rejected scrip must be moved out of pending dematerialisation location to invalid scrip account or original account
  risk:
    ownership_verification: Broker must verify client ownership of shares before submitting for dematerialisation
    validity_responsibility: Broker is responsible to the CSD for the validity of all scrip lodged
    right_to_refuse: Broker has no obligation to accept scrip where validity is in doubt
    physical_risk_point: Broker carries risk on delivery until CSD issues acknowledgement receipt
    no_pre_demat_trading: Selling on behalf of a client before dematerialisation completes adds borrowing risk and is discouraged
    settlement_rule: Only dematerialised securities may be used to settle listed equity trades
  client_own_name:
    direct_csd_approach: Clients wishing to dematerialise in their own name must approach a CSD participant directly and cannot route through the broker
  jurisdictional:
    multi_market_support: System must support local and regional securities (e.g. SA and Namibian listings) with market-appropriate CSD routing
  compliance:
    popia_compliance: Client scrip records contain personal information and are subject to POPIA s.19 safeguards
    audit_trail: All location moves, acknowledgements, and rejections logged with user, timestamp, and batch reference
errors:
  - code: DEMAT_BATCH_OVERSIZED
    status: 422
    message: Batch exceeds maximum of 100 documents of title
  - code: DEMAT_BATCH_MIXED_ISSUER
    status: 422
    message: Batch contains scrip from more than one issuing company
  - code: DEMAT_BATCH_MIXED_CLASS
    status: 422
    message: Batch contains more than one share class
  - code: DEMAT_BATCH_MIXED_HOLDER
    status: 422
    message: Batch contains more than one registered holder
  - code: DEMAT_NON_RESIDENT_MIXED
    status: 422
    message: Non-resident scrip must be lodged in a separate batch
  - code: DEMAT_CSD_ACKNOWLEDGEMENT_MISSING
    status: 409
    message: Central depository acknowledgement has not been received for this batch
  - code: DEMAT_SCRIP_REJECTED
    status: 409
    message: Scrip was rejected by the central depository and must be rectified
  - code: DEMAT_SCRIP_TAINTED
    status: 409
    message: Scrip is tainted and has been retained by the transfer secretary
  - code: DEMAT_INVALID_LOCATION_TRANSFER
    status: 409
    message: Scrip cannot be transferred out of the current location in its present state
  - code: DEMAT_OWNERSHIP_UNVERIFIED
    status: 403
    message: Client ownership of scrip could not be verified
events:
  - name: demat.batch_lodged
    payload:
      - batch_reference
      - issuing_company
      - share_class
      - registered_holder
      - document_count
      - lodged_by
      - timestamp
  - name: demat.pending_location_updated
    payload:
      - batch_reference
      - scrip_location
      - updated_by
      - timestamp
  - name: demat.acknowledged
    payload:
      - batch_reference
      - acknowledgement_receipt
      - received_at
  - name: demat.completed
    payload:
      - batch_reference
      - certificate_number
      - quantity
      - client_account_code
      - completed_at
  - name: demat.rejected
    payload:
      - batch_reference
      - certificate_number
      - rejection_reason
      - rejected_at
  - name: demat.tainted
    payload:
      - batch_reference
      - certificate_number
      - retained_by
      - timestamp
  - name: scrip.rematerialised
    payload:
      - client_account_code
      - issuing_company
      - quantity
      - registration_code
      - rematerialisation_receipt
      - timestamp
  - name: scrip.register_reconciled
    payload:
      - nominee_account_code
      - proprietary_total
      - resident_client_total
      - non_resident_client_total
      - reconciled_at
outcomes:
  lodge_valid_batch:
    priority: 1
    description: Operator lodges a well-formed batch with the central depository and moves scrip to the pending dematerialisation location
    given:
      - field: document_count
        source: input
        operator: lte
        value: 100
      - field: issuing_company
        source: input
        operator: exists
      - field: share_class
        source: input
        operator: exists
      - field: registered_holder
        source: input
        operator: exists
    then:
      - action: set_field
        target: scrip_location
        value: pending_demat
      - action: transition_state
        field: scrip_status
        from: lodged
        to: pending_demat
      - action: emit_event
        event: demat.batch_lodged
      - action: emit_event
        event: demat.pending_location_updated
    transaction: true
  reject_oversized_batch:
    priority: 2
    error: DEMAT_BATCH_OVERSIZED
    description: Prevent lodgement of a batch containing more than 100 documents of title
    given:
      - field: document_count
        source: input
        operator: gt
        value: 100
    then:
      - action: emit_event
        event: demat.rejected
  reject_mixed_holder_batch:
    priority: 3
    error: DEMAT_BATCH_MIXED_HOLDER
    description: Prevent lodgement of a batch containing multiple registered holders, issuers, or share classes
    given:
      - any:
          - field: distinct_holders
            source: input
            operator: gt
            value: 1
          - field: distinct_issuers
            source: input
            operator: gt
            value: 1
          - field: distinct_share_classes
            source: input
            operator: gt
            value: 1
    then:
      - action: emit_event
        event: demat.rejected
  reject_non_resident_mix:
    priority: 4
    error: DEMAT_NON_RESIDENT_MIXED
    description: Prevent non-resident scrip from being lodged in the same batch as resident scrip
    given:
      - field: has_resident_and_non_resident_mix
        source: input
        operator: eq
        value: true
    then:
      - action: emit_event
        event: demat.rejected
  mark_batch_dematerialised:
    priority: 5
    description: Operator marks scrip as successfully dematerialised on confirmation from the central depository and updates the nominee account balance
    given:
      - field: csd_response
        source: input
        operator: eq
        value: ok
      - field: scrip_status
        source: db
        operator: eq
        value: pending_demat
    then:
      - action: transition_state
        field: scrip_status
        from: pending_demat
        to: dematerialised
      - action: set_field
        target: scrip_location
        value: csd
      - action: emit_event
        event: demat.completed
      - action: emit_event
        event: scrip.register_reconciled
    transaction: true
  handle_rejected_scrip:
    priority: 6
    error: DEMAT_SCRIP_REJECTED
    description: Operator reverses pending location when the central depository rejects scrip and routes it to an invalid scrip account for rectification
    given:
      - field: csd_response
        source: input
        operator: eq
        value: nok
    then:
      - action: transition_state
        field: scrip_status
        from: pending_demat
        to: rejected
      - action: set_field
        target: scrip_location
        value: rejected
      - action: emit_event
        event: demat.rejected
    transaction: true
  handle_tainted_scrip:
    priority: 7
    error: DEMAT_SCRIP_TAINTED
    description: Transfer secretary retains tainted scrip; broker moves position to invalid account and initiates trace process
    given:
      - field: csd_response
        source: input
        operator: eq
        value: tainted
    then:
      - action: transition_state
        field: scrip_status
        from: pending_demat
        to: tainted
      - action: emit_event
        event: demat.tainted
    transaction: true
  daily_nominee_reconciliation:
    priority: 8
    description: Back-office system reconciles the nominee account daily, producing proprietary, resident-client, and non-resident-client sub-totals
    given:
      - field: reconciliation_trigger
        source: system
        operator: eq
        value: end_of_day
    then:
      - action: call_service
        target: nominee_reconciliation_engine
      - action: emit_event
        event: scrip.register_reconciled
  rematerialise_position:
    priority: 9
    description: Operator rematerialises a dematerialised position back into a paper certificate on client request
    given:
      - field: scrip_status
        source: db
        operator: eq
        value: dematerialised
      - field: rematerialisation_quantity
        source: input
        operator: gt
        value: 0
      - field: registration_code
        source: input
        operator: exists
      - field: rematerialisation_receipt
        source: input
        operator: exists
    then:
      - action: transition_state
        field: scrip_status
        from: dematerialised
        to: rematerialised
      - action: emit_event
        event: scrip.rematerialised
    transaction: true
  block_client_own_name_via_broker:
    priority: 10
    error: DEMAT_OWNERSHIP_UNVERIFIED
    description: Prevent a client from dematerialising in their own name via the broker; they must approach a central depository participant directly
    given:
      - field: own_name_request
        source: input
        operator: eq
        value: true
    then:
      - action: notify
        target: client
        message: own_name_demat_must_go_via_csd_participant
        channel: email
api:
  http:
    method: POST
    path: /api/v1/dematerialisation/batches
  request:
    schema:
      batch_reference: text
      issuing_company: text
      share_class: text
      registered_holder: text
      non_resident_flag: boolean
      document_count: number
      jurisdiction: select
  response:
    success:
      status: 201
      schema:
        batch_reference: text
        scrip_status: select
        scrip_location: select
    errors:
      - error_code: DEMAT_BATCH_OVERSIZED
        status: 422
      - error_code: DEMAT_BATCH_MIXED_ISSUER
        status: 422
      - error_code: DEMAT_BATCH_MIXED_CLASS
        status: 422
      - error_code: DEMAT_BATCH_MIXED_HOLDER
        status: 422
      - error_code: DEMAT_NON_RESIDENT_MIXED
        status: 422
      - error_code: DEMAT_SCRIP_REJECTED
        status: 409
      - error_code: DEMAT_SCRIP_TAINTED
        status: 409
      - error_code: DEMAT_OWNERSHIP_UNVERIFIED
        status: 403
anti_patterns:
  - rule: Do not mix resident and non-resident scrip in a single batch
    why: Exchange-control legislation requires strict segregation; mixing breaches regulation and causes rejection
  - rule: Do not allow sale of client scrip before dematerialisation completes
    why: Pre-demat selling relies on borrowing scrip for settlement, adding counterparty risk, particularly for new clients
  - rule: Do not accept scrip for lodgement where ownership is unverified
    why: Broker is liable to the central depository for the validity of all lodged scrip
  - rule: Do not commingle proprietary and client uncertificated holdings on the nominee account without daily sub-total reconciliation
    why: Regulatory segregation of proprietary vs client assets is mandatory and must be auditable daily
  - rule: Do not settle listed equity trades using non-dematerialised securities
    why: Electronic settlement rules prohibit use of paper-based securities
  - rule: Do not route client own-name dematerialisation through the broker
    why: Own-name registration must go direct to a central depository participant; broker routing is not permitted
related:
  - feature: broker-dematerialisation-upload
    type: recommended
  - feature: broker-client-account-maintenance
    type: required
  - feature: popia-compliance
    type: required
extensions:
  locations:
    RD: Pending Dematerialisation (scrip lodged at CSD awaiting acknowledgement)
    RJ: Rejected Dematerialisation (scrip lodged but rejected)
    CS: CSD Location (dematerialised scrip held at central depository)
    RN: Rematerialised Location (position returned to paper)
  accounts:
    uncertificated_nominee: Nominee account reserved for dematerialised scrip, loaded automatically for all members
  screens:
    USTCD: Accept Dematerialised Certificates (OK/NOK marking)
    USTCD2: Dematerialised Scrip Allocation (fungible position client allocation)
    USXCD: Rematerialise Scrip
    ACDLS: Open Deals by Share (entry point for rematerialisation)
    SCRMV: Scrip Move (location transfers)
    LOCSC: Location Scrip Totals (proprietary, resident, non-resident sub-totals)
  jurisdictions:
    local: Local listed securities
    regional: Regional listed securities (e.g. Namibian)
