# ============================================================
# target-downside-deviation — Feature Blueprint
# Source: CFA LV1 2025 Vol 01 — Module 3, p.109-112
# ============================================================

feature: target-downside-deviation
version: "1.0.0"
description: Compute the target downside deviation (target semideviation) — the square root of the average squared deviations below a target return — a risk measure for investors asymmetrically averse to losses
category: trading
tags: [quantitative-methods, descriptive-statistics, downside-risk, semideviation, target-return, post-modern-portfolio-theory, cfa-level-1]
aliases:
  - target-semideviation
  - downside-deviation
  - semi-deviation
  - downside-risk
  - mar-deviation
  - below-target-deviation
  - sortino-denominator

actors:
  - id: risk_engine
    name: Downside Risk Analytics Engine
    type: system

fields:
  - name: observations
    type: json
    required: true
    label: Array of returns
  - name: target_return
    type: number
    required: true
    label: Minimum acceptable return (MAR) or target (decimal) — e.g., 0 for loss aversion, risk-free rate for Sortino
  - name: population_or_sample
    type: select
    required: false
    label: sample (default, uses n-1) | population (uses N)

rules:
  core_formula:
    # Source: Vol 1, Module 3, p.110-111
    target_semideviation: "s_target = sqrt( sum_{X_i < target}[ (X_i - target)^2 ] / (n - 1) )"
    # Note: the denominator is n-1 (total sample size minus 1), NOT the count of below-target observations
    denominator_note: "Per CFA convention: divide by n-1 of the full sample, even though only below-target squared deviations are summed"
  comparison_with_std_dev:
    std_dev: "Treats upside and downside deviations symmetrically"
    target_semideviation: "Penalises only below-target outcomes; aligns with investor loss aversion"
  applications:
    sortino_ratio: "(R_portfolio - R_target) / target_semideviation; Sortino's refinement of Sharpe"
    liability_driven: "Pension funds use MAR as the liability rate; target_semideviation quantifies shortfall risk"
    post_modern_portfolio_theory: "Replaces variance with downside risk in optimisation"
  interpretation:
    lower_is_better: "Lower target_semideviation means smaller expected shortfall below target"
    zero: "A portfolio never underperforming the target produces zero target_semideviation"
  validation:
    non_empty: "observations array must be non-empty"
    sufficient_sample: "n >= 2"

outcomes:
  compute_target_semideviation:
    priority: 1
    description: Target downside deviation
    given:
      - field: observations
        source: input
        operator: exists
      - field: target_return
        source: input
        operator: exists
    then:
      - action: call_service
        target: risk_engine
      - action: emit_event
        event: risk.target_semideviation_calculated
  empty_observations:
    priority: 10
    description: Empty dataset
    given:
      - field: observations
        source: input
        operator: not_exists
    then:
      - action: emit_event
        event: risk.target_semideviation_rejected
    error: SEMI_DEV_EMPTY
  insufficient_sample:
    priority: 11
    description: Fewer than 2 observations
    given:
      - field: sample_size
        source: computed
        operator: lt
        value: 2
    then:
      - action: emit_event
        event: risk.target_semideviation_rejected
    error: SEMI_DEV_INSUFFICIENT_SAMPLE

errors:
  - code: SEMI_DEV_EMPTY
    status: 400
    message: Observations array must not be empty
  - code: SEMI_DEV_INSUFFICIENT_SAMPLE
    status: 400
    message: At least 2 observations required

events:
  - name: risk.target_semideviation_calculated
    payload: [dataset_id, target_return, target_semideviation, below_target_count, sample_size]
  - name: risk.target_semideviation_rejected
    payload: [dataset_id, reason_code]

anti_patterns:
  - rule: Do not use n instead of n-1 in the denominator
    why: "CFA and PMPT convention divides by (n-1) of the full sample to preserve an unbiased-style estimator; dividing by below-target count inflates the measure"
  - rule: Do not compute target_semideviation without disclosing the target
    why: "Zero target, risk-free target, and liability target produce very different numbers; the measure is not comparable without disclosure"
  - rule: Do not use short-window target_semideviation for long-horizon decisions
    why: "Small samples below target produce highly unstable estimates; needs substantial lookback for reliability"
  - rule: Do not mix downside deviation with full-distribution Sharpe ratio without adjustment
    why: "Sharpe uses total std dev; Sortino uses downside deviation — they are different metrics and should not be labelled interchangeably"

api:
  http:
    method: POST
    path: /analytics/risk/target-downside-deviation
  request:
    schema:
      observations: array
      target_return: number
      population_or_sample: string
  response:
    success:
      status: 200
      schema:
        target_return: number
        target_semideviation: number
        below_target_count: number
        sample_size: number
    errors:
      - status: 400
        error_code: SEMI_DEV_EMPTY
      - status: 400
        error_code: SEMI_DEV_INSUFFICIENT_SAMPLE


# ─── AGI READINESS ─────────────────────────────────────────

