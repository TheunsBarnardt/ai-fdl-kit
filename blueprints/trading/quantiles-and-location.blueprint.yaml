# ============================================================
# quantiles-and-location — Feature Blueprint
# Source: CFA LV1 2025 Vol 01 — Module 3, p.96-102
# ============================================================

feature: quantiles-and-location
version: "1.0.0"
description: Compute quantiles (quartiles, quintiles, deciles, percentiles) and location measures such as the interquartile range and box-and-whisker summary to describe distribution shape
category: trading
tags: [quantitative-methods, descriptive-statistics, quantiles, percentiles, quartiles, box-plot, interquartile-range, cfa-level-1]
aliases:
  - percentile
  - quartile
  - quintile
  - decile
  - interquartile-range
  - iqr
  - box-plot
  - box-and-whiskers
  - location-measure

actors:
  - id: statistics_engine
    name: Statistical Analytics Engine
    type: system

fields:
  - name: observations
    type: json
    required: true
    label: Array of numeric observations
  - name: quantile_type
    type: select
    required: true
    label: percentile | quartile | quintile | decile | custom
  - name: quantile_level
    type: number
    required: false
    label: Level in (0, 100) for percentile, 1-3 for quartile, 1-4 for quintile, 1-9 for decile
  - name: interpolation
    type: select
    required: false
    label: linear | nearest | lower | higher (default linear)

rules:
  core_formulas:
    # Source: Vol 1, Module 3, p.97-99
    position_formula: "L_y = (n + 1) * y / 100, where y is the percentile level"
    interpolation: "If L_y is not integer, interpolate linearly between floor and ceil positions"
    quartile_q1: "Q1 = 25th percentile"
    quartile_q2: "Q2 = median = 50th percentile"
    quartile_q3: "Q3 = 75th percentile"
    iqr: "IQR = Q3 - Q1"
  box_plot_anatomy:
    box: "Spans Q1 to Q3; central line at Q2 (median)"
    whiskers: "Extend to min and max (or to 1.5*IQR boundary)"
    outliers: "Points beyond 1.5*IQR from Q1/Q3 typically plotted individually"
  tukey_outlier_test:
    # Standard Tukey fences
    lower_inner: "Q1 - 1.5 * IQR"
    upper_inner: "Q3 + 1.5 * IQR"
    lower_outer: "Q1 - 3.0 * IQR"
    upper_outer: "Q3 + 3.0 * IQR"
  applications:
    risk_management: "5th percentile ≈ historical VaR"
    performance_quartiles: "Managers commonly ranked by quartile of peer group"
    contract_milestones: "Percentile-based performance bonuses"
  validation:
    non_empty: "observations array must be non-empty"
    level_in_range: "0 < level < 100 for percentile; appropriate integer ranges for others"

outcomes:
  compute_percentile:
    priority: 1
    description: Arbitrary percentile
    given:
      - field: quantile_type
        source: input
        operator: eq
        value: percentile
      - field: quantile_level
        source: input
        operator: gt
        value: 0
      - field: quantile_level
        source: input
        operator: lt
        value: 100
    then:
      - action: call_service
        target: statistics_engine
      - action: emit_event
        event: stats.quantile_calculated
  compute_quartiles:
    priority: 2
    description: Q1, Q2, Q3, IQR
    given:
      - field: quantile_type
        source: input
        operator: eq
        value: quartile
    then:
      - action: call_service
        target: statistics_engine
      - action: emit_event
        event: stats.quantile_calculated
  compute_decile:
    priority: 3
    description: Decile
    given:
      - field: quantile_type
        source: input
        operator: eq
        value: decile
    then:
      - action: call_service
        target: statistics_engine
      - action: emit_event
        event: stats.quantile_calculated
  invalid_level:
    priority: 10
    description: Level out of range
    given:
      - any:
          - field: quantile_level
            source: input
            operator: lte
            value: 0
          - field: quantile_level
            source: input
            operator: gte
            value: 100
    then:
      - action: emit_event
        event: stats.quantile_rejected
    error: QUANTILE_INVALID_LEVEL
  empty_observations:
    priority: 11
    description: Empty dataset
    given:
      - field: observations
        source: input
        operator: not_exists
    then:
      - action: emit_event
        event: stats.quantile_rejected
    error: QUANTILE_EMPTY

errors:
  - code: QUANTILE_INVALID_LEVEL
    status: 400
    message: Quantile level must be in (0, 100) for percentile or valid range for other types
  - code: QUANTILE_EMPTY
    status: 400
    message: Observations array must not be empty

events:
  - name: stats.quantile_calculated
    payload: [dataset_id, quantile_type, quantile_level, value, sample_size]
  - name: stats.quantile_rejected
    payload: [dataset_id, reason_code]

anti_patterns:
  - rule: Do not use linear interpolation across regime-change data
    why: "Interpolation assumes smoothness; distributions with regime discontinuities (e.g., pre/post-crisis returns) can give misleading percentiles"
  - rule: Do not compute percentiles from a handful of observations
    why: "Quantiles are unstable at small n; a 95th percentile from n=20 is essentially the max — report with confidence bounds or don't compute"
  - rule: Do not report historical VaR as a single percentile without a window disclosure
    why: "5th percentile VaR from 1-year vs 10-year windows yields materially different numbers; always state the lookback period"
  - rule: Do not treat values outside 1.5*IQR as errors by default
    why: "Financial return distributions are fat-tailed; 'outliers' by Tukey's rule are often legitimate observations worth analysing, not discarding"

api:
  http:
    method: POST
    path: /analytics/stats/quantiles
  request:
    schema:
      observations: array
      quantile_type: string
      quantile_level: number
      interpolation: string
  response:
    success:
      status: 200
      schema:
        quantile_type: string
        value: number
        q1: number
        q2: number
        q3: number
        iqr: number
    errors:
      - status: 400
        error_code: QUANTILE_INVALID_LEVEL
      - status: 400
        error_code: QUANTILE_EMPTY


# ─── AGI READINESS ─────────────────────────────────────────

