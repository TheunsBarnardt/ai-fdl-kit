# ============================================================
# SHADCN-COMPONENTS — Feature Blueprint
# FDL v0.1.0 | Blueprint v1.0.0
# ============================================================
# Extracted from: https://github.com/shadcn-ui/ui.git
# Tech stack: React 19 + Tailwind CSS v4 + Radix UI / Base UI
# Files analyzed: 56 UI components + registry config + design system
# ============================================================

feature: accessible-component-library
version: "1.0.0"
description: Accessible, composable UI component library built on accessible component primitives with variant system, Tailwind CSS styling, and a multi-style design system
category: ui
tags: [components, design-system, accessible-primitives, tailwind, accessibility, react]

actors:
  - id: developer
    name: Developer
    type: human
    description: Consumes components in their application
  - id: end_user
    name: End User
    type: human
    description: Interacts with the rendered UI components
  - id: design_system
    name: Design System
    type: system
    description: CSS custom properties, style presets, and theme configuration
    # Source: apps/v4/registry/config.ts
  - id: accessible_primitives
    name: Accessible Component Primitives
    type: external
    description: Unstyled, accessible component primitives providing ARIA compliance
    # Source: apps/v4/registry/new-york-v4/ui/*.tsx
  - id: alternative_primitives
    name: Alternative Accessible Primitives
    type: external
    description: Alternative unstyled component primitives
    # Source: apps/v4/registry/config.ts

fields:
  # Underlying primitive library — choice of accessible component libraries
  # Source: apps/v4/registry/config.ts — designSystemConfigSchema
  - name: primitive_library
    label: Primitive Library
    type: select
    required: true
    options:
      - value: library-a
        label: Library A
      - value: library-b
        label: Library B

  # Visual design preset controlling spacing, radius, typography, and colour
  # Source: apps/v4/registry/config.ts — designSystemConfigSchema
  - name: style
    label: Design Style
    type: select
    required: true
    options:
      - value: vega
        label: Vega
      - value: nova
        label: Nova
      - value: lyra
        label: Lyra
      - value: maia
        label: Maia
      - value: mira
        label: Mira
      - value: luma
        label: Luma

  # Icon set used throughout components
  # Source: apps/v4/registry/config.ts
  - name: icon_library
    label: Icon Library
    type: select
    required: false
    options:
      - value: lucide
        label: Lucide
      - value: hugeicons
        label: Hugeicons
      - value: tabler
        label: Tabler
      - value: phosphor
        label: Phosphor
      - value: remixicon
        label: Remix Icon

  # Global border radius scaling factor in rem
  # Source: apps/v4/app/globals.css — radius CSS variable
  - name: border_radius
    label: Border Radius
    type: number
    required: false

  # Primary font for the design system
  # Source: apps/v4/lib/fonts.ts
  - name: font_family
    label: Font Family
    type: text
    required: false

  # Visual variant controlled via CVA — options differ per component
  # Source: apps/v4/registry/new-york-v4/ui/button.tsx — buttonVariants
  - name: variant
    label: Component Variant
    type: text
    required: false

  # Size variant controlled via CVA
  # Source: apps/v4/registry/new-york-v4/ui/button.tsx — buttonVariants
  - name: size
    label: Component Size
    type: select
    required: false
    options:
      - value: default
        label: Default
      - value: sm
        label: Small
      - value: lg
        label: Large
      - value: icon
        label: Icon

  # Compose component with child element using Radix Slot pattern
  # Source: apps/v4/registry/new-york-v4/ui/button.tsx — asChild prop
  - name: as_child
    label: Render as Child
    type: boolean
    required: false

  # Unique identifier for a form field within react-hook-form context
  # Source: apps/v4/registry/new-york-v4/ui/form.tsx — FormField
  - name: form_field_name
    label: Form Field Name
    type: text
    required: true

  # Validation error message rendered by FormMessage component
  # Source: apps/v4/registry/new-york-v4/ui/form.tsx — FormMessage
  - name: form_field_error
    label: Field Error Message
    type: text
    required: false

  # Current sidebar expansion state managed via SidebarProvider context
  # Source: apps/v4/registry/new-york-v4/ui/sidebar.tsx — useSidebar
  - name: sidebar_state
    label: Sidebar State
    type: select
    required: false
    options:
      - value: expanded
        label: Expanded
      - value: collapsed
        label: Collapsed

  # Whether sidebar sheet is open on mobile viewports
  # Source: apps/v4/registry/new-york-v4/ui/sidebar.tsx
  - name: sidebar_open
    label: Sidebar Mobile Open
    type: boolean
    required: false

rules:
  accessibility:
    aria_compliance: true
    # Source: apps/v4/registry/new-york-v4/ui/form.tsx
    # "aria-describedby, aria-invalid attributes on form controls"
    keyboard_navigation: true
    # Source: Radix UI primitives provide keyboard navigation by default
    focus_management: true
    # Source: apps/v4/registry/new-york-v4/ui/dialog.tsx
    # "Focus trapped inside dialog, returned on close"
    screen_reader_labels: true
    # Source: apps/v4/registry/new-york-v4/ui/form.tsx
    # "FormLabel associates with FormControl via htmlFor"

  composition:
    slot_pattern: true
    # Source: apps/v4/registry/new-york-v4/ui/button.tsx
    # "asChild prop delegates rendering to child using Radix Slot"
    data_slot_attributes: true
    # Source: apps/v4/registry/new-york-v4/ui/*.tsx
    # "data-slot attributes on every component element for CSS targeting"
    context_based_state: true
    # Source: apps/v4/registry/new-york-v4/ui/sidebar.tsx
    # "SidebarProvider wraps children with React Context for shared state"
    compound_components: true
    # Source: apps/v4/registry/new-york-v4/ui/dialog.tsx
    # "DialogTrigger, DialogContent, DialogHeader, DialogFooter exported as subcomponents"

  styling:
    cva_variants: true
    # Source: apps/v4/registry/new-york-v4/ui/button.tsx
    # "class-variance-authority for variant/size prop-to-className mapping"
    cn_utility: true
    # Source: apps/v4/lib/utils.ts
    # "cn = clsx + tailwind-merge for className composition"
    css_custom_properties: true
    # Source: apps/v4/app/globals.css
    # "OKLCH color space variables for theming"
    tailwind_v4: true
    # Source: apps/v4/package.json — @tailwindcss/postcss v4
    multi_theme: true
    # Source: apps/v4/app/globals.css
    # "6 style layers: vega, nova, lyra, maia, mira, luma with light/dark modes"

  state_management:
    sidebar_cookie_persistence: true
    # Source: apps/v4/registry/new-york-v4/ui/sidebar.tsx
    # "Cookie-based persistence for sidebar open/collapsed state"
    jotai_atoms: true
    # Source: apps/v4/hooks/use-config.ts
    # "Jotai atoms with localStorage for design system config"
    url_state: true
    # Source: apps/v4/package.json — nuqs dependency
    # "URL-based state management for shareable component previews"

  dependencies:
    react_hook_form: true
    # Source: apps/v4/registry/new-york-v4/ui/form.tsx
    # "react-hook-form Controller, FormProvider for form state"
    tanstack_table: true
    # Source: apps/v4/package.json — @tanstack/react-table
    recharts: true
    # Source: apps/v4/registry/new-york-v4/ui/chart.tsx
    embla_carousel: true
    # Source: apps/v4/registry/new-york-v4/ui/carousel.tsx

outcomes:
  # ---- COMPONENT RENDERING ----
  component_renders_with_variants:
    priority: 1
    given:
      - "Developer passes variant and size props to a component"
      - field: variant
        source: input
        operator: exists
    then:
      - action: call_service
        target: cva.resolve_classname
        description: "CVA resolves variant+size to Tailwind className string"
      - action: call_service
        target: cn.merge
        description: "cn() merges variant classes with any custom className prop"
    result: "Component renders with correct visual variant and allows className overrides"
    # Source: apps/v4/registry/new-york-v4/ui/button.tsx

  component_renders_as_child:
    priority: 2
    given:
      - "Developer passes asChild=true to a component"
      - field: as_child
        source: input
        operator: eq
        value: true
    then:
      - action: call_service
        target: radix.slot
        description: "Radix Slot merges props onto child element instead of rendering wrapper"
    result: "Component behaviour applied to child element without extra DOM node"
    # Source: apps/v4/registry/new-york-v4/ui/button.tsx

  # ---- FORM HANDLING ----
  form_field_validates:
    priority: 3
    given:
      - "Form is wrapped in FormProvider with react-hook-form"
      - "FormField is configured with validation rules"
    then:
      - action: call_service
        target: react_hook_form.validate
        description: "react-hook-form validates field against schema (Zod resolver)"
      - action: set_field
        target: form_field_error
        value: "validation error message"
    result: "FormMessage displays error, FormControl gets aria-invalid=true and aria-describedby linking to error"
    # Source: apps/v4/registry/new-york-v4/ui/form.tsx

  form_submits_successfully:
    priority: 4
    given:
      - "All form fields pass validation"
      - "User submits the form"
    then:
      - action: call_service
        target: react_hook_form.handle_submit
        description: "Form handler receives validated, typed data"
    result: "Developer's onSubmit callback receives strongly-typed form values"
    # Source: apps/v4/registry/new-york-v4/ui/form.tsx

  # ---- DIALOG / SHEET / DRAWER ----
  dialog_opens_with_focus_trap:
    priority: 5
    given:
      - "User clicks DialogTrigger or sheet/drawer trigger"
    then:
      - action: call_service
        target: radix.portal
        description: "Overlay content rendered in React Portal"
      - action: call_service
        target: radix.focus_trap
        description: "Focus trapped inside dialog, Tab cycles within content"
    result: "Dialog is visible with backdrop overlay, focus trapped, ESC to close"
    # Source: apps/v4/registry/new-york-v4/ui/dialog.tsx

  dialog_closes:
    priority: 6
    given:
      - any:
        - "User presses Escape key"
        - "User clicks overlay backdrop"
        - "User clicks close button (if showCloseButton=true)"
    then:
      - action: call_service
        target: radix.restore_focus
        description: "Focus returned to trigger element"
    result: "Dialog closes and focus returns to the element that opened it"
    # Source: apps/v4/registry/new-york-v4/ui/dialog.tsx

  # ---- SIDEBAR ----
  sidebar_toggles:
    priority: 7
    given:
      - any:
        - "User clicks SidebarTrigger button"
        - "User presses keyboard shortcut"
    then:
      - action: set_field
        target: sidebar_state
        value: "toggled value"
      - action: call_service
        target: cookie.persist
        description: "Persist sidebar state in cookie for next page load"
    result: "Sidebar expands or collapses with animation, state persisted across sessions"
    # Source: apps/v4/registry/new-york-v4/ui/sidebar.tsx

  sidebar_mobile_responsive:
    priority: 8
    given:
      - "Viewport width is below mobile breakpoint"
    then:
      - action: call_service
        target: sheet.render
        description: "Sidebar renders as a Sheet (slide-in overlay) on mobile"
    result: "Sidebar adapts to mobile as a dismissible sheet overlay"
    # Source: apps/v4/registry/new-york-v4/ui/sidebar.tsx

  # ---- DATA TABLE ----
  table_renders_with_sorting:
    priority: 9
    given:
      - "Developer provides column definitions with sorting enabled"
      - "Data array is passed to useReactTable hook"
    then:
      - action: call_service
        target: tanstack.create_table
        description: "@tanstack/react-table creates headless table instance"
    result: "Table renders with sortable columns, click headers to sort"
    # Source: apps/v4/registry/new-york-v4/ui/table.tsx

  # ---- THEMING ----
  theme_switches_light_dark:
    priority: 10
    given:
      - "User changes system colour scheme preference or developer toggles theme"
    then:
      - action: set_field
        target: css_custom_properties
        value: "light or dark theme values"
    result: "All components update to light/dark theme via CSS variable cascade"
    # Source: apps/v4/app/globals.css

  style_preset_applied:
    priority: 11
    given:
      - "Design system config has a style value (vega, nova, lyra, maia, mira, luma)"
    then:
      - action: set_field
        target: css_custom_properties
        value: "style-specific CSS variable overrides"
    result: "Components render with chosen design style's spacing, radius, typography"
    # Source: apps/v4/app/globals.css

  # ---- TOAST NOTIFICATIONS ----
  toast_displays:
    priority: 12
    given:
      - "Developer calls toast() or sonner function"
    then:
      - action: call_service
        target: sonner.show
        description: "Toast appears in configured position with auto-dismiss timer"
    result: "Non-intrusive notification shown to user, auto-dismisses after timeout"
    # Source: apps/v4/registry/new-york-v4/ui/sonner.tsx

  # ---- ERRORS ----
  component_import_missing:
    priority: 13
    error: COMPONENT_NOT_INSTALLED
    given:
      - "Developer imports a component that hasn't been added via CLI"
    then:
      - action: notify
        channel: build
        target: developer
        description: "Build error or module not found error"
    result: "Developer must run 'shadcn add <component>' to install it"

errors:
  - code: COMPONENT_NOT_INSTALLED
    status: 404
    message: "Component not found. Run 'npx shadcn add <component>' to install it."

  - code: FORM_VALIDATION_FAILED
    status: 422
    message: "One or more form fields contain invalid values."
    # Source: apps/v4/registry/new-york-v4/ui/form.tsx

  - code: INVALID_VARIANT
    status: 400
    message: "Unknown variant or size value passed to component."
    # Source: apps/v4/registry/new-york-v4/ui/button.tsx

  - code: MISSING_FORM_CONTEXT
    status: 500
    message: "useFormField must be used within a FormField component."
    # Source: apps/v4/registry/new-york-v4/ui/form.tsx

  - code: MISSING_SIDEBAR_CONTEXT
    status: 500
    message: "useSidebar must be used within a SidebarProvider."
    # Source: apps/v4/registry/new-york-v4/ui/sidebar.tsx

events:
  - name: form.submit.success
    description: Form submitted with valid data
    payload: [form_values, form_name]
    # Source: apps/v4/registry/new-york-v4/ui/form.tsx

  - name: form.validation.error
    description: Form validation failed
    payload: [field_name, error_message]
    # Source: apps/v4/registry/new-york-v4/ui/form.tsx

  - name: sidebar.toggle
    description: Sidebar expanded or collapsed
    payload: [new_state, is_mobile]
    # Source: apps/v4/registry/new-york-v4/ui/sidebar.tsx

  - name: dialog.open
    description: Dialog or sheet opened
    payload: [dialog_id]
    # Source: apps/v4/registry/new-york-v4/ui/dialog.tsx

  - name: dialog.close
    description: Dialog or sheet closed
    payload: [dialog_id, close_reason]
    # Source: apps/v4/registry/new-york-v4/ui/dialog.tsx

  - name: toast.show
    description: Toast notification displayed
    payload: [message, type, duration]
    # Source: apps/v4/registry/new-york-v4/ui/sonner.tsx

  - name: theme.change
    description: Theme switched between light and dark
    payload: [new_theme]
    # Source: apps/v4/app/globals.css

related:
  - feature: shadcn-cli
    type: required
    reason: "The CLI tool that installs and manages these components in developer projects"

