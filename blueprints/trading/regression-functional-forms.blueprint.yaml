# ============================================================
# regression-functional-forms — Feature Blueprint
# Source: CFA LV1 2025 Vol 01 — Module 10, p.304-328
# ============================================================

feature: regression-functional-forms
version: "1.0.0"
description: Transform variables in a simple linear regression to capture non-linear relationships using log-lin, lin-log, log-log, and reciprocal functional forms
category: trading
tags: [quantitative-methods, regression, functional-forms, log-linear, elasticity, transformations, cfa-level-1]
aliases:
  - log-lin-model
  - lin-log-model
  - log-log-model
  - elasticity-regression
  - non-linear-transformations
  - variable-transformation

actors:
  - id: regression_engine
    name: Regression Engine
    type: system

fields:
  - name: y_observations
    type: json
    required: true
    label: Array of dependent variable values
  - name: x_observations
    type: json
    required: true
    label: Array of independent variable values
  - name: functional_form
    type: select
    required: true
    label: linear | log_lin | lin_log | log_log | reciprocal

rules:
  linear:
    # Source: Vol 1, Module 10, p.304
    model: "Y = b0 + b1 * X"
    slope_meaning: "Unit change in Y per unit change in X"
  log_lin:
    # Source: Vol 1, Module 10, p.305-306
    model: "ln(Y) = b0 + b1 * X"
    slope_meaning: "Relative (percent) change in Y per unit change in X"
    use_when: "Y grows exponentially in X (e.g., compounded returns)"
    back_transform: "Y_hat = exp(b0_hat + b1_hat * X)"
  lin_log:
    # Source: Vol 1, Module 10, p.306-307
    model: "Y = b0 + b1 * ln(X)"
    slope_meaning: "Unit change in Y per percent change in X"
    use_when: "Diminishing marginal effect of X on Y"
  log_log:
    # Source: Vol 1, Module 10, p.307-308
    model: "ln(Y) = b0 + b1 * ln(X)"
    slope_meaning: "Elasticity — percent change in Y per percent change in X"
    use_when: "Both variables span wide ranges; constant elasticity expected"
  reciprocal:
    model: "Y = b0 + b1 * (1/X)"
    use_when: "Y asymptotes as X grows"
  selection_guidance:
    # Source: Vol 1, Module 10, p.304-328
    use_r_squared: "Prefer the form with higher R^2 — but only when dependent variable is the same"
    use_residual_plots: "Choose the form with the most random-looking residuals"
    use_se: "Lower standard error of estimate implies better fit (same Y scale)"
    economic_theory: "Let theory guide — elasticities -> log-log; growth -> log-lin"
  r_squared_comparability:
    warning: "R^2 values are NOT comparable across models with different Y transformations — compare only within same Y scale"
  applications:
    volatility_modeling: "Log-log regression of variance on option moneyness (volatility smile)"
    earnings_to_size: "Log-log regression of earnings on market cap -> size elasticity"
    interest_rate_level: "Log-lin regression of rate level on time -> exponential growth"
    demand_curves: "Log-log of quantity on price -> demand elasticity"
  validation:
    non_negative_for_log_y: "For log_lin/log_log, all Y > 0"
    non_negative_for_log_x: "For lin_log/log_log, all X > 0"
    functional_form_known: "functional_form must be one of supported values"

outcomes:
  fit_functional_form:
    priority: 1
    description: Transform variables and fit linear regression in transformed space
    given:
      - field: functional_form
        source: input
        operator: in
        value: [linear, log_lin, lin_log, log_log, reciprocal]
      - field: transform_valid
        source: computed
        operator: eq
        value: true
    then:
      - action: call_service
        target: regression_engine
      - action: emit_event
        event: regression.transformed_fit_completed
  non_positive_values_for_log:
    priority: 10
    description: Log transformation requested on non-positive data
    given:
      - field: transform_valid
        source: computed
        operator: eq
        value: false
    then:
      - action: emit_event
        event: regression.transformed_fit_rejected
    error: FUNC_FORM_NON_POSITIVE
  invalid_functional_form:
    priority: 11
    description: Functional form not supported
    given:
      - field: functional_form
        source: input
        operator: not_in
        value: [linear, log_lin, lin_log, log_log, reciprocal]
    then:
      - action: emit_event
        event: regression.transformed_fit_rejected
    error: FUNC_FORM_INVALID

errors:
  - code: FUNC_FORM_NON_POSITIVE
    status: 400
    message: Log transformation requires all values to be strictly positive
  - code: FUNC_FORM_INVALID
    status: 400
    message: Functional form must be one of linear, log_lin, lin_log, log_log, reciprocal

events:
  - name: regression.transformed_fit_completed
    payload: [model_id, functional_form, b0_hat, b1_hat, r_squared, se, interpretation]
  - name: regression.transformed_fit_rejected
    payload: [model_id, reason_code]

anti_patterns:
  - rule: Do not compare R^2 across models with different dependent variable transformations
    why: "R^2 is scale-dependent; log(Y) and Y regressions have different denominators. Compare instead residual plots, AIC/BIC, or out-of-sample error"
  - rule: Do not log-transform negative or zero observations without a shift
    why: "log(x) is undefined for x <= 0; applying log silently drops or NaN-poisons those rows — use log(x + c) or an alternative model"
  - rule: Do not interpret log-log slopes in level-change terms
    why: "In log-log, b1 is an elasticity (percent per percent); reporting 'a 1 unit change in X causes b1 units of Y' is wrong by factors of Y/X"
  - rule: Do not pick the functional form purely to maximize R^2 in-sample
    why: "Overfitting the functional form is a form of p-hacking; use cross-validation or economic theory to justify the choice"

api:
  http:
    method: POST
    path: /analytics/regression/functional-form
  request:
    schema:
      y_observations: array
      x_observations: array
      functional_form: string
  response:
    success:
      status: 200
      schema:
        functional_form: string
        b0_hat: number
        b1_hat: number
        r_squared: number
        standard_error_of_estimate: number
        interpretation: string
    errors:
      - status: 400
        error_code: FUNC_FORM_NON_POSITIVE
      - status: 400
        error_code: FUNC_FORM_INVALID

extensions:
  interpretation_cheat_sheet:
    # Source: Vol 1, Module 10, p.308
    linear: "b1 unit change in Y per unit change in X"
    log_lin: "100 * b1 percent change in Y per unit change in X"
    lin_log: "b1 / 100 unit change in Y per 1 percent change in X"
    log_log: "b1 percent change in Y per 1 percent change in X (elasticity)"

related:
  - feature: simple-linear-regression-ols
    type: required
  - feature: regression-goodness-of-fit
    type: recommended
  - feature: continuously-compounded-returns
    type: recommended
