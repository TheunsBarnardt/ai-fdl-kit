# ============================================================
# implied-forward-rates — Feature Blueprint
# Source: CFA LV1 2025 Vol 01 — Module 2, p.71-74
# ============================================================

feature: implied-forward-rates
version: "1.0.0"
description: Derive implied forward interest rates from the observed spot curve using cash flow additivity and the no-arbitrage condition
category: trading
tags: [quantitative-methods, time-value-of-money, fixed-income, forward-rates, spot-curve, term-structure, cfa-level-1]
aliases:
  - forward-rate
  - forward-interest-rate
  - implied-forward-yield
  - fra-rate
  - forward-curve
  - rolling-yield

actors:
  - id: rates_engine
    name: Term Structure / Rates Engine
    type: system

fields:
  - name: short_spot_rate
    type: number
    required: true
    label: Spot rate for shorter maturity A (decimal, annualised)
  - name: short_maturity
    type: number
    required: true
    label: Maturity of shorter spot in years (A)
  - name: long_spot_rate
    type: number
    required: true
    label: Spot rate for longer maturity B (decimal, annualised)
  - name: long_maturity
    type: number
    required: true
    label: Maturity of longer spot in years (B), where B > A
  - name: compounding
    type: select
    required: false
    label: annual | semiannual | continuous (default annual)
  - name: periods_per_year
    type: number
    required: false
    label: For non-annual compounding (default 1)

rules:
  core_formula:
    # Source: Vol 1, Module 2, p.72 — implied forward via cash flow additivity
    no_arbitrage: "(1 + S_A)^A * (1 + F_{A,B-A})^(B-A) = (1 + S_B)^B"
    solved: "F_{A,B-A} = [ (1 + S_B)^B / (1 + S_A)^A ]^(1/(B-A)) - 1"
    continuous_form: "F_{A,B-A} = (S_B * B - S_A * A) / (B - A)"
  interpretation:
    forward_rate: "F_{A,B-A} is the rate that would apply to a loan beginning at time A and maturing at time B"
    equivalence: "Investing at the long spot must equal investing at short spot then rolling into the forward"
    break_even: "Forward rate is the market-implied break-even reinvestment rate — not a forecast"
  curve_shapes:
    upward_sloping: "F > S_A when the spot curve is rising"
    flat: "F = S when the curve is flat"
    inverted: "F < S_A when the spot curve is falling"
  validation:
    long_greater_than_short: "long_maturity > short_maturity"
    positive_maturities: "both maturities > 0"
    rates_above_negative_one: "spot rates > -1"

outcomes:
  compute_implied_forward:
    priority: 1
    description: Solve implied forward from spot pair
    given:
      - field: long_maturity
        source: input
        operator: gt
        value: short_maturity
      - field: short_spot_rate
        source: input
        operator: gt
        value: -1
      - field: long_spot_rate
        source: input
        operator: gt
        value: -1
    then:
      - action: call_service
        target: rates_engine
      - action: emit_event
        event: rates.forward_calculated
  invalid_maturity_order:
    priority: 10
    description: Long maturity not greater than short maturity
    given:
      - field: long_maturity
        source: input
        operator: lte
        value: short_maturity
    then:
      - action: emit_event
        event: rates.forward_rejected
    error: FORWARD_INVALID_MATURITY_ORDER
  invalid_rate:
    priority: 11
    description: A spot rate is at or below -100%
    given:
      - any:
          - field: short_spot_rate
            source: input
            operator: lte
            value: -1
          - field: long_spot_rate
            source: input
            operator: lte
            value: -1
    then:
      - action: emit_event
        event: rates.forward_rejected
    error: FORWARD_INVALID_RATE

errors:
  - code: FORWARD_INVALID_MATURITY_ORDER
    status: 400
    message: Long maturity must be strictly greater than short maturity
  - code: FORWARD_INVALID_RATE
    status: 400
    message: Spot rates must be strictly greater than -100%

events:
  - name: rates.forward_calculated
    payload: [short_maturity, long_maturity, short_spot_rate, long_spot_rate, implied_forward_rate, forward_period]
  - name: rates.forward_rejected
    payload: [reason_code]

anti_patterns:
  - rule: Do not treat the implied forward rate as a forecast of the future spot rate
    why: "Empirically, forward rates are biased predictors of future spots; they are equilibrium rates, not expectations under risk-neutral measure only"
  - rule: Do not combine spot rates with mismatched compounding conventions
    why: "Semi-annual BEY and annually-compounded spots produce different forwards; always convert to a single convention first"
  - rule: Do not extrapolate the forward beyond the observable curve
    why: "Forwards beyond the longest liquid spot are purely model-driven; flag them as extrapolated"
  - rule: Do not ignore the liquidity premium in implied forwards
    why: "Liquidity premium biases implied forwards above expected future spots; relevant for term-premium decomposition"

api:
  http:
    method: POST
    path: /analytics/rates/implied-forward
  request:
    schema:
      short_spot_rate: number
      short_maturity: number
      long_spot_rate: number
      long_maturity: number
      compounding: string
      periods_per_year: number
  response:
    success:
      status: 200
      schema:
        implied_forward_rate: number
        forward_start: number
        forward_tenor: number
        compounding: string
    errors:
      - status: 400
        error_code: FORWARD_INVALID_MATURITY_ORDER
      - status: 400
        error_code: FORWARD_INVALID_RATE


# ─── AGI READINESS ─────────────────────────────────────────

agi:
  # --- AGI READINESS (auto-generated by propagate-agi.js) ---

  goals:
    - id: reliable_implied_forward_rates
      description: Derive implied forward interest rates from the observed spot curve using cash flow additivity and the
        no-arbitrage condition
      success_metrics:
        - metric: policy_violation_rate
          target: 0%
          measurement: Operations that violate defined policies
        - metric: audit_completeness
          target: 100%
          measurement: All decisions have complete audit trails
      constraints:
        - type: regulatory
          description: All operations must be auditable and traceable
          negotiable: false
  autonomy:
    level: supervised
    human_checkpoints:
      - before making irreversible changes
    escalation_triggers:
      - error_rate > 5
      - consecutive_failures > 3
  safety:
    action_permissions:
      - action: compute_implied_forward
        permission: autonomous
      - action: invalid_maturity_order
        permission: autonomous
      - action: invalid_rate
        permission: autonomous
  tradeoffs:
    - prefer: accuracy
      over: latency
      reason: trading operations require precise execution and full audit trails
  verification:
    invariants:
      - error messages never expose internal system details
  coordination:
    protocol: orchestrated
    consumes:
      - capability: cash_flow_additivity
        from: cash-flow-additivity
        fallback: fail

extensions:
  worked_example:
    # Source: Vol 1, Module 2, p.72-73
    scenario: "2-year spot 3%, 5-year spot 4%"
    computation: "[(1.04)^5 / (1.03)^2]^(1/3) - 1 = 0.0467"
    implied_forward_2y3y: 0.0467
    interpretation: "Market-implied 3-year rate beginning 2 years from now"
  continuous_example:
    scenario: "S_A=0.03 (2y), S_B=0.04 (5y), continuous compounding"
    formula: "(0.04*5 - 0.03*2)/3 = 0.0467"

related:
  - feature: fixed-income-spot-forward-rates
    type: recommended
    reason: Spot rates are the building blocks from which implied forward rates are derived
  - feature: cash-flow-additivity
    type: required
  - feature: fixed-income-present-value
    type: recommended
  - feature: implied-return-fixed-income
    type: recommended
  - feature: forward-exchange-rate-no-arbitrage
    type: recommended
