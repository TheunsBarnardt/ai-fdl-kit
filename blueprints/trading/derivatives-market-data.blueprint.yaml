feature: derivatives-market-data
version: 1.0.0
description: Non-live market data products for derivatives (equity derivatives, commodity derivatives, currency derivatives, interest-rate derivatives)
category: trading
tags: [derivatives, market-data, non-live, eod-data, options-futures]
aliases:
  - derivatives-nlmd-data
  - derivatives-reference-data
  - options-futures-data
  - derivatives-eod-feed
  - derivatives-market-feed

fields:
  - name: derivative_code
    type: text
    required: true
    label: Derivative Contract Code
  - name: derivative_type
    type: select
    required: true
    label: Type (EquityOption, EquityFuture, CommodityFuture, CurrencyDerivative, IRDerivative)
  - name: underlying_asset
    type: text
    required: true
    label: Underlying Asset
  - name: maturity_date
    type: date
    required: false
    label: Maturity/Expiry Date
  - name: strike_price
    type: number
    required: false
    label: Strike Price (for options)
  - name: settlement_date
    type: date
    required: false
    label: Settlement Date

rules:
  data_coverage:
    contract_specifications: "Includes contract size, tick size, trading hours, position limits"
    settlement_terms: "Physical vs cash settlement rules documented"
    risk_parameters: "Greeks (delta, gamma, vega, theta) calculated daily"

outcomes:
  publish_derivatives_data:
    priority: 1
    description: Publish derivatives market data end-of-day
    given:
      - field: derivative_code
        source: input
        operator: exists
    then:
      - action: emit_event
        event: derivatives_data.published

errors:
  - code: DERIVATIVES_DATA_PUBLISH_FAILED
    status: 500
    message: Failed to publish derivatives market data

events:
  - name: derivatives_data.published
    payload: [derivative_code, publication_date]


# ─── AGI READINESS ─────────────────────────────────────────

agi:
  # --- AGI READINESS (auto-generated by propagate-agi.js) ---

  goals:
    - id: reliable_derivatives_market_data
      description: Non-live market data products for derivatives (equity derivatives, commodity derivatives, currency
        derivatives, interest-rate derivatives)
      success_metrics:
        - metric: policy_violation_rate
          target: 0%
          measurement: Operations that violate defined policies
        - metric: audit_completeness
          target: 100%
          measurement: All decisions have complete audit trails
      constraints:
        - type: regulatory
          description: All operations must be auditable and traceable
          negotiable: false
  autonomy:
    level: supervised
    human_checkpoints:
      - before making irreversible changes
    escalation_triggers:
      - error_rate > 5
      - consecutive_failures > 3
  safety:
    action_permissions:
      - action: publish_derivatives_data
        permission: autonomous
  tradeoffs:
    - prefer: accuracy
      over: latency
      reason: trading operations require precise execution and full audit trails
  verification:
    invariants:
      - error messages never expose internal system details
  coordination:
    protocol: request_response
    consumes:
      - capability: reference_data_management
        from: reference-data-management
        fallback: fail

extensions:
  derivative_types:
    - {type: EquityOption, description: "Call and put options on equities"}
    - {type: EquityFuture, description: "Equity index and single-stock futures"}
    - {type: CommodityFuture, description: "Commodity futures contracts"}
    - {type: CurrencyDerivative, description: "FX forwards, swaps, options"}
    - {type: IRDerivative, description: "Bond futures, interest-rate swaps"}
  data_fields:
    - {field: OpenPrice, description: "Opening price"}
    - {field: HighPrice, description: "Intraday high"}
    - {field: LowPrice, description: "Intraday low"}
    - {field: ClosePrice, description: "Settlement price"}
    - {field: Volume, description: "Contracts traded"}
    - {field: OpenInterest, description: "Outstanding contracts"}

related:
  - feature: trading-gateway-fix
    type: recommended
  - feature: reference-data-management
    type: required
