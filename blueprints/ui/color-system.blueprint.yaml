feature: color-system
version: "1.0"
category: ui
description: >
  Define a structured color palette using HSL for better control over shades and tones, ensuring sufficient colors for hierarchy while avoiding over-saturation and maintaining accessibility across all color-blindness types.

rules:
  - Use HSL instead of hex — easier to understand (Hue 0-360°, Saturation 0-100%, Lightness 0-100%) and generate shades
  - You need more colors than you think — plan for 5-8 base colors with 5-9 shades each (dark, lighter, lightest, etc.)
  - Define shades up front — don't generate them ad-hoc; create a structured palette
  - Don't let lightness kill saturation — reduce saturation as lightness increases to keep colors vibrant
  - Greys don't have to be grey — subtle hue can make neutrals feel warmer or cooler
  - Accessible doesn't have to mean ugly — sufficient contrast is possible with saturated, modern colors
  - Don't rely on color alone — always pair color with other signals (icon, text, weight) for color-blind users

outcomes:
  - given:
      - "design system is initiated"
    then:
      - action: create_record
        target: color_palette
        payload: [base_colors, shade_variants, accent_colors]
      - action: set_field
        target: base_color_count
        value: "5-8"
      - action: set_field
        target: shades_per_color
        value: "5-9"
    result: "color palette is comprehensive and systematic"

  - given:
      - "color shade is generated"
    then:
      - action: set_field
        target: hue
        value: "constant"
      - action: set_field
        target: saturation
        value: "high for dark shades, reduced as lightness increases"
      - action: set_field
        target: lightness
        value: "varies to create contrast"
    result: "shade remains true to base hue and maintains vibrancy across the range"

  - given:
      - "text color is applied to background"
    then:
      - action: set_field
        target: contrast_ratio
        value: ">=4.5:1 for normal text, >=3:1 for large text"
      - action: set_field
        target: tested_for
        value: "WCAG AA at minimum"
    result: "text is readable for users with low vision and color-blindness"

  - given:
      - "information or meaning is conveyed through color"
    then:
      - action: set_field
        target: secondary_indicator
        value: "icon, text label, or pattern"
      - action: emit_event
        event: "color.accessibility.checked"
        payload: [color_blind_simulation]
    result: "meaning is conveyed to color-blind users without color alone"

  - given:
      - "neutral or background color is selected"
    then:
      - action: set_field
        target: hue
        value: "subtle warm or cool bias (not pure grey)"
      - action: set_field
        target: saturation
        value: "2-5%"
    result: "neutral feels intentional and cohesive with brand rather than colorless"

fields:
  - name: primary_colors
    type: text
    description: "Main brand and action colors (5-8 base hues)"

  - name: neutral_palette
    type: text
    description: "Greys and near-neutrals with subtle hue biases"

  - name: accent_colors
    type: text
    description: "Alert, error, success, warning colors with sufficient contrast"

  - name: color_format
    type: text
    description: "Preferred format: HSL (recommended) or hex"

  - name: contrast_standard
    type: text
    description: "Minimum contrast ratio (WCAG AA 4.5:1 or AAA 7:1)"

tags:
  - design-system
  - accessibility
  - visual-design

related:
  - feature: visual-hierarchy
    type: required
    description: "Color is a tool for expressing hierarchy and emphasis"

  - feature: dark-mode
    type: recommended
    description: "Color system must work in both light and dark modes"

  - feature: accessibility
    type: required
    description: "Color choices must pass contrast ratios and avoid color-only meaning"
