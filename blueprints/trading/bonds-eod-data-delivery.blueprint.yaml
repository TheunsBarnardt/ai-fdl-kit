# ============================================================
# Bonds End-of-Day Market Data Delivery — Feature Blueprint
# FDL v0.1.0 | Blueprint v1.0.0
# ============================================================
# Extracted from: Bonds Market Data Products Specifications v10.0
# CSV and XLS dissemination of end-of-day bond market data
# via FTP — covers yield curves, MTM valuations, trade detail,
# instrument detail, position reports, and non-resident trading
# ============================================================

feature: bonds-eod-data-delivery
version: "1.0.0"
description: "End-of-day bonds market data delivery via FTP — CSV/XLS formats covering zero curves, MTM valuations, trade detail, instrument statistics, member/client position, and non-resident trading reports"
category: trading
tags: [market-data, eod, bonds, csv, xls, excel, yield-curve, mtm, zero-curve, non-live, ftp]

actors:
  - id: data_subscriber
    name: "Data Subscriber"
    type: human
    description: "Licensed recipient who receives end-of-day bonds market data files"

  - id: exchange_operations
    name: "Exchange Operations"
    type: system
    description: "Exchange dissemination system that generates and delivers EOD bonds files"

  - id: account_manager
    name: "Account Manager"
    type: human
    description: "Market Data team member who manages subscriber onboarding and data agreements"

fields:
  # ── Common MTM Report Fields (applies to MTM Detailed, MTM T+1, MTM Value Today, UTMTM, UTMTM+1, UTMTM Value Today) ──
  - name: trade_date
    type: date
    required: true
    # Report relevance date
  - name: settlement_date
    type: date
    required: true
    # Date for which all instruments are valued (T+0, T+1, or T+3 depending on report)
  - name: bond_code
    type: text
    required: true
    # Short code for each listed instrument (e.g. R186), max 20 chars
  - name: isin_code
    type: text
    required: true
    # Unique ISIN for each listed instrument (ZAG prefix for bonds)
  - name: maturity
    type: date
    required: true
    # Date instrument will redeem
  - name: coupon
    type: number
    required: true
    # Interest rate payable by issuer to investors
  - name: companion_bond
    type: text
    required: false
    # Short code of liquid companion instrument for yield curve re-valuation
  - name: bp_spread
    type: number
    required: false
    # Basis-point spread above companion bond (credit component)
  - name: mtm
    type: number
    required: true
    # Marked-to-market yield of listed instrument
  - name: all_in_price
    type: number
    required: true
    # Price including interest, based on nominal of 100 bonds
  - name: clean_price
    type: number
    required: true
    # Price excluding interest, based on nominal of 100 bonds
  - name: accrued_interest
    type: number
    required: true
    # Interest due to buyer/seller (nominal of 100)
  - name: year_high_yield
    type: number
    required: false
  - name: year_low_yield
    type: number
    required: false
  - name: return_ytd
    type: number
    required: false
    # Basis point change since beginning of year
  - name: duration
    type: number
    required: false
    # Price volatility / interest rate sensitivity
  - name: modified_duration
    type: number
    required: false
  - name: delta
    type: number
    required: false
    # Ratio comparing change in instrument price
  - name: rand_per_basis_point
    type: number
    required: false
    # Rand value change on R1m bonds per 1bp yield move
  - name: convexity
    type: number
    required: false
  - name: yield_volatility
    type: number
    required: false
    # Reserved for future use (currently unpopulated)
  - name: yield_price_indicator
    type: text
    required: false
    # Indicates whether instrument is traded as price or yield
  - name: last_trade_date
    type: date
    required: false
  - name: last_mtm_change_date
    type: date
    required: false
  - name: index_ratio
    type: number
    required: false
    # Multiplicative factor for inflation-linked bond prices
  - name: base_cpi
    type: number
    required: false
    # CPI value at settlement date of issue
  - name: reference_cpi
    type: number
    required: false
    # CPI value at settlement date of trade
  - name: mtm_process_methodology
    type: text
    required: false
    # Methodology used to value the bond
  - name: mtm_change
    type: text
    required: false
    # Reason why MTM changed (currently empty in data)

  # ── Zero Curve Fields (Zeroes / Compact / Inputs worksheets) ──
  - name: curve_date
    type: date
    required: true
    # Date of curve dissemination run (CCYY/MM/DD)
  - name: period
    type: text
    required: false
    # Period from valuation date
  - name: bond_curve_nacc
    type: number
    required: false
    # Nominal Annual Compounded Continuously bond curve yields
  - name: swap_curve_nacc
    type: number
    required: false
    # NACC swap curve yields
  - name: real_curve_nacc
    type: number
    required: false
    # NACC real curve yields
  - name: nominal_swap_nacq
    type: number
    required: false
    # Nominal Annual Compounded Quarterly swap zero yields
  - name: nominal_bond_nacs
    type: number
    required: false
  - name: real_bond_nacs
    type: number
    required: false
  - name: curve_code
    type: text
    required: false
    # Code/name of bond/swap input
  - name: curve_mtm
    type: number
    required: false
    # MTM rate for curve input

  # ── BEASSA Yield Curve (MTM Detailed only) ──
  - name: time_to_maturity
    type: date
    required: false
  - name: yield_to_maturity
    type: number
    required: false

  # ── Trade Detail Report Fields ──
  - name: statistic_date
    type: date
    required: false
    # Date trade is aggregated into statistics
  - name: trade_time
    type: text
    required: false
    # Time matching criteria satisfied
  - name: instrument
    type: text
    required: false
    # Bond code for trade
  - name: yield
    type: number
    required: false
    # Yield at which trade was made (or price if price-traded)
  - name: nominal
    type: number
    required: false
    # Nominal amount (can be negative for backdated E&O)
  - name: consideration
    type: number
    required: false
    # ZAR value of trade (can be negative)
  - name: carry_rate
    type: number
    required: false
    # Underlying rate for Repo trades
  - name: trade_type
    type: select
    required: false
    # Standard Trade, Standard Trade (Spot), Repo 1, Repo 2, Structured Deal, FOV, Option Exercised, Other, Backdated E&O variants
  - name: buy_party
    type: select
    required: false
    # Foreign Client, Member, Local Client
  - name: sell_party
    type: select
    required: false
  - name: settlement
    type: date
    required: false
  - name: period_settlement
    type: text
    required: false
    # Settlement period (t+0, t+1, t+3)
  - name: spread
    type: number
    required: false
    # Traded spread value over companion bond YTM
  - name: trade_clean_price
    type: number
    required: false

  # ── Instrument Detail Report Fields ──
  - name: deals
    type: number
    required: false
    # Number of trades (can be negative for backdated E&O)

  # ── Member/Client Position Report Fields ──
  - name: member_client
    type: select
    required: false
    # Foreign Client, Member, Local Client
  - name: party
    type: select
    required: false
    # Buy or Sell

rules:
  dissemination:
    - "MUST: Disseminate Zero Curve reports at 14:30, 15:30, and 17:30 SAST daily"
    - "MUST: Generate MTM reports at 17:30 (T+3, T+1, T+0) and UTMTM reports at 15:30"
    - "MUST: Publish Trade Detail and Instrument Detail reports at end of day"
    - "MUST: Exclude trades reported and cancelled on the same day from all reports"
    - "MUST: Include backdated trades reported on the day in all reports"
  formats:
    - "MUST: Provide all MTM reports in both XLS and CSV formats"
    - "MUST: Use comma delimiter for CSV files"
    - "MUST: Use fixed column counts per report (MTM Detailed = 26, UTMTM = 28, Trade Detail = 16)"
  identification:
    - "MUST: Use ISIN with ZAG prefix for all listed bonds"
    - "MUST: Use bond code as short identifier, max 20 chars"
  valuation:
    - "MUST: Calculate MTM yields for T+3, T+1, and T+0 settlement scenarios"
    - "MUST: Include BEASSA Yield Curve worksheet only in MTM Detailed report"
    - "SHOULD: Populate companion_bond for parallel yield curve shift calculations"
  access_control:
    - "MUST: Verify subscriber entitlement before file generation"
    - "MUST: Deliver files only via IDP FTP to provisioned subscribers"

errors:
  - code: BONDS_SUBSCRIBER_NOT_PROVISIONED
    message: "Subscriber not provisioned for bonds market data products"
    status: 403
  - code: BONDS_FILE_GENERATION_FAILED
    message: "Failed to generate bonds EOD data file"
    status: 500
  - code: BONDS_DISSEMINATION_FAILED
    message: "Failed to disseminate bonds data file via FTP"
    status: 500
  - code: BONDS_INVALID_REPORT_DATE
    message: "Report date is invalid or report unavailable for requested date"
    status: 400

outcomes:
  generate_zero_curve_1430:
    priority: 1
    description: "Zero Curve report generated and disseminated at 14:30 daily"
    given:
      - "system time reaches 14:30 SAST"
      - "daily curve inputs are available"
    then:
      - action: create_record
        type: zero_curve_report
        description: "Build ZeroCurve<CCYYMMDD>.xls with Zeroes, Compact, and Inputs worksheets"
      - action: call_service
        target: idp_ftp_dissemination
      - action: emit_event
        event: bonds.zero_curve.1430.disseminated

  generate_zero_curve_1530:
    priority: 2
    description: "Zero Curve report disseminated at 15:30 with updated inputs"
    given:
      - "system time reaches 15:30 SAST"
    then:
      - action: create_record
        type: zero_curve_report_1530
      - action: emit_event
        event: bonds.zero_curve.1530.disseminated

  generate_zero_curve_1730:
    priority: 3
    description: "Final Zero Curve report disseminated at 17:30"
    given:
      - "system time reaches 17:30 SAST"
    then:
      - action: create_record
        type: zero_curve_report_1730
      - action: emit_event
        event: bonds.zero_curve.1730.disseminated

  generate_zaronia_zero_curve:
    priority: 4
    description: "ZARONIA Zero Curve (Zaronia Swap Curve) disseminated 3 times daily"
    given:
      - "system time reaches 14:30, 15:30, or 17:30 SAST"
    then:
      - action: create_record
        type: zaronia_zero_curve
      - action: emit_event
        event: bonds.zaronia_curve.disseminated

  generate_mtm_detailed_1730:
    priority: 5
    description: "MTM Detailed report (T+3 settlement) disseminated at 17:30"
    given:
      - "system time reaches 17:30 SAST"
      - "all trades for the day have been processed"
    then:
      - action: create_record
        type: mtm_detailed_report
        description: "MTMDetailed<CCYYMMDD>.xls with MTM sheet (26 cols) and BEASSA Yield Curve sheet"
      - action: create_record
        type: mtm_detailed_csv
      - action: emit_event
        event: bonds.mtm_detailed.disseminated

  generate_mtm_t1_1730:
    priority: 6
    description: "MTM T+1 report (T+1 settlement valuations) disseminated at 17:30"
    given:
      - "system time reaches 17:30 SAST"
    then:
      - action: create_record
        type: mtm_t1_report
      - action: emit_event
        event: bonds.mtm_t1.disseminated

  generate_mtm_value_today_1730:
    priority: 7
    description: "MTM Value Today report (T+0 settlement) disseminated at 17:30"
    given:
      - "system time reaches 17:30 SAST"
    then:
      - action: create_record
        type: mtm_value_today_report
      - action: emit_event
        event: bonds.mtm_value_today.disseminated

  generate_utmtm_reports_1530:
    priority: 8
    description: "UTMTM, UTMTM+1, and UTMTM Value Today reports (Unit Trust MTM, 15:00 data) disseminated at 15:30"
    given:
      - "system time reaches 15:30 SAST"
    then:
      - action: create_record
        type: utmtm_reports
        description: "Three Unit Trust MTM reports for T+3, T+1, T+0 settlement"
      - action: emit_event
        event: bonds.utmtm.disseminated

  generate_trade_detail_eod:
    priority: 9
    description: "Trade Detail report with all reported trades for the day"
    given:
      - "end of day batch triggered"
    then:
      - action: create_record
        type: trade_detail_report
        description: "TradeDetail_Daily<CCYYMMDD>.xls/.csv with 16 columns (excludes same-day cancelled trades)"
      - action: emit_event
        event: bonds.trade_detail.disseminated

  generate_instrument_detail_eod:
    priority: 10
    description: "Instrument Detail statistical report per trade type"
    given:
      - "end of day batch triggered"
    then:
      - action: create_record
        type: instrument_detail_report
        description: "InstrumentDetail_Daily<CCYYMMDD>.xls/.csv with turnover stats per trade type"
      - action: emit_event
        event: bonds.instrument_detail.disseminated

  generate_member_client_position_eod:
    priority: 11
    description: "Member/Client Position report with Buy/Sell split per member/local/foreign"
    given:
      - "end of day batch triggered"
    then:
      - action: create_record
        type: member_client_position_report
      - action: emit_event
        event: bonds.member_client_position.disseminated

  ftp_dissemination_failure:
    priority: 12
    error: BONDS_DISSEMINATION_FAILED
    description: "FTP dissemination to IDP fails"
    given:
      - "any bonds EOD file generation succeeds"
      - field: ftp_transfer_status
        source: system
        operator: eq
        value: "failed"
    then:
      - action: notify
        channel: operations
        target: exchange_operations
      - action: emit_event
        event: bonds.dissemination.failed

  subscriber_not_provisioned:
    priority: 13
    error: BONDS_SUBSCRIBER_NOT_PROVISIONED
    description: "Subscriber attempts to retrieve file without entitlement"
    given:
      - field: subscriber_entitled
        source: db
        operator: eq
        value: false
    then:
      - action: emit_event
        event: bonds.access_denied


# ─── AGI READINESS ─────────────────────────────────────────

agi:
  # --- AGI READINESS (auto-generated by propagate-agi.js) ---

  goals:
    - id: reliable_bonds_eod_data_delivery
      description: End-of-day bonds market data delivery via FTP — CSV/XLS formats covering zero curves, MTM valuations, trade
        detail, instrument statistics, member/client position, and non-resident trading reports
      success_metrics:
        - metric: policy_violation_rate
          target: 0%
          measurement: Operations that violate defined policies
        - metric: audit_completeness
          target: 100%
          measurement: All decisions have complete audit trails
      constraints:
        - type: regulatory
          description: All operations must be auditable and traceable
          negotiable: false
  autonomy:
    level: supervised
    human_checkpoints:
      - before making irreversible changes
    escalation_triggers:
      - error_rate > 5
      - consecutive_failures > 3
  safety:
    action_permissions:
      - action: generate_zero_curve_1430
        permission: autonomous
      - action: generate_zero_curve_1530
        permission: autonomous
      - action: generate_zero_curve_1730
        permission: autonomous
      - action: generate_zaronia_zero_curve
        permission: autonomous
      - action: generate_mtm_detailed_1730
        permission: autonomous
      - action: generate_mtm_t1_1730
        permission: autonomous
      - action: generate_mtm_value_today_1730
        permission: autonomous
      - action: generate_utmtm_reports_1530
        permission: autonomous
      - action: generate_trade_detail_eod
        permission: autonomous
      - action: generate_instrument_detail_eod
        permission: autonomous
      - action: generate_member_client_position_eod
        permission: autonomous
      - action: ftp_dissemination_failure
        permission: autonomous
      - action: subscriber_not_provisioned
        permission: autonomous
  tradeoffs:
    - prefer: accuracy
      over: latency
      reason: trading operations require precise execution and full audit trails
  verification:
    invariants:
      - error messages never expose internal system details

extensions:
  delivery_products:
    # All products disseminated daily via IDP FTP server
    zero_curves:
      - name: "Zero Curve 14:30"
        filename: "ZeroCurve<CCYYMMDD>.xls / ZeroCurveCompact<CCYYMMDD>.csv"
        time: "14:30 SAST"
        worksheets: [Zeroes, Compact, Inputs]
      - name: "Zero Curve 15:30"
        filename: "ZeroCurve<CCYYMMDD>.xls"
        time: "15:30 SAST"
      - name: "Zero Curve 17:30"
        filename: "ZeroCurve<CCYYMMDD>.xls"
        time: "17:30 SAST"
    zaronia_curves:
      - name: "ZARONIA Zero Curve"
        times: ["14:30", "15:30", "17:30"]
        description: "Zaronia Swap Curve (Overnight + OIS Swaps weekly/monthly/yearly)"
    mtm_reports_t3:
      - name: "MTM Detailed"
        filename: "MTMDetailed<CCYYMMDD>.xls / MTMDetail<CCYYMMDD>.csv"
        time: "17:30"
        columns: 26
        settlement: "T+3"
        worksheets: [MTM, BEASSA_Yield_Curve]
    mtm_reports_t1:
      - name: "MTM T+1"
        filename: "MTMT1<CCYYMMDD>.xls/.csv"
        time: "17:30"
        settlement: "T+1"
    mtm_reports_t0:
      - name: "MTM Value Today"
        filename: "MTMValueToday<CCYYMMDD>.xls/.csv"
        time: "17:30"
        settlement: "T+0"
    utmtm_reports:
      - name: "UTMTM"
        filename: "UTMTM<CCYYMMDD>.xls/.csv"
        time: "15:30"
        settlement: "T+3"
        description: "Unit Trust MTM based on 15:00 data"
      - name: "UTMTM + 1"
        time: "15:30"
        settlement: "T+1"
      - name: "UTMTM Value Today"
        time: "15:30"
        settlement: "T+0"
    turnover_reports:
      - name: "Trade Detail"
        filename: "TradeDetail_Daily<CCYYMMDD>.xls/.csv"
        columns: 16
        frequency: "Daily, Weekly, Monthly, YTD"
      - name: "Instrument Detail"
        filename: "InstrumentDetail_Daily<CCYYMMDD>.xls/.csv"
        frequency: "Daily, Weekly, Monthly, YTD"
      - name: "Member/Client Position"
        worksheets: [Member_Client_Overall, Member_Client_Instruments]
        frequency: "Daily, Weekly, Monthly, YTD"
      - name: "Non-Resident Trading"
        description: "Foreign vs local client trading report"
  trade_types:
    - "Standard Trade"
    - "Standard Trade (Spot)"
    - "Repo 1"
    - "Repo 2"
    - "Structured Deal (SD)"
    - "Free of Value (FOV)"
    - "Option Exercised (OX)"
    - "Other"
    - "Backdated E&O (Standard Trade)"
    - "Backdated E&O (Standard Trade-Spot)"
    - "Backdated E&O (Repo1 or Repo2)"
    - "Backdated E&O (FOV)"
    - "Backdated E&O (Structured deal)"
    - "Backdated E&O (OX)"
  party_types:
    - "Foreign Client"
    - "Member"
    - "Local Client"
  file_formats:
    - XLS
    - CSV
  delivery_channel: "IDP FTP (Information Delivery Portal)"

related:
  - feature: bonds-reference-corporate-actions-eod-data-delivery
    type: recommended
  - feature: bond-etp-eod-data-delivery
    type: recommended
  - feature: equities-eod-data-delivery
    type: optional
