        from: portfolio-expected-return
        fallback: fail
      - capability: portfolio_variance_covariance
        from: portfolio-variance-covariance
        fallback: fail

extensions:
  worked_example:
    # Source: Vol 1, Module 5, p.173-174 — three-portfolio Roy example
    threshold_return: 0.02
    portfolios:
      - {id: A, expected_return: 0.12, std_dev: 0.15, sfratio: 0.667}
      - {id: B, expected_return: 0.14, std_dev: 0.16, sfratio: 0.750}
      - {id: C, expected_return: 0.16, std_dev: 0.20, sfratio: 0.700}
    selected: B
    interpretation: "Highest SFRatio → lowest probability of falling below the 2% threshold"
  sharpe_relationship:
    when_threshold_equals_rf: "SFRatio reduces to Sharpe ratio"
    example: "R_L = 0.03 = R_f → SFRatio_A = (0.12-0.03)/0.15 = 0.60 = Sharpe_A"

related:
  - feature: portfolio-expected-return
    type: required
  - feature: portfolio-variance-covariance
    type: required
  - feature: target-downside-deviation
    type: recommended
  - feature: measures-of-dispersion
    type: recommended
