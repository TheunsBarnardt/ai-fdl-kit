# ============================================================
# industry-competitive-analysis — Feature Blueprint
# Source: CFA LV1 2025 Vol 05 — Module 6, Industry & Competitive Analysis
# ============================================================

feature: industry-competitive-analysis
version: "1.0.0"
description: Classify industry structure, apply Porter's five forces, assess external PEST influences, and characterise competitive positioning along cost and differentiation axes
category: trading
tags: [equity, industry-analysis, porter-five-forces, competitive-positioning, pest, cfa-level-1]
aliases:
  - industry-classification
  - porter-five-forces
  - competitive-positioning
  - pest-analysis
  - industry-lifecycle
  - market-share-trends

actors:
  - id: industry_analyst
    name: Industry & Competitive Analyst
    type: system

fields:
  - name: industry_id
    type: text
    required: true
    label: Industry identifier or classification code
  - name: classification_scheme
    type: select
    required: false
    label: gics | icb | naics | sic | custom
  - name: lifecycle_stage
    type: select
    required: false
    label: embryonic | growth | shakeout | mature | declining
  - name: concentration
    type: select
    required: false
    label: fragmented | concentrated | monopolistic | oligopolistic

rules:
  classification_schemes:
    gics: "Global Industry Classification Standard (MSCI / S&P)"
    icb: "Industry Classification Benchmark (FTSE)"
    naics: "North American Industry Classification"
    sic: "Legacy Standard Industrial Classification"
    custom: "Analyst-defined peer groups"
  lifecycle_stages:
    embryonic: "Slow growth, high prices, high risk"
    growth: "Rapid demand, low competition, expanding margins"
    shakeout: "Slowing growth, intensifying rivalry"
    mature: "Slow growth, high consolidation"
    declining: "Negative growth, overcapacity"
  porter_five_forces:
    rivalry: "Concentration, growth rate, fixed costs, exit barriers"
    new_entrants: "Barriers — scale, capital, regulation, brand"
    substitutes: "Price-performance of alternatives"
    supplier_power: "Concentration, switching costs, forward integration"
    buyer_power: "Concentration, price sensitivity, backward integration"
  external_influences_pest:
    political: "Government stability, taxation, trade policy"
    economic: "Growth, inflation, rates, currency"
    social: "Demographics, preferences, education"
    technological: "Innovation cycles, productivity gains"
  competitive_positioning:
    cost_leadership: "Scale, process efficiency, low prices"
    differentiation: "Brand, quality, service, innovation"
    focus: "Niche segments where broader players under-serve"
  validation:
    industry_required: "industry_id present"

outcomes:
  analyze_industry:
    priority: 1
    description: Produce an industry structure and positioning profile
    given:
      - field: industry_id
        source: input
        operator: exists
    then:
      - action: call_service
        target: industry_analyst
      - action: emit_event
        event: industry.analyzed
  missing_industry:
    priority: 10
    description: Industry identifier missing
    given:
      - field: industry_id
        source: input
        operator: not_exists
    then:
      - action: emit_event
        event: industry.analysis_rejected
    error: IND_MISSING_ID

errors:
  - code: IND_MISSING_ID
    status: 400
    message: industry_id is required

events:
  - name: industry.analyzed
    payload: [analysis_id, industry_id, lifecycle_stage, concentration, forces_score]
  - name: industry.analysis_rejected
    payload: [analysis_id, reason_code]

anti_patterns:
  - rule: Do not rely solely on third-party industry classifications
    why: "GICS/ICB groupings mix diverse business models; build custom peer groups for valuation work"
  - rule: Do not ignore substitutes from adjacent categories
    why: "Substitutes often originate outside the industry boundary — e.g., video conferencing substituting business travel"
  - rule: Do not treat five-forces scores as static
    why: "Technology and regulation shift forces quickly; refresh analysis each cycle"

api:
  http:
    method: POST
    path: /industry/analyze
  request:
    schema:
      industry_id: string
      classification_scheme: string
      lifecycle_stage: string
      concentration: string
  response:
    success:
      status: 200
      schema:
        analysis_id: string
        forces: object
        positioning: string
    errors:
      - status: 400
        error_code: IND_MISSING_ID

related:
  - feature: company-business-model-analysis
    type: required
  - feature: company-forecasting-model
    type: recommended
