feature: driver-assignment-dispatch
version: 1.0.0
description: Assign a driver to an order and dispatch the order to that driver, supporting both manual assignment and proximity-based adhoc dispatch.
category: workflow
tags:
  - dispatch
  - driver-assignment
  - adhoc
  - fleet-ops
  - fleet
  - vehicle
actors:
  - id: dispatcher
    name: Dispatcher
    type: human
    description: Operator or system that assigns drivers to orders.
  - id: driver
    name: Driver
    type: human
    description: The driver receiving the dispatched order.
  - id: platform
    name: Platform
    type: system
    description: Automated dispatch and matching system.
fields:
  - name: order_id
    type: text
    required: true
    label: Identifier of the order to dispatch.
  - name: driver_id
    type: text
    required: false
    label: Public identifier of the driver to assign (omit for adhoc mode).
  - name: adhoc
    type: boolean
    required: false
    label: If true, order is broadcast to nearby drivers; first to accept is assigned.
  - name: adhoc_distance
    type: number
    required: false
    label: Radius in meters within which nearby drivers are pinged for adhoc orders.
  - name: dispatch_immediately
    type: boolean
    required: false
    label: Whether to dispatch the order immediately after assignment.
  - name: dispatched
    type: boolean
    required: false
    label: Whether the order has been successfully dispatched.
  - name: dispatched_at
    type: datetime
    required: false
    label: Timestamp of dispatch.
  - name: vehicle_id
    type: text
    required: false
    label: Vehicle assigned to the driver for this order.
  - name: driver_response
    type: select
    required: false
    label: Driver response to dispatch (accepted, rejected).
  - name: driver_response_at
    type: datetime
    required: false
    label: Timestamp when driver responded.
  - name: notes
    type: text
    required: false
    label: Dispatcher notes for this assignment.
  - name: status
    type: select
    required: true
    label: Current dispatch status.

states:
  field: status
  values:
    - name: pending_assignment
      label: Pending Assignment
      initial: true
    - name: assigned
      label: Assigned
    - name: dispatched
      label: Dispatched
    - name: accepted
      label: Accepted
    - name: rejected
      label: Rejected
      terminal: true
    - name: reassigned
      label: Reassigned
  transitions:
    - from: pending_assignment
      to: assigned
      actor: dispatcher
      description: Driver and vehicle manually assigned by dispatcher
    - from: pending_assignment
      to: assigned
      actor: platform
      description: System auto-assigns nearest available driver
    - from: assigned
      to: dispatched
      actor: dispatcher
      description: Order dispatched to assigned driver
    - from: dispatched
      to: accepted
      actor: driver
      description: Driver accepts the dispatch
    - from: dispatched
      to: rejected
      actor: driver
      description: Driver rejects the dispatch
    - from: rejected
      to: reassigned
      actor: dispatcher
      description: Dispatcher assigns a different driver

rules:
  rule_01: A driver can only be assigned to one active order at a time (current_job).
  rule_02: Assigning a driver does not automatically dispatch; dispatch is a separate explicit action.
  rule_03: In adhoc mode, the order is broadcast to all available drivers within adhoc_distance; the first driver to accept is assigned.
  rule_04: A dispatched order cannot be dispatched a second time.
  rule_05: If no driver is assigned and adhoc is false, dispatch fails with ORDER_NO_DRIVER_ASSIGNED.
  rule_06: When a driver is assigned, the driver receives a push notification with order details.
  rule_07: Vehicle assignment is exclusive; a vehicle can only be active for one driver at a time.
  rule_08: Driver must have status 'available' (online, not on an active order) to be assigned.
  rule_09: Vehicle must be operational and not already assigned to another active order.
  rule_10: System should suggest the nearest available driver based on current GPS position.
  rule_11: If a driver rejects a dispatch the order returns to the queue for reassignment.
  rule_12: Dispatcher can override system suggestions and manually select any available driver.
  rule_13: Driver acceptance or rejection must be timestamped for SLA tracking.
outcomes:
  driver_manually_assigned:
    priority: 1
    given:
      - dispatcher provides a valid driver_id
      - driver is available (not on another active order)
    then:
      - action: set_field
        target: driver_assigned
        description: Order record is updated with the assigned driver reference.
      - action: emit_event
        event: order.driver_assigned
        payload:
          - order_id
          - driver_id
      - action: notify
        target: driver
        channel: push
        description: Driver receives push notification informing them of the new order assignment.
    result: Driver is linked to the order and notified. Order is ready to dispatch.
  adhoc_ping_sent:
    priority: 2
    given:
      - adhoc is true
      - no driver is pre-assigned
      - order is dispatched
    then:
      - action: emit_event
        event: order.dispatched
        payload:
          - order_id
          - adhoc
          - adhoc_distance
      - action: notify
        target: nearby_drivers
        channel: push
        description: All available drivers within adhoc_distance are pinged with the order details.
    result: Nearby drivers receive a ping and can accept or reject the order.
  order_dispatched:
    priority: 3
    given:
      - driver is assigned OR adhoc is true
      - order has not been dispatched already
    then:
      - action: set_field
        target: dispatched
        value: true
      - action: set_field
        target: dispatched_at
        value: now
      - action: transition_state
        field: status
        from: created
        to: dispatched
      - action: emit_event
        event: order.dispatched
        payload:
          - order_id
          - driver_id
          - dispatched_at
    result: Order is live; driver begins navigating to pickup.
  driver_assigned_at_adhoc_accept:
    priority: 4
    given:
      - order is in adhoc mode
      - a driver accepts the order ping
      - no other driver has already accepted
    then:
      - action: set_field
        target: driver_assigned
        description: First-responding driver is locked to the order.
      - action: set_field
        target: current_job
        description: Order is set as the driver's current active job.
      - action: emit_event
        event: order.driver_assigned
        payload:
          - order_id
          - driver_id
    result: Driver is assigned; order proceeds with this driver.
  driver_accepted:
    priority: 5
    given:
      - field: driver_response
        source: input
        operator: eq
        value: accepted
    then:
      - action: set_field
        target: status
        value: accepted
      - action: set_field
        target: driver_response_at
        value: now
      - action: emit_event
        event: dispatch.accepted
        payload:
          - order_id
          - driver_id
    result: Driver accepted; order is en route.
  driver_rejected:
    priority: 6
    error: DISPATCH_DRIVER_REJECTED
    given:
      - field: driver_response
        source: input
        operator: eq
        value: rejected
    then:
      - action: set_field
        target: status
        value: rejected
      - action: set_field
        target: driver_response_at
        value: now
      - action: emit_event
        event: dispatch.rejected
        payload:
          - order_id
          - driver_id
    result: Driver rejected; order returned to dispatch queue for reassignment.
  dispatch_failed_no_driver:
    priority: 7
    error: ORDER_NO_DRIVER_ASSIGNED
    given:
      - adhoc is false
      - no driver_id is provided
    then:
      - action: emit_event
        event: order.dispatch_failed
        payload:
          - order_id
          - reason
    result: Dispatch is rejected; operator must assign a driver first.
errors:
  - code: ORDER_NO_DRIVER_ASSIGNED
    status: 400
    message: No driver assigned to dispatch.
  - code: ORDER_ALREADY_DISPATCHED
    status: 400
    message: This order has already been dispatched.
  - code: DRIVER_NOT_FOUND
    status: 404
    message: The specified driver could not be found.
  - code: DISPATCH_DRIVER_REJECTED
    status: 422
    message: The driver declined this order.
  - code: DISPATCH_VEHICLE_UNAVAILABLE
    status: 422
    message: The selected vehicle is not available for dispatch.
events:
  - name: order.driver_assigned
    description: Fired when a driver is linked to an order.
    payload:
      - order_id
      - driver_id
      - assigned_at
  - name: order.dispatched
    description: Fired when an order is dispatched (to a specific driver or broadcast in adhoc mode).
    payload:
      - order_id
      - driver_id
      - adhoc
      - dispatched_at
  - name: order.dispatch_failed
    description: Fired when dispatch cannot be completed.
    payload:
      - order_id
      - reason
  - name: dispatch.accepted
    description: Fired when driver accepts the dispatch.
    payload:
      - order_id
      - driver_id
      - driver_response_at
  - name: dispatch.rejected
    description: Fired when driver rejects the dispatch.
    payload:
      - order_id
      - driver_id
      - driver_response_at
  - name: dispatch.reassigned
    description: Fired when order is reassigned to a different driver after rejection.
    payload:
      - order_id
      - new_driver_id
      - previous_driver_id
related:
  - feature: ride-request-lifecycle
    type: required
    reason: Dispatch is a key state transition in the ride lifecycle.
  - feature: driver-app-flow
    type: required
    reason: Driver app handles the ping, accept, and reject interaction.
  - feature: driver-shift-management
    type: recommended
    reason: Only online/on-shift drivers should receive pings.
  - feature: fleet-vehicle-registry
    type: optional
    reason: Vehicle assignment is validated as part of driver dispatch readiness.
  - feature: driver-profile
    type: required
    reason: Driver availability and status comes from driver profile.
  - feature: realtime-driver-tracking
    type: recommended
    reason: Driver location used for nearest-driver auto-assignment and adhoc radius.

