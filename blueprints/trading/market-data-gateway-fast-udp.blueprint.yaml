feature: market-data-gateway-fast-udp
version: 1.0.0
description: Real-time market data via FAST UDP multicast with TCP recovery and replay channels.
category: trading

fields:
  - name: instrument_id
    type: text
    required: true
    label: Security ID

rules:
  delivery:
    multicast: "Real-time UDP multicast feeds A and B"
    recovery: "TCP recovery channel for trade history and snapshots"
    replay: "TCP replay channel for message recovery"

outcomes:
  logon_successful:
    priority: 1
    description: "Client successfully authenticates"
    given:
      - field: credentials_valid
        source: request
        operator: eq
        value: true
    then:
      - action: emit_event
        event: session.established
        payload: [user_id]
    result: "Session active"

  market_data_published:
    priority: 2
    description: "Market data updates published"
    given:
      - field: data_available
        source: system
        operator: eq
        value: true
    then:
      - action: emit_event
        event: market.data_published
        payload: [security_id]
    result: "Data disseminated"

errors:
  - code: AUTH_FAILED
    status: 401
    message: "Authentication failed"
  - code: SESSION_ERROR
    status: 500
    message: "Session error"

events:
  - name: session.established
    payload: [user_id]
  - name: market.data_published
    payload: [security_id]

actors:
  - id: client
    name: Client
    type: human
    description: "Market data subscriber"

related:
  - feature: market-data-feed-fast-udp
    type: extends
    reason: Inherits shared FAST UDP multicast and TCP recovery/replay specification


# ─── AGI READINESS ─────────────────────────────────────────

agi:
  # --- AGI READINESS (auto-generated by propagate-agi.js) ---

  goals:
    - id: reliable_market_data_gateway_fast_udp
      description: Real-time market data via FAST UDP multicast with TCP recovery and replay channels.
      success_metrics:
        - metric: policy_violation_rate
          target: 0%
          measurement: Operations that violate defined policies
        - metric: audit_completeness
          target: 100%
          measurement: All decisions have complete audit trails
      constraints:
        - type: regulatory
          description: All operations must be auditable and traceable
          negotiable: false
  autonomy:
    level: supervised
    human_checkpoints:
      - before making irreversible changes
    escalation_triggers:
      - error_rate > 5
      - consecutive_failures > 3
  safety:
    action_permissions:
      - action: logon_successful
        permission: autonomous
      - action: market_data_published
        permission: autonomous
  tradeoffs:
    - prefer: accuracy
      over: latency
      reason: trading operations require precise execution and full audit trails
  verification:
    invariants:
      - error messages never expose internal system details
