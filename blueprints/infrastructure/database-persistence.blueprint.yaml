# ============================================================
# Database Persistence (RDB + AOF) — Portable Feature Blueprint
# FDL v0.1.0 | Blueprint v1.0.0
# ============================================================
# Extracted from: https://github.com/redis/redis
# Source project: Redis (C, in-memory data structure store)
# Files traced: rdb.c, aof.c
# ============================================================

feature: database-persistence
version: 1.0.0
description: Data durability via RDB snapshots and/or AOF journaling; recover to point-in-time or exact command sequence after crash
category: infrastructure
tags:
  - persistence
  - durability
  - rdb-snapshots
  - aof-journal
  - crash-recovery
  - backup
actors:
  - id: database
    name: Database
    type: system
    description: Redis server persisting data
  - id: persistence_engine
    name: Persistence Engine
    type: system
    description: Background save/rewrite processes
  - id: storage
    name: Storage
    type: system
    description: Disk or filesystem for persisted data
fields:
  # Which persistence strategies enabled
  - name: persistence_mode
    type: select
    options:
      - value: rdb_only
        label: RDB Only
      - value: aof_only
        label: AOF Only
      - value: rdb_and_aof
        label: RDB and AOF
    required: false
    label: Persistence Mode
  # RDB snapshot file path and size
  - name: rdb_file
    type: text
    required: false
    label: Rdb File
  # AOF journal file path and size
  - name: aof_file
    type: text
    required: false
    label: Aof File
  # Unix timestamp of last successful save
  - name: last_save_time
    type: number
    required: false
    label: Last Save Time
  # AOF fsync frequency
  - name: fsync_policy
    type: select
    options:
      - value: always
        label: Always
      - value: everysec
        label: Every Second
      - value: no
        label: No (OS decides)
    required: false
    label: Fsync Policy
  # Point to recover to (RDB time, AOF offset, or exact command)
  - name: recovery_point
    type: text
    required: false
    label: Recovery Point
rules:
  general:
    - RDB snapshots are point-in-time; commands after snapshot are lost on crash
    - AOF journaling logs every write command; replaying recovers to exact state before crash
    - RDB snapshots smaller but slower to load; AOF larger but can replay incrementally
    - Fsync policy determines durability vs. performance tradeoff (always=safe, no=fast)
    - RDB snapshot created via fork; uses copy-on-write to minimize memory overhead
    - AOF rewrite compacts journal into snapshot + recent commands (background process)
    - RDB + AOF together: fastest load (RDB) + maximum durability (AOF)
    - Persistence operations are transparent; do not block client commands (background)
    - Files are atomic; writes to temp files then renamed
states:
  field: rdb_save_state
  values:
    - name: idle
      initial: true
      description: No RDB save in progress
    - name: saving
      description: RDB save running (fork-based)
    - name: saved
      description: RDB snapshot written
    - name: save_failed
      description: Save failed (corrupt file, disk full, etc.)
outcomes:
  rdb_save_sync:
    priority: 10
    description: Block and save snapshot synchronously
    given:
      - SAVE command
    then:
      - action: transition_state
        field: rdb_save_state
        to: saving
      - action: emit_event
        event: rdb.save_started
        payload:
          - blocking_mode
    result: server blocks; snapshot written to disk; client receives OK
  rdb_bgsave:
    priority: 11
    description: Save snapshot in background
    given:
      - BGSAVE command
      - field: no_other_save_in_progress
        source: system
        operator: eq
        value: true
    then:
      - action: transition_state
        field: rdb_save_state
        to: saving
      - action: emit_event
        event: rdb.bgsave_started
        payload:
          - child_pid
    result: background process started; client receives OK immediately
  rdb_save_complete:
    priority: 12
    given:
      - field: rdb_save_succeeds
        source: system
        operator: eq
        value: true
    then:
      - action: set_field
        target: last_save_time
      - action: transition_state
        field: rdb_save_state
        to: saved
      - action: emit_event
        event: rdb.save_complete
        payload:
          - file_size
          - duration_ms
    result: snapshot available for recovery
  rdb_save_failed:
    priority: 13
    error: BGSAVE_FAILED
    given:
      - field: rdb_save_fails
        source: system
        operator: eq
        value: true
      # disk full, write error, fork failure, etc.
      - field: failure_reason
        source: system
        operator: exists
    then:
      - action: transition_state
        field: rdb_save_state
        to: save_failed
      - action: emit_event
        event: rdb.save_failed
        payload:
          - reason
          - error_code
    result: save aborted; existing snapshot unchanged; server continues
  rdb_lastsave:
    priority: 14
    description: Query last save time
    given:
      - LASTSAVE command
    then:
      - action: emit_event
        event: rdb.lastsave_queried
        payload:
          - timestamp
    result: Unix timestamp of last successful save (or 0 if never saved)
  aof_write_command:
    priority: 20
    description: Append command to journal
    given:
      - any write command (SET, DEL, LPUSH, etc.)
      - field: aof_enabled
        source: system
        operator: eq
        value: true
    then:
      - action: emit_event
        event: aof.command_logged
        payload:
          - command
          - serialized_length
    result: command written to AOF buffer (fsync per policy)
  aof_fsync_always:
    priority: 21
    description: Sync after every write
    given:
      - field: fsync_policy
        source: db
        operator: eq
        value: always
    then:
      - action: emit_event
        event: aof.fsync
        payload:
          - duration_ms
    result: AOF durability guaranteed; write latency increased
  aof_fsync_everysec:
    priority: 22
    description: Sync every 1 second
    given:
      - field: fsync_policy
        source: db
        operator: eq
        value: everysec
    then:
      - action: emit_event
        event: aof.periodic_fsync
        payload:
          - period_seconds
          - buffered_commands
    result: good balance of durability and performance
  aof_fsync_no:
    priority: 23
    description: OS decides when to sync
    given:
      - field: fsync_policy
        source: db
        operator: eq
        value: no
    then:
      - action: emit_event
        event: aof.os_fsync
        payload:
          - buffered_commands
    result: fastest but least durable; data loss possible on crash
  aof_rewrite:
    priority: 24
    description: Compact AOF by rewriting
    given:
      - BGREWRITEAOF command
      - field: no_rewrite_in_progress
        source: system
        operator: eq
        value: true
    then:
      - action: transition_state
        field: aof_rewrite_state
        to: rewriting
      - action: emit_event
        event: aof.rewrite_started
        payload:
          - child_pid
          - aof_size_before
    result: background rewrite process started
  aof_rewrite_complete:
    priority: 25
    given:
      - field: aof_rewrite_succeeds
        source: system
        operator: eq
        value: true
    then:
      - action: transition_state
        field: aof_rewrite_state
        to: rewritten
      - action: emit_event
        event: aof.rewrite_complete
        payload:
          - old_size
          - new_size
          - reduction_percent
          - duration_ms
    result: AOF compacted; future appends continue on new AOF
  aof_rewrite_failed:
    priority: 26
    error: BGREWRITEAOF_FAILED
    given:
      - field: aof_rewrite_fails
        source: system
        operator: exists
    then:
      - action: transition_state
        field: aof_rewrite_state
        to: rewrite_failed
      - action: emit_event
        event: aof.rewrite_failed
        payload:
          - reason
    result: rewrite aborted; old AOF continues
  recovery_rdb_only:
    priority: 30
    description: Recover from RDB snapshot
    given:
      - field: persistence_mode
        source: system
        operator: eq
        value: rdb_only
      - server startup
    then:
      - action: emit_event
        event: persistence.recovery_rdb
        payload:
          - snapshot_age_seconds
          - recovery_time_ms
    result: database loaded from RDB; commands after snapshot lost
  recovery_aof_only:
    priority: 31
    description: Recover from AOF by replaying
    given:
      - field: persistence_mode
        source: system
        operator: eq
        value: aof_only
    then:
      - action: emit_event
        event: persistence.recovery_aof
        payload:
          - commands_replayed
          - recovery_time_ms
          - aof_size
    result: database recovered to exact state before crash
  recovery_rdb_and_aof:
    priority: 32
    description: Recover RDB then replay AOF
    given:
      - field: persistence_mode
        source: system
        operator: eq
        value: rdb_and_aof
    then:
      - action: emit_event
        event: persistence.recovery_hybrid
        payload:
          - rdb_load_time
          - aof_replay_time
          - total_recovery_time
    result: fast load (RDB) with exact state (AOF replay)
  recovery_aof_truncated:
    priority: 33
    description: AOF has incomplete last command
    given:
      - field: aof_last_command_incomplete
        source: system
        operator: eq
        value: true
    then:
      - action: emit_event
        event: persistence.aof_truncated
        payload:
          - truncated_bytes
    result: incomplete command skipped; recovery continues with earlier commands
  recovery_aof_corruption:
    priority: 34
    error: CORRUPTED_AOF
    given:
      - field: aof_corrupted_mid_command
        source: system
        operator: eq
        value: true
    then:
      - action: emit_event
        event: persistence.aof_corrupt
        payload:
          - corrupted_offset
          - error_message
    result: admin must use redis-check-aof tool to fix; recovery manual
  backup_via_rdb:
    priority: 40
    description: Use RDB for backup
    given:
      - field: strategy
        source: system
        operator: eq
        value: snapshot-based
    then:
      - action: emit_event
        event: persistence.backup_rdb
        payload:
          - backup_time
          - file_size
          - disk_space_saved
    result: small backup files; fast restore; acceptable data loss window
  backup_via_replication:
    priority: 41
    description: Replica holds backup snapshots
    given:
      - field: strategy
        source: system
        operator: eq
        value: replica-based
    then:
      - action: emit_event
        event: persistence.backup_replica
        payload:
          - replica_count
          - replication_lag_seconds
    result: replicas take RDB snapshots while staying up-to-date
  backup_hybrid:
    priority: 42
    description: RDB + AOF for maximum safety
    given:
      - field: persistence_mode
        source: system
        operator: eq
        value: rdb_and_aof
    then:
      - action: emit_event
        event: persistence.backup_hybrid
        payload:
          - rdb_size
          - aof_size
          - total_disk_usage
    result: maximum durability; largest disk footprint
errors:
  - code: BGSAVE_FAILED
    message: Background save failed
    status: 500
  - code: BGREWRITEAOF_FAILED
    message: Background AOF rewrite failed
    status: 500
  - code: CORRUPTED_AOF
    message: The AOF file is corrupted
    status: 500
events:
  - name: rdb.save_started
    payload: []
  - name: rdb.bgsave_started
    payload: []
  - name: rdb.save_complete
    payload: []
  - name: rdb.save_failed
    payload: []
  - name: rdb.lastsave_queried
    payload: []
  - name: aof.command_logged
    payload: []
  - name: aof.fsync
    payload: []
  - name: aof.periodic_fsync
    payload: []
  - name: aof.os_fsync
    payload: []
  - name: aof.rewrite_started
    payload: []
  - name: aof.rewrite_complete
    payload: []
  - name: aof.rewrite_failed
    payload: []
  - name: persistence.recovery_rdb
    payload: []
  - name: persistence.recovery_aof
    payload: []
  - name: persistence.recovery_hybrid
    payload: []
  - name: persistence.aof_truncated
    payload: []
  - name: persistence.aof_corrupt
    payload: []
  - name: persistence.backup_rdb
    payload: []
  - name: persistence.backup_replica
    payload: []
  - name: persistence.backup_hybrid
    payload: []
related:
  - feature: master-replica-replication
    type: optional
    reason: Replicas can hold backup snapshots
  - feature: key-expiration
    type: optional
    reason: Expired keys may or may not be persisted
agi:
  goals:
    - id: reliable_database_persistence
      description: Data durability via RDB snapshots and/or AOF journaling; recover to point-in-time or exact command sequence after crash
      success_metrics:
        - metric: success_rate
          target: ">= 99%"
          measurement: Successful operations divided by total attempts
        - metric: error_rate
          target: < 1%
          measurement: Failed operations divided by total attempts
      constraints: []
  autonomy:
    level: supervised
    human_checkpoints:
      - before transitioning to a terminal state
    escalation_triggers:
      - error_rate > 5
      - consecutive_failures > 3
  safety:
    action_permissions:
      - action: rdb_save_sync
        permission: autonomous
      - action: rdb_bgsave
        permission: autonomous
      - action: rdb_save_complete
        permission: autonomous
      - action: rdb_save_failed
        permission: autonomous
      - action: rdb_lastsave
        permission: autonomous
      - action: aof_write_command
        permission: autonomous
      - action: aof_fsync_always
        permission: autonomous
      - action: aof_fsync_everysec
        permission: autonomous
      - action: aof_fsync_no
        permission: autonomous
      - action: aof_rewrite
        permission: autonomous
      - action: aof_rewrite_complete
        permission: autonomous
      - action: aof_rewrite_failed
        permission: autonomous
      - action: recovery_rdb_only
        permission: autonomous
      - action: recovery_aof_only
        permission: autonomous
      - action: recovery_rdb_and_aof
        permission: autonomous
      - action: recovery_aof_truncated
        permission: autonomous
      - action: recovery_aof_corruption
        permission: autonomous
      - action: backup_via_rdb
        permission: autonomous
      - action: backup_via_replication
        permission: autonomous
      - action: backup_hybrid
        permission: autonomous
  tradeoffs:
    - prefer: availability
      over: cost
      reason: infrastructure downtime impacts all dependent services
  verification:
    invariants:
      - error messages never expose internal system details
      - state transitions follow the defined state machine — no illegal transitions
extensions:
  source:
    repo: https://github.com/redis/redis
    project: Redis
    tech_stack: C
    files_traced: 2
    entry_points:
      - src/rdb.c
      - src/aof.c
