    given:
      - "Create vectors from components is requested"
    then:
      - action: transition_state
        field: status
        from: idle
        to: active
    result: "Create vectors from components completed"
    priority: 1
  normalization:
    given:
      - "Convert to unit vectors is requested"
    then:
      - action: transition_state
        field: status
        from: idle
        to: active
    result: "Convert to unit vectors completed"
    priority: 2
  length:
