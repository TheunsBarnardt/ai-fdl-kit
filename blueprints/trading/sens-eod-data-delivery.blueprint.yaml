# ============================================================
# SENS End-of-Day Announcements Delivery — Feature Blueprint
# FDL v0.1.0 | Blueprint v1.0.0
# ============================================================
# Extracted from: SENS End of Day Market Data Product
# Specifications v2.5
# XML NewsML-G2 dissemination of Stock Exchange News Service
# (SENS) announcements with two product variants:
#   - EOD SENS (ETNI) — plain-text announcements
#   - EOD SENS Plus (EPNI) — PDF announcements
# ============================================================

