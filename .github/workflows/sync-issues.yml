name: Sync backlog issues

on:
  push:
    branches: [master]
    paths:
      - "blueprints/**/*.blueprint.yaml"
      - "TODO.md"
      - "data/extraction-candidates.yaml"
      - "scripts/sync-github-issues.js"
      - "scripts/fitness-recommend.js"
      - "scripts/fitness.js"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci --no-audit --no-fund --ignore-scripts
      - name: Sync GitHub Issues from fitness + TODO.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sync-github-issues.js --apply
