extensions:
  worked_example:
    # Source: Vol 1, Module 3, p.114
    scenario: "EAA Equity Index daily returns"
    skewness: -0.54
    interpretation: "Negative skew — frequent small gains and occasional large losses (crash risk)"
  asset_class_typical_skew:
    - {asset: US equity daily, typical_skew: -0.5, note: crash risk}
    - {asset: US equity monthly, typical_skew: -0.3, note: less pronounced}
    - {asset: long OOTM calls, typical_skew: "+2.0", note: lottery-like payoff}
    - {asset: merger arbitrage, typical_skew: -1.5, note: deal-break risk}

related:
  - feature: measures-of-dispersion
    type: recommended
  - feature: kurtosis
    type: recommended
