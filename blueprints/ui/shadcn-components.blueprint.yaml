  tech_stack:
    language: TypeScript
    framework: React 19 + Next.js 16
    styling: Tailwind CSS v4
    primitives: Radix UI / Base UI
    build: Turborepo + pnpm
  components:
    count: 56
    list:
      - accordion
      - alert
      - alert-dialog
      - aspect-ratio
      - avatar
      - badge
      - breadcrumb
      - button
      - button-group
      - calendar
      - card
      - carousel
      - chart
      - checkbox
      - collapsible
      - combobox
      - command
      - context-menu
      - dialog
      - direction
      - drawer
      - dropdown-menu
      - empty
      - field
      - form
      - hover-card
      - input
      - input-group
      - input-otp
      - kbd
      - label
      - menubar
      - native-select
      - navigation-menu
      - pagination
      - popover
      - progress
      - radio-group
      - resizable
      - scroll-area
      - select
      - separator
      - sheet
      - sidebar
      - skeleton
      - slider
      - sonner
      - spinner
      - switch
      - table
      - tabs
      - textarea
      - toggle
      - toggle-group
      - tooltip
  design_styles:
    - vega
    - nova
    - lyra
    - maia
    - mira
    - luma
  component_bases:
    - radix
    - base

ui_hints:
  component_pattern: "Compound components with subcomponent exports (e.g., Dialog.Trigger, Dialog.Content)"
  styling_approach: "CVA variants + cn() utility + data-slot attributes + Tailwind CSS v4"
  form_library: "react-hook-form with Zod resolver"
  state_management: "React Context for compound components, Jotai atoms for global config"
