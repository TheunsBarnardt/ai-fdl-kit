feature: broker-securities-lending-collateral
version: 1.0.0
description: Back-office securities lending and borrowing (SLB) with cash and securities collateral, loan book, collateral interest, proprietary loans, and central-securities-depository movement via...
category: trading
tags:
  - back-office
  - broker
  - securities-lending
  - slb
  - collateral
  - loan-book
  - settlement
  - proprietary
aliases:
  - slb
  - scrip-lending
  - scrip-borrowing
  - securities-lending-borrowing
  - collateral-management
  - cash-collateral
  - securities-collateral
  - loan-book
  - slb-collateral
actors:
  - id: lender
    name: Securities Lender
    type: external
  - id: borrower
    name: Securities Borrower
    type: external
  - id: slb_operator
    name: SLB Back-Office Operator
    type: human
  - id: lending_desk
    name: Lending Desk
    type: human
  - id: settlement_authority
    name: Settlement Authority
    type: external
  - id: csd_participant
    name: Central Securities Depository Participant
    type: external
  - id: back_office_system
    name: Back-Office System
    type: system
  - id: settlement_messaging_gateway
    name: Settlement Messaging Gateway
    type: system
fields:
  - name: loan_reference
    type: text
    required: true
    label: Loan Reference
  - name: loan_type
    type: select
    required: true
    label: Loan Type
  - name: lender_account
    type: text
    required: true
    label: Lender Account
  - name: borrower_account
    type: text
    required: true
    label: Borrower Account
  - name: instrument_code
    type: text
    required: true
    label: Instrument Code
  - name: quantity
    type: number
    required: true
    label: Quantity
  - name: trade_date
    type: date
    required: true
    label: Trade Date
  - name: settlement_date
    type: date
    required: true
    label: Settlement Date
  - name: return_date
    type: date
    required: false
    label: Return Date
  - name: slb_rate
    type: number
    required: true
    label: SLB Rate
  - name: collateral_type
    type: select
    required: true
    label: Collateral Type
  - name: cash_collateral_amount
    type: number
    required: false
    label: Cash Collateral Amount
  - name: securities_collateral_code
    type: text
    required: false
    label: Securities Collateral Instrument Code
  - name: securities_collateral_quantity
    type: number
    required: false
    label: Securities Collateral Quantity
  - name: collateral_haircut_percent
    type: number
    required: false
    label: Collateral Haircut Percentage
  - name: interest_code
    type: text
    required: false
    label: Cash Collateral Interest Code
  - name: interest_rate
    type: number
    required: false
    label: Interest Rate
  - name: turn_rate
    type: number
    required: false
    label: Turn Rate
  - name: investment_type
    type: select
    required: false
    label: Investment Type
  - name: revaluation_price
    type: number
    required: false
    label: Revaluation Price
  - name: proprietary_flag
    type: boolean
    required: true
    label: Proprietary Loan Flag
  - name: controlled_client_flag
    type: boolean
    required: true
    label: Controlled Client Flag
  - name: counterparty_code
    type: text
    required: true
    label: Counterparty Code
  - name: message_requested
    type: boolean
    required: true
    label: Settlement Message Requested
  - name: message_reference
    type: text
    required: false
    label: Settlement Message Reference
  - name: loan_status
    type: select
    required: true
    label: Loan Status
states:
  field: loan_status
  values:
    - name: requested
      initial: true
    - name: pending_settlement
    - name: active
    - name: return_pending
    - name: returned
      terminal: true
    - name: cancelled
      terminal: true
  transitions:
    - from: requested
      to: pending_settlement
      actor: slb_operator
    - from: pending_settlement
      to: active
      actor: settlement_messaging_gateway
    - from: active
      to: return_pending
      actor: slb_operator
    - from: return_pending
      to: returned
      actor: settlement_messaging_gateway
    - from: requested
      to: cancelled
      actor: slb_operator
    - from: pending_settlement
      to: cancelled
      actor: slb_operator
rules:
  data_integrity:
    loan_uniqueness: Loan reference must be unique within broker firm and lending desk
    quantity_positive: Loan quantity must be greater than zero and in whole units
    collateral_required: Every loan must carry either cash or securities collateral, never neither
    referential_integrity: Instrument, lender, and borrower accounts must exist before loan capture
    revaluation_audit: Each loan revaluation retains the prior price, user, and timestamp for audit
  security:
    segregation_of_duties: Capture and confirmation are separate actions performed by different operators
    access_control: SLB screens controlled at screen level via resource access control facility
    message_authentication: Outgoing settlement messages must be signed by the settlement-messaging gateway
  compliance:
    proprietary_segregation: Proprietary loans are ring-fenced from client loans and reported separately
    controlled_client_rules: Controlled-client loans require internal collateral movement rather than external messaging
    loan_reporting: Open loans reported daily to settlement authority
    popia_counterparty_data: Counterparty natural-person data subject to POPIA lawful-basis and minimisation
  business:
    slb_rate_bounds: SLB rate must fall inside the broker's configured minimum and maximum range
    collateral_haircut: Securities collateral valued at market less the configured haircut percentage
    interest_accrual: Cash collateral accrues interest daily at the applicable interest-code rate
    turn_rate: Difference between borrow rate and lend rate is retained as the broker turn
    revaluation_required: Active loans must be revalued at least daily against latest close price
    return_symmetry: Loan return releases collateral in the same direction as original capture
    message_bulking: Multiple SLB or collateral messages may be bulked into a single settlement-messaging batch
errors:
  - code: SLB_DUPLICATE_REFERENCE
    status: 409
    message: Loan reference already exists
  - code: SLB_INVALID_RATE
    status: 400
    message: SLB rate outside permitted range
  - code: SLB_COLLATERAL_MISSING
    status: 422
    message: Loan must carry cash or securities collateral
  - code: SLB_MESSAGE_GENERATION_FAILED
    status: 503
    message: Settlement message could not be generated
  - code: SLB_NOT_ACTIVE
    status: 409
    message: Loan is not in an active state, return cannot be processed
  - code: SLB_INSUFFICIENT_COLLATERAL
    status: 422
    message: Collateral value below required coverage after revaluation
  - code: SLB_PROPRIETARY_FORBIDDEN
    status: 403
    message: Proprietary loan actions require proprietary trading role
  - code: SLB_RETURN_DATE_INVALID
    status: 400
    message: Return date must be on or after settlement date
events:
  - name: slb.loan.captured
    payload:
      - loan_reference
      - lender_account
      - borrower_account
      - instrument_code
      - quantity
      - captured_by
      - timestamp
  - name: slb.loan.confirmed
    payload:
      - loan_reference
      - confirmed_by
      - timestamp
  - name: slb.loan.activated
    payload:
      - loan_reference
      - settlement_date
      - timestamp
  - name: slb.loan.returned
    payload:
      - loan_reference
      - return_date
      - returned_by
      - timestamp
  - name: slb.loan.cancelled
    payload:
      - loan_reference
      - cancelled_by
      - reason
      - timestamp
  - name: slb.collateral.captured
    payload:
      - loan_reference
      - collateral_type
      - amount_or_quantity
      - captured_by
      - timestamp
  - name: slb.collateral.returned
    payload:
      - loan_reference
      - collateral_type
      - returned_by
      - timestamp
  - name: slb.collateral.topped_up
    payload:
      - loan_reference
      - top_up_amount
      - topped_up_by
      - timestamp
  - name: slb.collateral.interest_accrued
    payload:
      - loan_reference
      - accrual_date
      - interest_amount
  - name: slb.loan.revalued
    payload:
      - loan_reference
      - revaluation_price
      - prior_price
      - revalued_by
      - timestamp
  - name: slb.message.sent
    payload:
      - loan_reference
      - message_reference
      - direction
      - timestamp
  - name: slb.message.status_updated
    payload:
      - loan_reference
      - message_reference
      - status
      - timestamp
outcomes:
  capture_securities_loan:
    priority: 1
    description: Operator captures a new securities lending or borrowing loan with collateral
    given:
      - field: loan_type
        source: input
        operator: in
        value:
          - lending
          - borrowing
      - field: instrument_code
        source: input
        operator: exists
      - field: quantity
        source: input
        operator: gt
        value: 0
      - any:
          - field: cash_collateral_amount
            source: input
            operator: gt
            value: 0
          - field: securities_collateral_code
            source: input
            operator: exists
    then:
      - action: create_record
        type: slb_loan
      - action: set_field
        target: loan_status
        value: requested
      - action: emit_event
        event: slb.loan.captured
    transaction: true
  reject_loan_without_collateral:
    priority: 2
    error: SLB_COLLATERAL_MISSING
    description: Reject loan capture where neither cash nor securities collateral is supplied
    given:
      - field: cash_collateral_amount
        source: input
        operator: not_exists
      - field: securities_collateral_code
        source: input
        operator: not_exists
    then:
      - action: emit_event
        event: slb.loan.captured
  reject_duplicate_loan:
    priority: 3
    error: SLB_DUPLICATE_REFERENCE
    description: Prevent duplicate loan reference within broker firm
    given:
      - field: loan_reference
        source: db
        operator: exists
    then:
      - action: emit_event
        event: slb.loan.captured
  confirm_and_send_settlement_message:
    priority: 4
    description: Operator confirms loan and settlement message is generated via settlement-messaging gateway
    given:
      - field: loan_status
        source: db
        operator: eq
        value: requested
      - field: message_requested
        source: input
        operator: eq
        value: true
    then:
      - action: call_service
        target: settlement_messaging_gateway
      - action: transition_state
        field: loan_status
        from: requested
        to: pending_settlement
      - action: emit_event
        event: slb.message.sent
      - action: emit_event
        event: slb.loan.confirmed
    transaction: true
  activate_loan_on_settlement_intimation:
    priority: 5
    description: Incoming settlement confirmation from settlement-messaging gateway activates the loan automatically
    given:
      - field: loan_status
        source: db
        operator: eq
        value: pending_settlement
      - field: message_status
        source: input
        operator: eq
        value: settled
    then:
      - action: transition_state
        field: loan_status
        from: pending_settlement
        to: active
      - action: emit_event
        event: slb.loan.activated
  revalue_active_loan:
    priority: 6
    description: Daily revaluation of active loans against the latest close price
    given:
      - field: loan_status
        source: db
        operator: eq
        value: active
      - field: revaluation_price
        source: input
        operator: gt
        value: 0
    then:
      - action: set_field
        target: revaluation_price
        value: updated
      - action: emit_event
        event: slb.loan.revalued
    transaction: true
  top_up_cash_collateral:
    priority: 7
    description: Operator tops up cash collateral when revaluation shows shortfall
    given:
      - field: loan_status
        source: db
        operator: eq
        value: active
      - field: collateral_type
        source: db
        operator: eq
        value: cash
    then:
      - action: set_field
        target: cash_collateral_amount
        value: increased
      - action: emit_event
        event: slb.collateral.topped_up
  accrue_cash_collateral_interest:
    priority: 8
    description: Daily interest accrual on cash collateral balances at the applicable interest code
    given:
      - field: collateral_type
        source: db
        operator: eq
        value: cash
      - field: loan_status
        source: db
        operator: eq
        value: active
    then:
      - action: emit_event
        event: slb.collateral.interest_accrued
  return_loan_and_release_collateral:
    priority: 9
    description: Operator processes loan return and releases collateral symmetrically
    given:
      - field: loan_status
        source: db
        operator: eq
        value: active
      - field: return_date
        source: input
        operator: exists
    then:
      - action: transition_state
        field: loan_status
        from: active
        to: return_pending
      - action: call_service
        target: settlement_messaging_gateway
      - action: emit_event
        event: slb.loan.returned
      - action: emit_event
        event: slb.collateral.returned
    transaction: true
  reject_return_on_inactive_loan:
    priority: 10
    error: SLB_NOT_ACTIVE
    description: Prevent return processing on loans that are not active
    given:
      - field: loan_status
        source: db
        operator: neq
        value: active
    then:
      - action: emit_event
        event: slb.loan.returned
  enforce_proprietary_role:
    priority: 11
    error: SLB_PROPRIETARY_FORBIDDEN
    description: Only users with proprietary trading role may act on proprietary loans
    given:
      - field: proprietary_flag
        source: input
        operator: eq
        value: true
      - field: user_role
        source: session
        operator: neq
        value: proprietary_trader
    then:
      - action: emit_event
        event: slb.loan.captured
api:
  http:
    method: POST
    path: /api/v1/slb/loans
  request:
    schema:
      loan_type: select
      lender_account: text
      borrower_account: text
      instrument_code: text
      quantity: number
      slb_rate: number
      collateral_type: select
      cash_collateral_amount: number
      securities_collateral_code: text
      securities_collateral_quantity: number
      proprietary_flag: boolean
      message_requested: boolean
  response:
    success:
      status: 201
      schema:
        loan_reference: text
        loan_status: select
        message_reference: text
    errors:
      - error_code: SLB_DUPLICATE_REFERENCE
        status: 409
      - error_code: SLB_INVALID_RATE
        status: 400
      - error_code: SLB_COLLATERAL_MISSING
        status: 422
      - error_code: SLB_MESSAGE_GENERATION_FAILED
        status: 503
      - error_code: SLB_PROPRIETARY_FORBIDDEN
        status: 403
      - error_code: SLB_RETURN_DATE_INVALID
        status: 400
anti_patterns:
  - rule: Do not permit loan capture without either cash or securities collateral
    why: Uncollateralised loans expose the broker to full counterparty default loss and breach prudential rules
  - rule: Do not allow the same operator to capture and confirm a loan
    why: Segregation-of-duties is the primary control against internal fraud on high-value securities movements
  - rule: Do not co-mingle proprietary and client loan books
    why: Regulators require strict segregation, mixing books breaches client-asset protection rules
  - rule: Do not transmit settlement messages without gateway authentication
    why: Unsigned settlement messages can be replayed or forged to divert securities
  - rule: Do not accept revaluation prices from untrusted sources
    why: A manipulated revaluation price can hide an under-collateralised loan and delay margin calls
  - rule: Do not delete loans with active collateral or pending messages
    why: Orphaned collateral balances and in-flight messages create unreconcilable settlement breaks
related:
  - feature: broker-securities-lending-borrowing-upload
    type: recommended
  - feature: broker-client-account-maintenance
    type: required
  - feature: popia-compliance
    type: required
