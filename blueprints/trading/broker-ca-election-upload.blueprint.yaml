  goals:
    - id: reliable_broker_ca_election_upload
      description: Broker upload of client elections for voluntary corporate action events, validated against a frozen
        positions file before the election deadline.
      success_metrics:
        - metric: policy_violation_rate
          target: 0%
          measurement: Operations that violate defined policies
        - metric: audit_completeness
          target: 100%
          measurement: All decisions have complete audit trails
      constraints:
        - type: regulatory
          description: All operations must be auditable and traceable
          negotiable: false
  autonomy:
    level: supervised
    human_checkpoints:
      - before making irreversible changes
    escalation_triggers:
      - error_rate > 5
      - consecutive_failures > 3
  safety:
    action_permissions:
      - action: upload_election
        permission: autonomous
      - action: validate_against_frozen_file
        permission: autonomous
      - action: reject_past_deadline
        permission: supervised
      - action: reject_insufficient_holdings
        permission: supervised
      - action: apply_default_election
        permission: autonomous
      - action: ack_received
        permission: autonomous
  tradeoffs:
    - prefer: accuracy
      over: latency
      reason: trading operations require precise execution and full audit trails
  verification:
    invariants:
      - error messages never expose internal system details

extensions:
  cut_off:
    default_time: 11:00
    relative_to: election_date
    election_date_offset_days: -2
    extension_process: Broker contacts customer support to request an exceptional extension.
  default_option_rules:
    TU:
      T: Take up
      " ": Lapse
    SC:
      S: Scrip
      C: Cash
      " ": Default as configured on entitlement event
    OL:
      S: Sell
      B: Buy
      " ": Retain
    CD:
      " ": Reinvest
    RI:
      " ": Reinvest
