# ============================================================
# Broker Bond Member Setup — Feature Blueprint
# FDL v0.1.0 | Blueprint v1.0.0
# ============================================================
# Onboarding and configuration of a new bond-market member
# on the broker back-office system. Covers service-provider
# appointment, reference data setup, settlement account
# configuration, user access provisioning, capital-adequacy
# obligations, and activation for bond trade processing.
# ============================================================

feature: broker-bond-member-setup
version: 1.0.0
description: Onboarding and configuration of a new bond-market member on the broker back-office system including reference data, settlement accounts, user access, capital adequacy, and trade-processing enablement
category: trading
tags:
  - back-office
  - broker
  - bond-market
  - member-onboarding
  - settlement
  - reference-data
  - capital-adequacy
  - access-control

aliases:
  - bond-member-onboarding
  - bond-member-loading
  - bond-user-setup
  - bond-broker-registration
  - gilt-member-setup
  - bond-trading-authorization

actors:
  - id: customer_support_officer
    name: Customer Support Officer
    type: human
    description: Senior back-office staff responsible for loading bond member reference data
  - id: access_control_coordinator
    name: Access Control Coordinator
    type: human
    description: Provisions user IDs and screen-level access rights
  - id: surveillance_officer
    name: Surveillance Officer
    type: human
    description: Reviews capital-adequacy compliance before activation
  - id: bond_member
    name: Bond Member Firm
    type: external
    description: Applying member firm that has appointed the service provider
  - id: bond_exchange
    name: Bond Exchange
    type: external
    description: Bond market operator that approves membership
  - id: bond_code_registry
    name: Bond Code Registry
    type: external
    description: External registry that issues member identifier codes and settlement routing
  - id: back_office_system
    name: Back-Office System
    type: system

fields:
  - name: member_code
    type: text
    required: true
    label: Member Code
  - name: member_legal_name
    type: text
    required: true
    label: Member Legal Name
  - name: effective_date
    type: date
    required: true
    label: Effective Date
  - name: training_required
    type: boolean
    required: false
    label: Training Required
  - name: cs_officer
    type: text
    required: true
    label: Assigned Support Officer
  - name: super_user_id
    type: text
    required: true
    label: Super User ID
  - name: additional_user_id
    type: text
    required: false
    label: Additional User ID
  - name: registry_id
    type: text
    required: false
    label: Registry Participant ID
  - name: gilt_user_flag
    type: boolean
    required: true
    label: Gilt User Indicator
  - name: party_role
    type: select
    required: true
    label: Party Role
  - name: category
    type: select
    required: true
    label: Category
  - name: settlement_terms
    type: select
    required: true
    label: Settlement Terms
  - name: charge_type
    type: select
    required: true
    label: Charge Type
  - name: broker_user_flag
    type: boolean
    required: true
    label: Broker User Indicator
  - name: trading_type
    type: select
    required: true
    label: Trading Type
  - name: member_settlement_account
    type: text
    required: false
    label: Member Proprietary Settlement Account
  - name: resident_client_settlement_account
    type: text
    required: false
    label: Resident Client Settlement Account
  - name: non_resident_client_settlement_account
    type: text
    required: false
    label: Non-Resident Client Settlement Account
  - name: non_member_settled_clearing_account
    type: text
    required: false
    label: Non-Member Settled Clearing Account
  - name: default_settlement_account
    type: text
    required: false
    label: Default Settlement Account
  - name: settlement_agent_code
    type: text
    required: false
    label: Settlement Agent Code
  - name: funds_account_number
    type: text
    required: false
    label: Funds Account Number
  - name: funds_branch_number
    type: text
    required: false
    label: Funds Branch Number
  - name: scrip_account_number
    type: text
    required: false
    label: Scrip Account Number
  - name: scrip_branch_number
    type: text
    required: false
    label: Scrip Branch Number
  - name: country_code
    type: text
    required: true
    label: Country Code
  - name: client_type
    type: select
    required: false
    label: Client Type
  - name: capital_adequacy_confirmed
    type: boolean
    required: true
    label: Capital Adequacy Confirmed
  - name: member_status
    type: select
    required: true
    label: Member Status
  - name: service_provider_letter
    type: file
    required: true
    label: Service Provider Appointment Letter
  - name: membership_approval_reference
    type: text
    required: true
    label: Membership Approval Reference

states:
  field: member_status
  values:
    - name: applied
      initial: true
    - name: approved
    - name: active
    - name: suspended
    - name: deactivated
      terminal: true
  transitions:
    - from: applied
      to: approved
      actor: bond_exchange
      description: Exchange approves membership application
    - from: approved
      to: active
      actor: customer_support_officer
      description: All reference data, user access and settlement accounts loaded and verified
    - from: active
      to: suspended
      actor: surveillance_officer
      description: Capital-adequacy breach or compliance concern
    - from: suspended
      to: active
      actor: surveillance_officer
      description: Remediation confirmed
    - from: active
      to: deactivated
      actor: customer_support_officer

rules:
  eligibility:
    service_provider_appointment: "Member must have formally appointed the service provider in writing to the bond exchange before any loading begins"
    membership_approval_required: "Back-office loading may only commence after the bond exchange confirms membership approval and issues a member code"
    senior_operator_only: "Only a senior customer-support staff member may load the bond member on the back-office system"
  reference_data:
    broker_master_indicators: "Member master record must set gilt-user, party role, category, settlement terms, charge type and broker-user indicators at least one day before the live date"
    unique_member_code: "Member code must be unique within the back-office system"
    broker_master_first: "Broker master record must be updated before access-control provisioning will action the request"
  access_control:
    external_provisioning_first: "Bond code registry must provision the member on their side and issue a super-user credential before internal access-control can process the request"
    super_user_and_additional_ids: "Access-control coordinator creates a super-user ID and an additional user ID, with registry ID supplied to the bond code registry for trading-screen access"
    screen_level_access: "Super-user ID is granted access to the bond-market trading option at the screen level"
  settlement_accounts:
    proprietary_netting: "Member proprietary settlement account is the netting account for proprietary bond trades and must reconcile with the member's settlement agent"
    resident_client_netting: "Resident client settlement account nets market-leg entries for resident member-settled clients and must be linked to the settlement-details record"
    non_resident_client_netting: "Non-resident client settlement account nets market-leg entries for non-resident clients and must be linked once the registry code is received"
    default_account_routing: "If no settlement account is linked, trades default to the default settlement account and must be investigated"
    non_member_settled_clearing: "Non-member settled clearing account is a reverse-substitution account; settlement must not occur there and any settlement entries require investigation"
    no_automatic_bond_settlement: "There is no automatic market settlement for bond trades; the member must process cash-book entries and receipt or delivery of holdings manually"
  settlement_details:
    proprietary_registration: "Settlement-details registration request is triggered to the bond code registry which replies with verified settlement details that auto-populate the master record"
    registry_verification_required: "Settlement-details record must be verified by the bond code registry before the member can commence trading"
    resident_client_details: "Resident member-settled client settlement details are loaded with the local client type, country code ZA, and the resident settlement account"
    non_resident_client_details: "Non-resident member-settled client settlement details are loaded with the non-resident client type, generic foreign country code, and the non-resident settlement account"
  capital_adequacy:
    surveillance_briefing: "A meeting must be scheduled between the member and the surveillance department before activation so capital-adequacy requirements are formally communicated"
    capital_confirmation_before_activation: "Capital-adequacy confirmation from surveillance is a precondition to transitioning the member to active"
    ongoing_monitoring: "Non-resident client settlement account must be monitored daily; net positions are generated per stock on T+1"
  trade_processing:
    end_of_day_batch: "Trades flow from the registry into the back-office system as part of the start-of-day batch run"
    market_leg_auto_posted: "Market leg is automatically posted to the relevant settlement account based on the linked settlement details"
    controlled_accounts_manual: "Trades on controlled client accounts are captured manually on the deal-capture screen and allocated via the scrip-allocation screen"
  security:
    access_segregation: "Access-control provisioning is segregated from reference-data loading; neither role may perform the other"
    audit_trail_retention: "All onboarding steps, approvals, and reference-data changes are logged with user, timestamp and before/after values"
  compliance:
    popia: "Any personal information captured about authorised representatives of the member must comply with POPIA lawful-basis, minimisation and breach-notification requirements"

errors:
  - code: BOND_MEMBER_NOT_APPROVED
    status: 409
    message: Membership has not been approved by the bond exchange
  - code: BOND_MEMBER_SERVICE_PROVIDER_LETTER_MISSING
    status: 422
    message: Service provider appointment letter has not been recorded
  - code: BOND_MEMBER_DUPLICATE_CODE
    status: 409
    message: Member code already exists
  - code: BOND_MEMBER_ACCESS_NOT_PROVISIONED
    status: 409
    message: External access credentials have not been provisioned
  - code: BOND_MEMBER_BROKER_MASTER_INCOMPLETE
    status: 422
    message: Broker master record indicators are incomplete
  - code: BOND_MEMBER_SETTLEMENT_UNVERIFIED
    status: 409
    message: Settlement details have not been verified by the bond code registry
  - code: BOND_MEMBER_CAPITAL_ADEQUACY_NOT_CONFIRMED
    status: 409
    message: Capital adequacy briefing has not been confirmed by surveillance
  - code: BOND_MEMBER_ROLE_FORBIDDEN
    status: 403
    message: Only a senior customer-support officer may perform this action

events:
  - name: bond_member.applied
    payload: [member_code, member_legal_name, effective_date, cs_officer, timestamp]
  - name: bond_member.approved
    payload: [member_code, membership_approval_reference, approved_by, timestamp]
  - name: bond_member.broker_master_loaded
    payload: [member_code, loaded_by, timestamp]
  - name: bond_member.access_provisioned
    payload: [member_code, super_user_id, additional_user_id, provisioned_by, timestamp]
  - name: bond_member.settlement_registered
    payload: [member_code, member_settlement_account, verified, timestamp]
  - name: bond_member.client_settlement_loaded
    payload: [member_code, client_type, settlement_account, timestamp]
  - name: bond_member.capital_adequacy_confirmed
    payload: [member_code, confirmed_by, timestamp]
  - name: bond_member.activated
    payload: [member_code, activated_by, timestamp]
  - name: bond_member.suspended
    payload: [member_code, reason, suspended_by, timestamp]

outcomes:
  record_member_application:
    priority: 1
    description: Customer support records the member application once a service-provider letter is lodged
    given:
      - field: service_provider_letter
        source: input
        operator: exists
      - field: member_legal_name
        source: input
        operator: exists
    then:
      - action: create_record
        type: bond_member
      - action: set_field
        target: member_status
        value: applied
      - action: emit_event
        event: bond_member.applied
    transaction: true

  reject_missing_service_provider_letter:
    priority: 2
    error: BOND_MEMBER_SERVICE_PROVIDER_LETTER_MISSING
    description: Application may not be recorded without the written appointment letter
    given:
      - field: service_provider_letter
        source: input
        operator: not_exists
    then:
      - action: emit_event
        event: bond_member.applied

  approve_member_after_exchange_confirmation:
    priority: 3
    description: Transition to approved once the bond exchange has confirmed membership and issued a member code
    given:
      - field: member_status
        source: db
        operator: eq
        value: applied
      - field: membership_approval_reference
        source: input
        operator: exists
      - field: member_code
        source: input
        operator: exists
    then:
      - action: transition_state
        field: member_status
        from: applied
        to: approved
      - action: emit_event
        event: bond_member.approved
    transaction: true

  load_broker_master_record:
    priority: 4
    description: Senior customer-support officer loads broker-master indicators at least one day before live date
    given:
      - field: user_role
        source: session
        operator: eq
        value: customer_support_officer
      - field: member_status
        source: db
        operator: eq
        value: approved
      - field: gilt_user_flag
        source: input
        operator: eq
        value: true
    then:
      - action: set_field
        target: party_role
        value: PT
      - action: set_field
        target: category
        value: C
      - action: set_field
        target: settlement_terms
        value: AC
      - action: set_field
        target: charge_type
        value: F
      - action: set_field
        target: broker_user_flag
        value: true
      - action: emit_event
        event: bond_member.broker_master_loaded
    transaction: true

  reject_non_senior_loading:
    priority: 5
    error: BOND_MEMBER_ROLE_FORBIDDEN
    description: Non-senior users may not load broker-master or settlement data
    given:
      - field: user_role
        source: session
        operator: neq
        value: customer_support_officer
    then:
      - action: emit_event
        event: bond_member.broker_master_loaded

  provision_access_credentials:
    priority: 6
    description: Access-control coordinator provisions super-user and additional IDs after broker-master is loaded and external registry has provisioned its side
    given:
      - field: user_role
        source: session
        operator: eq
        value: access_control_coordinator
      - all:
          - field: super_user_id
            source: input
            operator: exists
          - field: broker_master_loaded
            source: db
            operator: eq
            value: true
    then:
      - action: set_field
        target: additional_user_id
        value: generated
      - action: emit_event
        event: bond_member.access_provisioned
    transaction: true

  register_settlement_details:
    priority: 7
    description: Trigger settlement-details registration to the bond code registry and store verified reply
    given:
      - field: member_code
        source: input
        operator: exists
      - field: trading_type
        source: input
        operator: in
        value: [proprietary, client, both]
    then:
      - action: call_service
        target: bond_code_registry.register_settlement
      - action: set_field
        target: member_settlement_account
        value: "40527"
      - action: emit_event
        event: bond_member.settlement_registered
    transaction: true

  reject_unverified_settlement:
    priority: 8
    error: BOND_MEMBER_SETTLEMENT_UNVERIFIED
    description: Member may not be activated while settlement details remain unverified by the bond code registry
    given:
      - field: settlement_verified
        source: db
        operator: eq
        value: false
    then:
      - action: emit_event
        event: bond_member.settlement_registered

  load_resident_client_settlement:
    priority: 9
    description: Load resident member-settled client settlement details with local client type
    given:
      - field: client_type
        source: input
        operator: eq
        value: resident
      - field: trading_type
        source: input
        operator: in
        value: [client, both]
    then:
      - action: set_field
        target: country_code
        value: ZA
      - action: set_field
        target: resident_client_settlement_account
        value: "40519"
      - action: emit_event
        event: bond_member.client_settlement_loaded
    transaction: true

  load_non_resident_client_settlement:
    priority: 10
    description: Load non-resident member-settled client settlement details with generic foreign country code
    given:
      - field: client_type
        source: input
        operator: eq
        value: non_resident
      - field: trading_type
        source: input
        operator: in
        value: [client, both]
    then:
      - action: set_field
        target: country_code
        value: ZZ
      - action: set_field
        target: non_resident_client_settlement_account
        value: "40501"
      - action: emit_event
        event: bond_member.client_settlement_loaded
    transaction: true

  confirm_capital_adequacy:
    priority: 11
    description: Surveillance confirms the member has been briefed on and meets capital-adequacy requirements
    given:
      - field: user_role
        source: session
        operator: eq
        value: surveillance_officer
      - field: capital_adequacy_confirmed
        source: input
        operator: eq
        value: true
    then:
      - action: set_field
        target: capital_adequacy_confirmed
        value: true
      - action: emit_event
        event: bond_member.capital_adequacy_confirmed
    transaction: true

  activate_bond_member:
    priority: 12
    description: Activate the member for live bond trading once all preconditions are satisfied
    given:
      - field: member_status
        source: db
        operator: eq
        value: approved
      - field: broker_master_loaded
        source: db
        operator: eq
        value: true
      - field: access_provisioned
        source: db
        operator: eq
        value: true
      - field: settlement_verified
        source: db
        operator: eq
        value: true
      - field: capital_adequacy_confirmed
        source: db
        operator: eq
        value: true
    then:
      - action: transition_state
        field: member_status
        from: approved
        to: active
      - action: emit_event
        event: bond_member.activated
    transaction: true

  reject_activation_without_capital_confirmation:
    priority: 13
    error: BOND_MEMBER_CAPITAL_ADEQUACY_NOT_CONFIRMED
    description: Block activation until surveillance has confirmed capital adequacy
    given:
      - field: capital_adequacy_confirmed
        source: db
        operator: neq
        value: true
    then:
      - action: emit_event
        event: bond_member.activated

  suspend_on_capital_breach:
    priority: 14
    description: Surveillance may suspend an active member on a capital-adequacy breach
    given:
      - field: user_role
        source: session
        operator: eq
        value: surveillance_officer
      - field: member_status
        source: db
        operator: eq
        value: active
    then:
      - action: transition_state
        field: member_status
        from: active
        to: suspended
      - action: emit_event
        event: bond_member.suspended
    transaction: true

api:
  http:
    method: POST
    path: /api/v1/bond-members
  request:
    schema:
      member_legal_name: text
      effective_date: date
      cs_officer: text
      service_provider_letter: file
      trading_type: select
      gilt_user_flag: boolean
  response:
    success:
      status: 201
      schema:
        member_code: text
        member_status: select
    errors:
      - error_code: BOND_MEMBER_SERVICE_PROVIDER_LETTER_MISSING
        status: 422
      - error_code: BOND_MEMBER_DUPLICATE_CODE
        status: 409
      - error_code: BOND_MEMBER_NOT_APPROVED
        status: 409
      - error_code: BOND_MEMBER_BROKER_MASTER_INCOMPLETE
        status: 422
      - error_code: BOND_MEMBER_SETTLEMENT_UNVERIFIED
        status: 409
      - error_code: BOND_MEMBER_CAPITAL_ADEQUACY_NOT_CONFIRMED
        status: 409
      - error_code: BOND_MEMBER_ROLE_FORBIDDEN
        status: 403

anti_patterns:
  - rule: "Do not load broker-master or settlement records before exchange membership approval is confirmed"
    why: Unapproved members have no legal basis to trade and will cause trade-rejection cascades
  - rule: "Do not provision internal access credentials before the external registry has provisioned its side"
    why: The registry-issued super-user credential is a required input to internal provisioning; skipping this sequence produces orphaned user IDs
  - rule: "Do not let settlement default to the generic default-settlement account in production"
    why: Default routing masks missing settlement-details linkage and hides reconciliation breaks until month-end
  - rule: "Do not activate a member before surveillance has confirmed capital adequacy"
    why: Capital-adequacy breach exposes the service provider to regulatory and financial loss on a defaulting counterparty
  - rule: "Do not mix resident and non-resident client settlement on a single settlement account"
    why: Exchange-control legislation requires strict segregation of non-resident funds; mixing breaches the rules
  - rule: "Do not allow junior operators to load bond-member reference data"
    why: Bond-member loading errors propagate to all downstream trade processing and are difficult to unwind
  - rule: "Do not record real credentials (super-user passwords, registry IDs) in plaintext in tickets, emails, or logs"
    why: POPIA s.19 and basic credential hygiene require secure transmission and encrypted storage
  - rule: "Do not assume automatic market settlement for bond trades"
    why: Bond trades require manual cash-book and receipt/delivery entries; assuming automation causes unsettled positions

related:
  - feature: broker-client-account-maintenance
    type: required
  - feature: popia-compliance
    type: required
  - feature: broker-back-office-dissemination
    type: recommended
  - feature: broker-client-data-upload
    type: recommended

extensions:
  screens:
    BROKM: Broker Master Maintenance
    STAGN: Settlement Agent and Settlement Details
    CLMNT: Client Account Maintenance
    TRMNT: Transfer and General Ledger Maintenance
    ACDLU: Deal Capture for Controlled Accounts
    SCRAL: Scrip Allocation
    SCRMV: Scrip Movement
  settlement_accounts:
    "40527": Member Proprietary Settlement Account
    "40519": Resident Member-Settled Client Settlement Account
    "40501": Non-Resident Member-Settled Client Settlement Account
    "40071": Non-Member Settled Clearing Account
    "40089": Default Settlement Account
  general_ledger:
    "11023": Bonds Member Settled Default
    "11031": Bonds Non Member Settled
    "11049": Bonds Member Settled Residents
    "11056": Bonds Member Settled Non Residents
    "11064": Bonds Member Settled Proprietary
