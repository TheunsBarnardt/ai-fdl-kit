extensions:
  worked_example:
    # Source: Vol 1, Module 5, p.166
    joint_distribution:
      - {r_a: 0.20, r_b: 0.15, probability: 0.30}
      - {r_a: 0.10, r_b: 0.05, probability: 0.50}
      - {r_a: -0.05, r_b: -0.10, probability: 0.20}
    e_r_a: 0.10
    e_r_b: 0.065
    covariance_formula: "0.30*(0.20-0.10)*(0.15-0.065) + 0.50*(0.10-0.10)*(0.05-0.065) + 0.20*(-0.05-0.10)*(-0.10-0.065)"
    positive_comovement: "All deviation cross-products have the same sign → strong positive covariance"

related:
  - feature: portfolio-variance-covariance
    type: required
  - feature: covariance-correlation
    type: required
  - feature: expected-value-variance
    type: required
  - feature: probability-tree-conditional-expectation
    type: recommended
