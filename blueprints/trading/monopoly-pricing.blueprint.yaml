# ============================================================
# monopoly-pricing — Feature Blueprint
# Source: CFA LV1 2025 Vol 02 — Module 1 (monopoly sections)
# ============================================================

feature: monopoly-pricing
version: "1.0.0"
description: Determine the profit-maximising price and quantity for a monopolist using MR = MC, analyse price discrimination, and evaluate regulatory responses to monopoly power
category: trading
tags: [economics, microeconomics, monopoly, price-discrimination, deadweight-loss, regulation, cfa-level-1]
aliases:
  - single-seller-model
  - price-discrimination
  - natural-monopoly
  - regulated-monopoly
  - monopoly-deadweight-loss
  - markup-over-mc

actors:
  - id: pricing_engine
    name: Monopoly Pricing Engine
    type: system

fields:
  - name: firm_id
    type: text
    required: true
    label: Monopolist identifier
  - name: market_demand
    type: json
    required: true
    label: Market demand schedule or inverse demand function
  - name: marginal_cost
    type: number
    required: false
    label: Constant or schedule of marginal cost
  - name: regulation
    type: select
    required: false
    label: none | price_cap | rate_of_return | breakup
  - name: price_discrimination
    type: select
    required: false
    label: none | first_degree | second_degree | third_degree

rules:
  monopoly_optimum:
    # Source: Vol 2, Module 1 (monopoly section)
    rule: "Profit max at MR = MC; price set from demand curve at that quantity"
    mr_formula: "MR = P * (1 - 1/|elasticity|) for linear demand"
    markup_rule: "P = MC / (1 - 1/|elasticity|) — Lerner markup"
  barriers_to_entry:
    legal: "Patents, licenses, exclusive franchises"
    natural: "Economies of scale that make single firm most efficient"
    resource: "Control of essential input"
    strategic: "Predatory pricing, exclusive contracts"
  price_discrimination:
    first_degree: "Charge each customer their maximum willingness to pay"
    second_degree: "Volume or quality tiers (e.g., block pricing, versioning)"
    third_degree: "Different prices to identifiable groups (students, seniors)"
    requirements:
      - "Market power"
      - "Ability to segment customers"
      - "Prevent resale between segments"
  natural_monopoly:
    definition: "Industry in which single firm has lowest LRAC (declining throughout)"
    examples: "Water distribution, local electricity grid, rail infrastructure"
    regulation_rationale: "Avoid monopoly markup while preserving scale economies"
  regulation_approaches:
    price_cap: "Regulator sets maximum price (often at ATC or below)"
    rate_of_return: "Guaranteed return on invested capital; risks over-investment (Averch-Johnson)"
    marginal_cost_pricing: "P = MC; requires subsidy since P < ATC in natural monopoly"
    average_cost_pricing: "P = ATC; zero economic profit, socially second-best"
  investment_applications:
    pharma_patents: "Temporary monopoly during patent life"
    utility_valuation: "Regulated ROE constrains monopoly profit"
    tech_platforms: "Network-effect near-monopoly with antitrust scrutiny"
    music_streaming: "Price discrimination via subscription tiers"
  validation:
    firm_id_present: "firm_id required"
    demand_present: "market_demand required"
    valid_regulation: "regulation in {none, price_cap, rate_of_return, breakup}"

outcomes:
  compute_monopoly_price:
    priority: 1
    description: Unregulated monopoly optimum
    given:
      - field: regulation
        source: input
        operator: eq
        value: none
      - field: market_demand
        source: input
        operator: exists
    then:
      - action: call_service
        target: pricing_engine
      - action: emit_event
        event: monopoly.optimum_computed
  apply_regulation:
    priority: 2
    description: Regulated price and quantity
    given:
      - field: regulation
        source: input
        operator: in
        value: [price_cap, rate_of_return]
    then:
      - action: call_service
        target: pricing_engine
      - action: emit_event
        event: monopoly.regulation_applied
  missing_demand:
    priority: 10
    description: Market demand missing
    given:
      - field: market_demand
        source: input
        operator: not_exists
    then:
      - action: emit_event
        event: monopoly.pricing_rejected
    error: MONOPOLY_DEMAND_MISSING

errors:
  - code: MONOPOLY_DEMAND_MISSING
    status: 400
    message: market_demand is required to compute monopoly optimum

events:
  - name: monopoly.optimum_computed
    payload: [firm_id, monopoly_price, monopoly_quantity, economic_profit, deadweight_loss]
  - name: monopoly.regulation_applied
    payload: [firm_id, regulated_price, regulated_quantity, consumer_surplus]
  - name: monopoly.pricing_rejected
    payload: [firm_id, reason_code]

anti_patterns:
  - rule: Do not assume a monopolist charges the highest possible price
    why: "Monopolists maximise profit, not price; quantity matters and very high prices drive demand below the profit-max point"
  - rule: Do not model regulated monopoly profit using the unregulated formula
    why: "Price caps and rate-of-return ceilings cap ROE below what the Lerner markup would deliver"
  - rule: Do not ignore the deadweight loss when assessing monopoly welfare
    why: "Society loses the transactions between marginal cost and demand at the monopoly price; valuation of policy interventions hinges on that triangle"
  - rule: Do not confuse natural monopoly with the need for private operation
    why: "Scale economies justify single-firm production but not necessarily unregulated private ownership; public/regulated structures are alternatives"

api:
  http:
    method: POST
    path: /micro/monopoly/optimise
  request:
    schema:
      firm_id: string
      market_demand: object
      marginal_cost: number
      regulation: string
      price_discrimination: string
  response:
    success:
      status: 200
      schema:
        firm_id: string
        monopoly_price: number
        monopoly_quantity: number
        economic_profit: number
        deadweight_loss: number
        regulated_outcome: object
    errors:
      - status: 400
        error_code: MONOPOLY_DEMAND_MISSING

extensions:
  lerner_index:
    formula: "L = (P - MC) / P = 1 / |elasticity|"
    interpretation: "Markup relative to price; higher L signals more market power"

related:
  - feature: market-structures-analysis
    type: required
  - feature: profit-maximization-breakeven
    type: required
  - feature: oligopoly-pricing
    type: recommended
