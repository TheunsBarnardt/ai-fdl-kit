# ============================================================
# probability-tree-conditional-expectation — Feature Blueprint
# Source: CFA LV1 2025 Vol 01 — Module 4, p.136-141
# ============================================================

feature: probability-tree-conditional-expectation
version: "1.0.0"
description: Model sequential uncertain events as a probability tree and compute conditional expected values, conditional variances, and joint probabilities along each branch
category: trading
tags: [quantitative-methods, probability, probability-tree, conditional-expectation, conditional-probability, scenario-analysis, cfa-level-1]
aliases:
  - probability-tree
  - decision-tree-probabilities
  - conditional-expectation
  - conditional-expected-value
  - conditional-variance
  - scenario-tree
  - tree-diagram

actors:
  - id: probability_engine
    name: Probability / Forecasting Engine
    type: system

fields:
  - name: tree_structure
    type: json
    required: true
    label: Tree of {node_id, parent_id, event, conditional_probability, payoff, is_terminal}
  - name: target_conditioning_event
    type: text
    required: false
    label: Event S used to condition E(X | S)
  - name: compute
    type: select
    required: false
    label: joint_probabilities | conditional_expectation | conditional_variance | path_values

rules:
  core_definitions:
    # Source: Vol 1, Module 4, p.136-137
    conditional_probability: "P(A | B) = P(AB) / P(B), requires P(B) > 0"
    joint_probability: "P(A and B) = P(A | B) * P(B) = P(B | A) * P(A)"
    independent_events: "P(A and B) = P(A) * P(B) when A, B independent"
    conditional_expectation: "E(X | S) = sum_i[ P(X_i | S) * X_i ]"
    conditional_variance: "Var(X | S) = sum_i[ P(X_i | S) * (X_i - E(X|S))^2 ]"
  probability_tree_mechanics:
    # Source: Vol 1, Module 4, p.138-141
    structure: "Each node represents an event; branches represent conditional probabilities summing to 1 at each node"
    path_probability: "Product of conditional probabilities along the path from root to leaf"
    expected_value_of_tree: "Sum over all terminal nodes of (path_probability * terminal_payoff)"
  tree_properties:
    exhaustive_at_each_node: "Branches leaving a node must represent mutually exclusive and exhaustive events"
    probabilities_sum_to_one: "At each branching point, conditional probabilities sum to 1"
    sequential_independence: "Allows compact representation of multi-stage uncertainty"
  investment_applications:
    scenario_analysis: "Economy → sector → firm earnings tree for EPS forecasting"
    real_options: "Project value under sequential investment decisions"
    credit_default: "Conditional default probability given rating migrations"
    binomial_option_pricing: "Up/down tree of asset price paths"
  validation:
    tree_connected: "Every non-root node has a valid parent"
    probabilities_sum_at_each_node: "|sum(branch_probs) - 1| <= 1e-8 per parent node"
    terminal_nodes_have_payoffs: "Every leaf must have a numeric payoff to compute E(X)"

outcomes:
  compute_joint_probabilities:
    priority: 1
    description: Multiply conditional probabilities along each root-to-leaf path
    given:
      - field: tree_structure
        source: input
        operator: exists
      - field: tree_valid
        source: computed
        operator: eq
        value: true
    then:
      - action: call_service
        target: probability_engine
      - action: emit_event
        event: probability.tree_evaluated
  compute_conditional_expectation:
    priority: 2
    description: E(X | S) along a conditioning branch
    given:
      - field: target_conditioning_event
        source: input
        operator: exists
    then:
      - action: call_service
        target: probability_engine
      - action: emit_event
        event: probability.conditional_expectation_calculated
  tree_malformed:
    priority: 10
    description: Tree does not satisfy structure requirements
    given:
      - field: tree_valid
        source: computed
        operator: eq
        value: false
    then:
      - action: emit_event
        event: probability.tree_rejected
    error: TREE_MALFORMED
  empty_tree:
    priority: 11
    description: Tree structure missing
    given:
      - field: tree_structure
        source: input
        operator: not_exists
    then:
      - action: emit_event
        event: probability.tree_rejected
    error: TREE_EMPTY

errors:
  - code: TREE_EMPTY
    status: 400
    message: Tree structure must be provided
  - code: TREE_MALFORMED
    status: 400
    message: Tree is malformed — disconnected nodes, probabilities not summing to 1, or missing terminal payoffs

events:
  - name: probability.tree_evaluated
    payload: [tree_id, joint_probabilities, path_count, total_expected_value]
  - name: probability.conditional_expectation_calculated
    payload: [tree_id, conditioning_event, conditional_expected_value, conditional_variance]
  - name: probability.tree_rejected
    payload: [tree_id, reason_code]

anti_patterns:
  - rule: Do not confuse P(A | B) with P(B | A)
    why: "The prosecutor's fallacy — swapping conditional directions is one of the most common probability errors; they are equal only if P(A) = P(B)"
  - rule: Do not multiply marginal probabilities when events are dependent
    why: "P(A and B) = P(A) * P(B) holds only under independence; using it for dependent events overstates or understates joint likelihood"
  - rule: Do not omit branches that carry zero probability
    why: "Explicit zero-probability branches document the analysis and prevent silent tree malformations; removal makes the tree harder to audit"
  - rule: Do not use a single-scenario 'most likely' outcome instead of full tree expectation
    why: "Most-likely path ignores tail scenarios that drive portfolio risk; always compute full E(X) and path-weighted outcomes"

api:
  http:
    method: POST
    path: /analytics/probability/tree
  request:
    schema:
      tree_structure: array
      target_conditioning_event: string
      compute: string
  response:
    success:
      status: 200
      schema:
        expected_value: number
        joint_probabilities: array
        conditional_expected_value: number
        conditional_variance: number
    errors:
      - status: 400
        error_code: TREE_EMPTY
      - status: 400
        error_code: TREE_MALFORMED

extensions:
  worked_example:
    # Source: Vol 1, Module 4, p.139 — BankCorp tree
    scenario: "Economy (good 0.60 / poor 0.40) → EPS outcomes"
    good_economy:
      p_high: 0.25
      p_low: 0.75
      eps_high: 2.60
      eps_low: 2.45
    poor_economy:
      p_high: 0.60
      p_low: 0.40
      eps_high: 2.20
      eps_low: 2.00
    joint_probabilities:
      good_high: 0.15
      good_low: 0.45
      poor_high: 0.24
      poor_low: 0.16
    conditional_expectation_good: "0.25*2.60 + 0.75*2.45 = 2.4875"
    conditional_expectation_poor: "0.60*2.20 + 0.40*2.00 = 2.12"

related:
  - feature: expected-value-variance
    type: required
  - feature: total-probability-rule
    type: recommended
  - feature: bayes-formula
    type: recommended
