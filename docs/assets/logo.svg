<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="'Courier New', monospace">
  <!-- ai-fdl-kit logo — pixel art with chromatic aberration -->
  <!-- Rendered entirely as <rect> so no font dependencies. -->

  <rect width="1200" height="500" fill="#000000"/>

  <!--
    Each letter is a 5-wide x 7-tall pixel grid. Cell size = 28px.
    Letter width = 5*28 = 140px. Gap = 32px. 6 letters + 5 gaps.
    Total word width = 6*140 + 5*32 = 840 + 160 = 1000.
    Center horizontally: (1200-1000)/2 = 100px left padding.
    Top of word: 110px.
  -->

  <!-- ─── Chromatic layer 1: cyan, shifted right ───────────── -->
  <g transform="translate(112,110)" fill="#00f0ff" opacity="0.9">
    <!-- F -->
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="28" height="28"/><rect x="28" y="0" width="28" height="28"/><rect x="56" y="0" width="28" height="28"/><rect x="84" y="0" width="28" height="28"/><rect x="112" y="0" width="28" height="28"/>
      <rect x="0" y="28" width="28" height="28"/>
      <rect x="0" y="56" width="28" height="28"/>
      <rect x="0" y="84" width="28" height="28"/><rect x="28" y="84" width="28" height="28"/><rect x="56" y="84" width="28" height="28"/><rect x="84" y="84" width="28" height="28"/>
      <rect x="0" y="112" width="28" height="28"/>
      <rect x="0" y="140" width="28" height="28"/>
      <rect x="0" y="168" width="28" height="28"/>
    </g>
    <!-- D -->
