errors:
  - code: SERVICE_DEGRADED
    status: 503
    message: "Service temporarily unavailable. Automatic recovery in progress."
    retry: true

  - code: SSL_RENEWAL_FAILED
    status: 500
    message: "SSL certificate renewal failed. Service remains available with current certificate."
    retry: true

  - code: BACKUP_FAILED
    status: 500
    message: "Automated backup failed. Previous backups remain available."
    retry: true

  - code: DISK_SPACE_CRITICAL
    status: 503
    message: "Server disk space critically low. Some operations may be affected."
    retry: true

  - code: INTRUSION_DETECTED
    status: 403
    message: "Suspicious activity detected and blocked."
    retry: false

  - code: DNS_UPDATE_FAILED
    status: 503
    message: "DNS update failed. Server may be temporarily unreachable via domain name."
    retry: true

  - code: PORT_FORWARDING_FAILED
    status: 503
    message: "Required ports are not accessible from the public internet."
    retry: true

  - code: DATABASE_CONNECTION_FAILED
    status: 500
    message: "Database connection failed. Automatic restart attempted."
    retry: true

sla:
  web_response:
    max_duration: "500ms"
    description: "Web server responds within 500ms for static content (p95)"

  uptime:
    max_duration: "99.9%"
    description: "99.9% uptime target — max 8.7 hours downtime per year"

  ssl_renewal:
    max_duration: "30d"
    description: "SSL certificates renewed at least 30 days before expiry"
    escalation:
      - after: "14d"
        action: "alert_admin"
        description: "Urgent alert if certificate expiring within 14 days"

  backup_completion:
    max_duration: "4h"
    description: "Daily backup completes within 4 hours"

  incident_response:
    max_duration: "5m"
    description: "Automated recovery attempts within 5 minutes of service failure"

  ddns_update:
    max_duration: "10m"
    description: "DNS updated within 10 minutes of IP address change"

