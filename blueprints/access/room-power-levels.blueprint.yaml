  source:
    repo: "https://github.com/element-hq/synapse"
    project: "Synapse Matrix homeserver"
    tech_stack: "Python / Twisted async"
    files_traced: 4
    entry_points:
      - "synapse/event_auth.py"
      - "synapse/handlers/room.py"
