      - error messages never expose internal system details

extensions:
  worked_example:
    # Source: Vol 1, Module 3, p.111
    scenario: "Monthly returns, target = 0%"
    returns: [0.02, -0.01, 0.03, -0.005, 0.015, -0.02]
    below_target_squared_sum: 0.000525
    n_minus_1: 5
    target_semideviation: 0.01025
  sortino_example:
    formula: "Sortino = (R_portfolio - R_target) / target_semideviation"
    rationale: "Penalises only 'bad' volatility (below target)"

related:
  - feature: measures-of-dispersion
    type: recommended
  - feature: holding-period-return
    type: recommended
