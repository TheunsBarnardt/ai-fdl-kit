feature: market-data-indices-nlmd
version: 1.0.0
description: Non-live market data products for all index families (equity, sector, style, thematic, factor, fixed-income, multi-asset)
category: trading
tags: [market-data, indices, nlmd, non-live, end-of-day, reference-data]
aliases:
  - indices-nlmd-feeds
  - index-reference-data
  - nlmd-index-data
  - index-eod-data
  - market-data-indices-all

fields:
  - name: index_code
    type: text
    required: true
    label: Index Code
  - name: index_family
    type: select
    required: true
    label: Index Family
  - name: data_type
    type: select
    required: true
    label: Data Type (Price, Return, Volatility, Earnings, NAV)
  - name: distribution_date
    type: date
    required: true
    label: Distribution Date
  - name: record_count
    type: number
    required: false
    label: Number of Data Records

rules:
  data_delivery:
    eod_publication: "Index data published end-of-day after market close"
    file_format: "Delivered in fixed-width or delimited text format"
    content_inclusion: "Includes opening, high, low, close, volume, and technical indicators"

outcomes:
  publish_nlmd_index_data:
    priority: 1
    description: Publish non-live index market data file
    given:
      - field: index_code
        source: input
        operator: exists
    then:
      - action: emit_event
        event: nlmd.published

errors:
  - code: NLMD_PUBLISH_FAILED
    status: 500
    message: Failed to publish index NLMD data

events:
  - name: nlmd.published
    payload: [index_code, publication_date, file_size]

extensions:
  index_families:
    - {family: Headline, indices: [ALSI, TOP40, FINI, RAFI]}
    - {family: African, indices: [AllAfrica40USD, AllAfrica40ZAR, AllAfricaExSA30USD, AllAfricaExSA30ZAR]}
    - {family: Capped, indices: [CappedAllShare, CappedAllShareNetTRI, CappedIndustrial25, CappedSHARIATop40, CappedTop40, CappedTop40NetTRI]}
    - {family: Core, indices: [Core, CoreNetTRI]}
    - {family: Factor, indices: [DividendYield, LowVolatility, Quality, Momentum, Value]}
    - {family: Style, indices: [Growth, Value]}
    - {family: Thematic, indices: [GlobalInvestor, ResponsibleInvestment, SHARIAH]}
    - {family: Sector, indices: [Financial, Industrial, Resource]}
    - {family: FixedIncome, indices: [FTSEJSEFixedIncome, BondETP, BondMarketData]}
    - {family: MultiAsset, indices: [FTSEJSEMultiAsset]}
    - {family: Technical, indices: [EarningsYield, ValueAdded, IntraDaySnapshots]}
  data_products:
    - {product: Price, description: "Closing price and price changes"}
    - {product: Return, description: "Total return including reinvested dividends"}
    - {product: Volatility, description: "Historical volatility measures"}
    - {product: Earnings, description: "Earnings yields and multiples"}
    - {product: NAV, description: "Net asset value for index-linked funds"}

related:
  - feature: index-data-feeds
    type: extends
  - feature: reference-data-management
    type: required
