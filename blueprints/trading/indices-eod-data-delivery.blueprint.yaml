# ============================================================
# FTSE-JSE Indices End-of-Day Data Delivery — Feature Blueprint
# FDL v0.1.0 | Blueprint v1.0.0
# ============================================================
# Extracted from: FTSE-JSE Indices Non-Live Data Products
# Specifications v12.0 (778 pages)
# Fixed-width flat file dissemination of end-of-day index
# data products covering 30+ index families with valuations,
# constituents, trackers (index level, stock level weighting,
# ex-dividend), opening constituents, and five-day trackers
# ============================================================

