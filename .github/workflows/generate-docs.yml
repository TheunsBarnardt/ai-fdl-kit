name: Generate Docs & Deploy Pages

on:
  push:
    branches: [master]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    # Skip if the push was already made by auto-evolve or the CI bot itself
    if: |
      !contains(github.event.head_commit.message, 'auto-evolve') &&
      !contains(github.event.head_commit.message, 'Extract/Update') &&
      github.event.head_commit.author.name != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so rebase has context
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # `npm ci` instead of `npm install`: faster, deterministic from the
      # lockfile, and never mutates package-lock.json. `npm install` was
      # leaving subtle lockfile drift unstaged after the auto-commit, which
      # broke the subsequent `git pull --rebase` and blocked Pages deploys.
      - run: npm ci

      - run: npm run generate

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage every path npm run generate writes to:
          #   docs/blueprints/, docs/api/  — generate-docs + generate-api + agi-registry + relationship-graph
          #   blueprints/                  — generate-readmes (per-feature .md, INDEX.md, blueprint-index.json)
          # Missing the third path used to leave it unstaged and crash `git pull --rebase`.
          git add docs/blueprints/ docs/api/ blueprints/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-generate docs and API from blueprints"
            # Pull rebase before pushing to avoid diverging from any concurrent local commits
            git pull --rebase origin master
            git push
          fi

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Pull latest (including generated files)
        run: git pull origin master

      - uses: actions/configure-pages@v5

      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Verify API files in build
        run: |
          echo "Checking _site/api/registry.json..."
          ls -la _site/api/registry.json || echo "WARNING: registry.json missing from build!"
          ls _site/api/blueprints/ | head -5 || echo "WARNING: blueprint JSONs missing!"

      - uses: actions/upload-pages-artifact@v3

      - id: deployment
        uses: actions/deploy-pages@v4
