      description: Distinguish weak, semi-strong, and strong forms of market efficiency, test joint hypotheses with event
        studies, and reconcile market value with intrinsic value
      success_metrics:
        - metric: policy_violation_rate
          target: 0%
          measurement: Operations that violate defined policies
        - metric: audit_completeness
